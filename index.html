        <style>
            /* ── Variables ── */
            :root {
                --navy: #0b1d3a;
                --blue-dark: #163566;
                --blue-mid: #1e4d9a;
                --blue: #2563b0;
                --blue-light: #4a87d8;
                --blue-pale: #dbeafe;
                --blue-xpale: #eff6ff;
                --white: #ffffff;
                --bg: #f2f6fb;
                --border: #d4e4f7;
                --line-color: #bdd5f0;
                --text-main: #0b1d3a;
                --text-mid: #2c4a73;
                --text-muted: #6789b0;
                --sidebar-w: 360px;
                --header-h: 52px;
                --transition: 0.15s ease;
            }
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body,
            html {
                height: 100%;
                font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
                font-size: 15px;
                color: var(--text-main);
                overflow: hidden;
                background: var(--bg);
            }

            /* ── App shell ── */
            #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
            }
            #main {
                display: flex;
                flex: 1;
                overflow: hidden;
            }

            /* ── Header ── */
            #header {
                height: var(--header-h);
                background: var(--navy);
                color: var(--white);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 20px;
                flex-shrink: 0;
            }
            .header-left {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .header-logo {
                width: 32px;
                height: 32px;
                background: rgba(255, 255, 255, 0.08);
                border: 1.5px solid rgba(255, 255, 255, 0.18);
                border-radius: 8px;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .header-logo svg {
                width: 18px;
                height: 18px;
            }
            .header-title {
                font-size: 14px;
                font-weight: 600;
                letter-spacing: 0.1px;
            }
            .header-right {
                display: flex;
                gap: 8px;
            }
            .hdr-btn {
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.16);
                color: white;
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
                font-size: 12px;
                font-family: inherit;
                font-weight: 500;
                transition: background var(--transition);
                display: flex;
                align-items: center;
                gap: 6px;
                text-decoration: none;
            }
            .hdr-btn:hover {
                background: rgba(255, 255, 255, 0.16);
            }
            .hdr-btn svg {
                width: 14px;
                height: 14px;
                fill: currentColor;
                flex-shrink: 0;
            }

            /* ── Sidebar ── */
            #sidebar {
                width: var(--sidebar-w);
                background: var(--white);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
                flex-shrink: 0;
            }

            .tree-node {
                display: flex;
                align-items: center;
                padding: 7px 14px;
                cursor: pointer;
                transition: all var(--transition);
                border-radius: 5px;
                margin: 0 8px;
                color: var(--text-mid);
                font-size: 13.5px;
                line-height: 1.4;
                gap: 8px;
                align-items: flex-start;
            }
            .tree-node:hover {
                background: var(--blue-xpale);
                color: var(--navy);
            }
            .tree-node.active {
                background: var(--blue-pale);
                color: var(--blue);
                font-weight: 600;
                border-left: 3px solid var(--blue);
                padding-left: 11px;
            }
            /* Toggle chevron for folders */
            .tree-chevron {
                width: 16px;
                height: 16px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                color: var(--text-muted);
                transition: transform var(--transition);
                margin-top: 2px;
            }
            li.expanded > .tree-node .tree-chevron {
                transform: rotate(90deg);
            }
            .tree-file-icon {
                width: 16px;
                height: 16px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
                color: var(--blue-light);
                margin-top: 2px;
            }
            .tree-label {
                flex: 1;
                min-width: 0;
                white-space: normal;
                word-break: break-word;
                line-height: 1.4;
            }

            /* Hierarchical folder levels */
            .tree-node.folder.level-0 {
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                color: var(--navy);
                background: var(--bg);
                border: 1px solid var(--border);
                border-radius: 6px;
                margin: 10px 8px 3px;
                padding: 9px 14px;
            }
            .tree-node.folder.level-0:hover {
                background: var(--blue-xpale);
            }
            .tree-node.folder.level-1 {
                font-size: 13.5px;
                font-weight: 600;
                color: var(--blue-mid);
                border-left: 2px solid var(--blue-pale);
                border-radius: 0 5px 5px 0;
                margin-top: 5px;
            }
            .tree-node.folder.level-2,
            .tree-node.folder.level-3 {
                font-weight: bold;
            }

            /* ── Sidebar content ── */
            #sidebar {
                overflow-y: auto;
            }
            #tree-root {
                padding: 10px 0 16px;
            }

            /* File tree */
            ul.tree {
                list-style: none;
            }
            ul.tree ul {
                padding-left: 14px;
                display: none;
            }
            ul.tree li {
                margin: 1px 0;
            }
            ul.tree li.expanded > ul {
                display: block;
            }

            .tree-node {
                display: flex;
                align-items: flex-start;
                padding: 7px 14px;
                cursor: pointer;
                transition: all var(--transition);
                border-radius: 5px;
                margin: 0 8px;
                color: var(--text-mid);
                font-size: 13.5px;
                line-height: 1.4;
                gap: 8px;
            }

            /* ── Content area ── */
            #content-area {
                flex: 1;
                display: flex;
                flex-direction: column;
                background: var(--bg);
                overflow: hidden;
            }
            #breadcrumb-bar {
                height: 38px;
                background: var(--white);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                padding: 0 20px;
                font-size: 12px;
                color: var(--text-muted);
                overflow-x: auto;
                white-space: nowrap;
                flex-shrink: 0;
            }
            .breadcrumb-item {
                display: inline-flex;
                align-items: center;
            }
            .breadcrumb-item:not(:last-child)::after {
                content: "›";
                margin: 0 7px;
                color: var(--line-color);
            }
            .breadcrumb-item.current {
                color: var(--navy);
                font-weight: 600;
            }

            #iframe-container {
                flex: 1;
                position: relative;
            }
            iframe {
                width: 100%;
                height: 100%;
                border: none;
                display: block;
            }

            /* ── Placeholder ── */
            .placeholder {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                height: 100%;
                color: var(--text-muted);
                text-align: center;
                padding: 20px;
            }
            .placeholder-icon {
                width: 64px;
                height: 64px;
                background: var(--blue-xpale);
                border: 1.5px solid var(--blue-pale);
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                margin-bottom: 20px;
                color: var(--blue-light);
            }
            .placeholder-icon svg {
                width: 32px;
                height: 32px;
            }
            .placeholder-title {
                font-size: 17px;
                font-weight: 600;
                color: var(--navy);
                margin-bottom: 8px;
            }
            .placeholder-text {
                font-size: 13px;
                max-width: 380px;
                line-height: 1.6;
            }

            /* ── Toast ── */
            .toast {
                position: fixed;
                bottom: 28px;
                left: 50%;
                transform: translateX(-50%) translateY(100px);
                background: var(--navy);
                color: var(--white);
                padding: 11px 20px 11px 16px;
                border-radius: 40px;
                font-size: 13px;
                font-weight: 500;
                z-index: 9999;
                box-shadow: 0 8px 28px rgba(11, 29, 58, 0.28);
                transition: transform 0.32s
                    cubic-bezier(0.175, 0.885, 0.32, 1.275);
                pointer-events: none;
                white-space: nowrap;
                max-width: 90vw;
                overflow: hidden;
                text-overflow: ellipsis;
                display: flex;
                align-items: center;
                gap: 10px;
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .toast.visible {
                transform: translateX(-50%) translateY(0);
            }
            .toast-icon {
                flex-shrink: 0;
                display: inline-flex;
            }
            .toast-icon svg {
                width: 15px;
                height: 15px;
            }

            /* ── Responsive ── */
            @media (max-width: 768px) {
                #sidebar {
                    position: absolute;
                    left: calc(-1 * var(--sidebar-w));
                    z-index: 100;
                    height: calc(100% - var(--header-h));
                    top: var(--header-h);
                    transition: left 0.28s ease;
                    box-shadow: none;
                }
                #sidebar.open {
                    left: 0;
                    box-shadow: 4px 0 16px rgba(11, 29, 58, 0.15);
                }
                .menu-toggle {
                    display: block !important;
                }
            }
            .menu-toggle {
                display: none;
                background: transparent;
                border: none;
                color: white;
                cursor: pointer;
                padding: 4px;
                margin-right: 4px;
            }
            .menu-toggle svg {
                width: 20px;
                height: 20px;
                fill: currentColor;
            }
        </style>
    </head>

            const FOLDER_SVG =
                '<svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" width="14" height="14"><path d="M3 6h5l2 2h7a1 1 0 011 1v7a1 1 0 01-1 1H3a1 1 0 01-1-1V7a1 1 0 011-1z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>';
            const FILE_SVG =
                '<svg viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 1.5h7.5l3 3V14.5a.5.5 0 01-.5.5H2a.5.5 0 01-.5-.5v-13A.5.5 0 012 1.5z" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 1.5v3h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M4 7.5h6M4 10h6M4 12.5h3.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg>';

            function createTreeHtml(node, pathStr, level) {
                pathStr = pathStr || "";
                level = level || 0;
                var html = '<ul class="tree">';
                var keys = Object.keys(node).sort(function (a, b) {
                    var fa = typeof node[a] === "object";
                    var fb = typeof node[b] === "object";
                    if (fa && !fb) return -1;
                    if (!fa && fb) return 1;
                    return a.localeCompare(b, "es");
                });

                keys.forEach(function (key) {
                    var isFolder = typeof node[key] === "object";
                    var currentPath = pathStr ? pathStr + " > " + key : key;
                    var displayKey = key;
                    if (key === "00 - Indices" || key === "00 - Índices")
                        displayKey = "Índices";
                    if (key === "LEC")
                        displayKey = "Ley de Enjuiciamiento Civil (LEC)";
                    if (key === "LJV")
                        displayKey = "Ley de la Jurisdicción Voluntaria (LJV)";
                    if (
                        key === "01 - Legislación completa interactiva" ||
                        key === "01 - Legislación completa interactiva"
                    )
                        displayKey = "Legislación completa interactiva";
                    if (
                        key === "02 - Esquemas interactivos" ||
                        key === "02 - Esquemas interactivos"
                    )
                        displayKey = "Esquemas interactivos";
                    if (
                        key === "03 - Guías de tramitación" ||
                        key === "03 - Guías de tramitación"
                    )
                        displayKey = "Guías de tramitación";

                    if (isFolder) {
                        html += "<li>";
                        html +=
                            '<div class="tree-node folder level-' +
                            level +
                            '">';
                        html +=
                            '<span class="tree-chevron">' +
                            CHEVRON_SVG +
                            "</span>";
                        html +=
                            '<span class="tree-label">' +
                            displayKey +
                            "</span>";
                        html += "</div>";
                        html += createTreeHtml(
                            node[key],
                            currentPath,
                            level + 1,
                        );
                        html += "</li>";
                    } else {
                        var filePath = node[key];
                        var displayName = key.replace(".html", "");
                        var safeUrl = filePath
                            .replace(/&/g, "&amp;")
                            .replace(/"/g, "&quot;");
                        var safeCrumb = currentPath
                            .replace(/&/g, "&amp;")
                            .replace(/"/g, "&quot;");

                        html += "<li>";
                        html +=
                            '<div class="tree-node file level-' +
                            level +
                            '" data-url="' +
                            safeUrl +
                            '" data-crumb="' +
                            safeCrumb +
                            '">';
                        html +=
                            '<span class="tree-file-icon">' +
                            FILE_SVG +
                            "</span>";
                        html +=
                            '<span class="tree-label">' +
                            displayName +
                            "</span>";
                        html += "</div>";
                        html += "</li>";
                    }
                });
                html += "</ul>";
                return html;
            }

            var treeRoot = document.getElementById("tree-root");
            treeRoot.innerHTML = createTreeHtml(treeData);

            // Event delegation — no inline onclick quoting needed
            treeRoot.addEventListener("click", function (e) {
                var node = e.target.closest(".tree-node");
                if (!node) return;
                if (node.classList.contains("folder")) {
                    node.parentElement.classList.toggle("expanded");
                } else if (node.classList.contains("file")) {
                    loadFile(node.dataset.url, node.dataset.crumb, node);
                }
            });

            function loadFile(url, pathStr, element) {
                document
                    .querySelectorAll(".tree-node.active")
                    .forEach(function (el) {
                        el.classList.remove("active");
                    });
                if (element) {
                    element.classList.add("active");
                    if (window.innerWidth <= 768) toggleSidebar();
                }
                const viewer = document.getElementById("viewer");
                const placeholder = document.getElementById("placeholder");
                const encodedUrl = url
                    .split("/")
                    .map(encodeURIComponent)
                    .join("/");

                viewer.src = encodedUrl;
                viewer.style.display = "block";
                placeholder.style.display = "none";

                const btnNewTab = document.getElementById("btn-new-tab");
                const btnFullscreen = document.getElementById("btn-fullscreen");
                btnNewTab.href = encodedUrl;
                btnNewTab.style.display = "flex";
                btnFullscreen.style.display = "flex";

                const parts = pathStr.split(" > ");
                let breadcrumbHtml = "";
                parts.forEach(function (part, index) {
                    const cleanPart = part.replace(".html", "");
                    if (index === parts.length - 1) {
                        breadcrumbHtml +=
                            '<span class="breadcrumb-item current">' +
                            cleanPart +
                            "</span>";
                    } else {
                        breadcrumbHtml +=
                            '<span class="breadcrumb-item">' +
                            cleanPart +
                            "</span>";
                    }
                });
                document.getElementById("breadcrumb-bar").innerHTML =
                    breadcrumbHtml;
            }

            function toggleSidebar() {
                document.getElementById("sidebar").classList.toggle("open");
            }

            function toggleFullscreen() {
                const viewer = document.getElementById("viewer");
                if (!document.fullscreenElement) {
                    (
                        viewer.requestFullscreen ||
                        viewer.webkitRequestFullscreen ||
                        viewer.msRequestFullscreen
                    ).call(viewer);
                } else {
                    (
                        document.exitFullscreen ||
                        document.webkitExitFullscreen ||
                        document.msExitFullscreen
                    ).call(document);
                }
            }
