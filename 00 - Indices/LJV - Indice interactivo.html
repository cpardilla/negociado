<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            Ley 15/2015, de 2 de julio, de la Jurisdicción Voluntaria – Índice
            Interactivo
        </title>
        <style>
            :root {
                --navy: #1a2f6e;
                --blue-dark: #163566;
                --blue-mid: #1e4d9a;
                --blue: #2563b0;
                --blue-light: #4a87d8;
                --blue-pale: #dbeafe;
                --blue-xpale: #eff6ff;
                --white: #ffffff;
                --bg: #f2f6fb;
                --line-color: #bdd5f0;
                --border: #d4e4f7;
                --text-main: #0b1d3a;
                --text-mid: #2c4a73;
                --text-muted: #6789b0;
                --shadow-sm: 0 2px 8px rgba(11, 29, 58, 0.08);
                --shadow-md: 0 6px 24px rgba(11, 29, 58, 0.1);
                --shadow-lg: 0 16px 40px rgba(11, 29, 58, 0.14);
                --radius: 10px;
                --transition: 0.18s ease;
            }
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "IBM Plex Sans", "Segoe UI", system-ui, sans-serif;
                background: var(--bg);
                color: var(--text-main);
                line-height: 1.65;
                padding: 28px 20px;
                min-height: 100vh;
            }
            .container {
                max-width: 1050px;
                margin: 0 auto;
                background: var(--white);
                border-radius: 16px;
                box-shadow: var(--shadow-lg);
                overflow: hidden;
                border: 1px solid var(--border);
            }
            .header-band {
                background: var(--navy);
                padding: 36px 40px 32px;
                text-align: center;
                position: relative;
                overflow: hidden;
            }
            .header-band::before {
                content: "";
                position: absolute;
                inset: 0;
                background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            }
            .header-icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 52px;
                height: 52px;
                background: rgba(255, 255, 255, 0.1);
                border: 1.5px solid rgba(255, 255, 255, 0.2);
                border-radius: 14px;
                margin-bottom: 16px;
            }
            .header-icon svg {
                width: 28px;
                height: 28px;
            }
            h1 {
                font-size: 1.65rem;
                font-weight: 700;
                color: var(--white);
                margin-bottom: 8px;
                letter-spacing: 0.1px;
                line-height: 1.3;
                position: relative;
            }
            .subtitulo {
                color: rgba(255, 255, 255, 0.65);
                font-size: 0.88rem;
                font-weight: 400;
                letter-spacing: 1.5px;
                text-transform: uppercase;
                position: relative;
            }
            .container-body {
                padding: 32px 36px;
            }
            .search-wrapper {
                position: relative;
                margin-bottom: 28px;
            }
            .search-icon-wrap {
                position: absolute;
                left: 18px;
                top: 50%;
                transform: translateY(-50%);
                pointer-events: none;
                color: var(--blue-light);
                display: flex;
            }
            #searchInput {
                width: 100%;
                padding: 14px 20px 14px 48px;
                font-size: 0.95rem;
                font-family: inherit;
                border: 1.5px solid var(--border);
                border-radius: 40px;
                background: var(--white);
                transition: all var(--transition);
                outline: none;
                box-shadow: var(--shadow-sm);
                color: var(--text-main);
            }
            #searchInput:focus {
                border-color: var(--blue);
                box-shadow: 0 0 0 3.5px rgba(37, 99, 176, 0.13);
            }
            #searchInput::placeholder {
                color: var(--text-muted);
                font-style: italic;
                font-size: 0.9rem;
            }
            .autocomplete-list {
                position: absolute;
                top: calc(100% + 8px);
                left: 0;
                right: 0;
                background: var(--white);
                border: 1.5px solid var(--border);
                border-radius: 14px;
                max-height: 280px;
                overflow-y: auto;
                z-index: 1000;
                box-shadow: var(--shadow-md);
                display: none;
                list-style: none;
            }
            .autocomplete-list li {
                padding: 11px 18px;
                cursor: pointer;
                border-bottom: 1px solid var(--blue-xpale);
                font-size: 0.88rem;
                color: var(--text-mid);
                transition: background var(--transition);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .autocomplete-list li:last-child {
                border-bottom: none;
            }
            .autocomplete-list li:hover,
            .autocomplete-list li.active {
                background: var(--blue-xpale);
                color: var(--blue-dark);
                font-weight: 500;
            }
            .arbol {
                list-style: none;
                padding-left: 0;
                font-size: 0.93rem;
            }
            .arbol ul {
                list-style: none;
                padding-left: 26px;
                border-left: 1.5px solid var(--line-color);
                margin-left: 10px;
            }
            .arbol li {
                position: relative;
                margin: 2px 0;
                cursor: default;
                border-radius: 7px;
                transition: background var(--transition);
            }
            .arbol li:hover {
                background: var(--blue-xpale);
            }
            .arbol li.articulo {
                cursor: pointer;
                padding: 3px 10px 3px 6px;
                margin: 1px 0;
                border-radius: 6px;
                transition: all var(--transition);
            }
            .arbol li.articulo:hover {
                background: var(--blue-pale);
                transform: translateX(2px);
                box-shadow: 0 1px 4px rgba(37, 99, 176, 0.1);
            }
            .arbol li.articulo:active {
                background: #bfdbfe;
                transform: scale(0.998);
            }
            .nodo-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 5px 8px;
                border-radius: 7px;
                cursor: pointer;
                user-select: none;
                transition: background var(--transition);
            }
            .nodo-header:hover {
                background: rgba(37, 99, 176, 0.06);
            }
            .toggle-icon {
                display: inline-flex;
                align-items: center;
                justify-content: center;
                width: 20px;
                height: 20px;
                border-radius: 50%;
                background: var(--blue-pale);
                color: var(--blue-mid);
                flex-shrink: 0;
                transition: all var(--transition);
            }
            .toggle-icon svg {
                width: 10px;
                height: 10px;
                transition: transform var(--transition);
                display: block;
            }
            .toggle-icon.expandido {
                background: var(--blue);
                color: var(--white);
            }
            .toggle-icon.expandido svg {
                transform: rotate(90deg);
            }
            .nodo-texto {
                font-weight: 500;
                letter-spacing: 0.05px;
            }

            .nivel-titulo_preliminar > .nodo-header .nodo-texto,
            .nivel-disposiciones_adicionales > .nodo-header .nodo-texto,
            .nivel-disposiciones_transitorias > .nodo-header .nodo-texto,
            .nivel-disposicion_derogatoria > .nodo-header .nodo-texto,
            .nivel-disposiciones_finales > .nodo-header .nodo-texto {
                color: var(--navy);
                font-size: 1.08rem;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.8px;
            }
            .nivel-titulo > .nodo-header .nodo-texto {
                color: var(--blue-dark);
                font-size: 0.98rem;
                font-weight: 600;
            }
            .nivel-capitulo > .nodo-header .nodo-texto {
                color: var(--blue-mid);
                font-size: 0.93rem;
                font-weight: 600;
            }
            .nivel-seccion > .nodo-header .nodo-texto {
                color: var(--blue);
                font-size: 0.9rem;
                font-weight: 500;
                font-style: italic;
            }
            .nivel-articulo {
                color: var(--text-mid);
                font-size: 0.875rem;
                font-weight: 400;
                padding-left: 22px;
                display: flex;
                align-items: center;
                gap: 7px;
            }
            .nivel-disposicion {
                color: var(--text-mid);
                font-size: 0.875rem;
                font-weight: 400;
                padding-left: 22px;
                display: flex;
                align-items: center;
                gap: 7px;
            }
            .articulo-icono {
                flex-shrink: 0;
                color: var(--blue-light);
                opacity: 0.75;
                display: inline-flex;
            }
            .articulo-icono svg {
                width: 13px;
                height: 14px;
            }
            .resaltado-arbol {
                background: var(--blue-pale) !important;
                border-radius: 6px;
                outline: 2px solid var(--blue);
                outline-offset: 2px;
                animation: pulso-resalte 1.5s ease-in-out 2;
            }
            @keyframes pulso-resalte {
                0%,
                100% {
                    outline-color: var(--blue);
                }
                50% {
                    outline-color: var(--blue-light);
                }
            }
            .toast {
                position: fixed;
                bottom: 30px;
                left: 50%;
                transform: translateX(-50%) translateY(120px);
                background: var(--navy);
                color: var(--white);
                padding: 12px 24px 12px 18px;
                border-radius: 40px;
                font-size: 0.875rem;
                font-weight: 500;
                z-index: 9999;
                box-shadow: 0 8px 28px rgba(11, 29, 58, 0.28);
                transition: transform 0.35s
                    cubic-bezier(0.175, 0.885, 0.32, 1.275);
                pointer-events: none;
                white-space: nowrap;
                max-width: 90vw;
                overflow: hidden;
                text-overflow: ellipsis;
                display: flex;
                align-items: center;
                gap: 10px;
                border: 1px solid rgba(255, 255, 255, 0.08);
            }
            .toast.visible {
                transform: translateX(-50%) translateY(0);
            }
            .toast-icon {
                flex-shrink: 0;
                display: inline-flex;
            }
            .toast-icon svg {
                width: 16px;
                height: 16px;
            }
            .footer-note {
                text-align: center;
                margin-top: 28px;
                color: var(--text-muted);
                font-size: 0.82rem;
                font-style: italic;
                padding-bottom: 4px;
                display: flex;
                align-items: center;
                justify-content: center;
                gap: 7px;
            }
            .footer-note svg {
                width: 15px;
                height: 15px;
                color: var(--blue-light);
                flex-shrink: 0;
            }
            html {
                scroll-behavior: smooth;
            }
            ::-webkit-scrollbar {
                width: 5px;
            }
            ::-webkit-scrollbar-track {
                background: transparent;
            }
            ::-webkit-scrollbar-thumb {
                background: var(--line-color);
                border-radius: 20px;
            }
            @media (max-width: 768px) {
                .container-body {
                    padding: 20px 18px;
                }
                .header-band {
                    padding: 28px 20px 24px;
                }
                h1 {
                    font-size: 1.25rem;
                }
                .arbol ul {
                    padding-left: 16px;
                    margin-left: 4px;
                }
                #searchInput {
                    font-size: 0.9rem;
                    padding: 12px 16px 12px 44px;
                }
            }
        </style>
    </head>

                const todosLosItems = [];
                let contadorId = 0;

                function construirNodo(item, rutaAcumulada = "") {
                    const id = `nodo-${contadorId++}`;
                    const ruta = rutaAcumulada
                        ? `${rutaAcumulada} > ${item.texto}`
                        : item.texto;
                    todosLosItems.push({
                        id,
                        texto: item.texto,
                        ruta,
                        tipo: item.tipo,
                    });

                    const li = document.createElement("li");
                    li.dataset.id = id;
                    li.dataset.texto = item.texto;
                    li.dataset.ruta = ruta;
                    li.dataset.tipo = item.tipo;
                    li.className = `nivel-${item.tipo}`;

                    if (
                        item.tipo === "articulo" ||
                        item.tipo === "disposicion" ||
                        item.tipo === "disposicion_derogatoria"
                    ) {
                        li.classList.add("articulo");
                        const span = document.createElement("span");
                        span.className = "nodo-header";
                        span.innerHTML = `<span class="articulo-icono"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg></span>${item.texto}`;
                        li.appendChild(span);
                        li.addEventListener("click", function (e) {
                            e.stopPropagation();
                            copiarJerarquia(this);
                        });
                    } else {
                        const header = document.createElement("div");
                        header.className = "nodo-header";
                        header.innerHTML = `<span class="toggle-icon"><svg viewBox="0 0 10 10"><polygon points="3,0 8,5 3,10" fill="currentColor"/></svg></span><span class="nodo-texto">${item.texto}</span>`;
                        header.addEventListener("click", function (e) {
                            e.stopPropagation();
                            toggleNodo(this);
                        });
                        li.appendChild(header);
                        if (item.hijos && item.hijos.length > 0) {
                            const ul = document.createElement("ul");
                            item.hijos.forEach((hijo) =>
                                ul.appendChild(construirNodo(hijo, ruta)),
                            );
                            li.appendChild(ul);
                        }
                    }
                    return li;
                }

                function toggleNodo(header) {
                    const li = header.parentElement;
                    const ul = li.querySelector(":scope > ul");
                    const icon = header.querySelector(".toggle-icon");
                    if (!ul) return;
                    const isHidden = ul.style.display === "none";
                    ul.style.display = isHidden ? "" : "none";
                    icon.classList.toggle("expandido", isHidden);
                }

                function construirArbol() {
                    contadorId = 0;
                    todosLosItems.length = 0;
                    const container = document.getElementById("arbolContainer");
                    const ul = document.createElement("ul");
                    ul.className = "arbol";
                    indice.forEach((item) =>
                        ul.appendChild(construirNodo(item)),
                    );
                    container.innerHTML = "";
                    container.appendChild(ul);
                    document
                        .querySelectorAll("#arbolContainer ul")
                        .forEach((ul) => {
                            if (ul.parentElement.closest("ul")) {
                                ul.style.display = "none";
                                const icon = ul.parentElement.querySelector(
                                    ":scope > .nodo-header .toggle-icon",
                                );
                                if (icon) icon.classList.remove("expandido");
                            }
                        });
                }

                function aplicarFiltro(query) {
                    const q = query.trim().toLowerCase();
                    if (!q) {
                        document
                            .querySelectorAll("#arbolContainer li")
                            .forEach((li) => (li.style.display = ""));
                        const uls =
                            document.querySelectorAll("#arbolContainer ul");
                        uls.forEach((ul) => {
                            ul.style.display = "";
                        });
                        document
                            .querySelectorAll(".toggle-icon")
                            .forEach((ic) => ic.classList.remove("expandido"));
                        return;
                    }
                    const coincidencias = todosLosItems.filter((it) =>
                        it.texto.toLowerCase().includes(q),
                    );
                    document
                        .querySelectorAll("#arbolContainer li")
                        .forEach((li) => (li.style.display = "none"));
                    document
                        .querySelectorAll("#arbolContainer ul")
                        .forEach((ul) => {
                            ul.style.display = "";
                        }); // reset, we'll hide later
                    coincidencias.forEach((item) => {
                        const el = document.querySelector(
                            `#arbolContainer li[data-id="${item.id}"]`,
                        );
                        if (!el) return;
                        let current = el;
                        while (current && current.id !== "arbolContainer") {
                            if (current.tagName === "LI") {
                                current.style.display = "";
                                // show the parent UL of this LI
                                const parentUl = current.parentElement;
                                if (parentUl && parentUl.tagName === "UL") {
                                    parentUl.style.display = "";
                                    // expand toggle icon in parent li
                                    const parentLi = parentUl.parentElement;
                                    if (parentLi && parentLi.tagName === "LI") {
                                        const icon = parentLi.querySelector(
                                            ":scope > .nodo-header .toggle-icon",
                                        );
                                        if (icon)
                                            icon.classList.add("expandido");
                                    }
                                }
                            }
                            current =
                                current.parentElement?.closest("li") || null;
                        }
                    });
                    // Hide ul that are not ancestor of any visible li
                    document
                        .querySelectorAll("#arbolContainer ul")
                        .forEach((ul) => {
                            const anyVisibleChild = Array.from(
                                ul.children,
                            ).some((li) => li.style.display !== "none");
                            if (!anyVisibleChild) ul.style.display = "none";
                        });
                }

                function copiarJerarquia(el) {
                    const texto = el.dataset.texto;
                    const ruta = el.dataset.ruta;
                    const copia = ruta ? `${ruta}\n${texto}` : texto;
                    if (navigator.clipboard?.writeText) {
                        navigator.clipboard
                            .writeText(copia)
                            .then(() =>
                                mostrarToast("📋 Copiado al portapapeles"),
                            )
                            .catch(() => fallback(copia));
                    } else fallback(copia);
                }
                function fallback(texto) {
                    const ta = document.createElement("textarea");
                    ta.value = texto;
                    ta.style.cssText =
                        "position:fixed;left:-9999px;top:-9999px";
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                    mostrarToast("📋 Copiado al portapapeles");
                }
                function mostrarToast(msg) {
                    const toast = document.getElementById("toastCopiado");
                    document.getElementById("toastMessage").textContent = msg;
                    toast.classList.add("visible");
                    clearTimeout(toast._timeout);
                    toast._timeout = setTimeout(
                        () => toast.classList.remove("visible"),
                        2200,
                    );
                }

                const input = document.getElementById("searchInput");
                const autocomp = document.getElementById("autocompleteList");
                let seleccionado = -1;

                input.addEventListener("input", function () {
                    const q = this.value.trim().toLowerCase();
                    autocomp.innerHTML = "";
                    seleccionado = -1;
                    if (!q) {
                        autocomp.style.display = "none";
                        aplicarFiltro("");
                        return;
                    }
                    const coincidencias = todosLosItems
                        .filter((it) => it.texto.toLowerCase().includes(q))
                        .slice(0, 20);
                    if (!coincidencias.length) {
                        autocomp.style.display = "none";
                        aplicarFiltro(q);
                        return;
                    }
                    coincidencias.forEach((it, i) => {
                        const li = document.createElement("li");
                        li.textContent = it.texto;
                        li.dataset.id = it.id;
                        li.addEventListener("click", () => {
                            seleccionarItem(it);
                            autocomp.style.display = "none";
                            input.value = it.texto;
                            aplicarFiltro(it.texto);
                        });
                        li.addEventListener("mouseenter", () => {
                            seleccionado = i;
                            actualizarActivo();
                        });
                        autocomp.appendChild(li);
                    });
                    autocomp.style.display = "block";
                    aplicarFiltro(q);
                });
                input.addEventListener("keydown", function (e) {
                    const items = autocomp.querySelectorAll("li");
                    if (e.key === "ArrowDown") {
                        e.preventDefault();
                        seleccionado = Math.min(
                            seleccionado + 1,
                            items.length - 1,
                        );
                        actualizarActivo();
                    } else if (e.key === "ArrowUp") {
                        e.preventDefault();
                        seleccionado = Math.max(seleccionado - 1, 0);
                        actualizarActivo();
                    } else if (e.key === "Enter") {
                        e.preventDefault();
                        if (seleccionado >= 0 && items[seleccionado]) {
                            const id = items[seleccionado].dataset.id;
                            const it = todosLosItems.find((i) => i.id === id);
                            if (it) {
                                seleccionarItem(it);
                                autocomp.style.display = "none";
                                input.value = it.texto;
                                aplicarFiltro(it.texto);
                            }
                        }
                    } else if (e.key === "Escape") {
                        autocomp.style.display = "none";
                        input.blur();
                    }
                });
                function actualizarActivo() {
                    const items = autocomp.querySelectorAll("li");
                    items.forEach((li, i) =>
                        li.classList.toggle("active", i === seleccionado),
                    );
                }
                function seleccionarItem(item) {
                    const el = document.querySelector(
                        `#arbolContainer li[data-id="${item.id}"]`,
                    );
                    if (el) {
                        el.scrollIntoView({
                            behavior: "smooth",
                            block: "center",
                        });
                        el.classList.add("resaltado-arbol");
                        setTimeout(
                            () => el.classList.remove("resaltado-arbol"),
                            3000,
                        );
                    }
                }
                document.addEventListener("click", (e) => {
                    if (!e.target.closest(".search-wrapper"))
                        autocomp.style.display = "none";
                });

                construirArbol();
            })();
        </script>
