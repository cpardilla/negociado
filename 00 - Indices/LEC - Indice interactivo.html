<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ley 1/2000, de 7 de enero, de Enjuiciamiento Civil – Índice completo con filtro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy:        #1A2F6E;
            --blue-dark:   #163566;
            --blue-mid:    #1e4d9a;
            --blue:        #2563b0;
            --blue-light:  #4a87d8;
            --blue-pale:   #dbeafe;
            --blue-xpale:  #eff6ff;
            --white:       #ffffff;
            --bg:          #f2f6fb;
            --line-color:  #bdd5f0;
            --border:      #d4e4f7;
            --text-main:   #0b1d3a;
            --text-mid:    #2c4a73;
            --text-muted:  #6789b0;
            --shadow-sm:   0 2px 8px rgba(11,29,58,0.08);
            --shadow-md:   0 6px 24px rgba(11,29,58,0.10);
            --shadow-lg:   0 16px 40px rgba(11,29,58,0.14);
            --radius:      10px;
            --transition:  0.18s ease;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family: 'IBM Plex Sans', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            line-height: 1.65;
            padding: 28px 20px;
            min-height: 100vh;

        }

        /* ── Container ── */
        .container {
            max-width: 1050px;
            margin: 0 auto;
            background: var(--white);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* ── Header band ── */
        .header-band {
            background: var(--navy);
            padding: 36px 40px 32px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header-band::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        .header-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 52px;
            height: 52px;
            background: rgba(255,255,255,0.10);
            border: 1.5px solid rgba(255,255,255,0.20);
            border-radius: 14px;
            margin-bottom: 16px;
        }
        .header-icon svg { width: 28px; height: 28px; }
        h1 {
            font-size: 1.65rem;
            font-weight: 700;
            color: var(--white);
            margin-bottom: 8px;
            letter-spacing: 0.1px;
            line-height: 1.3;
            position: relative;
        }
        .subtitulo {
            color: rgba(255,255,255,0.65);
            font-size: 0.88rem;
            font-weight: 400;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            position: relative;
        }

        /* ── Body padding ── */
        .container-body { padding: 32px 36px; }

        /* ── Search ── */
        .search-wrapper { position: relative; margin-bottom: 28px; }
        .search-icon-wrap {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: var(--blue-light);
            display: flex;
        }
        #searchInput {
            width: 100%;
            padding: 14px 20px 14px 48px;
            font-size: 0.95rem;
            font-family: inherit;
            border: 1.5px solid var(--border);
            border-radius: 40px;
            background: var(--white);
            transition: all var(--transition);
            outline: none;
            box-shadow: var(--shadow-sm);
            color: var(--text-main);
        }
        #searchInput:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3.5px rgba(37,99,176,0.13);
        }
        #searchInput::placeholder { color: var(--text-muted); font-style: italic; font-size: 0.9rem; }

        .autocomplete-list {
            position: absolute;
            top: calc(100% + 8px);
            left: 0; right: 0;
            background: var(--white);
            border: 1.5px solid var(--border);
            border-radius: 14px;
            max-height: 280px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: var(--shadow-md);
            display: none;
            list-style: none;
        }
        .autocomplete-list li {
            padding: 11px 18px;
            cursor: pointer;
            border-bottom: 1px solid var(--blue-xpale);
            font-size: 0.88rem;
            color: var(--text-mid);
            transition: background var(--transition);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .autocomplete-list li:last-child { border-bottom: none; }
        .autocomplete-list li:hover,
        .autocomplete-list li.active {
            background: var(--blue-xpale);
            color: var(--blue-dark);
            font-weight: 500;
        }

        /* ── Tree ── */
        .arbol { list-style: none; padding-left: 0; font-size: 0.93rem; }
        .arbol ul {
            list-style: none;
            padding-left: 26px;
            border-left: 1.5px solid var(--line-color);
            margin-left: 10px;
        }
        .arbol li {
            position: relative;
            margin: 2px 0;
            cursor: default;
            border-radius: 7px;
            transition: background var(--transition);
        }
        .arbol li:hover { background: var(--blue-xpale); }

        .arbol li.articulo {
            cursor: pointer;
            padding: 3px 10px 3px 6px;
            margin: 1px 0;
            border-radius: 6px;
            transition: all var(--transition);
        }
        .arbol li.articulo:hover {
            background: var(--blue-pale);
            transform: translateX(2px);
            box-shadow: 0 1px 4px rgba(37,99,176,0.10);
        }
        .arbol li.articulo:active { background: #bfdbfe; transform: scale(0.998); }

        /* ── Node header ── */
        .nodo-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 8px;
            border-radius: 7px;
            cursor: pointer;
            user-select: none;
            transition: background var(--transition);
        }
        .nodo-header:hover { background: rgba(37,99,176,0.06); }

        /* Toggle icon — small circle with chevron SVG */
        .toggle-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: var(--blue-pale);
            color: var(--blue-mid);
            flex-shrink: 0;
            transition: all var(--transition);
        }
        .toggle-icon svg {
            width: 10px;
            height: 10px;
            transition: transform var(--transition);
            display: block;
        }
        .toggle-icon.expandido {
            background: var(--blue);
            color: var(--white);
        }
        .toggle-icon.expandido svg { transform: rotate(90deg); }

        /* Node text levels — all blue-family */
        .nodo-texto { font-weight: 500; letter-spacing: 0.05px; }

        .nivel-libro > .nodo-header .nodo-texto {
            color: var(--navy);
            font-size: 1.08rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .nivel-titulo_preliminar > .nodo-header .nodo-texto {
            color: var(--navy);
            font-size: 1.08rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .nivel-titulo > .nodo-header .nodo-texto {
            color: var(--blue-dark);
            font-size: 0.98rem;
            font-weight: 600;
        }
        .nivel-capitulo > .nodo-header .nodo-texto {
            color: var(--blue-mid);
            font-size: 0.93rem;
            font-weight: 600;
        }
        .nivel-seccion > .nodo-header .nodo-texto {
            color: var(--blue);
            font-size: 0.90rem;
            font-weight: 500;
            font-style: italic;
        }
        .nivel-disposiciones_adicionales > .nodo-header .nodo-texto,
        .nivel-disposiciones_transitorias > .nodo-header .nodo-texto,
        .nivel-disposicion_derogatoria > .nodo-header .nodo-texto,
        .nivel-disposiciones_finales > .nodo-header .nodo-texto {
            color: var(--navy);
            font-size: 1.08rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .nivel-articulo {
            color: var(--text-mid);
            font-size: 0.875rem;
            font-weight: 400;
            padding-left: 22px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .nivel-disposicion {
            color: var(--text-mid);
            font-size: 0.875rem;
            font-weight: 400;
            padding-left: 22px;
            display: flex;
            align-items: center;
            gap: 7px;
        }
        .articulo-icono {
            flex-shrink: 0;
            color: var(--blue-light);
            opacity: 0.75;
            display: inline-flex;
        }
        .articulo-icono svg { width: 13px; height: 14px; }

        /* ── Highlight ── */
        .resaltado-arbol {
            background: var(--blue-pale) !important;
            border-radius: 6px;
            outline: 2px solid var(--blue);
            outline-offset: 2px;
            animation: pulso-resalte 1.5s ease-in-out 2;
        }
        @keyframes pulso-resalte {
            0%, 100% { outline-color: var(--blue); }
            50%       { outline-color: var(--blue-light); }
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(120px);
            background: var(--navy);
            color: var(--white);
            padding: 12px 24px 12px 18px;
            border-radius: 40px;
            font-size: 0.875rem;
            font-weight: 500;
            z-index: 9999;
            box-shadow: 0 8px 28px rgba(11,29,58,0.28);
            transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
            white-space: nowrap;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .toast.visible { transform: translateX(-50%) translateY(0); }
        .toast-icon { flex-shrink: 0; display: inline-flex; }
        .toast-icon svg { width: 16px; height: 16px; }

        /* ── Footer note ── */
        .footer-note {
            text-align: center;
            margin-top: 28px;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-style: italic;
            padding-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }
        .footer-note svg { width: 15px; height: 15px; color: var(--blue-light); flex-shrink: 0; }

        /* ── Scrollbar ── */
        html { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--line-color); border-radius: 20px; }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .container-body { padding: 20px 18px; }
            .header-band { padding: 28px 20px 24px; }
            h1 { font-size: 1.25rem; }
            .arbol ul { padding-left: 16px; margin-left: 4px; }
            #searchInput { font-size: 0.9rem; padding: 12px 16px 12px 44px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header-band">
        <div class="header-icon">
            <!-- Scales of justice icon -->
            <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">

    <div class="container-body">
        <div class="search-wrapper">

</div>
<div class="toast" id="toastCopiado">

    // ===================== RENDERIZADO DEL ÁRBOL =====================
    const arbolContainer = document.getElementById('arbolLEC');
    const todosLosItems = [];
    let contadorId = 0;

    function crearNodo(item, rutaAcumulada = '') {
        const id = `nodo-${contadorId++}`;
        const rutaPropia = rutaAcumulada ? `${rutaAcumulada} > ${item.texto}` : item.texto;
        const nodoData = { id, texto: item.texto, ruta: rutaPropia, tipo: item.tipo };
        todosLosItems.push(nodoData);

        const li = document.createElement('li');
        li.setAttribute('data-id', id);
        li.setAttribute('data-ruta', rutaPropia);
        li.setAttribute('data-texto', item.texto);
        li.classList.add(`nivel-${item.tipo}`);

        if (item.tipo === 'articulo' || item.tipo === 'disposicion') {
            li.classList.add('articulo');
            li.innerHTML = `<span class="articulo-icono"><svg viewBox="0 0 14 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 1.5h7.5l3 3V14.5a.5.5 0 01-.5.5H2a.5.5 0 01-.5-.5v-13A.5.5 0 012 1.5z" stroke="currentColor" stroke-width="1.3"/><path d="M9.5 1.5v3h3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/><path d="M4 7.5h6M4 10h6M4 12.5h3.5" stroke="currentColor" stroke-width="1" stroke-linecap="round"/></svg></span> ${item.texto}`;
            li.addEventListener('click', function(e) {
                e.stopPropagation();
                copiarJerarquia(this);
            });
        } else {
            const header = document.createElement('div');
            header.className = 'nodo-header';
            header.innerHTML = `<span class="toggle-icon"><svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M4 2.5L8 6L4 9.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg></span><span class="nodo-texto">${item.texto}</span>`;
            header.addEventListener('click', function(e) {
                e.stopPropagation();
                toggleNodo(this);
            });
            li.appendChild(header);

            if (item.hijos && item.hijos.length > 0) {
                const ul = document.createElement('ul');
                item.hijos.forEach(hijo => ul.appendChild(crearNodo(hijo, rutaPropia)));
                li.appendChild(ul);
            }
        }
        return li;
    }

    function construirArbol() {
        contadorId = 0;
        todosLosItems.length = 0;
        const ul = document.createElement('ul');
        ul.className = 'arbol';
        indice.forEach(item => ul.appendChild(crearNodo(item)));
        arbolContainer.appendChild(ul);
        // Colapsar todo excepto primer nivel (modo normal inicial)
        document.querySelectorAll('#arbolLEC ul').forEach(ul => {
            if (ul.parentElement.closest('ul')) {
                ul.style.display = 'none';
                const icon = ul.parentElement.querySelector(':scope > .nodo-header .toggle-icon');
                if (icon) icon.classList.remove('expandido');
            }
        });
        document.querySelectorAll('#arbolLEC > ul > li > ul').forEach(ul => { ul.style.display = ''; });
        document.querySelectorAll('#arbolLEC > ul > li > .nodo-header .toggle-icon').forEach(icon => icon.classList.add('expandido'));
    }

    // ===================== MODO FILTRO =====================
    let modoFiltro = false;

    window.toggleNodo = function(headerElement) {
        if (modoFiltro) return; // Bloquear toggles durante filtro
        const icon = headerElement.querySelector('.toggle-icon');
        const liParent = headerElement.parentElement;
        const ulChild = liParent.querySelector(':scope > ul');
        if (!ulChild) return;
        const isHidden = ulChild.style.display === 'none';
        ulChild.style.display = isHidden ? '' : 'none';
        icon.classList.toggle('expandido', isHidden);
    };

    function aplicarFiltro(query) {
        const q = query.trim().toLowerCase();
        if (q === '') {
            // Restaurar árbol completo (modo normal colapsado)
            modoFiltro = false;
            restaurarArbol();
            return;
        }
        modoFiltro = true;
        // Encontrar nodos que coinciden
        const coincidencias = todosLosItems.filter(item => item.texto.toLowerCase().includes(q));
        const visibleIds = new Set();
        coincidencias.forEach(item => {
            const el = document.querySelector(`#arbolLEC [data-id="${item.id}"]`);
            if (!el) return;
            let current = el;
            while (current && current.id !== 'arbolLEC') {
                if (current.tagName === 'LI') {
                    visibleIds.add(current.getAttribute('data-id'));
                }
                current = current.parentElement?.closest('li') || null;
            }
        });
        // Aplicar visibilidad a todos los <li>
        document.querySelectorAll('#arbolLEC li').forEach(li => {
            const id = li.getAttribute('data-id');
            if (visibleIds.has(id)) {
                li.style.display = '';
                // Asegurar que el ul interior sea visible para que se vean hijos coincidentes
                const childUl = li.querySelector(':scope > ul');
                if (childUl) childUl.style.display = '';
                // Mostrar icono expandido
                const icon = li.querySelector(':scope > .nodo-header .toggle-icon');
                if (icon) icon.classList.add('expandido');
            } else {
                li.style.display = 'none';
                // Ocultar ul interior (no necesario porque li está oculto)
            }
        });
    }

    function restaurarArbol() {
        // Mostrar todos los li y ul, luego colapsar según estado inicial
        document.querySelectorAll('#arbolLEC li').forEach(li => li.style.display = '');
        document.querySelectorAll('#arbolLEC ul').forEach(ul => {
            if (ul.parentElement.closest('ul')) {
                ul.style.display = 'none';
                const icon = ul.parentElement.querySelector(':scope > .nodo-header .toggle-icon');
                if (icon) icon.classList.remove('expandido');
            }
        });
        document.querySelectorAll('#arbolLEC > ul > li > ul').forEach(ul => { ul.style.display = ''; });
        document.querySelectorAll('#arbolLEC > ul > li > .nodo-header .toggle-icon').forEach(icon => icon.classList.add('expandido'));
    }

    // ===================== COPIA AL PORTAPAPELES =====================
    function copiarJerarquia(elemento) {
        const ruta = elemento.getAttribute('data-ruta');
        const texto = elemento.getAttribute('data-texto') || elemento.textContent.trim();
        const textoCopiado = ruta ? `${ruta}\n${texto}` : texto;
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(textoCopiado).then(() => mostrarToast('Copiado: ' + textoCopiado.substring(0, 80) + (textoCopiado.length > 80 ? '...' : ''))).catch(() => copiarFallback(textoCopiado));
        } else {
            copiarFallback(textoCopiado);
        }
    }

    function copiarFallback(texto) {
        const textarea = document.createElement('textarea');
        textarea.value = texto;
        textarea.style.cssText = 'position:fixed;left:-9999px;top:-9999px;';
        document.body.appendChild(textarea);
        textarea.select();
        try { document.execCommand('copy'); mostrarToast('Copiado al portapapeles'); } catch (e) { mostrarToast('No se pudo copiar'); }
        document.body.removeChild(textarea);
    }

    function mostrarToast(mensaje) {
        const toast = document.getElementById('toastCopiado');
        // Update only the text node (second child), preserve the icon span
        const textNode = Array.from(toast.childNodes).find(n => n.nodeType === 3 && n.textContent.trim());
        if (textNode) textNode.textContent = '\n    ' + mensaje + '\n';
        else toast.appendChild(document.createTextNode(mensaje));
        toast.classList.add('visible');
        clearTimeout(toast._timeout);
        toast._timeout = setTimeout(() => toast.classList.remove('visible'), 2200);
    }

    // ===================== BÚSQUEDA Y AUTOCOMPLETADO =====================
    const searchInput = document.getElementById('searchInput');
    const autocompleteList = document.getElementById('autocompleteList');
    let selectedIndex = -1;

    searchInput.addEventListener('input', function() {
        const query = this.value.trim();
        const queryLower = query.toLowerCase();
        autocompleteList.innerHTML = '';
        selectedIndex = -1;
        if (queryLower.length < 1) {
            autocompleteList.style.display = 'none';
            aplicarFiltro(''); // limpia filtro
            return;
        }
        const coincidencias = todosLosItems.filter(item => item.texto.toLowerCase().includes(queryLower)).slice(0, 20);
        if (coincidencias.length === 0) {
            autocompleteList.style.display = 'none';
            aplicarFiltro(query); // filtrar igualmente (sin resultados)
            return;
        }
        coincidencias.forEach((item, idx) => {
            const li = document.createElement('li');
            li.textContent = item.texto;
            li.setAttribute('data-id', item.id);
            li.addEventListener('click', () => {
                seleccionarItem(item);
                autocompleteList.style.display = 'none';
                searchInput.value = item.texto;
                aplicarFiltro(item.texto); // mantiene filtro
            });
            li.addEventListener('mouseenter', () => { selectedIndex = idx; actualizarActivo(); });
            autocompleteList.appendChild(li);
        });
        autocompleteList.style.display = 'block';
        aplicarFiltro(query); // Filtrar el árbol en tiempo real
    });

    searchInput.addEventListener('keydown', function(e) {
        const listItems = autocompleteList.querySelectorAll('li');
        if (e.key === 'ArrowDown') { e.preventDefault(); selectedIndex = Math.min(selectedIndex + 1, listItems.length - 1); actualizarActivo(); }
        else if (e.key === 'ArrowUp') { e.preventDefault(); selectedIndex = Math.max(selectedIndex - 1, 0); actualizarActivo(); }
        else if (e.key === 'Enter') {
            e.preventDefault();
            if (selectedIndex >= 0 && listItems.length > selectedIndex) {
                const id = listItems[selectedIndex].getAttribute('data-id');
                const item = todosLosItems.find(it => it.id === id);
                if (item) { seleccionarItem(item); autocompleteList.style.display = 'none'; searchInput.value = item.texto; aplicarFiltro(item.texto); }
            } else if (listItems.length > 0) {
                const id = listItems[0].getAttribute('data-id');
                const item = todosLosItems.find(it => it.id === id);
                if (item) { seleccionarItem(item); autocompleteList.style.display = 'none'; searchInput.value = item.texto; aplicarFiltro(item.texto); }
            }
        } else if (e.key === 'Escape') { autocompleteList.style.display = 'none'; searchInput.blur(); }
    });

    function actualizarActivo() {
        const listItems = autocompleteList.querySelectorAll('li');
        listItems.forEach((li, idx) => li.classList.toggle('active', idx === selectedIndex));
    }

    function seleccionarItem(item) {
        limpiarResaltados();
        const elementoDOM = document.querySelector(`[data-id="${item.id}"]`);
        if (!elementoDOM) return;
        expandirAncestros(elementoDOM);
        elementoDOM.scrollIntoView({ behavior: 'smooth', block: 'center' });
        elementoDOM.classList.add('resaltado-arbol');
        setTimeout(() => elementoDOM.classList.remove('resaltado-arbol'), 3000);
    }

    function expandirAncestros(elemento) {
        let current = elemento.parentElement;
        while (current && current.id !== 'arbolLEC') {
            if (current.tagName === 'UL') {
                current.style.display = '';
                const icon = current.parentElement.querySelector(':scope > .nodo-header .toggle-icon');
                if (icon) icon.classList.add('expandido');
            }
            current = current.parentElement;
        }
    }

    function limpiarResaltados() { document.querySelectorAll('.resaltado-arbol').forEach(el => el.classList.remove('resaltado-arbol')); }

    document.addEventListener('click', function(e) { if (!e.target.closest('.search-wrapper')) autocompleteList.style.display = 'none'; });

    // ===================== INICIALIZAR =====================
    construirArbol();
})();
