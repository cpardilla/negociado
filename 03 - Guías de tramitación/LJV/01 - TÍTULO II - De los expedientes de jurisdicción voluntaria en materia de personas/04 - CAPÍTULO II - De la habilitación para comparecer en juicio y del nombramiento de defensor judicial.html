<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            De la habilitación para comparecer en juicio y del nombramiento de
            defensor judicial (artículos 27 a 32 LJV)
        </title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            :root {
                --navy: #1a2f6e;
                --navy-mid: #2e4daa;
                --navy-lt: #4169e1;
                --cyan: #0d9488;
                --cyan-bg: #f0fdfa;
                --violet: #5b21b6;
                --violet-bg: #f5f3ff;
                --green: #15803d;
                --green-bg: #f0fdf4;
                --amber: #b45309;
                --amber-bg: #fffbeb;
                --red: #b91c1c;
                --red-bg: #fef2f2;
                --slate: #475569;
                --slate-bg: #f4f6fb;
                --white: #ffffff;
                --bdr: #d1d9ee;
                --text: #1a1a2e;
                --muted: #6b7280;
                --transition-norm: 250ms ease;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                font-family: "Outfit", sans-serif;
                font-size: 15px;
                background: var(--slate-bg);
                color: var(--text);
                height: 100vh;
                overflow: hidden;
            }
            #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
                position: relative;
            }

            /* CABECERA */
            #hdr {
                flex-shrink: 0;
                height: 56px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
                background: var(--navy);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            .h-left {
                display: flex;
                align-items: center;
                gap: 12px;
                min-width: 0;
            }
            /* Botón toggle sidebar (NUEVO) */
            .btn-toggle-sidebar {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 4px 10px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
                font-family: inherit;
                font-size: 20px;
                cursor: pointer;
                transition: all 150ms ease;
                white-space: nowrap;
                line-height: 1;
            }
            .btn-toggle-sidebar:hover {
                background: rgba(255, 255, 255, 0.18);
            }
            .btn-toggle-sidebar:focus-visible {
                outline: 2px solid var(--navy-lt);
                outline-offset: 2px;
            }
            .h-seal {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                flex-shrink: 0;
                background: rgba(255, 255, 255, 0.1);
                border: 1.5px solid rgba(255, 255, 255, 0.25);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                color: rgba(255, 255, 255, 0.85);
            }
            .h-title {
                font-size: 14px;
                font-weight: 700;
                color: white;
                letter-spacing: 0.3px;
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            .h-sub {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.55);
                font-weight: 400;
            }
            .h-right {
                display: flex;
                gap: 6px;
                flex-shrink: 0;
            }
            .btn {
                padding: 6px 12px;
                font-size: 12px;
                font-weight: 500;
                font-family: inherit;
                border-radius: 6px;
                cursor: pointer;
                transition: all 0.15s;
                border: 1px solid rgba(255, 255, 255, 0.18);
            }
            .btn-ghost {
                background: rgba(255, 255, 255, 0.08);
                color: rgba(255, 255, 255, 0.85);
            }
            .btn-ghost:hover {
                background: rgba(255, 255, 255, 0.18);
            }
            .btn-next {
                background: var(--navy-lt);
                border-color: var(--navy-lt);
                color: white;
                font-weight: 600;
                font-family: inherit;
                font-size: 13px;
                padding: 8px 18px;
                border-radius: 7px;
                cursor: pointer;
                transition: all 0.15s;
                border: none;
            }
            .btn-next:hover {
                background: var(--navy);
            }
            .zoom-cluster {
                display: flex;
                align-items: center;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 6px;
                overflow: hidden;
                margin-right: 6px;
            }
            .btn-zoom {
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.9);
                font-size: 16px;
                padding: 4px 10px;
                cursor: pointer;
                transition: background 0.15s;
            }
            .btn-zoom:hover {
                background: rgba(255, 255, 255, 0.1);
            }
            .zoom-label {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.9);
                padding: 0 8px;
                border-left: 1px solid rgba(255, 255, 255, 0.1);
                border-right: 1px solid rgba(255, 255, 255, 0.1);
                min-width: 46px;
                text-align: center;
            }

            /* BARRA DE FASES */
            #pbar {
                flex-shrink: 0;
                height: 42px;
                display: flex;
                align-items: center;
                padding: 0 20px;
                background: var(--navy-mid);
                overflow-x: auto;
                scrollbar-width: none;
                gap: 2px;
            }
            #pbar::-webkit-scrollbar {
                display: none;
            }
            .ph-item {
                display: flex;
                align-items: center;
            }
            .ph-lbl {
                font-size: 12px;
                font-weight: 600;
                padding: 5px 10px;
                border-radius: 6px;
                color: rgba(255, 255, 255, 0.45);
                white-space: nowrap;
                transition: all 0.15s;
            }
            .ph-lbl.active {
                background: rgba(255, 255, 255, 0.2);
                color: white;
            }
            .ph-lbl.done {
                color: rgba(255, 255, 255, 0.95);
            }
            .ph-sep {
                color: rgba(255, 255, 255, 0.2);
                font-size: 16px;
                margin: 0 2px;
                user-select: none;
            }

            /* BREADCRUMB */
            #breadcrumb {
                flex-shrink: 0;
                min-height: 34px;
                display: flex;
                align-items: center;
                padding: 4px 20px;
                background: var(--slate-bg);
                border-bottom: 1px solid var(--bdr);
                overflow-x: auto;
                scrollbar-width: none;
                flex-wrap: wrap;
                row-gap: 2px;
            }
            #breadcrumb::-webkit-scrollbar {
                display: none;
            }
            .bc-item {
                font-size: 13px;
                font-weight: 500;
                white-space: nowrap;
                padding: 0 6px;
                color: var(--muted);
                background: none;
                border: none;
                font-family: inherit;
                cursor: pointer;
            }
            .bc-past {
                cursor: pointer;
            }
            .bc-past:hover {
                color: var(--navy-lt);
                text-decoration: underline;
            }
            .bc-current {
                font-weight: 600;
                color: var(--navy);
                cursor: default;
            }
            .bc-sep {
                color: var(--muted);
                font-size: 15px;
                opacity: 0.5;
                margin: 0 2px;
                user-select: none;
            }

            /* LAYOUT */
            #layout {
                flex: 1;
                overflow: hidden;
                display: flex;
                position: relative;
            }

            /* SIDEBAR (MODIFICADO para soportar colapso y overlay móvil) */
            #sidebar {
                width: 260px;
                flex-shrink: 0;
                background: var(--navy-mid);
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                border-right: 1px solid rgba(255, 255, 255, 0.1);
                transition:
                    transform var(--transition-norm),
                    width var(--transition-norm);
                z-index: 80;
            }
            #sidebar.collapsed {
                width: 0;
                transform: translateX(-100%);
                overflow: hidden;
            }
            #sidebar {
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
            }
            #sidebar::-webkit-scrollbar {
                width: 4px;
            }
            #sidebar::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.25);
                border-radius: 3px;
            }
            #sidebar::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.35);
            }
            #sb-tabs {
                display: flex;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                position: sticky;
                top: 0;
                background: var(--navy-mid);
                z-index: 10;
                flex-shrink: 0;
            }
            .sb-tab {
                flex: 1;
                padding: 9px 0;
                font-size: 11px;
                font-weight: 600;
                font-family: inherit;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                letter-spacing: 0.4px;
                text-transform: uppercase;
                transition: all 0.15s;
            }
            .sb-tab.active {
                color: #fff;
                border-bottom: 2px solid var(--navy-lt);
            }
            .sb-tab:hover:not(.active) {
                color: rgba(255, 255, 255, 0.7);
                background: rgba(255, 255, 255, 0.05);
            }
            #sb-map,
            #sb-journey {
                flex: 1;
                min-height: 0;
                padding: 10px;
            }
            .sm-phase {
                margin-bottom: 2px;
            }
            .sm-phase-hdr {
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 6px 12px;
                cursor: pointer;
                color: rgba(255, 255, 255, 0.55);
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                user-select: none;
                transition: all 0.15s;
            }
            .sm-phase-hdr:hover {
                color: rgba(255, 255, 255, 0.85);
                background: rgba(255, 255, 255, 0.05);
            }
            .sm-phase-hdr .ph-toggle {
                font-size: 10px;
                transition: transform 0.15s;
            }
            .sm-phase-hdr.collapsed .ph-toggle {
                transform: rotate(-90deg);
            }
            .sm-nodes {
                overflow: hidden;
            }
            .sm-node {
                display: flex;
                align-items: flex-start;
                gap: 7px;
                padding: 5px 10px 5px 14px;
                cursor: pointer;
                transition: all 0.15s;
            }
            .sm-node:hover {
                background: rgba(255, 255, 255, 0.08);
            }
            .sm-node-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.2);
                flex-shrink: 0;
                margin-top: 4px;
                transition: all 0.15s;
            }
            .sm-node.sm-visited .sm-node-dot {
                background: #22c55e;
            }
            .sm-node.sm-current .sm-node-dot {
                background: var(--navy-lt);
                box-shadow: 0 0 0 3px rgba(65, 105, 225, 0.3);
            }
            .sm-node.sm-end .sm-node-dot {
                background: var(--amber);
            }
            .sm-node-label {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.65);
                line-height: 1.4;
            }
            .sm-node.sm-visited .sm-node-label {
                color: rgba(255, 255, 255, 0.8);
            }
            .sm-node.sm-current .sm-node-label {
                color: #fff;
                font-weight: 600;
            }
            .sm-node.sm-end .sm-node-label {
                color: rgba(255, 255, 255, 0.5);
                font-style: italic;
            }

            /* SIDEBAR JOURNEY */
            .pi {
                padding: 6px 12px 6px 14px;
                border-left: 2px solid transparent;
            }
            .pi.past {
                border-left-color: rgba(255, 255, 255, 0.15);
            }
            .pi.current {
                border-left-color: var(--navy-lt);
            }
            .pi-title {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.75);
                line-height: 1.4;
            }
            .pi.current .pi-title {
                color: #fff;
                font-weight: 600;
            }
            .pi-choice {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.45);
                padding-top: 2px;
            }
            .sb-foot {
                padding: 12px;
                margin-top: auto;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
            }
            .sb-foot-title {
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: rgba(255, 255, 255, 0.35);
                margin-bottom: 6px;
            }
            .sb-foot-ref {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.5);
                font-family: ui-monospace, monospace;
                line-height: 1.6;
            }
            .sb-empty {
                padding: 14px;
                color: rgba(255, 255, 255, 0.35);
                font-size: 12px;
                line-height: 1.5;
            }

            /* Backdrop para móvil (NUEVO) */
            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 140;
                display: none;
            }
            .sidebar-backdrop.show {
                display: block;
            }

            /* CONTENIDO PRINCIPAL */
            #content {
                flex: 1;
                overflow-y: auto;
                padding: 24px;
                background: var(--slate-bg);
            }
            #content::-webkit-scrollbar {
                width: 8px;
            }
            #content::-webkit-scrollbar-thumb {
                background: var(--bdr);
                border-radius: 4px;
            }

            /* CARD */
            .card {
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                background: white;
                border-radius: 12px;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
                border: 1px solid var(--bdr);
                animation: fadeUp 0.22s ease;
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .c-hdr {
                padding: 18px 22px 14px;
                border-bottom: 1px solid var(--bdr);
                display: flex;
                flex-direction: column;
                gap: 4px;
            }
            .c-hdr-row {
                display: flex;
                align-items: center;
                gap: 10px;
                flex-wrap: wrap;
            }
            .act-badge {
                font-size: 11px;
                font-weight: 700;
                padding: 3px 10px;
                border-radius: 20px;
                letter-spacing: 0.3px;
            }
            .act-laj {
                background: var(--cyan-bg);
                color: var(--cyan);
                border: 1px solid #99f6e4;
            }
            .act-juez {
                background: var(--violet-bg);
                color: var(--violet);
                border: 1px solid #ddd6fe;
            }
            .act-ambos {
                background: var(--amber-bg);
                color: var(--amber);
                border: 1px solid #fde68a;
            }
            .act-mf {
                background: var(--red-bg);
                color: var(--red);
                border: 1px solid #fecaca;
            }
            .step-meta {
                font-size: 11.5px;
                color: var(--muted);
            }
            .c-title {
                font-size: 18px;
                font-weight: 700;
                color: var(--navy);
                line-height: 1.3;
                margin-top: 4px;
            }
            .c-body {
                padding: 18px 22px;
            }

            /* BLOQUES DE CONTENIDO */
            .blk {
                margin-bottom: 12px;
                line-height: 1.65;
                font-size: 14.5px;
            }
            .blk:last-child {
                margin-bottom: 0;
            }
            .blk-i {
                color: var(--text);
            }
            .blk-d {
                background: var(--cyan-bg);
                border: 1px solid #99f6e4;
                border-radius: 8px;
                padding: 10px 14px;
                color: var(--cyan);
                font-weight: 500;
                font-size: 14px;
            }
            .blk-n {
                background: var(--amber-bg);
                border: 1px solid #fde68a;
                border-radius: 8px;
                padding: 10px 14px;
                color: var(--amber);
                font-size: 14px;
            }
            .blk-w {
                background: var(--red-bg);
                border: 1px solid #fecaca;
                border-radius: 8px;
                padding: 10px 14px;
                color: var(--red);
                font-size: 14px;
            }
            .blk-l {
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-radius: 8px;
                padding: 8px 14px;
                color: var(--slate);
                font-family: ui-monospace, monospace;
                font-size: 12.5px;
            }
            .blk-cl {
                background: var(--green-bg);
                border: 1px solid #bbf7d0;
                border-radius: 8px;
                padding: 12px 14px;
                font-size: 14px;
            }
            .blk-cl strong {
                display: block;
                color: var(--green);
                font-size: 12.5px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                margin-bottom: 8px;
            }
            .blk-cl ul {
                padding-left: 18px;
                color: var(--text);
            }
            .blk-cl ul li {
                margin-bottom: 5px;
                line-height: 1.5;
            }

            /* ZONA DE DECISIÓN */
            .dec-area {
                border-top: 1px solid var(--bdr);
                padding: 18px 22px;
            }
            .dec-q {
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-top: 3px solid var(--navy);
                border-radius: 8px;
                padding: 12px 16px;
                margin-bottom: 14px;
                font-size: 15px;
                font-weight: 600;
                color: var(--navy);
                line-height: 1.4;
            }
            .dec-opts {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .dec-btn {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 11px 14px;
                border-radius: 9px;
                border: 1.5px solid;
                cursor: pointer;
                background: none;
                font-family: inherit;
                text-align: left;
                transition: all 0.15s;
                width: 100%;
            }
            .dec-btn:hover {
                transform: translateY(-1px);
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }
            .dec-btn.ok {
                border-color: #86efac;
                background: var(--green-bg);
            }
            .dec-btn.ok:hover {
                background: #dcfce7;
                border-color: #4ade80;
            }
            .dec-btn.bad {
                border-color: #fca5a5;
                background: var(--red-bg);
            }
            .dec-btn.bad:hover {
                background: #fee2e2;
                border-color: #f87171;
            }
            .dec-btn.warn {
                border-color: #fde68a;
                background: var(--amber-bg);
            }
            .dec-btn.warn:hover {
                background: #fef3c7;
                border-color: #fbbf24;
            }
            .dec-btn.neutral {
                border-color: var(--bdr);
                background: var(--slate-bg);
            }
            .dec-btn.neutral:hover {
                background: #e8edf5;
                border-color: var(--navy-lt);
            }
            .dec-letter {
                width: 26px;
                height: 26px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: 700;
                flex-shrink: 0;
                margin-top: 1px;
            }
            .ok .dec-letter {
                background: #86efac;
                color: var(--green);
            }
            .bad .dec-letter {
                background: #fca5a5;
                color: var(--red);
            }
            .warn .dec-letter {
                background: #fde68a;
                color: var(--amber);
            }
            .neutral .dec-letter {
                background: var(--bdr);
                color: var(--navy);
            }
            .dec-text {
                font-size: 14px;
                line-height: 1.45;
                color: var(--text);
                font-weight: 400;
            }

            /* NAVEGACIÓN */
            .c-nav {
                padding: 14px 22px;
                border-top: 1px solid var(--bdr);
                display: flex;
                justify-content: space-between;
                align-items: center;
                gap: 10px;
            }
            .btn-back {
                font-family: inherit;
                font-size: 13px;
                font-weight: 500;
                padding: 8px 14px;
                border-radius: 7px;
                cursor: pointer;
                border: 1px solid var(--bdr);
                background: var(--white);
                color: var(--muted);
                transition: all 0.15s;
            }
            .btn-back:hover:not(:disabled) {
                background: var(--slate-bg);
                color: var(--navy);
            }
            .btn-back:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }

            /* TARJETA FINAL */
            .card.end-success {
                border-top: 5px solid var(--green);
            }
            .card.end-error {
                border-top: 5px solid var(--red);
            }
            .card.end-warning {
                border-top: 5px solid var(--amber);
            }
            .card.end-neutral {
                border-top: 5px solid var(--navy-lt);
            }
            .end-body {
                padding: 28px 22px;
                text-align: center;
            }
            .end-icon {
                font-size: 44px;
                margin-bottom: 12px;
            }
            .end-title {
                font-size: 22px;
                font-weight: 700;
                margin-bottom: 6px;
            }
            .end-sub {
                font-size: 14px;
                color: var(--muted);
                margin-bottom: 20px;
            }
            .end-success .end-title {
                color: var(--green);
            }
            .end-error .end-title {
                color: var(--red);
            }
            .end-warning .end-title {
                color: var(--amber);
            }
            .end-neutral .end-title {
                color: var(--navy-lt);
            }
            .end-actions {
                display: flex;
                gap: 10px;
                justify-content: center;
                margin-bottom: 20px;
                flex-wrap: wrap;
            }
            .summary-box {
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-radius: 8px;
                padding: 14px;
                text-align: left;
                margin-top: 16px;
            }
            .summary-box h4 {
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;

                left: 0;
                right: 0;
                bottom: 0;

                gap: 8px;
                font-family: inherit;
                font-size: 13px;
                font-weight: 600;
                padding: 9px 16px;
                border-radius: 8px;
                cursor: pointer;
                border: 1.5px solid var(--bdr);
                background: var(--white);
                color: var(--navy);
                transition: all 0.15s;
                margin-bottom: 18px;
            }

                background: var(--slate-bg);
            }
            .mapa-hint {
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 16px;
            }

                display: flex;
                gap: 16px;
                overflow-x: auto;
                padding-bottom: 8px;
                align-items: flex-start;
            }
            .mapa-col {
                min-width: 220px;
                flex: 1;
            }
            .mapa-col-hdr {
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: var(--muted);
                padding-bottom: 8px;
                border-bottom: 2px solid var(--bdr);
                margin-bottom: 10px;
            }
            .mapa-node {
                background: var(--white);
                border: 1px solid var(--bdr);
                border-radius: 8px;
                padding: 10px 12px;
                margin-bottom: 8px;
                font-size: 13px;
                cursor: pointer;
                transition: all 0.15s;
                border-left: 3px solid var(--bdr);
            }
            .mapa-node:hover {
                border-color: var(--navy-lt);
                box-shadow: 0 2px 6px rgba(0, 0, 0, 0.07);
            }
            .mapa-node.mn-visited {
                border-left-color: #22c55e;
                background: var(--green-bg);
            }
            .mapa-node.mn-current {
                border-left-color: var(--navy-lt);
                background: #eef2ff;
            }
            .mapa-node.mn-end-s {
                border-left-color: var(--green);
            }
            .mapa-node.mn-end-e {
                border-left-color: var(--red);
            }
            .mapa-node.mn-end-w {
                border-left-color: var(--amber);
            }
            .mapa-node.mn-end-n {
                border-left-color: var(--slate);

            .mapa-node-title {
                color: var(--text);
                font-weight: 500;

            /* RESPONSIVE (sobrescrito: se reemplaza el display:none por overlay móvil) */
            @media (max-width: 768px) {
                #sidebar {
                    position: fixed;
                    top: 0;
                    left: 0;
                    bottom: 0;
                    z-index: 150;
                    transform: translateX(-100%);

                    width: 260px;
                    display: flex !important;
                }
                #sidebar.open {

                }
                #sidebar.collapsed {
                    transform: translateX(-100%);

                }
                .sidebar-backdrop {
                    position: fixed;

                    background: rgba(0, 0, 0, 0.5);

                }
                .sidebar-backdrop.show {
                    display: block;
                }
                #content {
                    padding: 16px 12px;
                }
                .h-sub {
                    display: none;
                }

                    display: none;
                }

                    gap: 6px;
                }

                .btn-ghost span {
                    display: none;
                }
            }

            /* PRINT */
            @media print {
                #hdr,
                #pbar,
                #breadcrumb,
                #sidebar,
                .c-nav,
                #mapa-overlay .mapa-back-btn,
                .sidebar-backdrop {
                    display: none !important;
                }
                body,

                #content {
                    overflow: visible !important;
                    height: auto !important;
                }
                .card {
                    box-shadow: none;
                    page-break-inside: avoid;
                }

            var cur = "inicio";
            var hist = [];
            var activeSbTab = "map";
            var collapsedPhases = {};
            var mapaOn = false;
            var zoomLevel = 100;
            var cliCounter = 0;

            function updateZoom() {
                var label = document.getElementById("zoom-label");
                var content = document.getElementById("content");
                if (label) label.innerText = zoomLevel + "%";
                if (content) content.style.zoom = zoomLevel / 100;
            }

            // ── SIDEBAR TOGGLE (NUEVO) ──
            let sidebarOpen = false; // solo móvil

            function toggleSidebar() {
                const isMobile = window.innerWidth <= 768;
                const sidebar = document.getElementById("sidebar");
                const btn = document.getElementById("btnToggleSidebar");
                if (isMobile) {
                    sidebarOpen = !sidebarOpen;
                    if (sidebarOpen) {
                        sidebar.classList.add("open");
                        document
                            .getElementById("sidebarBackdrop")
                            .classList.add("show");
                        if (btn) btn.setAttribute("aria-expanded", "true");
                    } else {
                        sidebar.classList.remove("open");
                        document
                            .getElementById("sidebarBackdrop")
                            .classList.remove("show");
                        if (btn) btn.setAttribute("aria-expanded", "false");
                    }
                } else {
                    sidebar.classList.toggle("collapsed");
                    const isCollapsed = sidebar.classList.contains("collapsed");
                    if (btn)
                        btn.setAttribute(
                            "aria-expanded",
                            isCollapsed ? "false" : "true",
                        );
                }
            }

            function closeMobileSidebar() {
                if (window.innerWidth <= 768 && sidebarOpen) {
                    sidebarOpen = false;
                    const sidebar = document.getElementById("sidebar");
                    const backdrop = document.getElementById("sidebarBackdrop");
                    const btn = document.getElementById("btnToggleSidebar");
                    if (sidebar) sidebar.classList.remove("open");
                    if (backdrop) backdrop.classList.remove("show");
                    if (btn) btn.setAttribute("aria-expanded", "false");
                }
            }

            function handleResize() {
                if (window.innerWidth > 768) {
                    if (sidebarOpen) {
                        const sidebar = document.getElementById("sidebar");
                        const backdrop =
                            document.getElementById("sidebarBackdrop");
                        if (sidebar) sidebar.classList.remove("open");
                        if (backdrop) backdrop.classList.remove("show");
                        sidebarOpen = false;
                        const btn = document.getElementById("btnToggleSidebar");
                        if (btn) btn.setAttribute("aria-expanded", "false");
                    }
                    const sidebarEl = document.getElementById("sidebar");
                    if (sidebarEl) sidebarEl.classList.remove("open");
                } else {
                    const sidebarEl = document.getElementById("sidebar");
                    if (
                        sidebarEl &&
                        sidebarEl.classList.contains("collapsed")
                    ) {
                        sidebarEl.classList.remove("collapsed");
                    }
                    if (
                        !sidebarOpen &&
                        sidebarEl &&
                        sidebarEl.classList.contains("open")
                    ) {
                        sidebarEl.classList.remove("open");
                        const backdrop =
                            document.getElementById("sidebarBackdrop");
                        if (backdrop) backdrop.classList.remove("show");
                    }
                }
            }

            // ── NAVEGACIÓN (modificada para cerrar sidebar móvil) ──
            function goTo(stepId, choiceLabel) {
                if (!STEPS[stepId]) return;
                hist.push({ s: cur, next: stepId, c: choiceLabel || "" });
                cur = stepId;
                if (choiceLabel) sbTab("journey");
                render();
                closeMobileSidebar();
            }

            function goBack() {
                if (hist.length === 0) return;
                cur = hist.pop().s;
                render();
                closeMobileSidebar();
            }

            function goBackTo(idx) {
                if (idx < 0 || idx >= hist.length) return;
                cur = hist[idx].s;
                hist = hist.slice(0, idx);
                render();
                closeMobileSidebar();
            }

            function jumpTo(stepId) {
                if (!STEPS[stepId]) return;
                hist = [];
                cur = stepId;
                sbTab("map");
                if (mapaOn) toggleMapa();
                render();
                closeMobileSidebar();
            }

            function restart() {
                cur = "inicio";
                hist = [];
                sbTab("map");
                if (mapaOn) {
                    mapaOn = false;
                    document.getElementById("mapa-overlay").style.display =
                        "none";
                    document.getElementById("layout").style.display = "flex";
                }
                render();
                closeMobileSidebar();
            }

            // ── SIDEBAR TABS ──
            function sbTab(tab) {
                activeSbTab = tab;
                var mapEl = document.getElementById("sb-map");
                var jourEl = document.getElementById("sb-journey");
                if (mapEl)
                    mapEl.style.display = tab === "map" ? "block" : "none";
                if (jourEl)
                    jourEl.style.display = tab === "journey" ? "block" : "none";
                document.querySelectorAll(".sb-tab").forEach(function (t) {
                    t.classList.toggle("active", t.dataset.tab === tab);
                });
            }

            // ── RENDER PRINCIPAL ──
            function render() {
                renderPbar();
                renderBreadcrumb();
                renderSbMap();
                renderSbJourney();
                renderContent();
                document.getElementById("content").scrollTop = 0;
                closeMobileSidebar();
            }

            // ── RENDER BARRA DE FASES ──
            function renderPbar() {
                var pbar = document.getElementById("pbar");
                var step = STEPS[cur];
                var curPh = step ? step.ph : 0;
                var visitedPhs = {};
                hist.forEach(function (h) {
                    if (STEPS[h.s]) visitedPhs[STEPS[h.s].ph] = true;
                });
                var html = "";
                PHASES.forEach(function (phase, idx) {
                    var cls = "";
                    if (idx === curPh) cls = "active";
                    else if (visitedPhs[idx] && idx < curPh) cls = "done";
                    html +=
                        '<span class="ph-item"><span class="ph-lbl ' +
                        cls +
                        '">' +
                        escHtml(phase) +
                        "</span></span>";
                    if (idx < PHASES.length - 1)
                        html += '<span class="ph-sep">\u203A</span>';
                });
                pbar.innerHTML = html;
            }

            // ── RENDER BREADCRUMB ──
            function renderBreadcrumb() {
                var bc = document.getElementById("breadcrumb");
                var html = "";
                hist.forEach(function (h, idx) {
                    var step = STEPS[h.s];
                    if (!step) return;
                    var title =
                        step.t.length > 30
                            ? step.t.substring(0, 29) + "\u2026"
                            : step.t;
                    html +=
                        '<button class="bc-item bc-past" data-action="go-back-to" data-index="' +
                        idx +
                        '">' +
                        escHtml(title) +
                        "</button>";
                    html += '<span class="bc-sep">\u203A</span>';
                });
                var curStep = STEPS[cur];
                if (curStep) {
                    var ct =
                        curStep.t.length > 30
                            ? curStep.t.substring(0, 29) + "\u2026"
                            : curStep.t;
                    html +=
                        '<span class="bc-item bc-current">' +
                        escHtml(ct) +
                        "</span>";
                }
                bc.innerHTML = html;
            }

            // ── RENDER SIDEBAR MAPA ──
            function renderSbMap() {
                var sbMap = document.getElementById("sb-map");
                var visitedSet = {};
                hist.forEach(function (h) {
                    visitedSet[h.s] = true;
                });

                // Agrupar por fase
                var byPhase = PHASES.map(function () {
                    return [];
                });
                Object.keys(STEPS).forEach(function (id) {
                    var s = STEPS[id];
                    if (s.ph >= 0 && s.ph < PHASES.length)
                        byPhase[s.ph].push({ id: id, s: s });
                });

                var html = "";
                byPhase.forEach(function (nodes, pi) {
                    if (!nodes.length) return;
                    var isCollapsed = collapsedPhases[pi] === true;
                    html +=
                        '<div class="sm-phase">' +
                        '<div class="sm-phase-hdr ' +
                        (isCollapsed ? "collapsed" : "") +
                        '" data-action="toggle-phase" data-phase="' +
                        pi +
                        '">' +
                        "<span>" +
                        escHtml(PHASES[pi]) +
                        '</span><span class="ph-toggle">\u25BE</span></div>' +
                        '<div class="sm-nodes" style="display:' +
                        (isCollapsed ? "none" : "block") +
                        '">';
                    nodes.forEach(function (item) {
                        var id = item.id,
                            s = item.s;
                        var cls = "";
                        if (id === cur) cls = "sm-current";
                        else if (visitedSet[id]) cls = "sm-visited";
                        else if (s.end) cls = "sm-end";
                        var short =
                            s.t.length > 34
                                ? s.t.substring(0, 33) + "\u2026"
                                : s.t;
                        html +=
                            '<div class="sm-node ' +
                            cls +
                            '" data-action="jump-to" data-step="' +
                            id +
                            '">' +
                            '<div class="sm-node-dot"></div>' +
                            '<div class="sm-node-label">' +
                            escHtml(short) +
                            "</div></div>";
                    });
                    html += "</div></div>";
                });
                sbMap.innerHTML = html + SB_FOOT;
            }

            // ── RENDER SIDEBAR RECORRIDO ──
            function renderSbJourney() {
                var sbJourney = document.getElementById("sb-journey");
                if (hist.length === 0) {
                    sbJourney.innerHTML =
                        '<div class="sb-empty">El recorrido se ir\u00E1 mostrando aqu\u00ED conforme avance.</div>' +
                        SB_FOOT;
                    return;
                }
                var html = "";
                hist.forEach(function (h) {
                    var step = STEPS[h.s];
                    if (!step) return;
                    html +=
                        '<div class="pi past"><div class="pi-title">' +
                        escHtml(step.t) +
                        "</div>" +
                        (h.c
                            ? '<div class="pi-choice">\u2192 ' +
                              escHtml(h.c) +
                              "</div>"
                            : "") +
                        "</div>";
                });
                var curStep = STEPS[cur];
                if (curStep) {
                    html +=
                        '<div class="pi current"><div class="pi-title">' +
                        escHtml(curStep.t) +
                        "</div></div>";
                }
                html += SB_FOOT;
                sbJourney.innerHTML = html;
            }

            // ── RENDER CONTENIDO ──
            function renderContent() {
                var content = document.getElementById("content");
                var step = STEPS[cur];
                cliCounter = 0;
                if (!step) {
                    content.innerHTML =
                        '<p style="padding:20px">Paso no encontrado.</p>';
                    return;
                }
                if (step.end) {
                    content.innerHTML = buildEnd(step);
                } else {
                    content.innerHTML = buildStep(step);
                }
            }

            // ── RENDER BLOQUES ──
            function renderBlocks(blocks) {
                var html = "";
                (blocks || []).forEach(function (block) {
                    var type = block[0];
                    switch (type) {
                        case "i":
                            html +=
                                '<p class="blk blk-i">' +
                                escHtml(block[1]) +
                                "</p>";
                            break;
                        case "d":
                            html +=
                                '<div class="blk blk-d">\u23F1 ' +
                                escHtml(block[1]) +
                                "</div>";
                            break;
                        case "n":
                            html +=
                                '<div class="blk blk-n">\u2139\uFE0F ' +
                                escHtml(block[1]) +
                                "</div>";
                            break;
                        case "w":
                            html +=
                                '<div class="blk blk-w">\u26A0\uFE0F ' +
                                escHtml(block[1]) +
                                "</div>";
                            break;
                        case "l":
                            html +=
                                '<div class="blk blk-l">\uD83D\uDCCB ' +
                                escHtml(block[1]) +
                                "</div>";
                            break;
                        case "cl":
                            var title = block[1];
                            var items = block[2];
                            html +=
                                '<div class="blk blk-cl"><strong>' +
                                escHtml(title) +
                                "</strong><ul>";
                            items.forEach(function (item) {
                                html += "<li>" + escHtml(item) + "</li>";
                            });
                            html += "</ul></div>";
                            break;
                    }
                });
                return html;
            }

            // ── BUILD STEP ──
            function buildStep(s) {
                var actLabel = ACT_LABELS[s.ac] || s.ac;
                var actCls = ACT_CLS[s.ac] || "act-laj";
                var phaseName = PHASES[s.ph] || "";
                var stepNum = hist.length + 1;

                var html =
                    '<div class="card">' +
                    '<div class="c-hdr">' +
                    '<div class="c-hdr-row">' +
                    '<span class="act-badge ' +
                    actCls +
                    '">' +
                    escHtml(actLabel) +
                    "</span>" +
                    '<span class="step-meta">Paso ' +
                    stepNum +
                    " \u00B7 Fase: " +
                    escHtml(phaseName) +
                    "</span>" +
                    "</div>" +
                    '<div class="c-title">' +
                    escHtml(s.t) +
                    "</div>" +
                    "</div>" +
                    '<div class="c-body">' +
                    renderBlocks(s.c) +
                    "</div>";

                if (s.q) {
                    var letters = "ABCDEFGHIJ";
                    var opts = s.opts || [];
                    html +=
                        '<div class="dec-area">' +
                        '<div class="dec-q">' +
                        escHtml(s.q) +
                        "</div>" +
                        '<div class="dec-opts">';
                    opts.forEach(function (opt, i) {
                        var v = opt.v || "neutral";
                        html +=
                            '<button class="dec-btn ' +
                            v +
                            '" data-action="go-to" data-step="' +
                            opt.n +
                            '" data-label="' +
                            escAttr(opt.l || opt.t) +
                            '">' +
                            '<div class="dec-letter">' +
                            letters[i] +
                            "</div>" +
                            '<div class="dec-text">' +
                            escHtml(opt.t) +
                            "</div>" +
                            "</button>";
                    });
                    html += "</div></div>";
                }

                html +=
                    '<div class="c-nav">' +
                    '<button class="btn-back" data-action="go-back"' +
                    (hist.length === 0 ? " disabled" : "") +
                    ">\u2190 Volver</button>";
                if (!s.q && s.nx) {
                    html +=
                        '<button class="btn-next" data-action="go-to" data-step="' +
                        s.nx +
                        '" data-label="">Siguiente \u2192</button>';
                }
                html += "</div></div>";
                return html;
            }

            // ── BUILD END ──
            function buildEnd(s) {
                var conf = END_CONF[s.end] || END_CONF.neutral;
                var bodyHtml = renderBlocks(s.c);

                var summaryHtml = "";
                if (hist.length > 0) {
                    var items = hist.map(function (h, idx) {
                        var st = STEPS[h.s];
                        if (!st) return "";
                        return (
                            "<li><strong>" +
                            escHtml(st.t) +
                            "</strong>" +
                            (h.c
                                ? " \u2192 <em>" + escHtml(h.c) + "</em>"
                                : "") +
                            "</li>"
                        );
                    });
                    items.push(
                        "<li><strong>" +
                            escHtml(s.t) +
                            "</strong> \u2014 <em>Desenlace</em></li>",
                    );
                    summaryHtml =
                        '<div class="summary-box"><h4>Resumen del recorrido</h4><ol>' +
                        items.join("") +
                        "</ol></div>";
                }

                return (
                    '<div class="card end-' +
                    s.end +
                    '">' +
                    '<div class="end-body">' +
                    '<div class="end-icon">' +
                    conf.icon +
                    "</div>" +
                    '<div class="end-title">' +
                    escHtml(conf.title) +
                    "</div>" +
                    '<div class="end-sub">' +
                    escHtml(s.t) +
                    "</div>" +
                    '<div class="end-actions">' +
                    '<button class="btn-next" data-action="reiniciar">↺ Nuevo procedimiento</button>' +
                    '<button class="btn-back" data-action="go-back">\u2190 Volver</button>' +
                    "</div>" +
                    summaryHtml +
                    "</div>" +
                    (s.c && s.c.length
                        ? '<div class="end-content">' + bodyHtml + "</div>"
                        : "") +
                    "</div>"
                );
            }

            // ── MAPA OVERLAY ──
            function toggleMapa() {
                mapaOn = !mapaOn;
                document.getElementById("layout").style.display = mapaOn
                    ? "none"
                    : "flex";
                document.getElementById("mapa-overlay").style.display = mapaOn
                    ? "block"
                    : "none";
                if (mapaOn) renderMapa();
                closeMobileSidebar();
            }

            function renderMapa() {
                var el = document.getElementById("mapa-overlay");
                var visitedSet = {};
                hist.forEach(function (h) {
                    visitedSet[h.s] = true;
                });

                var byPhase = PHASES.map(function () {
                    return [];
                });
                Object.keys(STEPS).forEach(function (id) {
                    var s = STEPS[id];
                    if (s.ph >= 0 && s.ph < PHASES.length)
                        byPhase[s.ph].push({ id: id, s: s });
                });

                var html =
                    '<button class="mapa-back-btn" data-action="close-mapa">\u2190 Volver al recorrido</button>' +
                    '<p class="mapa-hint">Vista completa del procedimiento. Haga clic en cualquier paso para ir directamente a \u00E9l.</p>' +
                    '<div class="mapa-cols">';

                byPhase.forEach(function (nodes, pi) {
                    if (!nodes.length) return;
                    html +=
                        '<div class="mapa-col"><div class="mapa-col-hdr">' +
                        escHtml(PHASES[pi]) +
                        "</div>";
                    nodes.forEach(function (item) {
                        var id = item.id,
                            s = item.s;
                        var cls = "";
                        if (id === cur) cls = "mn-current";
                        else if (visitedSet[id]) cls = "mn-visited";
                        else if (s.end === "success") cls = "mn-end-s";
                        else if (s.end === "error") cls = "mn-end-e";
                        else if (s.end === "warning") cls = "mn-end-w";
                        else if (s.end === "neutral") cls = "mn-end-n";
                        var actLabel = ACT_LABELS[s.ac] || s.ac;
                        html +=
                            '<div class="mapa-node ' +
                            cls +
                            '" data-action="jump-to" data-step="' +
                            id +
                            '">' +
                            '<div class="mapa-node-title">' +
                            escHtml(s.t) +
                            "</div>" +
                            '<div class="mapa-node-badge">' +
                            escHtml(actLabel) +
                            (s.end ? " \u00B7 \uD83C\uDFC1" : "") +
                            "</div>" +
                            "</div>";
                    });
                    html += "</div>";
                });
                html += "</div>";
                el.innerHTML = html;
            }

            // ── DESCARGA ──
            function dlGuia() {
                var html =
                    "<!DOCTYPE html>" + document.documentElement.outerHTML;
                var blob = new Blob([html], {
                    type: "text/html;charset=utf-8",
                });
                var url = URL.createObjectURL(blob);
                var a = document.createElement("a");
                a.href = url;
                a.download = "guia-tramitacion-defensor-judicial.html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // ── UTILIDADES ──
            function escHtml(s) {
                if (!s) return "";
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;");
            }
            function escAttr(s) {
                if (!s) return "";
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            // ── EVENT DELEGATION ──
            function wireEvents() {
                document.addEventListener("click", function (ev) {
                    var el = ev.target.closest("[data-action]");
                    if (!el) return;
                    var action = el.dataset.action;
                    switch (action) {
                        case "toggle-mapa":
                            toggleMapa();
                            break;
                        case "close-mapa":
                            if (mapaOn) toggleMapa();
                            break;
                        case "descargar":
                            dlGuia();
                            break;
                        case "reiniciar":
                            restart();
                            break;
                        case "sb-tab":
                            sbTab(el.dataset.tab);
                            break;
                        case "go-back":
                            goBack();
                            break;
                        case "go-back-to":
                            goBackTo(parseInt(el.dataset.index, 10));
                            break;
                        case "go-to":
                            goTo(el.dataset.step, el.dataset.label || "");
                            break;
                        case "zoom-in":
                            if (zoomLevel < 150) {
                                zoomLevel += 10;
                                updateZoom();
                            }
                            break;
                        case "zoom-out":
                            if (zoomLevel > 70) {
                                zoomLevel -= 10;
                                updateZoom();
                            }
                            break;
                        case "jump-to":
                            jumpTo(el.dataset.step);
                            break;
                        case "toggle-phase":
                            var pi = parseInt(el.dataset.phase, 10);
                            collapsedPhases[pi] = !collapsedPhases[pi];
                            renderSbMap();
                            break;
                    }
                });
                document.addEventListener("keydown", function (ev) {
                    if (ev.key === "Escape" && mapaOn) toggleMapa();
                });
            }

            // ── STARTUP ──
            document.addEventListener("DOMContentLoaded", function () {
                wireEvents();
                updateZoom();
                // Eventos para toggle sidebar
                document
                    .getElementById("btnToggleSidebar")
                    .addEventListener("click", toggleSidebar);
                document
                    .getElementById("sidebarBackdrop")
                    .addEventListener("click", closeMobileSidebar);
                window.addEventListener("resize", handleResize);
                handleResize();
                render();
            });
        </script>
    </body>
</html>
