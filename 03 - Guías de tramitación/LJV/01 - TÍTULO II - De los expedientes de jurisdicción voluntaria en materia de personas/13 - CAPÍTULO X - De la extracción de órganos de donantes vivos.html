<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de Tramitación — Extracción de Órganos de Donantes Vivos</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════════
   CSS VARIABLES & TOKENS
   ═══════════════════════════════════════════════════════════════ */
:root {
  --navy:      #1A2F6E;
  --navy-mid:  #2E4DAA;
  --navy-lt:   #4169E1;
  --cyan:      #0D9488;    --cyan-bg:   #F0FDFA;
  --violet:    #5B21B6;    --violet-bg: #F5F3FF;
  --green:     #15803D;    --green-bg:  #F0FDF4;
  --amber:     #B45309;    --amber-bg:  #FFFBEB;
  --red:       #B91C1C;    --red-bg:    #FEF2F2;
  --slate:     #475569;    --slate-bg:  #F4F6FB;
  --white:     #FFFFFF;
  --bdr:       #D1D9EE;
  --text:      #1A1A2E;
  --muted:     #6B7280;
  --radius:    8px;
}

/* ═══════════════════════════════════════════════════════════════
   RESET & BASE
   ═══════════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'Outfit', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  background: var(--slate-bg);
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; }

/* ═══════════════════════════════════════════════════════════════
   #app — ROOT CONTAINER (100vh flex column)
   ═══════════════════════════════════════════════════════════════ */
#app {
  display: flex; flex-direction: column;
  height: 100vh; overflow: hidden;
}

/* ═══════════════════════════════════════════════════════════════
   ELEMENT 1 — CABECERA (#hdr)
   ═══════════════════════════════════════════════════════════════ */
#hdr {
  flex-shrink: 0;
  height: 56px;
  display: flex; justify-content: space-between; align-items: center;
  padding: 0 20px;
  background: var(--navy);
  color: #fff;
}
.h-left { display: flex; align-items: center; gap: 12px; }
.h-seal {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,.10);
  border: 1.5px solid rgba(255,255,255,.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}
.h-title { font-size: 14px; font-weight: 700; }
.h-sub { font-size: 10px; opacity: .55; margin-top: 1px; }
.h-right { display: flex; gap: 8px; }
.btn-ghost {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.18);
  color: rgba(255,255,255,.85);
  font-size: 12px; font-weight: 500;
  padding: 5px 12px; border-radius: 6px;
  transition: all .15s;
}
.btn-ghost:hover { background: rgba(255,255,255,.18); }

/* ═══════════════════════════════════════════════════════════════
   ELEMENT 2 — BARRA DE FASES (#pbar)
   ═══════════════════════════════════════════════════════════════ */
#pbar {
  flex-shrink: 0;
  height: 36px;
  display: flex; align-items: center;
  padding: 0 20px;
  overflow-x: auto; scrollbar-width: none;
  background: var(--navy-mid);
  gap: 0;
}
#pbar::-webkit-scrollbar { display: none; }
.ph-item { display: flex; align-items: center; white-space: nowrap; }
.ph-lbl {
  font-size: 11px; font-weight: 500;
  padding: 3px 10px; border-radius: 12px;
  color: rgba(255,255,255,.40);
  transition: all .15s;
}
.ph-lbl.active {
  color: #fff; font-weight: 700;
  background: rgba(65,105,225,.35);
}
.ph-lbl.done { color: rgba(255,255,255,.70); }
.ph-sep {
  font-size: 12px; color: rgba(255,255,255,.25);
  margin: 0 4px;
}

/* ═══════════════════════════════════════════════════════════════
   ELEMENT 3 — MIGAS DE PAN (#breadcrumb)
   ═══════════════════════════════════════════════════════════════ */
#breadcrumb {
  flex-shrink: 0;
  display: flex; align-items: center;
  padding: 0 20px; gap: 0;
  height: 34px;
  background: var(--slate-bg);
  border-bottom: 1px solid var(--bdr);
  overflow-x: auto; scrollbar-width: none;
}
#breadcrumb::-webkit-scrollbar { display: none; }
.bc-item { font-size: 11px; white-space: nowrap; padding: 0 6px; color: var(--muted); }
.bc-past {
  cursor: pointer; background: none; border: none;
  font-family: inherit; font-size: 11px;
  color: var(--muted); padding: 0 6px;
}
.bc-past:hover { color: var(--navy-lt); text-decoration: underline; }
.bc-current { font-weight: 600; color: var(--navy); }
.bc-sep { font-size: 10px; color: var(--bdr); padding: 0 2px; }

/* ═══════════════════════════════════════════════════════════════
   ELEMENT 4 — LAYOUT (#layout)
   ═══════════════════════════════════════════════════════════════ */
#layout {
  flex: 1; overflow: hidden;
  display: flex;
}

/* ═══════════════════════════════════════════════════════════════
   ELEMENT 4a — SIDEBAR (#sidebar)
   ═══════════════════════════════════════════════════════════════ */
#sidebar {
  flex-shrink: 0;
  width: 260px;
  background: var(--navy-mid);
  overflow-y: auto; overflow-x: hidden;
  color: #fff;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,.15) transparent;
}
#sidebar::-webkit-scrollbar { width: 5px; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }

#sb-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,.10); }
.sb-tab {
  flex: 1; padding: 8px 0; font-size: 11px; font-weight: 600;
  background: none; border: none;
  color: rgba(255,255,255,.40); cursor: pointer;
  letter-spacing: .4px; text-transform: uppercase;
  transition: all .15s;
}
.sb-tab.active { color: #fff; border-bottom: 2px solid var(--navy-lt); }
.sb-tab:hover:not(.active) { color: rgba(255,255,255,.70); background: rgba(255,255,255,.05); }

#sb-map, #sb-journey { padding: 8px 0; }
#sb-journey { display: none; }

/* Sidebar Map */
.sm-phase {}
.sm-phase-hdr {
  display: flex; align-items: center; gap: 6px;
  padding: 8px 12px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: .3px;
  color: rgba(255,255,255,.50); cursor: pointer;
  transition: background .15s;
}
.sm-phase-hdr:hover { background: rgba(255,255,255,.05); }
.sm-phase-hdr .arrow {
  font-size: 8px; transition: transform .15s;
  display: inline-block; margin-right: 4px;
}
.sm-phase-hdr.collapsed .arrow { transform: rotate(-90deg); }
.sm-phase-body { padding: 0 0 4px 0; }
.sm-phase-body.collapsed { display: none; }
.sm-node {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 12px 5px 22px;
  font-size: 12px; color: rgba(255,255,255,.55);
  cursor: pointer; transition: all .12s;
  border-left: 2px solid transparent;
}
.sm-node:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.80); }
.sm-node .nd-icon { font-size: 10px; flex-shrink: 0; width: 14px; text-align: center; }
.sm-node.sm-visited { color: rgba(255,255,255,.80); }
.sm-node.sm-visited .nd-icon { color: #34D399; }
.sm-node.sm-current {
  color: #fff; font-weight: 600;
  border-left-color: var(--navy-lt);
  background: rgba(65,105,225,.15);
}
.sm-node.sm-current .nd-icon { color: #60A5FA; }
.sm-node.sm-unreachable { opacity: .35; cursor: default; }
.sm-node.sm-end-node { font-style: italic; }

/* Sidebar Journey */
.pi {
  padding: 8px 12px;
  border-bottom: 1px solid rgba(255,255,255,.06);
  font-size: 12px;
}
.pi.past { color: rgba(255,255,255,.55); }
.pi.current { color: #fff; font-weight: 600; border-left: 2px solid var(--navy-lt); padding-left: 10px; }
.pi-title { margin-bottom: 2px; }
.pi-choice { font-size: 11px; color: rgba(255,255,255,.40); padding-left: 14px; }
.pi-choice::before { content: '↪ '; }
.sb-foot {
  padding: 12px; font-size: 10px;
  color: rgba(255,255,255,.30);
  border-top: 1px solid rgba(255,255,255,.06);
  line-height: 1.5;
}

/* ═══════════════════════════════════════════════════════════════
   ELEMENT 4b — CONTENT AREA (#content)
   ═══════════════════════════════════════════════════════════════ */
#content {
  flex: 1; overflow-y: auto;
  padding: 24px 28px;
  background: var(--slate-bg);
  scrollbar-width: thin;
  scrollbar-color: var(--bdr) transparent;
}
#content::-webkit-scrollbar { width: 6px; }
#content::-webkit-scrollbar-thumb { background: var(--bdr); border-radius: 3px; }

/* ═══════════════════════════════════════════════════════════════
   CARD — STEP CARD (.card)
   ═══════════════════════════════════════════════════════════════ */
.card {
  background: #fff;
  border: 1px solid var(--bdr);
  border-radius: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,.06);
  overflow: hidden;
  animation: fadeUp .22s ease;
  max-width: 740px;
  margin: 0 auto;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

.c-hdr {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--bdr);
  background: #fff;
}
.act-badge {
  display: inline-block; font-size: 10.5px; font-weight: 600;
  padding: 2px 10px; border-radius: 12px;
  text-transform: uppercase; letter-spacing: .3px;
  margin-bottom: 8px;
}
.act-laj   { background: #DBEAFE; color: #1E40AF; }
.act-juez  { background: #E0E7FF; color: #4338CA; }
.act-ambos { background: #F3E8FF; color: #7C3AED; }

.c-title {
  font-size: 18px; font-weight: 700;
  color: var(--text); margin-bottom: 4px;
  line-height: 1.3;
}
.step-num {
  font-size: 11px; color: var(--muted);
  font-weight: 400;
}

.c-body {
  padding: 18px 22px;
}
.c-body p { margin-bottom: 10px; line-height: 1.65; }
.c-body p:last-child { margin-bottom: 0; }

/* Content block types */
.blk-intro  { color: var(--text); }
.blk-deadline {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 14px; border-radius: 6px;
  background: var(--amber-bg); border: 1px solid #FDE68A;
  font-size: 13.5px; margin-bottom: 10px;
}
.blk-deadline::before { content: '⏱'; flex-shrink: 0; font-size: 14px; }
.blk-note {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 14px; border-radius: 6px;
  background: #EFF6FF; border: 1px solid #BFDBFE;
  font-size: 13.5px; margin-bottom: 10px;
}
.blk-note::before { content: 'ℹ'; flex-shrink: 0; font-size: 14px; }
.blk-warn {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 10px 14px; border-radius: 6px;
  background: var(--red-bg); border: 1px solid #FECACA;
  font-size: 13.5px; margin-bottom: 10px;
}
.blk-warn::before { content: '⚠'; flex-shrink: 0; font-size: 14px; }
.blk-law {
  font-size: 12px; color: var(--muted);
  font-family: ui-monospace, SFMono-Regular, monospace;
  margin-bottom: 10px;
  padding: 6px 10px; background: #F8FAFC; border-radius: 4px;
  border: 1px solid #E2E8F0;
}
.blk-law::before { content: '📜 '; }
.blk-checklist {
  margin-bottom: 10px;
}
.blk-checklist-title {
  font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text);
}
.blk-checklist ul {
  list-style: none; padding: 0;
}
.blk-checklist li {
  padding: 5px 0 5px 22px; position: relative;
  font-size: 13.5px; color: var(--text);
}
.blk-checklist li::before {
  content: '☐'; position: absolute; left: 0; top: 5px;
  font-size: 13px; color: var(--navy-lt);
}

/* ═══════════════════════════════════════════════════════════════
   DECISION AREA (.dec-area)
   ═══════════════════════════════════════════════════════════════ */
.dec-area {
  padding: 0 22px 4px;
}
.dec-q {
  padding: 14px 16px;
  border-top: 3px solid var(--navy);
  background: #F8FAFC;
  border-radius: 0 0 6px 6px;
  font-size: 14.5px; font-weight: 600;
  color: var(--text); margin-bottom: 12px;
}
.dec-opts {
  display: flex; flex-direction: column; gap: 8px;
}
.dec-btn {
  display: flex; align-items: center; gap: 12px;
  width: 100%; padding: 12px 16px;
  border: 1.5px solid var(--bdr);
  border-radius: 8px;
  background: #fff;
  font-size: 13.5px; font-weight: 500;
  color: var(--text);
  transition: all .15s;
  text-align: left;
}
.dec-btn:hover { border-color: var(--navy-lt); background: #F8FAFF; }
.dec-btn.ok    { border-left: 3px solid var(--green); }
.dec-btn.bad   { border-left: 3px solid var(--red); }
.dec-btn.warn  { border-left: 3px solid var(--amber); }
.dec-btn.neutral { border-left: 3px solid var(--navy-lt); }
.dec-letter {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.ok .dec-letter    { background: var(--green-bg); color: var(--green); }
.bad .dec-letter   { background: var(--red-bg); color: var(--red); }
.warn .dec-letter  { background: var(--amber-bg); color: var(--amber); }
.neutral .dec-letter { background: #EFF6FF; color: var(--navy-lt); }

/* ═══════════════════════════════════════════════════════════════
   CARD NAVIGATION (.c-nav)
   ═══════════════════════════════════════════════════════════════ */
.c-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 22px;
  border-top: 1px solid var(--bdr);
  background: #FAFBFE;
}
.btn-back {
  padding: 7px 16px; border-radius: 6px;
  border: 1px solid var(--bdr); background: #fff;
  font-size: 12.5px; font-weight: 500; color: var(--muted);
  transition: all .15s;
}
.btn-back:hover:not(:disabled) { background: #F1F5F9; color: var(--text); }
.btn-back:disabled { opacity: .35; cursor: not-allowed; }
.btn-next {
  padding: 7px 18px; border-radius: 6px;
  border: none; background: var(--navy-lt);
  font-size: 12.5px; font-weight: 600; color: #fff;
  transition: all .15s;
}
.btn-next:hover { background: var(--navy); }

/* ═══════════════════════════════════════════════════════════════
   END CARD (.card.end-*)
   ═══════════════════════════════════════════════════════════════ */
.card.end-success { border-left: 4px solid var(--green); }
.card.end-error   { border-left: 4px solid var(--red); }
.card.end-warning { border-left: 4px solid var(--amber); }
.card.end-neutral { border-left: 4px solid var(--navy-lt); }

.end-body {
  text-align: center;
  padding: 28px 22px 18px;
}
.end-icon { font-size: 40px; margin-bottom: 10px; }
.end-title {
  font-size: 18px; font-weight: 700; margin-bottom: 4px;
}
.end-success .end-title { color: var(--green); }
.end-error .end-title   { color: var(--red); }
.end-warning .end-title { color: var(--amber); }
.end-neutral .end-title { color: var(--navy-lt); }
.end-sub {
  font-size: 13px; color: var(--muted); margin-bottom: 16px;
}
.end-actions { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; }
.end-content { text-align: left; padding: 0 22px 14px; }

.summary-box {
  margin: 16px 22px 18px;
  padding: 14px 16px;
  background: #F8FAFC; border: 1px solid var(--bdr);
  border-radius: 8px;
}
.summary-box h4 {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .4px; color: var(--muted); margin-bottom: 8px;
}
.summary-box ol {
  padding-left: 18px; font-size: 12.5px; color: var(--text);
}
.summary-box li { margin-bottom: 4px; line-height: 1.5; }
.summary-box .sum-choice { color: var(--navy-lt); font-weight: 500; }

/* ═══════════════════════════════════════════════════════════════
   MAPA OVERLAY (#mapa-overlay)
   ═══════════════════════════════════════════════════════════════ */
#mapa-overlay {
  display: none;
  flex: 1; overflow-y: auto;
  background: var(--slate-bg);
  padding: 24px;
}
.mapa-close {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 6px;
  border: 1px solid var(--bdr); background: #fff;
  font-size: 12.5px; font-weight: 500; color: var(--text);
  margin-bottom: 18px; transition: all .15s;
}
.mapa-close:hover { background: #F1F5F9; }

.mapa-columns {
  display: flex; gap: 20px;
  overflow-x: auto; padding-bottom: 20px;
  align-items: flex-start;
}
.mapa-phase {
  min-width: 220px; max-width: 260px; flex-shrink: 0;
}
.mapa-phase-hdr {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: .4px;
  color: var(--navy); padding: 8px 12px;
  background: #fff; border-radius: 6px 6px 0 0;
  border: 1px solid var(--bdr); border-bottom: none;
}
.mapa-phase-body {
  background: #fff; border: 1px solid var(--bdr);
  border-radius: 0 0 6px 6px; padding: 8px;
}
.mapa-node {
  padding: 8px 10px; border-radius: 6px;
  margin-bottom: 6px; font-size: 12px;
  border: 1px solid #E2E8F0;
  transition: background .12s;
}
.mapa-node:last-child { margin-bottom: 0; }
.mapa-node.mapa-visited { border-left: 3px solid var(--green); background: var(--green-bg); }
.mapa-node.mapa-current { border-left: 3px solid var(--navy-lt); background: #EFF6FF; }
.mapa-node.mapa-end-success { border-left: 3px solid var(--green); }
.mapa-node.mapa-end-error { border-left: 3px solid var(--red); }
.mapa-node.mapa-end-warning { border-left: 3px solid var(--amber); }
.mapa-node.mapa-end-neutral { border-left: 3px solid var(--navy-lt); }
.mapa-node-title { font-weight: 600; color: var(--text); margin-bottom: 2px; }
.mapa-node-actor { font-size: 10px; color: var(--muted); }
.mapa-arrow {
  font-size: 10px; color: var(--muted); padding: 2px 0 2px 10px;
}

/* ═══════════════════════════════════════════════════════════════
   STEP PREVIEW TOOLTIP
   ═══════════════════════════════════════════════════════════════ */
.step-preview {
  position: fixed;
  z-index: 1000;
  width: 320px;
  max-height: 300px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--bdr);
  border-radius: 8px;
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
  padding: 14px 16px;
  font-size: 12.5px;
  color: var(--text);
  line-height: 1.5;
}
.step-preview .sp-title {
  font-weight: 700; font-size: 13px; margin-bottom: 6px;
}
.step-preview .sp-body { color: var(--muted); }
.sp-close {
  position: absolute; top: 6px; right: 8px;
  background: none; border: none; font-size: 16px;
  color: var(--muted); cursor: pointer;
}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE
   ═══════════════════════════════════════════════════════════════ */
@media (max-width: 700px) {
  #sidebar { display: none; }
  #content { padding: 16px 12px; }
  .card { max-width: 100%; }
  .dec-opts { gap: 6px; }
  .mapa-columns { flex-direction: column; }
  .mapa-phase { max-width: 100%; min-width: auto; }
}

/* ═══════════════════════════════════════════════════════════════
   PRINT
   ═══════════════════════════════════════════════════════════════ */
@media print {
  body { background: #fff; color: #111; overflow: visible; height: auto; }
  #app { height: auto; overflow: visible; }
  #hdr, #pbar, #breadcrumb, #sidebar, .c-nav, .dec-area, .end-actions, .mapa-close { display: none !important; }
  #layout { display: block; overflow: visible; }
  #content { overflow: visible; padding: 10px; }
  .card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; animation: none; max-width: 100%; }
  #mapa-overlay { display: block !important; overflow: visible; }
  .mapa-columns { flex-wrap: wrap; overflow: visible; }
}
</style>
</head>
<body>

<div id="app">

  <!-- ELEMENT 1 — CABECERA -->
  <header id="hdr">
    <div class="h-left">
      <div class="h-seal">⚖</div>
      <div>
        <div class="h-title">Extracción de órganos de donantes vivos</div>
        <div class="h-sub">Ley 15/2015 · Arts. 78-80 · Jurisdicción Voluntaria</div>
      </div>
    </div>
    <div class="h-right">
      <button class="btn-ghost" onclick="toggleMapa()">🗺 Ver mapa</button>
      <button class="btn-ghost" onclick="dlGuia()">⬇ Descargar</button>
      <button class="btn-ghost" onclick="restart()">↻ Reiniciar</button>
    </div>
  </header>

/* ═══════════════════════════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════════════════════════ */
let cur = 'inicio';
let hist = []; // [{s: originKey, next: destKey, c: choiceLabel}]
let activeSbTab = 'map';
let mapaOn = false;
let phaseCollapsed = {};

/* ═══════════════════════════════════════════════════════════════
   NAVIGATION FUNCTIONS
   ═══════════════════════════════════════════════════════════════ */
function goTo(stepId, choiceLabel) {
  hist.push({ s: cur, next: stepId, c: choiceLabel || '' });
  cur = stepId;
  if (choiceLabel) sbTab('journey');
  render();
}

function goBack() {
  if (hist.length === 0) return;
  const prev = hist.pop();
  cur = prev.s;
  render();
}

function goBackTo(index) {
  if (index < 0 || index >= hist.length) return;
  cur = hist[index].s;
  hist = hist.slice(0, index);
  render();
}

function buildPathTo(targetId) {
  if (targetId === 'inicio') return [];
  const queue = [{ node: 'inicio', path: [] }];
  const visited = new Set();
  visited.add('inicio');
  while (queue.length) {
    const current = queue.shift();
    const step = STEPS[current.node];
    if (!step) continue;
    if (step.nx) {
      const nextId = step.nx;
      const newPath = [...current.path, { s: current.node, next: nextId, c: '' }];
      if (nextId === targetId) return newPath;
      if (!visited.has(nextId)) {
        visited.add(nextId);
        queue.push({ node: nextId, path: newPath });
      }
    }
    if (step.opts) {
      for (const opt of step.opts) {
        const nextId = opt.n;
        const choiceLabel = opt.t;
        const newPath = [...current.path, { s: current.node, next: nextId, c: choiceLabel }];
        if (nextId === targetId) return newPath;
        if (!visited.has(nextId)) {
          visited.add(nextId);
          queue.push({ node: nextId, path: newPath });
        }
      }
    }
  }
  return null;
}

function jumpTo(stepId) {
  if (stepId !== cur) {
    const path = buildPathTo(stepId);
    if (path) {
      hist = path;
    } else {
      hist = [];
    }
  }
  cur = stepId;
  sbTab('map');
  closePreview();
  render();
}

function restart() {
  cur = 'inicio';
  hist = [];
  sbTab('map');
  mapaOn = false;
  document.getElementById('layout').style.display = 'flex';
  document.getElementById('mapa-overlay').style.display = 'none';
  render();
}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR TABS
   ═══════════════════════════════════════════════════════════════ */
function sbTab(tab) {
  activeSbTab = tab;
  document.getElementById('sb-map').style.display = tab === 'map' ? 'block' : 'none';
  document.getElementById('sb-journey').style.display = tab === 'journey' ? 'block' : 'none';
  document.querySelectorAll('.sb-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'map') || (i === 1 && tab === 'journey'));
  });
}

/* ═══════════════════════════════════════════════════════════════
   MAPA OVERLAY
   ═══════════════════════════════════════════════════════════════ */
function toggleMapa() {
  mapaOn = !mapaOn;
  document.getElementById('layout').style.display = mapaOn ? 'none' : 'flex';
  document.getElementById('mapa-overlay').style.display = mapaOn ? 'block' : 'none';
  if (mapaOn) renderMapa();
}

/* ═══════════════════════════════════════════════════════════════
   DOWNLOAD
   ═══════════════════════════════════════════════════════════════ */
function dlGuia() {
  const html = '<!DOCTYPE html>' + document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'guia-tramitacion-extraccion-organos-donantes-vivos.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ═══════════════════════════════════════════════════════════════
   ESCAPE HELPER
   ═══════════════════════════════════════════════════════════════ */
function escQ(s) { return String(s).replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }

/* ═══════════════════════════════════════════════════════════════
   UTILITY: get visited set
   ═══════════════════════════════════════════════════════════════ */
function getVisitedSet() {
  const v = new Set();
  v.add('inicio');
  hist.forEach(h => v.add(h.next));
  return v;
}

/* ═══════════════════════════════════════════════════════════════
   UTILITY: truncate
   ═══════════════════════════════════════════════════════════════ */
function trunc(s, n) {
  return s.length > n ? s.slice(0, n-1) + '…' : s;
}

/* ═══════════════════════════════════════════════════════════════
   UTILITY: actor label
   ═══════════════════════════════════════════════════════════════ */
function actorLabel(ac) {
  if (ac === 'laj') return 'Letrado AJ';
  if (ac === 'juez') return 'Juez';
  return 'Ambos';
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — MAIN
   ═══════════════════════════════════════════════════════════════ */
function render() {
  renderPbar();
  renderBreadcrumb();
  renderSidebarMap();
  renderSidebarJourney();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — PHASE BAR
   ═══════════════════════════════════════════════════════════════ */
function renderPbar() {
  const s = STEPS[cur];
  const curPh = s ? s.ph : 0;
  let html = '';
  PHASES.forEach((name, i) => {
    if (i > 0) html += '<span class="ph-sep">›</span>';
    const cls = i === curPh ? 'active' : (i < curPh ? 'done' : '');
    html += '<span class="ph-item"><span class="ph-lbl ' + cls + '">' + escQ(name) + '</span></span>';
  });
  document.getElementById('pbar').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — BREADCRUMB
   ═══════════════════════════════════════════════════════════════ */
function renderBreadcrumb() {
  const items = [];
  hist.forEach((h, i) => {
    const step = STEPS[h.s];
    if (step) items.push({ title: trunc(step.t, 28), index: i, isPast: true });
  });
  const curStep = STEPS[cur];
  if (curStep) items.push({ title: trunc(curStep.t, 28), isCurrent: true });

  let html = '';
  items.forEach((item, i) => {
    if (i > 0) html += '<span class="bc-sep">›</span>';
    if (item.isPast) {
      html += '<button class="bc-past" onclick="goBackTo(' + item.index + ')">' + escQ(item.title) + '</button>';
    } else {
      html += '<span class="bc-current">' + escQ(item.title) + '</span>';
    }
  });
  document.getElementById('breadcrumb').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — SIDEBAR MAP
   ═══════════════════════════════════════════════════════════════ */
function renderSidebarMap() {
  const visited = getVisitedSet();
  let html = '';

  PHASES.forEach((phaseName, phIdx) => {
    const collapsed = phaseCollapsed[phIdx] || false;
    html += '<div class="sm-phase">';
    html += '<div class="sm-phase-hdr' + (collapsed ? ' collapsed' : '') + '" onclick="togglePhase(' + phIdx + ')">';
    html += '<span class="arrow">▼</span> ' + escQ(phaseName) + '</div>';
    html += '<div class="sm-phase-body' + (collapsed ? ' collapsed' : '') + '">';

    Object.entries(STEPS).forEach(([key, step]) => {
      if (step.ph !== phIdx) return;
      let cls = '';
      if (key === cur) cls = 'sm-current';
      else if (visited.has(key)) cls = 'sm-visited';
      else cls = 'sm-unreachable';

      const isEnd = !!step.end;
      const icon = key === cur ? '●' : (visited.has(key) ? '✓' : '○');
      const endCls = isEnd ? ' sm-end-node' : '';

      html += '<div class="sm-node ' + cls + endCls + '" onclick="showPreview(\'' + escQ(key) + '\', event)">';
      html += '<span class="nd-icon">' + icon + '</span>';
      html += '<span>' + escQ(trunc(step.t, 30)) + '</span>';
      html += '</div>';
    });

    html += '</div></div>';
  });

  document.getElementById('sb-map').innerHTML = html;
}

function togglePhase(phIdx) {
  phaseCollapsed[phIdx] = !phaseCollapsed[phIdx];
  renderSidebarMap();
}

/* ═══════════════════════════════════════════════════════════════
   STEP PREVIEW (from sidebar map)
   ═══════════════════════════════════════════════════════════════ */
let previewEl = null;
function showPreview(stepId, event) {
  event.stopPropagation();
  closePreview();
  const step = STEPS[stepId];
  if (!step) return;

  const el = document.createElement('div');
  el.className = 'step-preview';
  el.innerHTML = '<button class="sp-close" onclick="closePreview()">✕</button>' +
    '<div class="sp-title">' + escQ(step.t) + '</div>' +
    '<div class="sp-body">' + escQ(step.c ? step.c.filter(b => b[0]==='i').map(b=>b[1]).join(' ').slice(0,200) : '') + '</div>' +
    '<div style="margin-top:8px"><button onclick="jumpTo(\'' + escQ(stepId) + '\');closePreview()" style="padding:5px 12px;border-radius:5px;border:1px solid var(--navy-lt);background:#fff;color:var(--navy-lt);font-size:11px;font-weight:600;cursor:pointer">Ir a este paso</button></div>';

  document.body.appendChild(el);
  previewEl = el;

  // Position near click
  const rect = event.target.getBoundingClientRect();
  let top = rect.bottom + 4;
  let left = rect.left;
  if (left + 320 > window.innerWidth) left = window.innerWidth - 330;
  if (top + 300 > window.innerHeight) top = rect.top - 304;
  el.style.top = top + 'px';
  el.style.left = left + 'px';
}

function closePreview() {
  if (previewEl) { previewEl.remove(); previewEl = null; }
}
document.addEventListener('click', function(e) {
  if (previewEl && !previewEl.contains(e.target)) closePreview();
});

/* ═══════════════════════════════════════════════════════════════
   RENDER — SIDEBAR JOURNEY
   ═══════════════════════════════════════════════════════════════ */
function renderSidebarJourney() {
  let html = '';
  const items = [];
  hist.forEach((h, i) => {
    const step = STEPS[h.s];
    if (step) items.push({ title: step.t, choice: h.c, isPast: true });
  });
  const curStep = STEPS[cur];
  if (curStep) items.push({ title: curStep.t, isCurrent: true });

  items.forEach(item => {
    const cls = item.isCurrent ? 'current' : 'past';
    html += '<div class="pi ' + cls + '">';
    html += '<div class="pi-title">' + escQ(item.title) + '</div>';
    if (item.choice) html += '<div class="pi-choice">' + escQ(item.choice) + '</div>';
    html += '</div>';
  });

  // Legal refs
  html += '<div class="sb-foot">Ley 15/2015, arts. 78-80 · Ley 30/1979 · RD 1723/2012 · Directiva 2010/45/UE · Convenio de Oviedo</div>';

  document.getElementById('sb-journey').innerHTML = html;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — CONTENT (card)
   ═══════════════════════════════════════════════════════════════ */
function renderContent() {
  const s = STEPS[cur];
  if (!s) return;
  if (s.end) {
    document.getElementById('content').innerHTML = buildEnd(cur, s);
  } else {
    document.getElementById('content').innerHTML = buildStep(cur, s);
  }
}

/* ═══════════════════════════════════════════════════════════════
   BUILD STEP CARD
   ═══════════════════════════════════════════════════════════════ */
function buildStep(key, s) {
  const stepNum = hist.length + 1;
  let html = '<div class="card">';

  // Header
  html += '<div class="c-hdr">';
  html += '<div class="act-badge act-' + s.ac + '">' + escQ(actorLabel(s.ac)) + '</div>';
  html += '<div class="c-title">' + escQ(s.t) + '</div>';
  html += '<div class="step-num">Paso ' + stepNum + ' de este recorrido · Fase ' + (s.ph + 1) + ': ' + escQ(PHASES[s.ph]) + '</div>';
  html += '</div>';

  // Body
  html += '<div class="c-body">';
  html += renderBlocks(s.c);
  html += '</div>';

  // Decision area
  if (s.q) {
    html += '<div class="dec-area">';
    html += '<div class="dec-q">' + escQ(s.q) + '</div>';
    html += '<div class="dec-opts">';
    s.opts.forEach((opt, i) => {
      const letter = opt.l || String.fromCharCode(65 + i);
      html += '<button class="dec-btn ' + opt.v + '" onclick="goTo(\'' + escQ(opt.n) + '\',\'' + escQ(opt.t) + '\')">';
      html += '<span class="dec-letter">' + escQ(letter) + '</span>';
      html += '<span>' + escQ(opt.t) + '</span>';
      html += '</button>';
    });
    html += '</div></div>';
  }

  // Navigation
  html += '<div class="c-nav">';
  html += '<button class="btn-back" onclick="goBack()"' + (hist.length === 0 ? ' disabled' : '') + '>← Volver</button>';
  if (s.nx) {
    html += '<button class="btn-next" onclick="goTo(\'' + escQ(s.nx) + '\',\'\')">Siguiente →</button>';
  } else {
    html += '<span></span>';
  }
  html += '</div>';

  html += '</div>';
  return html;
}

/* ═══════════════════════════════════════════════════════════════
   BUILD END CARD
   ═══════════════════════════════════════════════════════════════ */
function buildEnd(key, s) {
  const icons = { success: '✅', error: '❌', warning: '⚠️', neutral: '🔵' };
  const titles = { success: 'Procedimiento exitoso', error: 'Procedimiento denegado', warning: 'Procedimiento condicionado', neutral: 'Procedimiento concluido' };

  let html = '<div class="card end-' + s.end + '">';

  // End body
  html += '<div class="end-body">';
  html += '<div class="end-icon">' + (icons[s.end] || '🔵') + '</div>';
  html += '<div class="end-title">' + escQ(s.t) + '</div>';
  html += '<div class="end-sub">El procedimiento ha concluido en esta vía</div>';
  html += '<div class="end-actions">';
  html += '<button class="btn-next" onclick="restart()">↻ Nuevo procedimiento</button>';
  html += '<button class="btn-back" onclick="goBack()"' + (hist.length === 0 ? ' disabled' : '') + '>← Volver</button>';
  html += '</div>';
  html += '</div>';

  // Content
  if (s.c && s.c.length) {
    html += '<div class="end-content">';
    html += renderBlocks(s.c);
    html += '</div>';
  }

  // Summary
  html += '<div class="summary-box">';
  html += '<h4>Resumen del recorrido seguido</h4>';
  html += '<ol>';
  hist.forEach((h, i) => {
    const step = STEPS[h.s];
    if (step) {
      html += '<li>' + escQ(step.t);
      if (h.c) html += ' <span class="sum-choice">↪ ' + escQ(h.c) + '</span>';
      html += '</li>';
    }
  });
  // Current step
  const curStep = STEPS[cur];
  if (curStep) {
    html += '<li><strong>' + escQ(curStep.t) + '</strong></li>';
  }
  html += '</ol></div>';

  html += '</div>';
  return html;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER CONTENT BLOCKS
   ═══════════════════════════════════════════════════════════════ */
function renderBlocks(blocks) {
  if (!blocks) return '';
  let html = '';
  blocks.forEach(b => {
    const type = b[0];
    const text = b[1];
    switch(type) {
      case 'i': html += '<p class="blk-intro">' + escQ(text) + '</p>'; break;
      case 'd': html += '<div class="blk-deadline">' + escQ(text) + '</div>'; break;
      case 'n': html += '<div class="blk-note">' + escQ(text) + '</div>'; break;
      case 'w': html += '<div class="blk-warn">' + escQ(text) + '</div>'; break;
      case 'l': html += '<div class="blk-law">' + escQ(text) + '</div>'; break;
      case 'cl':
        html += '<div class="blk-checklist">';
        html += '<div class="blk-checklist-title">' + escQ(text) + '</div>';
        if (b[2] && b[2].length) {
          html += '<ul>';
          b[2].forEach(item => { html += '<li>' + escQ(item) + '</li>'; });
          html += '</ul>';
        }
        html += '</div>';
        break;
      default: html += '<p>' + escQ(text) + '</p>';
    }
  });
  return html;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER — MAPA OVERLAY
   ═══════════════════════════════════════════════════════════════ */
function renderMapa() {
  const visited = getVisitedSet();
  let html = '<button class="mapa-close" onclick="toggleMapa()">← Volver al recorrido</button>';
  html += '<div class="mapa-columns">';

  PHASES.forEach((phaseName, phIdx) => {
    html += '<div class="mapa-phase">';
    html += '<div class="mapa-phase-hdr">' + escQ(phaseName) + '</div>';
    html += '<div class="mapa-phase-body">';

    Object.entries(STEPS).forEach(([key, step]) => {
      if (step.ph !== phIdx) return;

      let cls = 'mapa-node';
      if (key === cur) cls += ' mapa-current';
      else if (visited.has(key)) cls += ' mapa-visited';
      if (step.end) cls += ' mapa-end-' + step.end;

      html += '<div class="' + cls + '">';
      html += '<div class="mapa-node-title">' + escQ(trunc(step.t, 35)) + '</div>';
      html += '<div class="mapa-node-actor">' + escQ(actorLabel(step.ac)) + '</div>';

      // Show arrows
      if (step.opts) {
        step.opts.forEach(opt => {
          html += '<div class="mapa-arrow">↳ ' + escQ(opt.t) + '</div>';
        });
      } else if (step.nx) {
        const nxStep = STEPS[step.nx];
        if (nxStep) html += '<div class="mapa-arrow">↳ → ' + escQ(trunc(nxStep.t, 30)) + '</div>';
      }

      html += '</div>';
    });

    html += '</div></div>';
  });

  html += '</div>';
  document.getElementById('mapa-overlay').innerHTML = html;
}
