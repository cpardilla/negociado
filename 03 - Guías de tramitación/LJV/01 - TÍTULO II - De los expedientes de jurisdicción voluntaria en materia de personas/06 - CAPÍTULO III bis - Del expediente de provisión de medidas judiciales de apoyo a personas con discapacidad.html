<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Guía interactiva de tramitación del expediente de provisión de medidas judiciales de apoyo a personas con discapacidad (Ley 15/2015, LJV Cap. III bis, Arts. 42 bis a), b), c))">
<title>Guía de Tramitación — Medidas Judiciales de Apoyo (LJV Cap. III bis)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   CSS CUSTOM PROPERTIES (G02 system)
   ══════════════════════════════════════ */
:root {
  --navy: #1A2F6E;
  --navy-mid: #2E4DAA;
  --navy-lt: #4169E1;
  --navy-bg: #f0f4f8;
  --slate: #475569;
  --slate-bg: #F4F6FB;
  --text: #1A1A2E;
  --text-muted: #6B7280;
  --text-inverse: #FFFFFF;
  --white: #ffffff;
  --bdr: #D1D9EE;
  --bdr-focus: #4169E1;
  --green: #15803D;
  --green-bg: #F0FDF4;
  --green-border: #86EFAC;
  --red: #B91C1C;
  --red-bg: #FEF2F2;
  --red-border: #FCA5A5;
  --amber: #B45309;
  --amber-bg: #FFFBEB;
  --amber-border: #FCD34D;
  --blue: #3B82F6;
  --blue-bg: #EFF6FF;
  --violet: #5B21B6;
  --violet-bg: #F5F3FF;
  --violet-border: #DDD6FE;
  --cyan: #0D9488;
  --cyan-bg: #F0FDFA;
  --cyan-border: #99F6E4;
  --radius-sm: 6px;
  --radius-md: 8px;
  --radius-lg: 12px;
  --radius-xl: 16px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.05);
  --shadow-md: 0 2px 8px rgba(0,0,0,.08);
  --shadow-lg: 0 8px 30px rgba(0,0,0,.12);
  --font-base: 'Outfit', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  --font-mono: ui-monospace, SFMono-Regular, 'Menlo', 'Monaco', monospace;
  --text-xs: clamp(10px, 0.7rem + 0.2vw, 12px);
  --text-sm: clamp(12px, 0.8rem + 0.2vw, 14px);
  --text-base: clamp(13px, 0.85rem + 0.25vw, 15px);
  --text-lg: clamp(15px, 0.95rem + 0.3vw, 18px);
  --text-xl: clamp(17px, 1.1rem + 0.3vw, 22px);
  --transition-fast: 150ms ease;
  --transition-norm: 250ms ease;
  --sidebar-w: 280px;
  --header-h: 56px;
  --pbar-h: 40px;
  --breadcrumb-h: 32px;
  contain: layout;
}

/* ══════════════════════════════════════
   RESET & BASE
   ══════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font-base);
  font-size: var(--text-base);
  line-height: 1.55;
  color: var(--text);
  background: var(--slate-bg);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   FOCUS & A11Y
   ══════════════════════════════════════ */
:focus-visible {
  outline: 2px solid var(--bdr-focus);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}
button:focus-visible, a:focus-visible { outline-offset: 1px; }

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
  html { scroll-behavior: auto; }
}

/* ══════════════════════════════════════
   APP LAYOUT
   ══════════════════════════════════════ */
#app {
  display: flex;
  flex-direction: column;
  min-height: 100dvh;
  contain: layout style;
}

/* ══════════════════════════════════════
   HEADER
   ══════════════════════════════════════ */
#hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  height: var(--header-h);
  background: var(--navy);
  color: #fff;
  position: sticky;
  top: 0;
  z-index: 100;
  contain: layout style;
  gap: 8px;
}
.h-left { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
.h-seal {
  width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.12);
  display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0;
}
.h-title { font-size: var(--text-base); font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-sub { font-size: var(--text-xs); color: rgba(255,255,255,.6); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }

/* ══════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════ */
.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 6px 12px; border: 1px solid rgba(255,255,255,.2);
  border-radius: var(--radius-md); background: rgba(255,255,255,.08);
  color: #fff; font-family: inherit; font-size: var(--text-sm);
  cursor: pointer; transition: all var(--transition-fast);
  white-space: nowrap; text-decoration: none;
}
.btn:hover { background: rgba(255,255,255,.18); }
.btn:disabled { opacity: .4; cursor: not-allowed; }
.btn-toggle-sidebar { font-size: 20px; padding: 4px 10px; }
.btn-ghost { border-color: transparent; background: transparent; }

/* ══════════════════════════════════════
   PROGRESS BAR
   ══════════════════════════════════════ */
#pbar {
  display: flex;
  align-items: center;
  height: var(--pbar-h);
  background: var(--navy-mid);
  padding: 0 20px;
  position: sticky;
  top: var(--header-h);
  z-index: 90;
  contain: layout style;
  overflow-x: auto;
  scrollbar-width: none;
}
#pbar::-webkit-scrollbar { display: none; }
.pb-phase {
  font-size: var(--text-xs); font-weight: 500;
  padding: 4px 10px; border-radius: 4px;
  color: rgba(255,255,255,.40); white-space: nowrap;
  cursor: default; transition: all var(--transition-fast);
  margin-right: 4px;
}
.pb-phase.active { color: #fff; font-weight: 700; background: rgba(65,105,225,.35); }
.pb-phase.completed { color: rgba(255,255,255,.70); }
.pb-sep { font-size: 10px; color: rgba(255,255,255,.3); margin: 0 2px; flex-shrink: 0; }

/* ══════════════════════════════════════
   BREADCRUMB
   ══════════════════════════════════════ */
#breadcrumb {
  display: flex; align-items: center; gap: 4px;
  height: var(--breadcrumb-h); padding: 0 16px;
  background: var(--white); border-bottom: 1px solid var(--bdr);
  font-size: var(--text-xs); color: var(--text-muted);
  overflow-x: auto; white-space: nowrap; flex-shrink: 0;
}
.bc-item { cursor: pointer; transition: color var(--transition-fast); }
.bc-item:hover { color: var(--blue); }
.bc-sep { color: var(--bdr); margin: 0 2px; }
.bc-current { color: var(--navy); font-weight: 600; }

/* ══════════════════════════════════════
   LAYOUT (SIDEBAR + MAIN)
   ══════════════════════════════════════ */
#layout {
  display: flex; flex: 1; min-height: 0;
  position: relative;
}

/* ══════════════════════════════════════
   SIDEBAR
   ══════════════════════════════════════ */
#sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--navy-mid); color: rgba(255,255,255,.85);
  display: flex; flex-direction: column;
  overflow: hidden; position: sticky;
  top: calc(var(--header-h) + var(--pbar-h) + var(--breadcrumb-h));
  height: calc(100dvh - var(--header-h) - var(--pbar-h) - var(--breadcrumb-h));
  transition: transform var(--transition-norm), width var(--transition-norm);
  z-index: 80;
  contain: layout style;
}
#sidebar.collapsed { width: 0; transform: translateX(-100%); }

#sb-tabs {
  display: flex; border-bottom: 1px solid rgba(255,255,255,.1);
  flex-shrink: 0;
}
.sb-tab {
  flex: 1; padding: 10px 0; background: transparent;
  border: none; border-bottom: 2px solid transparent;
  color: rgba(255,255,255,.5); font-size: var(--text-sm);
  font-weight: 600; cursor: pointer; transition: all var(--transition-fast);
  font-family: inherit;
}
.sb-tab:hover { color: rgba(255,255,255,.8); }
.sb-tab.active { color: #fff; border-bottom-color: var(--blue); }

#sb-map, #sb-journey {
  flex: 1; overflow-y: auto; padding: 8px 0;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.15) transparent;
}
#sb-map::-webkit-scrollbar, #sb-journey::-webkit-scrollbar { width: 4px; }
#sb-map::-webkit-scrollbar-thumb, #sb-journey::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 2px; }

/* Sidebar map items */
.sb-phase { margin: 0 8px; }
.sb-phase-title {
  font-size: var(--text-xs); font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; color: rgba(255,255,255,.4);
  padding: 10px 8px 4px; border-top: 1px solid rgba(255,255,255,.06);
}
.sb-phase:first-child .sb-phase-title { border-top: none; }
.sb-node {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 8px; border-radius: var(--radius-sm);
  cursor: pointer; transition: background var(--transition-fast);
  font-size: var(--text-sm); line-height: 1.35;
}
.sb-node:hover { background: rgba(255,255,255,.08); }
.sb-node.current { background: rgba(59,130,246,.25); color: #fff; font-weight: 600; }
.sb-node.visited { color: rgba(255,255,255,.6); }
.sb-node.end-node { color: rgba(255,255,255,.45); font-style: italic; }
.sb-dot {
  width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
  background: rgba(255,255,255,.25);
}
.sb-node.current .sb-dot { background: var(--blue); box-shadow: 0 0 6px rgba(59,130,246,.5); }
.sb-node.visited .sb-dot { background: var(--green); }
.sb-node.end-node .sb-dot { background: var(--amber); }
.sb-node-label { min-width: 0; overflow: hidden; text-overflow: ellipsis; }

/* Sidebar journey items */
.sb-journey-item {
  display: flex; gap: 10px; padding: 6px 12px;
  font-size: var(--text-sm); align-items: flex-start;
}
.sb-j-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: rgba(255,255,255,.12); color: #fff;
  font-size: 10px; font-weight: 700; display: flex;
  align-items: center; justify-content: center; flex-shrink: 0;
  margin-top: 1px;
}
.sb-j-label { color: rgba(255,255,255,.7); line-height: 1.35; }
.sb-j-choice { font-size: var(--text-xs); color: rgba(255,255,255,.4); margin-top: 2px; font-style: italic; }

/* Sidebar normative footer */
.sb-foot {
  padding: 12px 14px 8px; border-top: 1px solid rgba(255,255,255,0.08);
  margin-top: auto; flex-shrink: 0;
}
.sb-foot-title {
  font-size: 9px; text-transform: uppercase; letter-spacing: .5px;
  color: rgba(255,255,255,.35); margin-bottom: 6px; font-weight: 600;
}
.sb-foot-item {
  font-size: 10.5px; color: rgba(255,255,255,.45); margin-bottom: 3px;
  font-family: var(--font-mono);
}

/* ══════════════════════════════════════
   MAIN CONTENT
   ══════════════════════════════════════ */
#content {
  flex: 1; padding: 24px; overflow-y: auto;
  min-width: 0;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
}

/* ══════════════════════════════════════
   CARD
   ══════════════════════════════════════ */
.card {
  background: var(--white);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-md);
  overflow: hidden;
  contain: layout style;
}

/* Card header */
.c-hdr {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--bdr);
  display: flex; align-items: flex-start; gap: 12px;
}
.c-phase-badge {
  display: inline-flex; align-items: center; justify-content: center;
  padding: 2px 10px; border-radius: 99px;
  font-size: var(--text-xs); font-weight: 700; white-space: nowrap;
}
.c-phase-badge.ph-0 { background: var(--violet-bg); color: var(--violet); }
.c-phase-badge.ph-1 { background: var(--blue-bg); color: var(--blue); }
.c-phase-badge.ph-2 { background: var(--cyan-bg); color: var(--cyan); }
.c-phase-badge.ph-3 { background: var(--amber-bg); color: var(--amber); }
.c-phase-badge.ph-4 { background: var(--green-bg); color: var(--green); }

.c-hdr-text { flex: 1; min-width: 0; }
.c-step-num { font-size: var(--text-xs); color: var(--text-muted); font-weight: 600; }
.c-title { font-size: var(--text-xl); font-weight: 800; color: var(--navy); margin-top: 2px; line-height: 1.3; }

/* Actor badge */
.actor-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 99px;
  font-size: var(--text-xs); font-weight: 700; white-space: nowrap;
  flex-shrink: 0; margin-top: 2px;
}
.actor-badge.ac-laj { background: var(--violet-bg); color: var(--violet); }
.actor-badge.ac-juez { background: var(--cyan-bg); color: var(--cyan); }
.actor-badge.ac-ambos { background: var(--amber-bg); color: var(--amber); }

/* Card body */
.c-body {
  padding: 18px 22px;
  font-size: var(--text-base);
  line-height: 1.6;
  display: flex; flex-direction: column; gap: 10px;
}
.c-body p { margin: 0; }

/* Content block types */
.c-body .deadline {
  background: var(--amber-bg);
  border-left: 4px solid var(--amber);
  padding: 10px 14px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  font-weight: 600;
  color: #92400e;
}
.c-body .deadline::before { content: '\23F1 '; }

.c-body .note {
  background: var(--blue-bg);
  border-left: 4px solid var(--blue);
  padding: 10px 14px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: #1e40af;
}
.c-body .note::before { content: '\2139 '; }

.c-body .warning {
  background: var(--red-bg);
  border-left: 4px solid var(--red);
  padding: 10px 14px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  color: #991b1b;
  font-weight: 600;
}
.c-body .warning::before { content: '\26A0 '; }

.c-body .law {
  font-family: var(--font-mono);
  font-size: var(--text-sm);
  background: var(--slate-bg);
  padding: 10px 14px;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  border-left: 3px solid var(--navy-lt);
  margin: 12px 0;
  display: block;
  line-height: 1.5;
  color: var(--slate);
  white-space: pre-wrap;
}

.c-body .checklist {
  margin: 12px 0;
  background: var(--slate-bg);
  border: 1px solid var(--bdr);
  border-radius: var(--radius-md);
  padding: 12px 14px;
}
.c-body .checklist > strong {
  display: block; margin-bottom: 6px;
  font-size: var(--text-sm); color: var(--navy);
}
.c-body .checklist label {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 4px 0; font-size: var(--text-sm);
  cursor: pointer; line-height: 1.4;
}
.c-body .checklist input[type="checkbox"] {
  margin-top: 3px; flex-shrink: 0; accent-color: var(--green);
  width: 15px; height: 15px; cursor: pointer;
}

.c-body .content-list { margin: 12px 0; }
.c-body .content-list > strong { display: block; margin-bottom: 4px; font-size: var(--text-sm); color: var(--navy); }
.c-body .content-list ul { margin: 4px 0 0 20px; }
.c-body .content-list li { margin-bottom: 4px; font-size: var(--text-sm); }

/* Card question */
.c-question {
  padding: 14px 22px;
  background: var(--navy-bg);
  border-top: 1px solid var(--bdr);
  font-weight: 700;
  font-size: var(--text-base);
  color: var(--navy);
}

/* Card decision area */
.c-decisions {
  padding: 14px 22px 18px;
  display: flex; flex-direction: column; gap: 8px;
}

.dec-btn {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 12px 16px; border-radius: var(--radius-md);
  border: 2px solid var(--bdr); background: var(--white);
  cursor: pointer; transition: all var(--transition-fast);
  font-family: inherit; font-size: var(--text-sm);
  text-align: left; line-height: 1.4; width: 100%;
}
.dec-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.dec-btn:active { transform: translateY(0); }

.dec-btn.ok { border-color: var(--green); background: var(--green-bg); color: #065f46; }
.dec-btn.ok .dec-letter { background: var(--green); color: white; }
.dec-btn.bad { border-color: var(--red); background: var(--red-bg); color: var(--red); }
.dec-btn.bad .dec-letter { background: var(--red); color: white; }
.dec-btn.warn { border-color: var(--amber); background: var(--amber-bg); color: var(--amber); }
.dec-btn.warn .dec-letter { background: var(--amber); color: white; }
.dec-btn.neutral { border-color: var(--bdr); background: var(--white); color: var(--slate); }
.dec-btn.neutral .dec-letter { background: var(--slate); color: white; }

.dec-letter {
  display: flex; align-items: center; justify-content: center;
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--navy-lt); color: white;
  font-weight: 700; font-size: 12px; flex-shrink: 0;
}
.dec-text { flex: 1; min-width: 0; }

/* ══════════════════════════════════════
   END CARDS
   ══════════════════════════════════════ */
.card.end-success, .card.end-error, .card.end-warning, .card.end-neutral {
  text-align: center;
}
.end-body { padding: 30px 24px; }
.end-icon {
  display: inline-flex; align-items: center; justify-content: center;
  width: 56px; height: 56px; border-radius: 50%;
  font-size: 28px; font-weight: 700; margin-bottom: 14px;
}
.end-success .end-icon { background: var(--green-bg); color: var(--green); }
.end-success .end-icon::before { content: '\2713'; }
.end-error .end-icon { background: var(--red-bg); color: var(--red); }
.end-error .end-icon::before { content: '\2717'; }
.end-warning .end-icon { background: var(--amber-bg); color: var(--amber); }
.end-warning .end-icon::before { content: '\26A0'; }
.end-neutral .end-icon { background: var(--blue-bg); color: var(--blue); }
.end-neutral .end-icon::before { content: '\2139'; }

.end-title { font-size: var(--text-lg); font-weight: 700; margin-bottom: 4px; }
.end-success .end-title { color: var(--green); }
.end-error .end-title { color: var(--red); }
.end-warning .end-title { color: var(--amber); }
.end-neutral .end-title { color: var(--blue); }

.end-name { font-size: var(--text-lg); font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.end-sub { font-size: var(--text-sm); color: var(--text-muted); margin-bottom: 18px; }

.end-content {
  text-align: left; display: flex; flex-direction: column;
  gap: 9px; margin-bottom: 18px;
}
.end-content .deadline,
.end-content .note,
.end-content .warning,
.end-content .law { margin: 0; }
.end-content .checklist { margin: 0; }
.end-content .content-list { margin: 0; }

.end-btns {
  display: flex; gap: 10px; justify-content: center;
  padding: 10px 0 18px; flex-wrap: wrap;
}
.btn-back {
  padding: 9px 20px; border-radius: var(--radius-md);
  border: 1px solid var(--bdr); background: var(--white);
  color: var(--text); font-family: inherit; font-size: var(--text-base);
  font-weight: 600; cursor: pointer; transition: all var(--transition-fast);
}
.btn-back:hover { background: var(--slate-bg); }
.btn-back:disabled { opacity: .4; cursor: not-allowed; }
.btn-restart {
  padding: 9px 20px; border-radius: var(--radius-md);
  border: 1px solid var(--navy-lt); background: var(--navy-lt);
  color: #fff; font-family: inherit; font-size: var(--text-base);
  font-weight: 600; cursor: pointer; transition: all var(--transition-fast);
}
.btn-restart:hover { background: var(--navy); }

/* Summary box */
.summary-box {
  text-align: left; background: var(--slate-bg);
  border: 1px solid var(--bdr); border-radius: var(--radius-md);
  padding: 12px 14px; margin-top: 14px;
}
.sum-title {
  font-size: var(--text-sm); font-weight: 700;
  color: var(--navy); margin-bottom: 8px;
}
.sum-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 5px 0; border-bottom: 1px solid var(--bdr);
  font-size: 13px;
}
.sum-item:last-child { border-bottom: none; }
.sum-num {
  width: 22px; height: 22px; border-radius: 50%;
  background: var(--navy); color: #fff;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.sum-item.current { font-weight: 600; }
.sum-item.current .sum-num { background: var(--green); }
.sum-choice {
  font-size: var(--text-xs); color: var(--navy-lt);
  margin-top: 2px; font-style: italic;
}

/* ══════════════════════════════════════
   MAPA OVERLAY
   ══════════════════════════════════════ */
#mapa-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(15,23,42,.92);
  backdrop-filter: blur(6px);
  display: flex; flex-direction: column;
  align-items: center;
  padding: 20px;
  overflow-y: auto;
}
#mapa-overlay[hidden] { display: none; }

.mapa-cols {
  display: grid;
  grid-template-columns: repeat(5, minmax(200px, 1fr));
  gap: 16px;
  max-width: 1200px;
  width: 100%;
  margin-top: 12px;
}

.mapa-col {}
.mapa-col-title {
  font-size: var(--text-sm); font-weight: 700;
  color: rgba(255,255,255,.9);
  padding: 8px 10px; border-radius: var(--radius-sm) var(--radius-sm) 0 0;
  text-align: center;
}
.mapa-col-title.ph-0 { background: var(--violet); }
.mapa-col-title.ph-1 { background: var(--blue); }
.mapa-col-title.ph-2 { background: var(--cyan); }
.mapa-col-title.ph-3 { background: var(--amber); }
.mapa-col-title.ph-4 { background: var(--green); }

.mapa-nodes {
  background: rgba(255,255,255,.06);
  border-radius: 0 0 var(--radius-sm) var(--radius-sm);
  padding: 6px;
  display: flex; flex-direction: column; gap: 4px;
}

.mapa-node {
  padding: 6px 8px; border-radius: var(--radius-sm);
  background: rgba(255,255,255,.06);
  cursor: pointer; transition: background var(--transition-fast);
  font-size: var(--text-xs); line-height: 1.3;
  color: rgba(255,255,255,.7);
  border: 1px solid rgba(255,255,255,.08);
}
.mapa-node:hover { background: rgba(255,255,255,.14); color: #fff; }
.mapa-node.current { background: rgba(59,130,246,.3); border-color: var(--blue); color: #fff; font-weight: 600; }
.mapa-node.visited { border-color: rgba(22,163,74,.4); color: rgba(255,255,255,.8); }
.mapa-node.end-type { border-style: dashed; }
.mapa-node-title { font-weight: 600; margin-bottom: 2px; }
.mapa-node-actor { font-size: 9px; opacity: .7; }

/* ══════════════════════════════════════
   TOOLTIP
   ══════════════════════════════════════ */
.tooltip-box {
  position: fixed; z-index: 300;
  background: var(--navy); color: #fff;
  padding: 8px 12px; border-radius: var(--radius-sm);
  font-size: var(--text-xs); line-height: 1.4;
  max-width: 280px; box-shadow: var(--shadow-lg);
  pointer-events: none;
}

/* ══════════════════════════════════════
   STATUS MESSAGE (TOAST)
   ══════════════════════════════════════ */
#status-msg {
  position: fixed; bottom: 20px; right: 20px;
  z-index: 250; display: flex; flex-direction: column;
  gap: 8px; pointer-events: none;
}
.status-toast {
  padding: 10px 18px; border-radius: var(--radius-md);
  font-size: var(--text-sm); font-weight: 600;
  box-shadow: var(--shadow-lg);
  animation: toast-in .3s ease forwards;
  pointer-events: auto;
}
.status-toast.info { background: var(--blue); color: #fff; }
.status-toast.success { background: var(--green); color: #fff; }
.status-toast.warn { background: var(--amber); color: #fff; }
.status-toast.error { background: var(--red); color: #fff; }

@keyframes toast-in {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes toast-out {
  from { opacity: 1; transform: translateY(0); }
  to { opacity: 0; transform: translateY(-10px); }
}

/* ══════════════════════════════════════
   UTILITY FUNCTIONS
   ══════════════════════════════════════ */
function escapeHtml(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

function truncate(str, len) {
  if (!str) return '';
  return str.length > len ? str.slice(0, len) + '…' : str;
}

/* ══════════════════════════════════════
   STATUS TOAST
   ══════════════════════════════════════ */
function showStatus(msg, type) {
  type = type || 'info';
  const toast = document.createElement('div');
  toast.className = 'status-toast ' + type;
  toast.textContent = msg;
  DOM.statusMsg.appendChild(toast);
  setTimeout(() => {
    toast.style.animation = 'toast-out .3s ease forwards';
    setTimeout(() => toast.remove(), 300);
  }, CONFIG.TOAST_DURATION);
}

/* ══════════════════════════════════════
   CONTENT BLOCK RENDERERS
   ══════════════════════════════════════ */
function renderContentBlock(block) {
  if (!block || !block[0]) return '';
  const type = block[0];
  const content = block[1];
  const rest = block.slice(2);

  switch (type) {
    case 'i':
      return '<p>' + content + '</p>';
    case 'd':
      return '<div class="deadline" role="note">' + content + '</div>';
    case 'n':
      return '<div class="note" role="note">' + content + '</div>';
    case 'w':
      return '<div class="warning" role="alert">' + content + '</div>';
    case 'l':
      return '<span class="law">' + content + '</span>';
    case 'cl':
      return '<div class="checklist" role="group" aria-label="' + escapeHtml(content) + '">'
        + '<strong>' + escapeHtml(content) + ':</strong>'
        + (rest[0] ? rest[0].map(item =>
            '<label><input type="checkbox" aria-label="' + escapeHtml(item) + '"><span>' + item + '</span></label>'
          ).join('') : '')
        + '</div>';
    case 'ul':
      return '<div class="content-list"><strong>' + escapeHtml(content) + ':</strong>'
        + '<ul>' + (rest[0] ? rest[0].map(item => '<li>' + item + '</li>').join('') : '') + '</ul></div>';
    default:
      return '<p>' + content + '</p>';
  }
}

function renderEndContentBlock(block) {
  // Same as renderContentBlock but for end cards (inside .end-content)
  return renderContentBlock(block);
}

/* ══════════════════════════════════════
   BUTTON VARIANT LOGIC
   ══════════════════════════════════════ */
function getButtonVariant(opt) {
  if (opt.v) return opt.v;
  const l = (opt.l || '').toLowerCase();
  if (l.includes('sí') || l.includes('si') || l === 'a') return 'ok';
  if (l.includes('no')) return 'bad';
  return 'neutral';
}

/* ══════════════════════════════════════
   ACTOR BADGE
   ══════════════════════════════════════ */
function actorBadge(ac) {
  const map = {
    laj: { cls: 'ac-laj', label: 'Letrado AJ' },
    juez: { cls: 'ac-juez', label: 'Autoridad Judicial' },
    ambos: { cls: 'ac-ambos', label: 'Ambos' }
  };
  const info = map[ac] || map.ambos;
  return '<span class="actor-badge ' + info.cls + '">' + escapeHtml(info.label) + '</span>';
}

/* ══════════════════════════════════════
   STEP CARD RENDERING
   ══════════════════════════════════════ */
function buildStepCard(s, stepId) {
  const phase = PHASES[s.ph];
  const stepNum = AppState.history.length + 1;
  const isEnd = !!s.end;

  let html = '<article class="card" role="region" aria-label="' + escapeHtml(s.t) + '">';

  // Header
  html += '<div class="c-hdr">';
  html += '<span class="c-phase-badge ph-' + s.ph + '">' + escapeHtml(phase.name) + '</span>';
  html += '<div class="c-hdr-text">';
  html += '<div class="c-step-num">Paso ' + stepNum + '</div>';
  html += '<h2 class="c-title">' + escapeHtml(s.t) + '</h2>';
  html += '</div>';
  html += actorBadge(s.ac);
  html += '</div>';

  // Body
  html += '<div class="c-body">';
  html += s.c.map(block => renderContentBlock(block)).join('');
  html += '</div>';

  // Question + Decisions (only if not end and has opts)
  if (!isEnd && s.opts) {
    html += '<div class="c-question">' + escapeHtml(s.q) + '</div>';
    html += '<div class="c-decisions">';
    s.opts.forEach((opt, idx) => {
      const variant = getButtonVariant(opt);
      const letter = String.fromCharCode(65 + idx); // A, B, C...
      html += '<button class="dec-btn ' + variant + '" data-action="choose" data-next="' + opt.n + '" data-label="' + escapeHtml(opt.l) + '" data-idx="' + idx + '">';
      html += '<span class="dec-letter">' + letter + '</span>';
      html += '<span class="dec-text">' + opt.t + '</span>';
      html += '</button>';
    });
    html += '</div>';
  } else if (!isEnd && s.nx) {
    // Auto-advance step
    html += '<div class="c-decisions">';
    html += '<button class="dec-btn ok" data-action="auto-next" data-next="' + s.nx + '">';
    html += '<span class="dec-letter">&#8594;</span>';
    html += '<span class="dec-text">Continuar al siguiente paso</span>';
    html += '</button>';
    html += '</div>';
  }

  // Back button for steps
  if (AppState.history.length > 0 && !isEnd) {
    html += '<div style="padding: 0 22px 14px;">';
    html += '<button class="btn-back" data-action="go-back">&#8592; Volver</button>';
    html += '</div>';
  }

  html += '</article>';
  return html;
}

/* ══════════════════════════════════════
   END CARD RENDERING
   ══════════════════════════════════════ */
function buildEndCard(s, stepId) {
  const icons = { success: '\u2713', error: '\u2717', warning: '\u26A0', neutral: '\u2139' };
  const labels = {
    success: 'Concluido satisfactoriamente',
    error: 'Inadmisión / No procede',
    warning: 'Fin con advertencia',
    neutral: 'Derivación / Información'
  };

  const allSteps = [...AppState.history.map((h, i) => {
    const hs = STEPS[h.s];
    return '<div class="sum-item">'
      + '<span class="sum-num">' + (i + 1) + '</span>'
      + '<div><strong>' + (hs ? escapeHtml(truncate(hs.t, 40)) : escapeHtml(h.s)) + '</strong>'
      + (h.c ? '<div class="sum-choice">\u21B3 ' + escapeHtml(truncate(h.c, 50)) + '</div>' : '')
      + '</div></div>';
  }), '<div class="sum-item current">'
      + '<span class="sum-num">' + (AppState.history.length + 1) + '</span>'
      + '<div><strong>' + escapeHtml(s.t) + '</strong></div>'
      + '</div>'].join('');

  const bodyHtml = s.c.map(block => renderEndContentBlock(block)).join('');

  let html = '<article class="card end-' + s.end + '" role="region" aria-label="Procedimiento concluido">';
  html += '<div class="end-body">';
  html += '<span class="end-icon" aria-hidden="true">' + icons[s.end] + '</span>';
  html += '<h3 class="end-title">' + labels[s.end] + '</h3>';
  html += '<p class="end-name">' + escapeHtml(s.t) + '</p>';
  html += '<p class="end-sub">El procedimiento ha concluido en esta vía</p>';
  html += '<div class="end-content">' + bodyHtml + '</div>';
  html += '<div class="summary-box">';
  html += '<div class="sum-title">Resumen del recorrido seguido</div>';
  html += allSteps;
  html += '</div>';
  html += '<div class="end-btns">';
  html += '<button class="btn-back" data-action="go-back"' + (AppState.history.length === 0 ? ' disabled' : '') + '>&#8592; Volver</button>';
  html += '<button class="btn-restart" data-action="reiniciar">&#8634; Nuevo procedimiento</button>';
  html += '</div>';
  html += '</div></article>';
  return html;
}

/* ══════════════════════════════════════
   PROGRESS BAR
   ══════════════════════════════════════ */
function renderProgressBar() {
  const s = STEPS[AppState.current];
  if (!s) return;
  const currentPh = s.ph;

  let html = '';
  PHASES.forEach((ph, idx) => {
    let cls = '';
    if (idx < currentPh) cls = 'completed';
    else if (idx === currentPh) cls = 'active';
    const sep = idx > 0 ? '<span class="pb-sep" aria-hidden="true">›</span>' : '';
    html += sep + '<span class="pb-phase ' + cls + '" aria-current="' + (cls === 'active' ? 'step' : 'false') + '">' + escapeHtml(ph.name) + '</span>';
  });
  DOM.pbar.innerHTML = html;
}

/* ══════════════════════════════════════
   BREADCRUMB
   ══════════════════════════════════════ */
function renderBreadcrumb() {
  let items = [];
  items.push({ id: CONFIG.START_STEP, label: 'Inicio' });

  AppState.history.forEach((h, i) => {
    const hs = STEPS[h.s];
    items.push({ id: h.s, label: hs ? truncate(hs.t, 30) : h.s });
  });

  // Current
  const cs = STEPS[AppState.current];
  items.push({ id: AppState.current, label: cs ? truncate(cs.t, 30) : AppState.current, current: true });

  let html = '';
  items.forEach((item, i) => {
    if (i > 0) html += '<span class="bc-sep">/</span>';
    const cls = item.current ? 'bc-item bc-current' : 'bc-item';
    html += '<span class="' + cls + '" data-nav="' + item.id + '" title="' + escapeHtml(item.label) + '">' + escapeHtml(item.label) + '</span>';
  });
  DOM.breadcrumb.innerHTML = html;
}

/* ══════════════════════════════════════
   SIDEBAR MAP
   ══════════════════════════════════════ */
function renderSidebarMap() {
  // Group steps by phase
  const phaseGroups = {};
  PHASES.forEach((ph, idx) => { phaseGroups[idx] = []; });
  Object.keys(STEPS).forEach(id => {
    const s = STEPS[id];
    if (!phaseGroups[s.ph]) phaseGroups[s.ph] = [];
    phaseGroups[s.ph].push({ id, step: s });
  });

  let html = '';
  PHASES.forEach((ph, idx) => {
    html += '<div class="sb-phase">';
    html += '<div class="sb-phase-title">' + escapeHtml(ph.name) + '</div>';
    (phaseGroups[idx] || []).forEach(({ id, step }) => {
      const isEnd = !!step.end;
      const isCurrent = id === AppState.current;
      const isVisited = AppState.visited.has(id);
      let cls = 'sb-node';
      if (isCurrent) cls += ' current';
      else if (isVisited) cls += ' visited';
      if (isEnd) cls += ' end-node';
      html += '<div class="' + cls + '" data-nav="' + id + '" title="' + escapeHtml(step.t) + '">';
      html += '<span class="sb-dot"></span>';
      html += '<span class="sb-node-label">' + escapeHtml(truncate(step.t, 35)) + '</span>';
      html += '</div>';
    });
    html += '</div>';
  });

  // Normative footer
  html += '<div class="sb-foot">';
  html += '<div class="sb-foot-title">Referencias normativas</div>';
  html += '<div class="sb-foot-item">Art. 42 bis a), b), c) LJV</div>';
  html += '<div class="sb-foot-item">Arts. 249–298 CC (L. 8/2021)</div>';
  html += '<div class="sb-foot-item">Arts. 756–762 LEC</div>';
  html += '<div class="sb-foot-item">Art. 7 bis LJV</div>';
  html += '<div class="sb-foot-item">Art. 12 CRPD (2006)</div>';
  html += '<div class="sb-foot-item">Ley 39/2006 (SAAD)</div>';
  html += '</div>';

  DOM.sbMap.innerHTML = html;
}

/* ══════════════════════════════════════
   SIDEBAR JOURNEY
   ══════════════════════════════════════ */
function renderSidebarJourney() {
  let html = '';

  AppState.history.forEach((h, i) => {
    const hs = STEPS[h.s];
    html += '<div class="sb-journey-item">';
    html += '<span class="sb-j-num">' + (i + 1) + '</span>';
    html += '<div>';
    html += '<div class="sb-j-label">' + (hs ? escapeHtml(truncate(hs.t, 40)) : escapeHtml(h.s)) + '</div>';
    if (h.c) html += '<div class="sb-j-choice">\u21B3 ' + escapeHtml(truncate(h.c, 40)) + '</div>';
    html += '</div></div>';
  });

  // Current
  const cs = STEPS[AppState.current];
  html += '<div class="sb-journey-item">';
  html += '<span class="sb-j-num">' + (AppState.history.length + 1) + '</span>';
  html += '<div>';
  html += '<div class="sb-j-label" style="color:#fff;font-weight:600">' + (cs ? escapeHtml(truncate(cs.t, 40)) : escapeHtml(AppState.current)) + '</div>';
  if (cs && cs.end) html += '<div class="sb-j-choice" style="color:rgba(255,255,255,.6)">Fin del procedimiento</div>';
  html += '</div></div>';

  if (AppState.history.length === 0 && !STEPS[AppState.current].end) {
    html += '<div style="padding:16px 12px;font-size:var(--text-xs);color:rgba(255,255,255,.35);text-align:center;">El recorrido aparecerá aquí conforme avance</div>';
  }

  DOM.sbJourney.innerHTML = html;
}

/* ══════════════════════════════════════
   MAPA OVERLAY
   ══════════════════════════════════════ */
function renderMapa() {
  const phaseGroups = {};
  PHASES.forEach((ph, idx) => { phaseGroups[idx] = []; });
  Object.keys(STEPS).forEach(id => {
    const s = STEPS[id];
    if (!phaseGroups[s.ph]) phaseGroups[s.ph] = [];
    phaseGroups[s.ph].push({ id, step: s });
  });

  let html = '';
  PHASES.forEach((ph, idx) => {
    html += '<div class="mapa-col">';
    html += '<div class="mapa-col-title ph-' + idx + '">' + escapeHtml(ph.name) + '</div>';
    html += '<div class="mapa-nodes">';
    (phaseGroups[idx] || []).forEach(({ id, step }) => {
      const isEnd = !!step.end;
      const isCurrent = id === AppState.current;
      const isVisited = AppState.visited.has(id);
      let cls = 'mapa-node';
      if (isCurrent) cls += ' current';
      else if (isVisited) cls += ' visited';
      if (isEnd) cls += ' end-type';

      const actorMap = { laj: 'Letrado AJ', juez: 'Autoridad Judicial', ambos: 'Ambos' };
      html += '<div class="' + cls + '" data-nav="' + id + '">';
      html += '<div class="mapa-node-title">' + escapeHtml(truncate(step.t, 45)) + '</div>';
      html += '<div class="mapa-node-actor">' + (actorMap[step.ac] || '') + (isEnd ? ' · Fin' : '') + '</div>';
      html += '</div>';
    });
    html += '</div></div>';
  });

  DOM.mapaContent.innerHTML = html;
}

/* ══════════════════════════════════════
   MAIN RENDER
   ══════════════════════════════════════ */
function render() {
  const s = STEPS[AppState.current];
  if (!s) return;

  // Update visited
  AppState.visited.add(AppState.current);

  // Render main content
  if (s.end) {
    DOM.content.innerHTML = buildEndCard(s, AppState.current);
  } else {
    DOM.content.innerHTML = buildStepCard(s, AppState.current);
  }

  // Render all supporting UI
  renderProgressBar();
  renderBreadcrumb();
  renderSidebarMap();
  renderSidebarJourney();
  renderMapa();

  // Update hash
  writeHash();

  // Scroll to top of content
  DOM.content.scrollTop = 0;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Close mobile sidebar if open
  closeMobileSidebar();
}

/* ══════════════════════════════════════
   HASH NAVIGATION
   ══════════════════════════════════════ */
function readHash() {
  const h = window.location.hash.slice(1);
  if (h && STEPS[h]) {
    // Reconstruct a minimal path to this step
    AppState.current = h;
    AppState.history = [];
    AppState.visited = new Set([h]);
  }
}

function writeHash() {
  try {
    history.replaceState(null, '', '#' + AppState.current);
  } catch (e) { /* ignore */ }
}

/* ══════════════════════════════════════
   NAVIGATION ACTIONS
   ══════════════════════════════════════ */
function navigateTo(stepId, choiceLabel) {
  if (!STEPS[stepId]) return;
  AppState.history.push({ s: AppState.current, c: choiceLabel || null });
  AppState.current = stepId;
  render();
}

function goBack() {
  if (AppState.history.length === 0) return;
  const prev = AppState.history.pop();
  AppState.current = prev.s;
  render();
  showStatus('Volviendo al paso anterior', 'info');
}

function restart() {
  AppState.current = CONFIG.START_STEP;
  AppState.history = [];
  AppState.visited = new Set();
  render();
  showStatus('Procedimiento reiniciado', 'info');
}

function navigateToStep(stepId) {
  if (!STEPS[stepId]) return;
  // Navigate directly to a step (from sidebar/mapa), clearing forward history
  // Find if step is in history - if so, truncate history
  const histIdx = AppState.history.findIndex(h => h.s === stepId);
  if (histIdx >= 0) {
    AppState.history = AppState.history.slice(0, histIdx);
    AppState.current = stepId;
  } else {
    // Direct jump - just navigate there
    AppState.current = stepId;
    // Don't modify history for direct jumps
  }
  render();
}

/* ══════════════════════════════════════
   SIDEBAR TOGGLE
   ══════════════════════════════════════ */
function toggleSidebar() {
  const isMobile = window.innerWidth <= 768;
  if (isMobile) {
    AppState.sidebarOpen = !AppState.sidebarOpen;
    DOM.sidebar.classList.toggle('open', AppState.sidebarOpen);
    DOM.sidebarBackdrop.classList.toggle('show', AppState.sidebarOpen);
    DOM.btnToggleSidebar.setAttribute('aria-expanded', AppState.sidebarOpen);
  } else {
    DOM.sidebar.classList.toggle('collapsed');
  }
}

function closeMobileSidebar() {
  if (window.innerWidth <= 768) {
    AppState.sidebarOpen = false;
    DOM.sidebar.classList.remove('open');
    DOM.sidebarBackdrop.classList.remove('show');
    DOM.btnToggleSidebar.setAttribute('aria-expanded', 'false');
  }
}

function switchSidebarTab(tab) {
  AppState.sidebarTab = tab;
  $$('.sb-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
  DOM.sbMap.style.display = tab === 'map' ? '' : 'none';
  DOM.sbJourney.style.display = tab === 'journey' ? '' : 'none';
}

/* ══════════════════════════════════════
   MAPA OVERLAY
   ══════════════════════════════════════ */
function toggleMapa() {
  AppState.mapaOpen = !AppState.mapaOpen;
  DOM.mapaOverlay.hidden = !AppState.mapaOpen;
  if (AppState.mapaOpen) {
    renderMapa();
    document.body.style.overflow = 'hidden';
  } else {
    document.body.style.overflow = '';
  }
}

function closeMapa() {
  AppState.mapaOpen = false;
  DOM.mapaOverlay.hidden = true;
  document.body.style.overflow = '';
}

/* ══════════════════════════════════════
   DOWNLOAD
   ══════════════════════════════════════ */
function downloadGuide() {
  try {
    const html = document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'Guia_Medidas_Apoyo_Judicial.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showStatus('Descarga iniciada', 'success');
  } catch (e) {
    showStatus('Error al descargar', 'error');
  }
}

/* ══════════════════════════════════════
   EVENT HANDLING
   ══════════════════════════════════════ */
function handleAction(action, el) {
  switch (action) {
    case 'choose': {
      const next = el.dataset.next;
      const label = el.dataset.label;
      navigateTo(next, label);
      break;
    }
    case 'auto-next': {
      const next = el.dataset.next;
      navigateTo(next, 'Continuar');
      break;
    }
    case 'go-back':
      goBack();
      break;
    case 'reiniciar':
      restart();
      break;
    case 'toggle-sidebar':
      toggleSidebar();
      break;
    case 'sb-tab':
      switchSidebarTab(el.dataset.tab);
      break;
    case 'toggle-mapa':
      toggleMapa();
      break;
    case 'close-mapa':
      closeMapa();
      break;
    case 'descargar':
      downloadGuide();
      break;
    default:
      break;
  }
}

function setupEvents() {
  // Delegated event handling
  document.addEventListener('click', (e) => {
    const actionEl = e.target.closest('[data-action]');
    if (actionEl) {
      handleAction(actionEl.dataset.action, actionEl);
      return;
    }

    // Navigation from sidebar/mapa/breadcrumb
    const navEl = e.target.closest('[data-nav]');
    if (navEl) {
      navigateToStep(navEl.dataset.nav);
      return;
    }
  });

  // Sidebar backdrop click (mobile)
  DOM.sidebarBackdrop.addEventListener('click', closeMobileSidebar);

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (AppState.mapaOpen) {
        closeMapa();
      } else if (AppState.sidebarOpen && window.innerWidth <= 768) {
        closeMobileSidebar();
      }
    }

    // Alt+Left to go back
    if (e.altKey && e.key === 'ArrowLeft') {
      e.preventDefault();
      goBack();
    }

    // Number keys 1-9 for decision shortcuts
    if (e.key >= '1' && e.key <= '9' && !e.ctrlKey && !e.altKey && !e.metaKey) {
      const s = STEPS[AppState.current];
      if (s && s.opts) {
        const idx = parseInt(e.key) - 1;
        if (idx < s.opts.length) {
          const btn = DOM.content.querySelector('.dec-btn[data-idx="' + idx + '"]');
          if (btn) btn.click();
        }
      }
    }
  });

  // Hash change
  window.addEventListener('hashchange', () => {
    const h = window.location.hash.slice(1);
    if (h && STEPS[h] && h !== AppState.current) {
      AppState.current = h;
      render();
    }
  });
}

/* ══════════════════════════════════════
   INITIALIZATION
   ══════════════════════════════════════ */
function init() {
  cacheDom();
  readHash();
  render();
  setupEvents();

  // Initial sidebar state for desktop
  if (window.innerWidth > 768) {
    DOM.sidebar.classList.remove('collapsed');
  }

  showStatus('Guía de tramitación cargada', 'info');
}

// Boot
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', init);
} else {
  init();
}
</script>
</body>
