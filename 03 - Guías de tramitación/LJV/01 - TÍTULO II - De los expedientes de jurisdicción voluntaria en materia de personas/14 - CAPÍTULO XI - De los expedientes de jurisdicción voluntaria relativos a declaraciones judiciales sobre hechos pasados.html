<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Guía de tramitación — Declaraciones judiciales sobre hechos pasados</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy:      #1A2F6E;
  --navy-mid:  #2E4DAA;
  --navy-lt:   #4169E1;
  --cyan:      #0D9488;    --cyan-bg:   #F0FDFA;
  --violet:    #5B21B6;    --violet-bg: #F5F3FF;
  --green:     #15803D;    --green-bg:  #F0FDF4;
  --amber:     #B45309;    --amber-bg:  #FFFBEB;
  --red:       #B91C1C;    --red-bg:    #FEF2F2;
  --slate:     #475569;    --slate-bg:  #F4F6FB;
  --white:     #FFFFFF;
  --bdr:       #D1D9EE;
  --text:      #1A1A2E;
  --muted:     #6B7280;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Outfit', system-ui, sans-serif; font-size: 16px; line-height: 1.65; color: var(--text); background: var(--slate-bg); -webkit-font-smoothing: antialiased; }

#app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

/* HEADER */
#hdr { flex-shrink: 0; height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background: var(--navy); color: #fff; }
.h-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
.h-seal { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.10); border: 1.5px solid rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.h-title-block { display: flex; flex-direction: column; min-width: 0; }
.h-title { font-size: 15px; font-weight: 700; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-sub { font-size: 11px; opacity: .55; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-right { display: flex; gap: 6px; flex-shrink: 0; }
.btn { font-family: 'Outfit', system-ui, sans-serif; font-size: 13px; font-weight: 500; padding: 6px 14px; border-radius: 6px; cursor: pointer; transition: all .15s; border: 1px solid; white-space: nowrap; }
.btn-ghost { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.18); color: rgba(255,255,255,.85); }
.btn-ghost:hover { background: rgba(255,255,255,.18); color: #fff; }

/* PHASE BAR */
#pbar { flex-shrink: 0; height: 40px; display: flex; align-items: center; padding: 0 20px; overflow-x: auto; scrollbar-width: none; background: var(--navy-mid); }
#pbar::-webkit-scrollbar { display: none; }
.ph-item { display: flex; align-items: center; }
.ph-lbl { font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 14px; color: rgba(255,255,255,.40); transition: all .15s; white-space: nowrap; }
.ph-lbl.active { color: #fff; font-weight: 700; background: rgba(59,130,246,.45); }
.ph-lbl.done { color: rgba(255,255,255,.70); }
.ph-sep { font-size: 14px; color: rgba(255,255,255,.25); padding: 0 4px; }

/* BREADCRUMB */
#breadcrumb { flex-shrink: 0; min-height: 36px; display: flex; align-items: center; padding: 0 20px; gap: 0; overflow-x: auto; scrollbar-width: none; background: var(--slate-bg); border-bottom: 1px solid var(--bdr); }
#breadcrumb::-webkit-scrollbar { display: none; }
.bc-item { font-size: 12px; white-space: nowrap; padding: 4px 6px; color: var(--muted); }
.bc-past { cursor: pointer; background: none; border: none; font-family: inherit; font-size: 12px; }
.bc-past:hover { color: var(--navy-lt); text-decoration: underline; }
.bc-current { font-weight: 600; color: var(--navy); }
.bc-sep { font-size: 11px; color: var(--bdr); padding: 0 2px; }

/* LAYOUT */
#layout { flex: 1; overflow: hidden; display: flex; }

/* SIDEBAR */
#sidebar { flex-shrink: 0; width: 272px; overflow-y: auto; background: var(--navy-mid); color: #fff; scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.15) transparent; }
#sidebar::-webkit-scrollbar { width: 5px; }
#sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }
#sb-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,.10); }
.sb-tab { flex: 1; padding: 9px 0; font-size: 11px; font-weight: 600; font-family: inherit; background: none; border: none; color: rgba(255,255,255,.40); cursor: pointer; letter-spacing: .4px; text-transform: uppercase; transition: all .15s; }
.sb-tab.active { color: #fff; border-bottom: 2px solid var(--navy-lt); }
.sb-tab:hover:not(.active) { color: rgba(255,255,255,.70); background: rgba(255,255,255,.05); }

#sb-map { padding: 8px 0; }
.sm-phase {}
.sm-phase-hdr { display: flex; align-items: center; padding: 7px 12px; cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: rgba(255,255,255,.50); transition: all .15s; }
.sm-phase-hdr:hover { color: rgba(255,255,255,.80); background: rgba(255,255,255,.04); }
.sm-phase-hdr .arrow { margin-right: 6px; font-size: 9px; transition: transform .15s; display: inline-block; }
.sm-phase-hdr.collapsed .arrow { transform: rotate(-90deg); }
.sm-phase-nodes { padding: 0 0 4px 0; }
.sm-phase-nodes.hidden { display: none; }
.sm-node { display: flex; align-items: center; gap: 8px; padding: 5px 12px 5px 20px; font-size: 13px; color: rgba(255,255,255,.45); cursor: pointer; transition: all .12s; border-left: 2px solid transparent; }
.sm-node:hover { background: rgba(255,255,255,.06); color: rgba(255,255,255,.85); }
.sm-node.sm-visited { color: rgba(255,255,255,.85); border-left-color: var(--green); }
.sm-node.sm-visited .sm-icon { color: var(--green); }
.sm-node.sm-current { color: #fff; border-left-color: var(--navy-lt); background: rgba(255,255,255,.08); font-weight: 600; }
.sm-node.sm-current .sm-icon { color: var(--navy-lt); }
.sm-node.sm-unreachable { opacity: .35; cursor: default; }
.sm-node.sm-end { color: rgba(255,255,255,.50); }
.sm-node.sm-end.sm-visited { color: rgba(255,255,255,.85); }
.sm-icon { font-size: 11px; width: 16px; text-align: center; flex-shrink: 0; }
@keyframes pulse { 0%,100%{ opacity:1; } 50%{ opacity:.35; } }
.sm-current .sm-icon { animation: pulse 1.6s infinite; }

#sb-journey { padding: 8px 0; display: none; }
.pi { padding: 7px 12px; font-size: 13px; color: rgba(255,255,255,.50); border-left: 2px solid transparent; }
.pi.past { border-left-color: rgba(255,255,255,.20); }
.pi.current { color: #fff; font-weight: 600; border-left-color: var(--navy-lt); }
.pi-choice { font-size: 12px; color: rgba(255,255,255,.45); margin-top: 2px; padding-left: 16px; }
.sb-foot { padding: 14px 12px; margin-top: 8px; border-top: 1px solid rgba(255,255,255,.08); font-size: 11px; color: rgba(255,255,255,.25); line-height: 1.6; }

/* CONTENT */
#content { flex: 1; overflow-y: auto; padding: 24px 32px 48px; background: var(--slate-bg); }

/* STEP JUMP */
.step-jump-wrap { max-width: 740px; margin: 0 auto 16px; }
.step-jump-label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; margin-bottom: 4px; }
.step-jump-select { width: 100%; padding: 8px 12px; border: 1px solid var(--bdr); border-radius: 8px; font-family: inherit; font-size: 14px; color: var(--text); background: var(--white); cursor: pointer; transition: border-color .15s; }
.step-jump-select:focus { outline: 2px solid var(--navy-lt); outline-offset: 1px; }

/* CARD */
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.card { animation: fadeUp .22s ease; background: var(--white); border: 1px solid var(--bdr); border-radius: 12px; max-width: 740px; margin: 0 auto; box-shadow: 0 1px 4px rgba(0,0,0,.04); }
.c-hdr { padding: 20px 24px 12px; border-bottom: 1px solid var(--bdr); }
.act-badge { display: inline-block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 3px 12px; border-radius: 12px; margin-bottom: 8px; }
.act-laj { background: #ECFEFF; color: #0E7490; border: 1px solid #A5F3FC; }
.act-juez { background: #F5F3FF; color: #5B21B6; border: 1px solid #DDD6FE; }
.act-ambos { background: #DBEAFE; color: #1E40AF; border: 1px solid #BFDBFE; }
.c-title { font-size: 20px; font-weight: 700; color: var(--text); line-height: 1.3; margin-bottom: 4px; }
.step-num { font-size: 12px; color: var(--muted); font-weight: 400; }

.c-body { padding: 18px 24px; }
.c-body p { margin-bottom: 12px; }
.c-body ul, .c-body ol { margin: 8px 0 12px 22px; }
.c-body li { margin-bottom: 5px; }

.blk-i { font-size: 15px; color: var(--text); line-height: 1.7; }
.blk-d { background: #FFF7ED; border: 1px solid #FED7AA; border-radius: 8px; padding: 12px 16px; margin: 10px 0; font-size: 14px; color: #92400E; line-height: 1.6; }
.blk-d::before { content: '\23F0'; margin-right: 8px; }
.blk-n { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 8px; padding: 12px 16px; margin: 10px 0; font-size: 14px; color: #1E40AF; line-height: 1.6; }
.blk-n::before { content: '\2139'; margin-right: 8px; font-weight: 700; }
.blk-w { background: #FEF2F2; border: 1px solid #FECACA; border-radius: 8px; padding: 12px 16px; margin: 10px 0; font-size: 14px; color: #991B1B; line-height: 1.6; }
.blk-w::before { content: '\26A0'; margin-right: 8px; }
.blk-l { font-size: 13px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, monospace; background: #F8FAFC; border: 1px solid #E2E8F0; border-radius: 6px; padding: 8px 14px; margin: 8px 0; line-height: 1.5; }
.blk-l::before { content: '\00A7'; margin-right: 8px; }
.blk-cl { margin: 10px 0; }
.blk-cl-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
.blk-cl-list { list-style: none; padding: 0; }
.blk-cl-list li { position: relative; padding: 5px 0 5px 28px; font-size: 14px; color: var(--text); line-height: 1.6; }
.blk-cl-list li::before { content: '\2610'; position: absolute; left: 0; color: var(--muted); font-size: 15px; top: 5px; }

/* DECISION */
.dec-area { padding: 16px 24px 0; }
.dec-q { background: #F0F4FA; border-top: 3px solid var(--navy); border-bottom: 1px solid var(--bdr); border-radius: 0 0 8px 8px; padding: 14px 18px; font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 14px; line-height: 1.5; }
.dec-opts { display: flex; flex-direction: column; gap: 10px; padding-bottom: 6px; }
.dec-btn { display: flex; align-items: flex-start; gap: 12px; padding: 12px 18px; border: 1.5px solid var(--bdr); border-radius: 8px; background: var(--white); cursor: pointer; font-family: inherit; font-size: 14px; color: var(--text); transition: all .15s; text-align: left; width: 100%; line-height: 1.5; }
.dec-btn:hover { border-color: var(--navy-lt); background: #F0F4FF; }
.dec-letter { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; margin-top: 1px; }
.dec-btn.ok .dec-letter { background: var(--green-bg); color: var(--green); border: 1px solid #A7F3D0; }
.dec-btn.bad .dec-letter { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; }
.dec-btn.warn .dec-letter { background: var(--amber-bg); color: var(--amber); border: 1px solid #FDE68A; }
.dec-btn.neutral .dec-letter { background: #EFF6FF; color: #1E40AF; border: 1px solid #BFDBFE; }

/* NAV */
.c-nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 18px; }
.btn-back { font-family: inherit; font-size: 13px; font-weight: 500; padding: 7px 16px; border-radius: 6px; cursor: pointer; background: var(--white); border: 1px solid var(--bdr); color: var(--muted); transition: all .15s; }
.btn-back:hover:not(:disabled) { border-color: var(--navy-lt); color: var(--navy-lt); }
.btn-back:disabled { opacity: .35; cursor: default; }
.btn-next { font-family: inherit; font-size: 13px; font-weight: 600; padding: 7px 18px; border-radius: 6px; cursor: pointer; background: var(--navy-lt); border: 1px solid var(--navy-lt); color: #fff; transition: all .15s; }
.btn-next:hover { background: var(--navy); border-color: var(--navy); }

/* END CARD */
.card.end-success { border-top: 4px solid var(--green); }
.card.end-error { border-top: 4px solid var(--red); }
.card.end-warning { border-top: 4px solid var(--amber); }
.card.end-neutral { border-top: 4px solid var(--navy-lt); }
.end-body { text-align: center; padding: 32px 24px 20px; }
.end-icon { font-size: 42px; margin-bottom: 10px; }
.end-success .end-icon { color: var(--green); }
.end-error .end-icon { color: var(--red); }
.end-warning .end-icon { color: var(--amber); }
.end-neutral .end-icon { color: var(--navy-lt); }
.end-title { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
.end-success .end-title { color: var(--green); }
.end-error .end-title { color: var(--red); }
.end-warning .end-title { color: var(--amber); }
.end-neutral .end-title { color: var(--navy-lt); }
.end-sub { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
.end-btns { display: flex; gap: 10px; justify-content: center; margin-bottom: 22px; }
.end-content { text-align: left; padding: 0 24px 12px; }
.summary-box { margin: 18px 24px 24px; background: #F8FAFC; border: 1px solid var(--bdr); border-radius: 8px; padding: 16px 18px; text-align: left; }
.summary-box h4 { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 10px; }
.summary-box ol { padding-left: 22px; font-size: 13px; color: var(--text); line-height: 1.8; }
.summary-box li .sum-choice { color: var(--navy-lt); font-weight: 500; }

/* MAPA OVERLAY */
#mapa-overlay { display: none; flex: 1; overflow-y: auto; background: var(--slate-bg); padding: 20px; }
.mapa-close { position: sticky; top: 0; z-index: 10; display: flex; justify-content: flex-end; margin-bottom: 14px; }
.mapa-close-btn { font-family: inherit; font-size: 13px; font-weight: 600; padding: 8px 18px; border-radius: 6px; cursor: pointer; background: var(--navy-lt); border: 1px solid var(--navy-lt); color: #fff; transition: all .15s; }
.mapa-close-btn:hover { background: var(--navy); }
.mapa-columns { display: flex; gap: 18px; min-width: max-content; padding-bottom: 40px; }
.mapa-col { min-width: 240px; max-width: 300px; }
.mapa-col-hdr { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--navy); padding: 8px 12px; background: #E0E5F0; border-radius: 8px 8px 0 0; }
.mapa-nodes { background: var(--white); border: 1px solid var(--bdr); border-radius: 0 0 8px 8px; padding: 8px; }
.mapa-node { padding: 10px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; border-left: 3px solid var(--bdr); background: #FAFBFE; }
.mapa-node.mapa-visited { border-left-color: var(--green); background: var(--green-bg); }
.mapa-node.mapa-current { border-left-color: var(--navy-lt); background: var(--cyan-bg); font-weight: 600; }
.mapa-node.mapa-end-success { border-left-color: var(--green); }
.mapa-node.mapa-end-error { border-left-color: var(--red); }
.mapa-node.mapa-end-warning { border-left-color: var(--amber); }
.mapa-node.mapa-end-neutral { border-left-color: var(--navy-lt); }
.mapa-node-actor { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); }
.mapa-node-title { font-size: 13px; color: var(--text); margin-top: 3px; line-height: 1.4; }
.mapa-arrow { font-size: 11px; color: var(--muted); padding: 3px 0 3px 16px; }
.mapa-arrow-label { font-style: italic; }

@media (max-width: 700px) {
  #sidebar { display: none; }
  #content { padding: 16px 14px 36px; }
  .h-title { font-size: 13px; }
  .h-sub { display: none; }
  .btn { font-size: 12px; padding: 5px 10px; }
  .c-title { font-size: 18px; }
  .c-body { padding: 14px 18px; }
  .c-hdr { padding: 16px 18px 10px; }
  .dec-area { padding: 12px 18px 0; }
  .c-nav { padding: 12px 18px 14px; }
  .step-jump-wrap { margin: 0 0 12px; }
}
@media print {
  #hdr, #pbar, #breadcrumb, #sidebar, .c-nav, .dec-opts, .dec-q, .btn-back, .btn-next, .end-btns, .mapa-close, .step-jump-wrap { display: none !important; }
  #app { height: auto; overflow: visible; }
  #layout { overflow: visible; }
  #content { overflow: visible; padding: 0; background: #fff; }
  .card { break-inside: avoid; box-shadow: none; border: 1px solid #ccc; margin-bottom: 14px; animation: none; }
  body { background: #fff; }
  #mapa-overlay { display: block !important; overflow: visible; }
  .mapa-columns { flex-wrap: wrap; }
  .mapa-col { min-width: 200px; }
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="h-left">
      <div class="h-seal">&#9878;</div>
      <div class="h-title-block">
        <div class="h-title">Declaraciones judiciales sobre hechos pasados</div>
        <div class="h-sub">Ley 15/2015, Cap. XI &middot; Arts. 80 bis &ndash; 80 quinquies</div>
      </div>
    </div>
    <div class="h-right">
      <button class="btn btn-ghost" onclick="toggleMapa()">&#9878; Ver mapa</button>
      <button class="btn btn-ghost" onclick="dlGuia()">&#11015; Descargar</button>
      <button class="btn btn-ghost" onclick="restart()">&#8635; Reiniciar</button>
    </div>
  </div>
  <div id="pbar"></div>
  <div id="breadcrumb"></div>
  <div id="layout">
    <div id="sidebar">
      <div id="sb-tabs">
        <button class="sb-tab active" onclick="sbTab('map')">Mapa</button>
        <button class="sb-tab" onclick="sbTab('journey')">Recorrido</button>
      </div>
      <div id="sb-map"></div>
      <div id="sb-journey"></div>
    </div>
    <div id="content"></div>
  </div>
  <div id="mapa-overlay">
    <div class="mapa-close"><button class="mapa-close-btn" onclick="toggleMapa()">&#8592; Volver al recorrido</button></div>
    <div class="mapa-columns" id="mapa-columns"></div>
  </div>
</div>

<script>
var PHASES = [
  'Viabilidad',
  'Competencia y admisión',
  'Tramitación',
  'Resolución y recursos'
];

var STEPS = {

inicio: {
  ph:0, t:'Recepción de la solicitud de declaración judicial sobre hechos pasados', ac:'ambos',
  c:[
    ['i','Se ha recibido una solicitud para obtener una declaración judicial sobre la realidad y las circunstancias de hechos pasados determinados. Este expediente se tramita conforme al Capítulo XI del Título II de la Ley 15/2015, de la Jurisdicción Voluntaria (artículos 80 bis a 80 quinquies), introducido por la disposición final tercera de la Ley 20/2022, de Memoria Democrática.'],
    ['n','El expediente reintroduce, con carácter renovado, la antigua figura de la "información para perpetua memoria" de la LEC de 1881 (arts. 2002-2010), derogada por la Ley 15/2015 y recuperada por la Ley 20/2022.'],
    ['l','Ley 15/2015, arts. 80 bis - 80 quinquies; Ley 20/2022, disp. final 3.ª; LEC 1881, arts. 2002-2010'],
    ['cl','Verificaciones iniciales',[
      'La solicitud se refiere a hechos pasados determinados',
      'No existe controversia que deba sustanciarse en proceso contencioso',
      'Se ha presentado ante el órgano judicial competente',
      'Se acompaña principio de prueba de los hechos'
    ]]
  ],
  q:'¿Quién promueve el expediente?',
  opts:[
    {t:'Persona interesada (titular de derechos o intereses legítimos)', l:'A', n:'contenido_solicitud', v:'ok'},
    {t:'Ministerio Fiscal (de oficio o a solicitud de cualquier persona)', l:'B', n:'contenido_solicitud', v:'neutral'}
  ]
},

contenido_solicitud: {
  ph:0, t:'Contenido de la solicitud', ac:'laj',
  c:[
    ['i','La solicitud debe expresar con claridad los siguientes extremos para que el Letrado de la Administración de Justicia pueda realizar el control de admisibilidad y, en su caso, admitirla a trámite:'],
    ['cl','Requisitos de la solicitud (art. 80 quáter.1)',[
      'Contenido de la declaración judicial que se interesa',
      'Relato de las circunstancias relevantes a los efectos de la solicitud',
      'Principio de prueba de los hechos sobre los que se interesa la información',
      'Identificación de las personas que puedan estar interesadas'
    ]],
    ['n','No es preceptiva la defensa de Letrado ni la representación por Procurador. En la Oficina Judicial existirán impresos normalizados a disposición de los interesados para formular la solicitud (art. 80 ter.3).'],
    ['n','El Ministerio Fiscal será siempre parte en este expediente, garantizando el control de legalidad y la protección de los intereses generales (art. 80 ter.4).'],
    ['l','Ley 15/2015, arts. 80 ter.3, 80 ter.4, 80 quáter.1']
  ],
  nx:'check_condiciones'
},

check_condiciones: {
  ph:0, t:'Verificación de las 5 condiciones cumulativas (art. 80 bis.2)', ac:'juez',
  c:[
    ['i','Para que proceda el expediente de declaración judicial sobre hechos pasados, deben concurrir cumulativamente las cinco condiciones establecidas en el apartado 2 del artículo 80 bis. Si alguna de ellas no se cumple, el expediente no es viable por esta vía.'],

/* ===== STATE ===== */
var cur = 'inicio';
var hist = [];
var activeSbTab = 'map';
var mapaOn = false;
var collapsedPhases = {};

/* ===== NAVIGATION ===== */
function goTo(stepId, choiceLabel) {
  hist.push({ s: cur, next: stepId, c: choiceLabel || '' });
  cur = stepId;
  if (choiceLabel) sbTab('journey');
  render();
}

function goBack() {
  if (hist.length === 0) return;
  var last = hist.pop();
  cur = last.s;
  render();
}

function goBackTo(index) {
  if (index < 0 || index >= hist.length) return;
  cur = hist[index].s;
  hist = hist.slice(0, index);
  render();
}

function buildPathTo(targetId) {
  if (targetId === 'inicio') return [];
  var queue = [{ node: 'inicio', path: [] }];
  var visited = new Set();
  visited.add('inicio');
  while (queue.length) {
    var current = queue.shift();
    var step = STEPS[current.node];
    if (!step) continue;
    if (step.nx) {
      var nextId = step.nx;
      var newPath = current.path.concat([{ s: current.node, next: nextId, c: '' }]);
      if (nextId === targetId) return newPath;
      if (!visited.has(nextId)) {
        visited.add(nextId);
        queue.push({ node: nextId, path: newPath });
      }
    }
    if (step.opts) {
      for (var i = 0; i < step.opts.length; i++) {
        var opt = step.opts[i];
        var nextId = opt.n;
        var choiceLabel = opt.t;
        var newPath = current.path.concat([{ s: current.node, next: nextId, c: choiceLabel }]);
        if (nextId === targetId) return newPath;
        if (!visited.has(nextId)) {
          visited.add(nextId);
          queue.push({ node: nextId, path: newPath });
        }
      }
    }
  }
  return null;
}

function jumpTo(stepId) {
  if (stepId !== cur) {
    var path = buildPathTo(stepId);
    if (path) {
      hist = path;
    } else {
      hist = [];
    }
  }
  cur = stepId;
  sbTab('map');
  render();
}

function restart() {
  cur = 'inicio';
  hist = [];
  sbTab('map');
  render();
}

function escQ(s) { return s.replace(/'/g, '&#39;').replace(/"/g, '&quot;'); }
function trunc(s, n) { return s.length > n ? s.substring(0, n) + '\u2026' : s; }
function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

/* ===== RENDER ===== */
function render() {
  renderPbar();
  renderBreadcrumb();
  renderSidebar();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

function renderPbar() {
  var s = STEPS[cur]; if (!s) return;
  var curPh = s.ph;
  var html = '';
  PHASES.forEach(function(name, i) {
    if (i > 0) html += '<span class="ph-sep">&#8250;</span>';
    var cls = 'ph-lbl';
    if (i === curPh) cls += ' active';
    else if (i < curPh) cls += ' done';
    html += '<div class="ph-item"><span class="' + cls + '">' + (i+1) + '. ' + escHtml(name) + '</span></div>';
  });
  document.getElementById('pbar').innerHTML = html;
}

function renderBreadcrumb() {
  var s = STEPS[cur]; if (!s) return;
  var html = '';
  hist.forEach(function(h, i) {
    var origin = STEPS[h.s];
    var label = trunc(origin ? origin.t : h.s, 28);
    if (i > 0) html += '<span class="bc-sep">&#8250;</span>';
    html += '<button class="bc-item bc-past" onclick="goBackTo(' + i + ')">' + escHtml(label) + '</button>';
  });
  var curLabel = trunc(s.t, 28);
  if (hist.length > 0) html += '<span class="bc-sep">&#8250;</span>';
  html += '<span class="bc-item bc-current">' + escHtml(curLabel) + '</span>';
  document.getElementById('breadcrumb').innerHTML = html;
}

function renderSidebar() {
  renderSbMap();
  renderSbJourney();
}

function getVisitedSet() {
  var set = new Set();
  set.add('inicio');
  hist.forEach(function(h) { set.add(h.s); set.add(h.next); });
  set.add(cur);
  return set;
}

function getChoicesMade() {
  var r = [];
  hist.forEach(function(h) { if (h.c) r.push({from:h.s, to:h.next, choice:h.c}); });
  return r;
}

function isUnreachable(key, visitedSet) {
  var choices = getChoicesMade();
  var allKeys = Object.keys(STEPS);
  for (var i = 0; i < allKeys.length; i++) {
    var sKey = allKeys[i];
    var s = STEPS[sKey];
    if (!s || !s.opts) continue;
    for (var j = 0; j < s.opts.length; j++) {
      if (s.opts[j].n === key) {
        for (var k = 0; k < choices.length; k++) {
          if (choices[k].from === sKey && choices[k].to !== key) return true;
        }
      }
    }
  }
  return false;
}

function renderSbMap() {
  var visitedSet = getVisitedSet();
  var html = '';
  PHASES.forEach(function(phaseName, pi) {
    var isCol = !!collapsedPhases[pi];
    html += '<div class="sm-phase">';
    html += '<div class="sm-phase-hdr' + (isCol ? ' collapsed' : '') + '" onclick="togglePhase(' + pi + ')">';
    html += '<span class="arrow">&#9660;</span> ' + escHtml(phaseName);
    html += '</div>';
    html += '<div class="sm-phase-nodes' + (isCol ? ' hidden' : '') + '">';
    Object.keys(STEPS).forEach(function(key) {
      var step = STEPS[key];
      if (step.ph !== pi) return;
      var isEnd = !!step.end;
      var isVisited = visitedSet.has(key);
      var isCurrent = key === cur;
      var cls = 'sm-node';
      if (isCurrent) cls += ' sm-current';
      else if (isVisited) cls += ' sm-visited';
      else if (isEnd) cls += ' sm-end';
      else if (isUnreachable(key, visitedSet)) cls += ' sm-unreachable';
      var icon = '&#9675;';
      if (isCurrent) icon = '&#9679;';
      else if (isVisited) icon = '&#10003;';
      else if (isEnd) icon = '&#9632;';
      var onclick = isCurrent ? '' : (' onclick="jumpTo(\'' + escQ(key) + '\')"');
      html += '<div class="' + cls + '"' + onclick + '>';
      html += '<span class="sm-icon">' + icon + '</span>';
      html += '<span>' + escHtml(trunc(step.t, 30)) + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('sb-map').innerHTML = html;
}

function togglePhase(pi) { collapsedPhases[pi] = !collapsedPhases[pi]; renderSbMap(); }

function renderSbJourney() {
  var html = '';
  hist.forEach(function(h, i) {
    var origin = STEPS[h.s];
    html += '<div class="pi past">' + escHtml(trunc(origin ? origin.t : h.s, 32)) + '</div>';
    if (h.c) html += '<div class="pi-choice">&#8226; ' + escHtml(h.c) + '</div>';
  });
  var curStep = STEPS[cur];
  if (curStep) html += '<div class="pi current">' + escHtml(trunc(curStep.t, 32)) + '</div>';
  html += '<div class="sb-foot">';
  html += 'Ley 15/2015, arts. 80 bis-80 quinquies<br>';
  html += 'Ley 20/2022, disp. final 3.ª<br>';
  html += 'LO 1/2025, disp. adic. 1.ª<br>';
  html += 'LOPJ, arts. 86.5.j) y 89.6.g)';
  html += '</div>';
  document.getElementById('sb-journey').innerHTML = html;
}

function renderContent() {
  var s = STEPS[cur]; if (!s) return;
  var el = document.getElementById('content');
  var html = '';
  // Step jump dropdown
  html += '<div class="step-jump-wrap">';
  html += '<div class="step-jump-label">Ir directamente a un paso</div>';
  html += '<select class="step-jump-select" onchange="jumpTo(this.value)">';
  PHASES.forEach(function(phaseName, pi) {
    html += '<optgroup label="' + escHtml((pi+1) + '. ' + phaseName) + '">';
    Object.keys(STEPS).forEach(function(key) {
      var step = STEPS[key];
      if (step.ph !== pi) return;
      var sel = key === cur ? ' selected' : '';
      var prefix = step.end ? '[Fin] ' : '';
      html += '<option value="' + escQ(key) + '"' + sel + '>' + escHtml(prefix + step.t) + '</option>';
    });
    html += '</optgroup>';
  });
  html += '</select></div>';

  if (s.end) html += buildEnd(cur, s);
  else html += buildStep(cur, s);
  el.innerHTML = html;
}

function actorLabel(ac) {
  if (ac === 'laj') return 'LAJ';
  if (ac === 'juez') return 'Juez';
  return 'Ambos';
}

function buildStep(key, s) {
  var stepCount = hist.length + 1;
  var phName = PHASES[s.ph] || '';
  var html = '<div class="card">';
  html += '<div class="c-hdr">';
  html += '<div class="act-badge act-' + s.ac + '">' + actorLabel(s.ac) + '</div>';
  html += '<div class="c-title">' + escHtml(s.t) + '</div>';
  html += '<div class="step-num">Paso ' + stepCount + ' de este recorrido &middot; Fase ' + (s.ph+1) + ': ' + escHtml(phName) + '</div>';
  html += '</div>';
  html += '<div class="c-body">';
  html += renderBlocks(s.c);
  html += '</div>';
  if (s.q) {
    html += '<div class="dec-area">';
    html += '<div class="dec-q">' + escHtml(s.q) + '</div>';
    html += '<div class="dec-opts">';
    s.opts.forEach(function(opt, i) {
      var letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
      var letter = opt.l || letters[i] || (i+1);
      var cls = opt.v || 'neutral';
      html += '<button class="dec-btn ' + cls + '" onclick="goTo(\'' + escQ(opt.n) + '\',\'' + escQ(opt.t) + '\')">';
      html += '<span class="dec-letter">' + letter + '</span>';
      html += '<span>' + escHtml(opt.t) + '</span>';
      html += '</button>';
    });
    html += '</div></div>';
  }
  html += '<div class="c-nav">';
  html += '<button class="btn-back"' + (hist.length === 0 ? ' disabled' : '') + ' onclick="goBack()">&#8592; Volver</button>';
  if (s.nx) html += '<button class="btn-next" onclick="goTo(\'' + escQ(s.nx) + '\',\'\')">Siguiente &#8594;</button>';
  html += '</div>';
  html += '</div>';
  return html;
}

function buildEnd(key, s) {
  var icons = {success:'&#10003;', error:'&#10007;', warning:'&#9888;', neutral:'&#9679;'};
  var html = '<div class="card end-' + s.end + '">';
  html += '<div class="end-body">';
  html += '<div class="end-icon">' + (icons[s.end]||'') + '</div>';
  html += '<div class="end-title">' + escHtml(s.t) + '</div>';
  html += '<div class="end-sub">El procedimiento ha concluido en esta vía</div>';
  html += '<div class="end-btns">';
  html += '<button class="btn-next" onclick="restart()">&#8635; Nuevo procedimiento</button>';
  html += '<button class="btn-back"' + (hist.length===0?' disabled':'') + ' onclick="goBack()">&#8592; Volver</button>';
  html += '</div></div>';
  html += '<div class="end-content">';
  html += renderBlocks(s.c);
  html += '</div>';
  html += '<div class="summary-box">';
  html += '<h4>Resumen del recorrido</h4>';
  html += '<ol>';
  hist.forEach(function(h) {
    var origin = STEPS[h.s];
    html += '<li>' + escHtml(origin ? origin.t : h.s);
    if (h.c) html += ' <span class="sum-choice">&#8594; ' + escHtml(trunc(h.c, 50)) + '</span>';
    html += '</li>';
  });
  html += '<li><strong>' + escHtml(s.t) + '</strong></li>';
  html += '</ol></div>';
  html += '</div>';
  return html;
}

function renderBlocks(blocks) {
  if (!blocks) return '';
  var html = '';
  blocks.forEach(function(b) {
    var type = b[0];
    if (type === 'i') html += '<p class="blk-i">' + escHtml(b[1]) + '</p>';
    else if (type === 'd') html += '<div class="blk-d">' + escHtml(b[1]) + '</div>';
    else if (type === 'n') html += '<div class="blk-n">' + escHtml(b[1]) + '</div>';
    else if (type === 'w') html += '<div class="blk-w">' + escHtml(b[1]) + '</div>';
    else if (type === 'l') html += '<div class="blk-l">' + escHtml(b[1]) + '</div>';
    else if (type === 'cl') {
      html += '<div class="blk-cl">';
      html += '<div class="blk-cl-title">' + escHtml(b[1]) + '</div>';
      html += '<ul class="blk-cl-list">';
      (b[2]||[]).forEach(function(item) { html += '<li>' + escHtml(item) + '</li>'; });
      html += '</ul></div>';
    }
  });
  return html;
}

/* ===== SIDEBAR TABS ===== */
function sbTab(tab) {
  activeSbTab = tab;
  document.getElementById('sb-map').style.display = tab === 'map' ? 'block' : 'none';
  document.getElementById('sb-journey').style.display = tab === 'journey' ? 'block' : 'none';
  document.querySelectorAll('.sb-tab').forEach(function(t, i) {
    t.classList.toggle('active', (i === 0 && tab === 'map') || (i === 1 && tab === 'journey'));
  });
}

/* ===== MAPA OVERLAY ===== */
function toggleMapa() {
  mapaOn = !mapaOn;
  document.getElementById('layout').style.display = mapaOn ? 'none' : 'flex';
  document.getElementById('mapa-overlay').style.display = mapaOn ? 'block' : 'none';
  if (mapaOn) renderMapa();
}

function renderMapa() {
  var visitedSet = getVisitedSet();
  var html = '';
  PHASES.forEach(function(phaseName, pi) {
    html += '<div class="mapa-col">';
    html += '<div class="mapa-col-hdr">' + escHtml((pi+1) + '. ' + phaseName) + '</div>';
    html += '<div class="mapa-nodes">';
    Object.keys(STEPS).forEach(function(key) {
      var s = STEPS[key];
      if (s.ph !== pi) return;
      var isVisited = visitedSet.has(key);
      var isCurrent = key === cur;
      var isEnd = !!s.end;
      var cls = 'mapa-node';
      if (isCurrent) cls += ' mapa-current';
      else if (isVisited) cls += ' mapa-visited';
      if (isEnd) cls += ' mapa-end-' + s.end;
      html += '<div class="' + cls + '">';
      html += '<div class="mapa-node-actor">' + actorLabel(s.ac) + '</div>';
      html += '<div class="mapa-node-title">' + escHtml(trunc(s.t, 45)) + '</div>';
      if (s.opts) {
        s.opts.forEach(function(opt) {
          html += '<div class="mapa-arrow"><span class="mapa-arrow-label">&#8594; ' + escHtml(trunc(opt.t, 40)) + '</span></div>';
        });
      } else if (s.nx) {
        var nxStep = STEPS[s.nx];
        html += '<div class="mapa-arrow"><span class="mapa-arrow-label">&#8594; ' + escHtml(trunc(nxStep ? nxStep.t : s.nx, 40)) + '</span></div>';
      }
      html += '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('mapa-columns').innerHTML = html;
}

/* ===== DOWNLOAD ===== */
function dlGuia() {
  var html = '<!DOCTYPE html>' + document.documentElement.outerHTML;
  var blob = new Blob([html], {type:'text/html;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'guia-tramitacion-declaraciones-hechos-pasados.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

/* ===== INIT ===== */
render();
</script>
