<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            De la protección del patrimonio de las personas con discapacidad
            (artículos 56 a 58 LJV)
        </title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            /* =========================================================
       MÓDULO 1 — VARIABLES CSS
       ========================================================= */
            :root {
                --navy: #1a2f6e;
                --navy-mid: #2e4daa;
                --navy-lt: #4169e1;
                --cyan: #0d9488;
                --cyan-bg: #f0fdfa;
                --violet: #5b21b6;
                --violet-bg: #f5f3ff;
                --green: #15803d;
                --green-bg: #f0fdf4;
                --amber: #b45309;
                --amber-bg: #fffbeb;
                --red: #b91c1c;
                --red-bg: #fef2f2;
                --slate: #475569;
                --slate-bg: #f4f6fb;
                --white: #ffffff;
                --bdr: #d1d9ee;
                --text: #1a1a2e;
                --muted: #6b7280;
                --transition-norm: 250ms ease;
            }

            /* =========================================================
       MÓDULO 2 — REGLAS ABSOLUTAS DE ESTILO
       ========================================================= */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                font-family: "Outfit", system-ui, sans-serif;
                font-size: 15px;
                line-height: 1.5;
                color: var(--text);
                background: var(--white);
                -webkit-font-smoothing: antialiased;
            }

            /* =========================================================
       MÓDULO 4 — LAYOUT PRINCIPAL #app
       ========================================================= */
            #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
                position: relative;
            }

            /* =========================================================
       MÓDULO 5 — CABECERA #hdr
       ========================================================= */
            #hdr {
                flex-shrink: 0;
                height: 56px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
                background: var(--navy);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            .h-left {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            /* Botón toggle sidebar (NUEVO) */
            .btn-toggle-sidebar {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 4px 10px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
                font-family: inherit;
                font-size: 20px;
                cursor: pointer;
                transition: all 150ms ease;
                white-space: nowrap;
                line-height: 1;
            }
            .btn-toggle-sidebar:hover {
                background: rgba(255, 255, 255, 0.18);
            }
            .btn-toggle-sidebar:focus-visible {
                outline: 2px solid var(--navy-lt);
                outline-offset: 2px;
            }
            .h-seal {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                flex-shrink: 0;
                background: rgba(255, 255, 255, 0.1);
                border: 1.5px solid rgba(255, 255, 255, 0.25);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                color: rgba(255, 255, 255, 0.85);
            }
            .h-title {
                font-weight: 700;
                font-size: 14px;
                color: #fff;
            }
            .h-sub {
                font-size: 10px;
                color: rgba(255, 255, 255, 0.55);
                margin-top: 2px;
            }
            .h-right {
                display: flex;
                gap: 8px;
            }

            .btn {
                padding: 6px 12px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 500;
                cursor: pointer;
                border: 1px solid transparent;
                transition: all 0.15s;
                font-family: inherit;
            }
            .btn-ghost {
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.18);
                color: rgba(255, 255, 255, 0.85);
            }
            .btn-ghost:hover {
                background: rgba(255, 255, 255, 0.18);
            }
            .zoom-cluster {
                display: inline-flex;
                align-items: center;
                overflow: hidden;
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.08);
            }
            .btn-zoom {
                appearance: none;
                border: none;
                background: transparent;
                color: rgba(255, 255, 255, 0.85);
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                cursor: pointer;
            }
            .btn-zoom:hover {
                background: rgba(255, 255, 255, 0.14);
            }
            .zoom-label {
                min-width: 46px;
                text-align: center;
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.9);
            }

            /* =========================================================
       MÓDULO 6 — BARRA DE FASES #pbar
       ========================================================= */
            #pbar {
                flex-shrink: 0;
                height: 42px;
                display: flex;
                align-items: center;
                padding: 0 16px;
                gap: 2px;
                overflow-x: auto;
                scrollbar-width: none;
                background: var(--navy-mid);
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            }
            #pbar::-webkit-scrollbar {
                display: none;
            }
            .ph-item {
                display: flex;
                align-items: center;
                gap: 4px;
            }
            .ph-lbl {
                display: inline-flex;
                align-items: center;
                height: 28px;
                padding: 0 10px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.6);
                transition: all 0.15s;
            }
            .ph-lbl.active {
                color: #fff;
                background: rgba(255, 255, 255, 0.22);
                font-weight: 800;
            }
            .ph-lbl.done {
                color: rgba(255, 255, 255, 0.9);
            }
            .ph-sep {
                font-size: 10px;
                color: rgba(255, 255, 255, 0.3);
                padding: 0 2px;
                flex-shrink: 0;
            }

            /* =========================================================
       MÓDULO 7 — MIGAS DE PAN #breadcrumb
       ========================================================= */
            #breadcrumb {
                flex-shrink: 0;
                min-height: 34px;
                height: auto;
                background: var(--slate-bg);
                border-bottom: 1px solid var(--bdr);
                display: flex;
                align-items: center;
                padding: 4px 20px;
                gap: 0;
                overflow-x: auto;
                scrollbar-width: none;
                flex-wrap: wrap;
                row-gap: 2px;
                white-space: normal;
            }
            #breadcrumb::-webkit-scrollbar {
                display: none;
            }
            .bc-item {
                font-size: 11px;
                white-space: nowrap;
                padding: 0 6px;
                color: var(--muted);
                display: inline-flex;
                align-items: center;
            }
            .bc-past {
                cursor: pointer;
                background: none;
                border: none;
                font-family: inherit;
            }
            .bc-past:hover {
                color: var(--navy-lt);
                text-decoration: underline;
            }
            .bc-current {
                font-weight: 600;
                color: var(--navy);
            }
            .bc-sep {
                font-size: 10px;
                color: var(--bdr);
                padding: 0 2px;
            }

            /* =========================================================
       MÓDULO 8-9 — LAYOUT Y SIDEBAR
       ========================================================= */
            #layout {
                flex: 1;
                overflow: hidden;
                display: flex;
                position: relative;
            }
            /* SIDEBAR (MODIFICADO para soportar colapso en escritorio y overlay móvil) */
            #sidebar {
                flex-shrink: 0;
                width: 260px;
                background: var(--navy-mid);
                overflow-y: auto;
                overflow-x: hidden;
                display: flex;
                flex-direction: column;
                min-height: 0;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
                transition:
                    transform var(--transition-norm),
                    width var(--transition-norm);
                z-index: 80;
            }
            #sidebar.collapsed {
                width: 0;
                transform: translateX(-100%);
                overflow: hidden;
            }
            #sidebar::-webkit-scrollbar {
                width: 4px;
            }
            #sidebar::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.15);
                border-radius: 2px;
            }
            #content {
                flex: 1;
                overflow-y: auto;
                padding: 20px;
                background: var(--white);
            }

            /* Backdrop para móvil (NUEVO) */
            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 140;
                display: none;
            }
            .sidebar-backdrop.show {
                display: block;
            }

            /* Pestañas del sidebar */
            #sb-tabs {
                display: flex;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                flex-shrink: 0;
            }
            .sb-tab {
                flex: 1;
                padding: 8px 0;
                font-size: 11px;
                font-weight: 600;
                font-family: inherit;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                letter-spacing: 0.4px;
                text-transform: uppercase;
                transition: all 0.15s;
            }
            .sb-tab.active {
                color: #fff;
                border-bottom: 2px solid var(--navy-lt);
            }
            .sb-tab:hover:not(.active) {
                color: rgba(255, 255, 255, 0.7);
                background: rgba(255, 255, 255, 0.05);
            }

            #sb-map {
                padding: 10px 0;
            }
            .sm-phase {
                margin-bottom: 16px;
            }
            .sm-phase-hdr {
                padding: 6px 8px;
                font-size: 11px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.7);
                cursor: pointer;
                display: flex;
                align-items: center;
                gap: 6px;
                border-radius: 4px;
            }
            .sm-phase-hdr:hover {
                background: rgba(255, 255, 255, 0.08);
            }
            .sm-phase-hdr::before {
                content: "▼";
                font-size: 8px;
                transition: transform 0.15s;
            }
            .sm-phase.collapsed .sm-phase-hdr::before {
                transform: rotate(-90deg);
            }
            .sm-phase.collapsed .sm-nodes {
                display: none;
            }
            .sm-nodes {
                margin-left: 16px;
                margin-top: 4px;
            }

            .sm-node {
                padding: 6px 8px;
                font-size: 11px;
                color: rgba(255, 255, 255, 0.6);
                cursor: pointer;
                border-radius: 4px;
                display: flex;
                align-items: center;
                gap: 6px;
                transition: all 0.15s;
            }
            .sm-node:hover {
                background: rgba(255, 255, 255, 0.1);
                color: #fff;
            }
            .sm-node.sm-visited {
                color: var(--green);
            }
            .sm-node.sm-visited::before {
                content: "✓";
                font-weight: 700;
                margin-right: 4px;
            }
            .sm-node.sm-current {
                color: var(--navy-lt);
                background: rgba(255, 255, 255, 0.15);
                font-weight: 600;
            }
            .sm-node.sm-current::before {
                content: "●";
                font-size: 8px;
                margin-right: 4px;
            }
            .sm-node.sm-unreachable {
                opacity: 0.4;
                cursor: default;
            }
            .sm-node.sm-unreachable:hover {
                background: none;
            }

            /* Botón de acceso directo en sidebar Mapa */
            .sm-node-action {
                margin-left: auto;
                padding: 2px 6px;
                background: rgba(65, 105, 225, 0.25);
                border: 1px solid rgba(65, 105, 225, 0.4);
                border-radius: 4px;
                font-size: 10px;
                color: rgba(255, 255, 255, 0.85);
                cursor: pointer;
                transition: all 0.15s;
                display: inline-flex;
                align-items: center;
                gap: 2px;
                flex-shrink: 0;
            }
            .sm-node-action:hover {
                background: rgba(65, 105, 225, 0.45);
                border-color: var(--navy-lt);
            }
            .sm-node-action:active {
                transform: scale(0.98);
            }
            .sm-node.sm-unreachable .sm-node-action {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .sm-node.sm-unreachable .sm-node-action:hover {
                background: rgba(65, 105, 225, 0.25);
            }

            #sb-journey {
                padding: 10px 0;
                display: none;
            }
            .pi {
                padding: 8px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                font-size: 12px;
                color: rgba(255, 255, 255, 0.8);
            }
            .pi:last-child {
                border-bottom: none;
            }
            .pi.past {
                opacity: 0.7;
            }
            .pi.current {
                font-weight: 600;
                color: #fff;
            }
            .pi-choice {
                display: block;
                font-size: 10px;
                color: rgba(255, 255, 255, 0.55);
                margin-left: 12px;
                margin-top: 2px;
            }
            .pi-choice::before {
                content: "→ ";
            }
            .sb-foot {
                margin-top: 16px;
                padding-top: 12px;
                border-top: 1px solid rgba(255, 255, 255, 0.15);
                font-size: 10px;
                color: rgba(255, 255, 255, 0.5);
                line-height: 1.4;
            }
            .sb-foot .law {
                font-family: ui-monospace, SFMono-Regular, monospace;
                color: rgba(255, 255, 255, 0.7);
            }

            /* =========================================================
       MÓDULO 10 — OVERLAY MAPA COMPLETO
       ========================================================= */
            #mapa-overlay {
                flex: 1;
                overflow-y: auto;
                background: var(--slate-bg);
                padding: 20px;
                display: none;
            }
            .mapa-close {
                margin-bottom: 16px;
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 6px 12px;
                background: var(--navy);
                color: #fff;
                border: none;
                border-radius: 8px;
                font-size: 12px;
                cursor: pointer;
                font-family: inherit;
            }
            .mapa-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 16px;
            }
            .mapa-col {
                background: var(--white);
                border-radius: 10px;
                border: 1px solid var(--bdr);
                overflow: hidden;
            }
            .mapa-col-hdr {
                padding: 10px 14px;
                background: var(--navy-mid);
                color: #fff;
                font-weight: 600;
                font-size: 12px;
            }
            .mapa-nodes {
                padding: 8px;
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .mapa-node {
                padding: 10px;
                border-radius: 8px;
                border: 1px solid var(--bdr);
                border-left: 4px solid var(--slate);
                background: var(--white);
                font-size: 12px;
                cursor: pointer;
                transition: all 0.15s;
            }
            .mapa-node:hover {
                border-color: var(--navy-lt);
            }
            .mapa-node.visited {
                border-left-color: var(--green);
                background: var(--green-bg);
            }
            .mapa-node.current {
                border-left-color: var(--cyan);
                background: var(--cyan-bg);
                font-weight: 600;
            }
            .mapa-node.end-success {
                border-left-color: var(--green);
            }
            .mapa-node.end-error {
                border-left-color: var(--red);
            }
            .mapa-node.end-warning {
                border-left-color: var(--amber);
            }
            .mapa-node.end-neutral {
                border-left-color: var(--navy-lt);
            }
            .mapa-node-title {
                font-weight: 600;
                margin-bottom: 4px;
            }
            .mapa-node-actor {
                font-size: 10px;
                padding: 2px 6px;
                border-radius: 4px;
                background: var(--slate-bg);
                color: var(--slate);
                display: inline-block;
                margin-bottom: 6px;
            }
            .mapa-arrow {
                font-size: 10px;
                color: var(--muted);
                margin-top: 4px;
                padding-left: 8px;
                border-left: 1px solid var(--bdr);
            }

            /* =========================================================
       MÓDULO 13-14 — TARJETAS DE CONTENIDO
       ========================================================= */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .card {
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                background: var(--white);
                border-radius: 12px;
                border: 1px solid var(--bdr);
                box-shadow: 0 2px 8px rgba(26, 47, 110, 0.08);
                animation: fadeUp 0.22s ease;
            }
            .c-hdr {
                padding: 16px 20px;
                border-bottom: 1px solid var(--bdr);
                display: flex;
                align-items: flex-start;
                gap: 12px;
            }
            .act-badge {
                padding: 4px 10px;
                border-radius: 20px;
                font-size: 10px;
                font-weight: 600;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                flex-shrink: 0;
            }
            .act-laj {
                background: var(--cyan-bg);
                color: var(--cyan);
            }
            .act-juez {
                background: var(--violet-bg);
                color: var(--violet);
            }
            .act-ambos {
                background: var(--amber-bg);
                color: var(--amber);
            }
            .c-title {
                font-size: 18px;
                font-weight: 700;
                line-height: 1.3;
                flex: 1;
            }
            .step-num {
                font-size: 11px;
                color: var(--muted);
                margin-top: 4px;
            }
            .c-body {
                padding: 20px;
            }
            .c-body > * + * {
                margin-top: 14px;
            }

            /* Bloques de contenido shorthand */
            .blk-i {
                color: var(--text);
            }
            .blk-d {
                padding: 10px 14px;
                background: var(--cyan-bg);
                border-left: 3px solid var(--cyan);
                border-radius: 0 6px 6px 0;
                font-size: 14px;
            }
            .blk-n {
                padding: 10px 14px;
                background: var(--slate-bg);
                border-left: 3px solid var(--slate);
                border-radius: 0 6px 6px 0;
                font-size: 14px;
            }
            .blk-w {
                padding: 10px 14px;
                background: var(--amber-bg);
                border-left: 3px solid var(--amber);
                border-radius: 0 6px 6px 0;
                font-size: 14px;
                color: var(--amber);
                font-weight: 500;
            }
            .blk-l {
                font-family: ui-monospace, SFMono-Regular, monospace;
                font-size: 13px;
                color: var(--navy);
                padding: 8px 12px;
                background: var(--slate-bg);
                border-radius: 6px;
                display: inline-block;
            }
            .blk-cl {
            }
            .blk-cl-title {
                font-weight: 600;
                margin-bottom: 8px;
            }
            .blk-cl-item {
                display: flex;
                align-items: flex-start;
                gap: 8px;
                font-size: 14px;
                margin-bottom: 6px;
            }
            .blk-cl-item input {
                margin-top: 3px;
            }

            /* Zona de decisión */
            .dec-area {
                padding: 0 20px 20px;
            }
            .dec-q {
                padding: 12px 16px;
                background: var(--slate-bg);
                border-top: 3px solid var(--navy);
                border-radius: 0 0 8px 8px;
                font-weight: 500;
                margin-bottom: 14px;
            }
            .dec-opts {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .dec-btn {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 16px;
                border: 1.5px solid var(--bdr);
                border-radius: 10px;
                background: var(--white);
                cursor: pointer;
                transition: all 0.15s;
                text-align: left;
                font-family: inherit;
                font-size: 14px;
            }
            .dec-btn:hover {
                border-color: var(--navy-lt);
                background: var(--slate-bg);
            }
            .dec-btn.ok {
                border-left: 4px solid var(--green);
            }
            .dec-btn.bad {
                border-left: 4px solid var(--red);
            }
            .dec-btn.warn {
                border-left: 4px solid var(--amber);
            }
            .dec-btn.neutral {
                border-left: 4px solid var(--navy-lt);
            }
            .dec-letter {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 12px;
                flex-shrink: 0;
            }
            .dec-btn.ok .dec-letter {
                background: var(--green);
                color: #fff;
            }
            .dec-btn.bad .dec-letter {
                background: var(--red);
                color: #fff;
            }
            .dec-btn.warn .dec-letter {
                background: var(--amber);
                color: #fff;
            }
            .dec-btn.neutral .dec-letter {
                background: var(--navy-lt);
                color: #fff;
            }

            /* Barra de navegación inferior */
            .c-nav {
                padding: 14px 20px 20px;
                display: flex;
                justify-content: space-between;
                gap: 10px;
                border-top: 1px solid var(--bdr);
            }
            .btn-nav {
                padding: 10px 18px;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                border: 1.5px solid var(--bdr);
                background: var(--white);
                transition: all 0.15s;
                font-family: inherit;
            }
            .btn-nav:hover:not(:disabled) {
                border-color: var(--navy-lt);
                background: var(--slate-bg);
            }
            .btn-nav:disabled {
                opacity: 0.5;
                cursor: not-allowed;
            }
            .btn-next {
                background: var(--navy-lt);
                border-color: var(--navy-lt);
                color: #fff;
            }
            .btn-next:hover:not(:disabled) {
                background: var(--navy);
                border-color: var(--navy);
            }

            /* Tarjeta final */
            .card.end-success {
                border-top: 4px solid var(--green);
            }
            .card.end-error {
                border-top: 4px solid var(--red);
            }
            .card.end-warning {

                    q: "¿El patrimonio incluye bienes registrables?",
                    opts: [

                            t: "Sí: Bienes inmuebles, derechos reales o valores",
                            l: "A",

                        },
                        {
                            t: "No: Solo bienes no registrables o efectivo",

                    ],
                },
                inscripcion_registrables: {
                    ph: 5,
                    t: "Inscripción de bienes registrables",
                    ac: "laj",
                    c: [
                        [
                            "i",

                        ],
                        [
                            "n",

                        ],
                        [

                        ],
                        [

                        ],
                    ],
                    nx: "fin_exitoso",
                },

                // === NODOS FINALES ===
                fin_exitoso: {
                    ph: 5,
                    t: "Fin: Patrimonio protegido constituido y registrado",
                    ac: "ambos",
                    c: [
                        [
                            "i",
                            "El procedimiento ha concluido con la constitución efectiva del patrimonio protegido y la inscripción registral de las medidas acordadas.",
                        ],
                        [
                            "cl",
                            "Obligaciones posteriores",
                            [
                                "Rendición de cuentas del administrador: periodicidad anual (Ley 41/2003 Art. 7)",
                                "Fiscalización por el Ministerio Fiscal: supervisión permanente del correcto funcionamiento",
                                "Revisión periódica de medidas de apoyo: máximo cada 3 años (Ley 8/2021 Art. 269 CC)",
                            ],
                        ],
                        [
                            "l",
                            "Ley 41/2003 Arts. 5-7; Ley 8/2021; Ley 15/2015 Art. 58",
                        ],
                    ],
                    end: "success",
                },
            };

            /* =========================================================
     ESTADO (Módulo 16)
     ========================================================= */
            let cur = "inicio";
            let hist = [];
            let activeSbTab = "map";
            let mapaOn = false;
            let collapsedPhases = {};
            let zoomLevel = 100;

            const SB_FOOT = `
    <div class="sb-foot">
      <strong>Referencias:</strong><br>
      <span class="law">Ley 15/2015 Arts. 56-58</span><br>
      <span class="law">Ley 41/2003 Capítulo I</span><br>
      <span class="law">Ley 8/2021 · CC Arts. 269-270</span>
    </div>
  `;

            function clampNum(v, min, max) {
                return Math.min(max, Math.max(min, v));
            }
            function setZoom(pct) {
                zoomLevel = clampNum(Math.round(pct), 80, 140);
                const content = document.getElementById("content");
                if (content) content.style.zoom = String(zoomLevel / 100);
                const lbl = document.getElementById("zoomLabel");
                if (lbl) lbl.textContent = zoomLevel + "%";
            }
            function zoomIn() {
                setZoom(zoomLevel + 10);
            }
            function zoomOut() {
                setZoom(zoomLevel - 10);
            }

            /* =========================================================
     SIDEBAR TOGGLE (NUEVO)
     ========================================================= */
            let sidebarOpen = false; // solo móvil

            function toggleSidebar() {
                const isMobile = window.innerWidth <= 768;
                const sidebar = document.getElementById("sidebar");
                const btn = document.getElementById("btnToggleSidebar");
                if (isMobile) {
                    sidebarOpen = !sidebarOpen;
                    if (sidebarOpen) {
                        sidebar.classList.add("open");
                        document
                            .getElementById("sidebarBackdrop")
                            .classList.add("show");
                        if (btn) btn.setAttribute("aria-expanded", "true");
                    } else {
                        sidebar.classList.remove("open");
                        document
                            .getElementById("sidebarBackdrop")
                            .classList.remove("show");
                        if (btn) btn.setAttribute("aria-expanded", "false");
                    }
                } else {
                    sidebar.classList.toggle("collapsed");
                    const isCollapsed = sidebar.classList.contains("collapsed");
                    if (btn)
                        btn.setAttribute(
                            "aria-expanded",
                            isCollapsed ? "false" : "true",
                        );
                }
            }

            function closeMobileSidebar() {
                if (window.innerWidth <= 768 && sidebarOpen) {
                    sidebarOpen = false;
                    const sidebar = document.getElementById("sidebar");
                    const backdrop = document.getElementById("sidebarBackdrop");
                    const btn = document.getElementById("btnToggleSidebar");
                    if (sidebar) sidebar.classList.remove("open");
                    if (backdrop) backdrop.classList.remove("show");
                    if (btn) btn.setAttribute("aria-expanded", "false");
                }
            }

            function handleResize() {
                if (window.innerWidth > 768) {
                    if (sidebarOpen) {
                        const sidebar = document.getElementById("sidebar");
                        const backdrop =
                            document.getElementById("sidebarBackdrop");
                        if (sidebar) sidebar.classList.remove("open");
                        if (backdrop) backdrop.classList.remove("show");
                        sidebarOpen = false;
                        const btn = document.getElementById("btnToggleSidebar");
                        if (btn) btn.setAttribute("aria-expanded", "false");
                    }
                    const sidebarEl = document.getElementById("sidebar");
                    if (sidebarEl) sidebarEl.classList.remove("open");
                } else {
                    const sidebarEl = document.getElementById("sidebar");
                    if (
                        sidebarEl &&
                        sidebarEl.classList.contains("collapsed")
                    ) {
                        sidebarEl.classList.remove("collapsed");
                    }
                    if (
                        !sidebarOpen &&
                        sidebarEl &&
                        sidebarEl.classList.contains("open")
                    ) {
                        sidebarEl.classList.remove("open");
                        const backdrop =
                            document.getElementById("sidebarBackdrop");
                        if (backdrop) backdrop.classList.remove("show");
                    }
                }
            }

            /* =========================================================
     NAVEGACIÓN (Módulo 16, modificada para cerrar sidebar móvil)
     ========================================================= */
            function goTo(stepId, choiceLabel) {
                if (!STEPS[stepId]) return;
                hist.push({ s: cur, next: stepId, c: choiceLabel || "" });
                cur = stepId;
                if (choiceLabel) sbTab("journey");
                render();
                closeMobileSidebar();
            }
            function goBack() {
                if (hist.length === 0) return;
                cur = hist.pop().s;
                render();
                closeMobileSidebar();
            }
            function goBackTo(index) {
                if (index < 0 || index >= hist.length) return;
                cur = hist[index].next;
                hist = hist.slice(0, index);
                render();
                closeMobileSidebar();
            }
            function restart() {
                cur = "inicio";
                hist = [];
                sbTab("map");
                setZoom(100);
                render();
                closeMobileSidebar();
            }
            function sbTab(tab) {
                activeSbTab = tab;
                const map = document.getElementById("sb-map");
                const jny = document.getElementById("sb-journey");
                if (map) map.style.display = tab === "map" ? "block" : "none";
                if (jny)
                    jny.style.display = tab === "journey" ? "block" : "none";
                document.querySelectorAll(".sb-tab").forEach((t) => {
                    t.classList.toggle("active", t.dataset.tab === tab);
                });
            }
            function toggleMapa() {
                mapaOn = !mapaOn;
                const lay = document.getElementById("layout");
                const ovl = document.getElementById("mapa-overlay");
                if (lay) lay.style.display = mapaOn ? "none" : "flex";
                if (ovl) ovl.style.display = mapaOn ? "block" : "none";
                if (mapaOn) renderMapa();
                closeMobileSidebar();
            }

            /* =========================================================
     HASH (Módulo 20)
     ========================================================= */
            function syncHash() {
                const current = window.location.hash.replace("#", "");
                if (current !== cur) history.replaceState(null, "", "#" + cur);
            }
            function loadFromHash() {
                const h = window.location.hash.replace("#", "");
                if (h && STEPS[h]) {
                    cur = h;
                    hist = [];
                }
            }

            /* =========================================================
     UTILIDADES (Módulo 19)
     ========================================================= */
            function escQ(s) {
                return String(s).replace(/'/g, "&#39;");
            }
            function truncate(s, n) {
                return s.length > n ? s.slice(0, n - 1) + "…" : s;
            }
            function getActorLabel(ac) {
                return ac === "laj"
                    ? "Letrado de la Administración"
                    : ac === "juez"
                      ? "Juez"
                      : "Ambos";
            }
            function getActorClass(ac) {
                return ac === "laj"
                    ? "act-laj"
                    : ac === "juez"
                      ? "act-juez"
                      : "act-ambos";
            }

            /* =========================================================
     RENDER (Módulo 17, cierra sidebar)
     ========================================================= */
            function render() {
                renderPbar();
                renderBreadcrumb();
                renderSidebar();
                renderContent();
                syncHash();
                const content = document.getElementById("content");
                if (content) content.scrollTop = 0;
                closeMobileSidebar();
            }

            /* =========================================================
     RENDER COMPONENTES
     ========================================================= */
            function renderPbar() {
                const host = document.getElementById("pbar");
                if (!host) return;
                const s = STEPS[cur];
                if (!s) return;
                const currentPhase = s.ph;
                host.innerHTML = PHASES.map((name, idx) => {
                    const cls =
                        idx < currentPhase
                            ? "done"
                            : idx === currentPhase
                              ? "active"
                              : "";
                    return `<div class="ph-item"><span class="ph-lbl ${cls}">${name}</span>${idx < PHASES.length - 1 ? '<span class="ph-sep">›</span>' : ""}</div>`;
                }).join("");
            }

            function renderBreadcrumb() {
                const host = document.getElementById("breadcrumb");
                if (!host) return;
                const items = hist
                    .map((h, i) => {
                        const step = STEPS[h.s];
                        const label = truncate(step ? step.t : h.s, 28);
                        return `<button class="bc-item bc-past" data-action="go-back-to" data-index="${i}" title="${escQ(step?.t || "")}">${label}</button><span class="bc-sep">›</span>`;
                    })
                    .join("");
                const current = STEPS[cur];
                const currentLabel = truncate(current?.t || cur, 28);
                host.innerHTML =
                    items +
                    `<span class="bc-item bc-current" title="${escQ(current?.t || "")}">${currentLabel}</span>`;
            }

            function renderSidebar() {
                if (activeSbTab === "map") renderSidebarMap();
                else renderSidebarJourney();
            }

            function renderSidebarMap() {
                const host = document.getElementById("sb-map");
                if (!host) return;

                const byPhase = {};
                Object.entries(STEPS).forEach(([id, step]) => {
                    if (!byPhase[step.ph]) byPhase[step.ph] = [];
                    byPhase[step.ph].push({ id, ...step });
                });

                host.innerHTML =
                    PHASES.map((phaseName, phaseIdx) => {
                        const nodes = byPhase[phaseIdx] || [];
                        const isCollapsed = collapsedPhases[phaseIdx] === true;
                        return `
        <div class="sm-phase ${isCollapsed ? "collapsed" : ""}" data-phase="${phaseIdx}">
          <div class="sm-phase-hdr" data-action="toggle-phase">${phaseName}</div>
          <div class="sm-nodes">
            ${nodes
                .map((node) => {
                    const isVisited = hist.some(
                        (h) => h.s === node.id || h.next === node.id,
                    );
                    const isCurrent = node.id === cur;
                    const isUnreachable =
                        !isVisited && !isCurrent && hist.length > 0;
                    const cls = isCurrent
                        ? "sm-current"
                        : isVisited
                          ? "sm-visited"
                          : isUnreachable
                            ? "sm-unreachable"
                            : "";
                    const titleTrunc = truncate(node.t, 24);
                    return `
                <div class="sm-node ${cls}" data-action="preview-step" data-step="${node.id}" title="${escQ(node.t)}">
                  <span style="flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${titleTrunc}</span>
                  ${!isUnreachable ? `<button class="sm-node-action" data-action="jump-to" data-step="${node.id}" title="Ir a este paso" aria-label="Ir a: ${escQ(node.t)}">→</button>` : ""}
                </div>
              `;
                })
                .join("")}
          </div>
        </div>
      `;
                    }).join("") + SB_FOOT;

                host.querySelectorAll(".sm-phase-hdr").forEach((hdr) => {
                    hdr.addEventListener("click", (e) => {
                        e.stopPropagation();
                        const phase = hdr.closest(".sm-phase");
                        const idx = phase.dataset.phase;
                        collapsedPhases[idx] = !collapsedPhases[idx];
                        phase.classList.toggle("collapsed");
                    });
                });

                host.querySelectorAll('[data-action="preview-step"]').forEach(
                    (node) => {
                        node.addEventListener("click", (e) => {
                            if (e.target.closest('[data-action="jump-to"]'))
                                return;
                            e.stopPropagation();
                            const stepId = node.dataset.step;
                            showStepPreview(stepId);
                        });
                    },
                );
            }

            function showStepPreview(stepId) {
                const step = STEPS[stepId];
                if (!step) return;

                const preview = document.createElement("div");
                preview.style.cssText =
                    "position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border:1px solid var(--bdr);border-radius:12px;max-width:500px;max-height:80vh;overflow:auto;z-index:1000;box-shadow:0 4px 20px rgba(0,0,0,.15);padding:20px;font-size:13px;";
                preview.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;">
        <strong style="font-size:15px;">${step.t}</strong>
        <button id="close-preview" style="background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);">&times;</button>
      </div>
      <div style="margin-bottom:10px;"><span class="act-badge ${getActorClass(step.ac)}">${getActorLabel(step.ac)}</span></div>
      <div>${renderContentBlocks(step.c)}</div>
      ${step.q ? `<div style="margin-top:14px;padding:10px;background:var(--slate-bg);border-radius:6px;font-weight:500;">${step.q}</div>` : ""}
    `;
                document.body.appendChild(preview);

                document.getElementById("close-preview").onclick = () =>
                    preview.remove();
                preview.onclick = (e) => {
                    if (e.target === preview) preview.remove();
                };
            }

            function renderSidebarJourney() {
                const host = document.getElementById("sb-journey");
                if (!host) return;

                const items = hist
                    .map((h, i) => {
                        const step = STEPS[h.s];
                        return `
        <div class="pi past">
          ${truncate(step?.t || h.s, 40)}
          ${h.c ? `<span class="pi-choice">${h.c}</span>` : ""}
        </div>
      `;
                    })
                    .join("");

                const current = STEPS[cur];
                host.innerHTML = `
      ${items}
      <div class="pi current">${truncate(current?.t || cur, 40)}</div>
      ${SB_FOOT}
    `;
            }

            function renderContent() {
                const s = STEPS[cur];
                if (!s) return;
                const host = document.getElementById("content");
                if (!host) return;
                host.innerHTML = s.end ? buildEnd(s) : buildStep(s);
            }

            function renderContentBlocks(blocks) {
                if (!Array.isArray(blocks)) return "";
                return blocks
                    .map((b) => {
                        const [type, ...args] = b;
                        switch (type) {
                            case "i":
                                return `<p class="blk-i">${args[0]}</p>`;
                            case "d":
                                return `<div class="blk-d"><strong>Plazo:</strong> ${args[0]}</div>`;
                            case "n":
                                return `<div class="blk-n"><strong>Nota:</strong> ${args[0]}</div>`;
                            case "w":
                                return `<div class="blk-w"><strong>Atención:</strong> ${args[0]}</div>`;
                            case "l":
                                return `<div class="blk-l">${args[0]}</div>`;
                            case "cl":
                                const [title, items] = args;
                                return `
            <div class="blk-cl">
              <div class="blk-cl-title">${title}</div>
              ${items.map((it) => `<label class="blk-cl-item"><input type="checkbox"> ${it}</label>`).join("")}
            </div>
          `;
                            default:
                                return "";
                        }
                    })
                    .join("");
            }

            function buildStep(s) {
                const hasDecision = !!s.q;
                const hasNext = !!s.nx;
                const canGoBack = hist.length > 0;

                return `
      <div class="card">
        <div class="c-hdr">
          <span class="act-badge ${getActorClass(s.ac)}">${getActorLabel(s.ac)}</span>
          <div>
            <div class="c-title">${s.t}</div>
            <div class="step-num">Paso ${hist.length + 1} de este recorrido · Fase ${s.ph + 1}: ${PHASES[s.ph]}</div>
          </div>
        </div>
        <div class="c-body">
          ${renderContentBlocks(s.c)}
        </div>
        ${
            hasDecision
                ? `
          <div class="dec-area">
            <div class="dec-q">${s.q}</div>
            <div class="dec-opts">
              ${s.opts
                  .map(
                      (opt, idx) => `
                <button class="dec-btn ${opt.l === "A" ? "ok" : opt.l === "B" ? "bad" : opt.l === "C" ? "warn" : "neutral"}"
                        data-action="go-to"
                        data-step="${opt.n}"
                        data-label="${escQ(opt.t)}">
                  <span class="dec-letter">${opt.l}</span>
                  <span>${opt.t}</span>
                </button>
              `,
                  )
                  .join("")}
            </div>
          </div>
        `
                : ""
        }
        <div class="c-nav">
          <button class="btn-nav" data-action="go-back" ${!canGoBack ? "disabled" : ""}>← Volver</button>
          ${hasNext ? `<button class="btn-nav btn-next" data-action="go-to" data-step="${s.nx}" data-label="">Siguiente →</button>` : ""}
        </div>
      </div>
    `;
            }

            function buildEnd(s) {
                const icon =
                    s.end === "success"
                        ? "✅"
                        : s.end === "error"
                          ? "❌"
                          : s.end === "warning"
                            ? "⚠️"
                            : "ℹ️";
                const title =
                    s.end === "success"
                        ? "Procedimiento concluido satisfactoriamente"
                        : s.end === "error"
                          ? "Procedimiento no procedente"
                          : s.end === "warning"
                            ? "Procedimiento concluido con observaciones"
                            : "Procedimiento concluido";

                const summary =
                    hist.length > 0
                        ? `
      <div class="summary-box">
        <strong>Resumen del recorrido:</strong>
        <ol>
          ${hist
              .map((h, i) => {
                  const step = STEPS[h.s];
                  return `<li>${i + 1}. ${truncate(step?.t || h.s, 50)}${h.c ? ` <span class="summary-choice">→ ${h.c}</span>` : ""}</li>`;
              })
              .join("")}
          <li><strong>${hist.length + 1}. ${truncate(s.t, 50)}</strong></li>
        </ol>
      </div>
    `
                        : "";

                return `
      <div class="card end-${s.end}">
        <div class="c-hdr">
          <span class="act-badge ${getActorClass(s.ac)}">${getActorLabel(s.ac)}</span>
          <div>
            <div class="c-title">${s.t}</div>
            <div class="step-num">Fase ${s.ph + 1}: ${PHASES[s.ph]} · Desenlace</div>
          </div>
        </div>
        <div class="end-body">
          <div class="end-icon">${icon}</div>
          <div class="end-title">${title}</div>
          <div class="end-sub">El procedimiento ha concluido en esta vía</div>
        </div>
        <div class="c-body">
          ${renderContentBlocks(s.c)}
          ${summary}
        </div>
        <div class="c-nav">
          <button class="btn-nav" data-action="go-back">← Volver</button>
          <button class="btn-nav btn-next" data-action="reiniciar">↺ Nuevo procedimiento</button>
        </div>
      </div>
    `;
            }

            /* =========================================================
     MÓDULO 10: RENDER MAPA COMPLETO
     ========================================================= */
            function renderMapa() {
                const host = document.getElementById("mapa-grid");
                if (!host) return;

                const byPhase = {};
                Object.entries(STEPS).forEach(([id, step]) => {
                    if (!byPhase[step.ph]) byPhase[step.ph] = [];
                    byPhase[step.ph].push({ id, ...step });
                });

                host.innerHTML = PHASES.map((phaseName, phaseIdx) => {
                    const nodes = byPhase[phaseIdx] || [];
                    return `
        <div class="mapa-col">
          <div class="mapa-col-hdr">Fase ${phaseIdx + 1}: ${phaseName}</div>
          <div class="mapa-nodes">
            ${nodes
                .map((node) => {
                    const isVisited = hist.some(
                        (h) => h.s === node.id || h.next === node.id,
                    );
                    const isCurrent = node.id === cur;
                    const stateClass = isCurrent
                        ? "current"
                        : isVisited
                          ? "visited"
                          : node.end
                            ? `end-${node.end}`
                            : "";
                    const arrow = node.opts
                        ? node.opts
                              .map(
                                  (o) =>
                                      `<div class="mapa-arrow">→ ${o.l}: ${truncate(o.t, 25)}</div>`,
                              )
                              .join("")
                        : node.nx
                          ? `<div class="mapa-arrow">→ Siguiente</div>`
                          : "";
                    return `
                <div class="mapa-node ${stateClass}" data-action="jump-to" data-step="${node.id}" title="${escQ(node.t)}">
                  <div class="mapa-node-title">${truncate(node.t, 35)}</div>
                  <span class="mapa-node-actor">${getActorLabel(node.ac)}</span>
                  ${arrow}
                </div>
              `;
                })
                .join("")}
          </div>
        </div>
      `;
                }).join("");
            }

            /* =========================================================
     DESCARGA (Módulo 18)
     ========================================================= */
            function dlGuia() {
                const html =
                    "<!DOCTYPE html>" + document.documentElement.outerHTML;
                const blob = new Blob([html], {
                    type: "text/html;charset=utf-8",
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "guia-patrimonio-discapacidad-ley15-2015.html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            /* =========================================================
     EVENTOS (Módulo 21) - Delegación única
     ========================================================= */
            function wireEvents() {
                document.addEventListener("click", (ev) => {
                    const el = ev.target.closest("[data-action]");
                    if (!el) return;
                    const action = el.dataset.action;

                    switch (action) {
                        case "toggle-mapa":
                            toggleMapa();
                            break;
                        case "descargar":
                            dlGuia();
                            break;
                        case "reiniciar":
                            restart();
                            break;
                        case "zoom-in":
                            zoomIn();
                            break;
                        case "zoom-out":
                            zoomOut();
                            break;
                        case "sb-tab":
                            sbTab(el.dataset.tab);
                            break;
                        case "go-back":
                            goBack();
                            break;
                        case "go-back-to":
                            goBackTo(parseInt(el.dataset.index, 10));
                            break;
                        case "go-to":
                            goTo(el.dataset.step, el.dataset.label || "");
                            break;
                        case "jump-to":
                            if (STEPS[el.dataset.step]) {
                                cur = el.dataset.step;
                                hist = [];
                                render();
                            }
                            break;
                        case "close-mapa":
                            toggleMapa();
                            break;
                        case "toggle-phase":
                            break;
                    }
                });

                document.addEventListener("keydown", (ev) => {
                    if (ev.key === "Escape" && mapaOn) toggleMapa();
                });
            }

            /* =========================================================
     ARRANQUE
     ========================================================= */
            document.addEventListener("DOMContentLoaded", () => {
                loadFromHash();
                wireEvents();
                setZoom(zoomLevel);
                // Eventos para toggle sidebar
                document
                    .getElementById("btnToggleSidebar")
                    .addEventListener("click", toggleSidebar);
                document
                    .getElementById("sidebarBackdrop")
                    .addEventListener("click", closeMobileSidebar);
                window.addEventListener("resize", handleResize);
                handleResize();
                render();
            });
        </script>
    </body>
</html>
