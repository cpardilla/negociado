<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <title>
            De la concesión judicial de la emancipación y del beneficio de la
            mayoría de edad (artículos 53 a 55 LJV)
        </title>
        <style>
            :root {
                --navy: #1a2f6e;
                --navy-mid: #2e4daa;
                --navy-lt: #4169e1;
                --cyan: #0d9488;
                --cyan-bg: #f0fdfa;
                --violet: #5b21b6;
                --violet-bg: #f5f3ff;
                --green: #15803d;
                --green-bg: #f0fdf4;
                --amber: #b45309;
                --amber-bg: #fffbeb;
                --red: #b91c1c;
                --red-bg: #fef2f2;
                --slate: #475569;
                --slate-bg: #f4f6fb;
                --white: #ffffff;
                --bdr: #d1d9ee;
                --text: #1a1a2e;
                --muted: #6b7280;
                --transition-norm: 250ms ease;
            }
            *,
            *::before,
            *::after {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                font-family:
                    "Outfit", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
                font-size: 14px;
                color: var(--text);
                background: var(--white);
            }
            #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
                position: relative;
            }

            /* HEADER */
            #hdr {
                flex-shrink: 0;
                height: 56px;
                background: var(--navy);
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
            }
            #hdr .hdr-left {
                display: flex;
                align-items: center;
                gap: 12px;
                min-width: 0;
            }
            /* Botón toggle sidebar (NUEVO) */
            .btn-toggle-sidebar {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 4px 10px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
                font-family: inherit;
                font-size: 20px;
                cursor: pointer;
                transition: all 150ms ease;
                white-space: nowrap;
                line-height: 1;
            }
            .btn-toggle-sidebar:hover {
                background: rgba(255, 255, 255, 0.18);
            }
            .btn-toggle-sidebar:focus-visible {
                outline: 2px solid var(--navy-lt);
                outline-offset: 2px;
            }
            #hdr .hdr-left .seal {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                flex-shrink: 0;
                background: rgba(255, 255, 255, 0.1);
                border: 1.5px solid rgba(255, 255, 255, 0.25);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                color: rgba(255, 255, 255, 0.85);
            }
            #hdr .hdr-left .hdr-titles {
                min-width: 0;
            }
            #hdr .hdr-left h1 {
                font-size: 14px;
                font-weight: 700;
                color: var(--white);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            #hdr .hdr-left .hdr-sub {
                font-size: 11px;
                color: var(--white);
                opacity: 0.7;
            }
            #hdr .hdr-right {
                display: flex;
                gap: 6px;
                flex-shrink: 0;
            }
            .btn-ghost {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: var(--white);
                font-size: 13px;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
                white-space: nowrap;
                font-family: inherit;
            }
            .btn-ghost:hover {
                background: rgba(255, 255, 255, 0.2);
            }
            .btn-ghost:disabled {
                opacity: 0.4;
                cursor: default;
            }
            .zoom-cluster {
                display: inline-flex;
                align-items: center;
                overflow: hidden;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 4px;
                background: rgba(255, 255, 255, 0.1);
            }
            .btn-zoom {
                appearance: none;
                border: none;
                background: transparent;
                color: var(--white);
                width: 30px;
                height: 30px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                cursor: pointer;
            }
            .btn-zoom:hover {
                background: rgba(255, 255, 255, 0.18);
            }
            .zoom-label {
                min-width: 46px;
                text-align: center;
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.95);
            }

            /* PHASE BAR */
            #pbar {
                flex-shrink: 0;
                height: 42px;
                background: var(--navy-mid);
                overflow-x: auto;
                scrollbar-width: none;
                display: flex;
                align-items: center;
                gap: 2px;
                padding: 0 16px;
            }
            #pbar::-webkit-scrollbar {
                display: none;
            }
            .ph-item {
                display: inline-flex;
                align-items: center;
                flex-shrink: 0;
            }
            .ph-lbl {
                display: inline-flex;
                align-items: center;
                height: 28px;
                font-size: 12px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.6);
                padding: 0 10px;
                border-radius: 8px;
                cursor: default;
                white-space: nowrap;
            }
            .ph-item.active .ph-lbl {
                font-weight: 800;
                background: rgba(255, 255, 255, 0.22);
                color: var(--white);
            }
            .ph-item.done .ph-lbl {
                opacity: 1;
                color: rgba(255, 255, 255, 0.9);
            }
            .ph-item.default .ph-lbl {
                opacity: 1;
                color: rgba(255, 255, 255, 0.45);
            }
            .ph-sep {
                color: rgba(255, 255, 255, 0.35);
                font-size: 13px;
                margin: 0 4px;
                flex-shrink: 0;
            }

            /* BREADCRUMB */
            #breadcrumb {
                flex-shrink: 0;
                min-height: 34px;
                height: auto;
                background: var(--slate-bg);
                border-bottom: 1px solid var(--bdr);
                display: flex;
                align-items: center;
                padding: 4px 16px;
                overflow-x: auto;
                scrollbar-width: none;
                gap: 6px;
                font-size: 13px;
                flex-wrap: wrap;
                row-gap: 2px;
                white-space: normal;
            }
            #breadcrumb::-webkit-scrollbar {
                display: none;
            }
            .bc-item {
                background: none;
                border: none;
                color: var(--navy-lt);
                cursor: pointer;
                font-size: 13px;
                font-family: inherit;
                padding: 2px 6px;
                border-radius: 3px;
                white-space: nowrap;
                max-width: 200px;
                overflow: hidden;
                text-overflow: ellipsis;
                text-align: left;
            }
            .bc-item:hover {
                background: rgba(65, 105, 225, 0.1);
                text-decoration: underline;
            }
            .bc-sep {
                color: var(--muted);
                font-size: 13px;
                flex-shrink: 0;
            }
            .bc-current {
                color: var(--text);
                font-weight: 600;
                white-space: nowrap;
                max-width: 300px;
                overflow: hidden;
                text-overflow: ellipsis;
                font-size: 13px;
            }
            .bc-back {
                background: none;
                border: none;
                color: var(--navy-lt);
                cursor: pointer;
                font-size: 13px;
                font-family: inherit;
                padding: 2px 8px;
                border-radius: 3px;
                white-space: nowrap;
                font-weight: 600;
                margin-right: 6px;
                flex-shrink: 0;
            }
            .bc-back:hover {
                background: rgba(65, 105, 225, 0.1);
                text-decoration: underline;
            }
            .bc-back:disabled {
                opacity: 0.35;
                cursor: default;
            }
            .bc-back:disabled:hover {
                background: none;
                text-decoration: none;
            }

            /* LAYOUT */
            #layout {
                flex: 1;
                overflow: hidden;
                display: flex;
                position: relative;
            }

            /* SIDEBAR (MODIFICADO para soportar colapso y overlay móvil) */
            #sidebar {
                width: 270px;
                flex-shrink: 0;
                background: var(--navy-mid);
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                overflow-x: hidden;
                min-height: 0;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.2) transparent;
                transition:
                    transform var(--transition-norm),
                    width var(--transition-norm);
                z-index: 80;
            }
            #sidebar.collapsed {
                width: 0;
                transform: translateX(-100%);
                overflow: hidden;
            }
            #sidebar::-webkit-scrollbar {
                width: 6px;
            }
            #sidebar::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.2);
                border-radius: 3px;
            }
            .sb-tabs {
                display: flex;
                flex-shrink: 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            }
            .sb-tab {
                flex: 1;
                padding: 8px 0;
                text-align: center;
                font-size: 13px;
                color: rgba(255, 255, 255, 0.6);
                cursor: pointer;
                border: none;
                background: none;
                font-family: inherit;
                font-weight: 600;
                border-bottom: 2px solid transparent;
            }
            .sb-tab.active {
                color: var(--white);
                border-bottom-color: var(--navy-lt);
                background: rgba(65, 105, 225, 0.15);
            }
            .sb-tab:hover:not(.active) {
                color: rgba(255, 255, 255, 0.85);
            }
            .sb-body {
                flex: 1;
                min-height: 0;
                padding: 10px 0;
            }
            #sb-map,
            #sb-journey {
                display: none;
            }
            .sb-foot {
                padding: 12px 14px 10px;
                border-top: 1px solid rgba(255, 255, 255, 0.12);
                font-size: 10.5px;
                line-height: 1.4;
                color: rgba(255, 255, 255, 0.55);
                font-family:
                    ui-monospace, SFMono-Regular, Menlo, Monaco, monospace;
            }

            /* Backdrop para móvil (NUEVO) */
            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 140;
                display: none;
            }
            .sidebar-backdrop.show {
                display: block;
            }

            /* Sidebar Map nodes */
            .sb-ph-hdr {
                padding: 10px 14px 6px;
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.5);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                cursor: pointer;
                display: flex;
                justify-content: space-between;
                align-items: center;
                user-select: none;
            }
            .sb-ph-hdr:hover {
                color: rgba(255, 255, 255, 0.75);
            }
            .sb-ph-hdr .ph-arrow {
                font-size: 10px;
                transition: transform 0.2s;
            }
            .sb-ph-hdr.collapsed .ph-arrow {
                transform: rotate(-90deg);
            }
            .sb-ph-steps {
                overflow: hidden;
                transition: max-height 0.25s ease;
            }
            .sb-ph-steps.collapsed {
                max-height: 0 !important;
            }
            .sm-node {
                display: flex;
                align-items: flex-start;
                gap: 8px;
                padding: 6px 14px;
                cursor: pointer;
                border-left: 3px solid transparent;
                transition: background 0.15s;
            }
            .sm-node:hover {
                background: rgba(255, 255, 255, 0.08);
            }
            .sm-node.sm-visited {
                border-left-color: #22c55e;
            }
            .sm-node.sm-current {
                border-left-color: var(--navy-lt);
                background: rgba(65, 105, 225, 0.15);
            }
            .sm-node.sm-default {
                border-left-color: rgba(255, 255, 255, 0.1);
            }
            .sm-dot {
                width: 10px;
                height: 10px;
                border-radius: 50%;
                flex-shrink: 0;
                margin-top: 4px;
            }
            .sm-visited .sm-dot {
                background: #22c55e;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 8px;
                color: #fff;
            }
            .sm-current .sm-dot {
                background: var(--navy-lt);
                animation: pulse 1.5s infinite;
            }
            .sm-default .sm-dot {
                background: rgba(255, 255, 255, 0.2);
            }
            .sm-lbl {
                font-size: 13px;
                color: rgba(255, 255, 255, 0.85);
                line-height: 1.3;
            }
            .sm-visited .sm-lbl {
                color: rgba(255, 255, 255, 0.95);
            }
            .sm-current .sm-lbl {
                color: var(--white);
                font-weight: 600;
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }

            /* Sidebar Journey */
            .jy-entry {
                padding: 8px 14px;
                border-left: 3px solid rgba(255, 255, 255, 0.1);
            }
            .jy-entry.jy-done {
                border-left-color: #22c55e;
            }
            .jy-entry.jy-cur {
                border-left-color: var(--navy-lt);
                background: rgba(65, 105, 225, 0.1);
            }
            .jy-step {
                font-size: 13px;
                color: var(--white);
                font-weight: 600;
                margin-bottom: 2px;
            }
            .jy-choice {
                font-size: 12px;
                color: rgba(255, 255, 255, 0.6);
                font-style: italic;
            }

            /* CONTENT */
            #content {
                flex: 1;
                overflow-y: auto;
                padding: 24px 32px;
                background: var(--slate-bg);
            }
            #content::-webkit-scrollbar {
                width: 8px;
            }
            #content::-webkit-scrollbar-thumb {
                background: var(--bdr);
                border-radius: 4px;
            }

            /* Card */
            .card {
                background: var(--white);
                border: 1px solid var(--bdr);
                border-radius: 8px;
                padding: 24px 28px;
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                animation: fadeUp 0.22s ease;
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            /* Card badges row */
            .card-badges {
                display: flex;
                flex-wrap: wrap;
                align-items: center;
                gap: 8px;
                margin-bottom: 14px;
            }

            /* Actor badge */
            .actor-badge {
                display: inline-block;
                font-size: 12px;
                font-weight: 700;
                color: var(--white);
                padding: 3px 10px;
                border-radius: 4px;
            }
            .actor-badge.laj {
                background: var(--navy);
            }
            .actor-badge.juez {
                background: var(--cyan);
            }
            .actor-badge.ambos {
                background: var(--violet);
            }

            /* Phase badge */
            .phase-badge {
                display: inline-block;
                font-size: 12px;
                color: var(--muted);
                background: var(--slate-bg);
                padding: 3px 10px;
                border-radius: 4px;
                border: 1px solid var(--bdr);
            }

            /* Card title */
            .card-title {
                font-size: 18px;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 16px;
                line-height: 1.3;
            }

            /* Content blocks */
            .cb {
                margin-bottom: 14px;
                line-height: 1.55;
            }
            .cb:last-child {
                margin-bottom: 0;
            }
            .cb-i {
                color: var(--text);
            }
            .cb-d {
                background: var(--amber-bg);
                border: 1px solid #fde68a;
                border-left: 4px solid var(--amber);
                padding: 12px 16px;
                border-radius: 4px;
                color: var(--amber);
            }
            .cb-d .cb-label {
                font-size: 12px;
                font-weight: 700;
                color: var(--amber);
                margin-bottom: 4px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }
            .cb-n {
                background: var(--slate-bg);
                border-left: 4px solid var(--bdr);
                padding: 10px 16px;
                border-radius: 4px;
                color: var(--slate);
                font-style: italic;
                font-size: 14px;
            }
            .cb-n .cb-label {
                font-size: 12px;
                font-weight: 700;
                color: var(--slate);
                margin-bottom: 4px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                font-style: normal;
            }
            .cb-w {
                background: var(--red-bg);
                border-left: 4px solid var(--red);
                padding: 12px 16px;
                border-radius: 4px;
                color: var(--red);
            }
            .cb-w .cb-label {
                font-size: 12px;
                font-weight: 700;
                color: var(--red);
                margin-bottom: 4px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }
            .cb-l {
                background: #f8f9fb;
                border: 1px solid #e5e7eb;
                padding: 10px 16px;
                border-radius: 4px;
                font-family: "Courier New", Courier, monospace;
                font-size: 13px;
                color: var(--muted);
                line-height: 1.5;
            }
            .cb-l .cb-label {
                font-size: 12px;
                font-weight: 700;
                color: var(--muted);
                margin-bottom: 4px;
                text-transform: uppercase;
                letter-spacing: 0.3px;
                font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
            }

            /* Checklist */
            .cb-cl {
                margin-bottom: 14px;
            }
            .cb-cl .cl-title {
                font-size: 14px;
                font-weight: 700;
                color: var(--text);
                margin-bottom: 8px;
                display: flex;
                align-items: center;
                gap: 6px;
            }
            .cb-cl .cl-title .cl-icon {
                color: var(--green);
                font-size: 15px;
            }
            .cb-cl ul {
                list-style: none;
                padding: 0;
            }
            .cb-cl ul li {
                padding: 6px 0 6px 28px;
                position: relative;
                font-size: 14px;
                color: var(--text);
                line-height: 1.45;
                border-bottom: 1px solid #f0f1f3;
            }
            .cb-cl ul li:last-child {
                border-bottom: none;
            }
            .cb-cl ul li::before {
                content: "✓";
                position: absolute;
                left: 4px;
                top: 6px;
                color: var(--green);
                font-weight: 700;
                font-size: 13px;
            }

            /* Question */
            .question {
                margin-top: 20px;
                padding: 16px 20px;
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-radius: 6px;
            }
            .question .q-text {
                font-size: 15px;
                font-weight: 600;
                color: var(--text);
                margin-bottom: 12px;
            }
            .question .q-label {
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 10px;
            }

            /* Decision buttons */
            .dec-btns {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .dec-btn {
                display: flex;
                align-items: flex-start;
                gap: 12px;
                padding: 12px 16px;
                border: 2px solid;
                border-radius: 6px;
                cursor: pointer;
                text-align: left;
                background: var(--white);
                transition:
                    background 0.15s,
                    border-color 0.15s;
                font-family: inherit;
                font-size: 14px;
                line-height: 1.45;
            }
            .dec-btn:hover {
                filter: brightness(0.95);
            }
            .dec-btn .dec-letter {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 13px;
                flex-shrink: 0;
            }
            .dec-btn.ok {
                border-color: var(--green);
                color: var(--green);
            }
            .dec-btn.ok .dec-letter {
                background: var(--green-bg);
                color: var(--green);
            }
            .dec-btn.ok:hover {
                background: var(--green-bg);
            }
            .dec-btn.bad {
                border-color: var(--red);
                color: var(--red);
            }
            .dec-btn.bad .dec-letter {
                background: var(--red-bg);
                color: var(--red);
            }
            .dec-btn.bad:hover {
                background: var(--red-bg);
            }
            .dec-btn.warn {
                border-color: var(--amber);
                color: var(--amber);
            }
            .dec-btn.warn .dec-letter {
                background: var(--amber-bg);
                color: var(--amber);
            }
            .dec-btn.warn:hover {
                background: var(--amber-bg);
            }
            .dec-btn.neutral {
                border-color: var(--navy-lt);
                color: var(--navy-lt);
            }
            .dec-btn.neutral .dec-letter {
                background: var(--violet-bg);
                color: var(--navy-lt);
            }
            .dec-btn.neutral:hover {
                background: var(--violet-bg);
            }
            .dec-btn .dec-text {
                flex: 1;
            }
            .dec-btn .dec-text .dt-main {
                font-weight: 600;
                margin-bottom: 2px;
            }
            .dec-btn .dec-text .dt-sub {
                font-size: 12px;
                font-weight: 400;
                opacity: 0.7;
            }

            /* Next button */
            .next-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                margin-top: 20px;
                padding: 10px 20px;
                background: var(--navy);
                color: var(--white);
                border: none;
                border-radius: 6px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
                font-family: inherit;
                transition: background 0.15s;
            }
            .next-btn:hover {
                background: var(--navy-mid);
            }

            /* End card */
            .end-card {
                margin-top: 20px;
                padding: 20px 24px;
                border-radius: 8px;
                border: 2px solid;
            }
            .end-card.success {
                background: var(--green-bg);
                border-color: var(--green);
            }

            function clampNum(v, min, max) {
                return Math.min(max, Math.max(min, v));
            }
            function setZoom(pct) {
                zoomLevel = clampNum(Math.round(pct), 80, 140);
                var content = document.getElementById("content");
                if (content) content.style.zoom = String(zoomLevel / 100);
                var lbl = document.getElementById("zoomLabel");
                if (lbl) lbl.textContent = zoomLevel + "%";
            }
            function zoomIn() {
                setZoom(zoomLevel + 10);
            }
            function zoomOut() {
                setZoom(zoomLevel - 10);
            }
            function renderSidebarFoot() {
                var foot = document.getElementById("sbFoot");
                if (foot) foot.innerHTML = SB_FOOT;
            }

            // ═══════════════════════════════════════════
            // HELPERS
            // ═══════════════════════════════════════════
            function escQ(s) {
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }
            function trunc(s, n) {
                if (!s) return "";
                return s.length > n ? s.substring(0, n) + "…" : s;
            }
            function actorLabel(ac) {
                if (ac === "laj") return "LAJ";
                if (ac === "juez") return "Juez";
                return "LAJ / Juez";
            }
            function visitedSet() {
                var s = {};
                for (var i = 0; i < hist.length; i++) {
                    s[hist[i].s] = true;
                    if (hist[i].next) s[hist[i].next] = true;
                }
                s[cur] = true;
                return s;
            }
            function letters() {
                return "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            }
            function optClass(nxt) {
                if (!nxt) return "neutral";
                var st = STEPS[nxt];
                if (st && st.end === "error") return "bad";
                if (st && st.end === "success") return "ok";
                if (st && st.end === "neutral") return "neutral";
                var t = STEPS[nxt] ? STEPS[nxt].t.toLowerCase() : "";
                if (
                    t.indexOf("oposici") >= 0 ||
                    t.indexOf("deneg") >= 0 ||
                    t.indexOf("no adm") >= 0 ||
                    t.indexOf("inasi") >= 0 ||
                    t.indexOf("archiv") >= 0
                )
                    return "bad";
                if (
                    t.indexOf("conced") >= 0 ||
                    t.indexOf("estima") >= 0 ||
                    t.indexOf("admisi") >= 0 ||
                    t.indexOf("sin oposi") >= 0
                )
                    return "ok";
                return "neutral";
            }

            // ═══════════════════════════════════════════
            // SIDEBAR TOGGLE (NUEVO)
            // ═══════════════════════════════════════════
            let sidebarOpen = false; // solo móvil

            function toggleSidebar() {
                const isMobile = window.innerWidth <= 768;
                const sidebar = document.getElementById("sidebar");
                const btn = document.getElementById("btnToggleSidebar");
                if (isMobile) {
                    sidebarOpen = !sidebarOpen;
                    if (sidebarOpen) {
                        sidebar.classList.add("open");
                        document
                            .getElementById("sidebarBackdrop")
                            .classList.add("show");
                        if (btn) btn.setAttribute("aria-expanded", "true");
                    } else {
                        sidebar.classList.remove("open");
                        document
                            .getElementById("sidebarBackdrop")
                            .classList.remove("show");
                        if (btn) btn.setAttribute("aria-expanded", "false");
                    }
                } else {
                    sidebar.classList.toggle("collapsed");
                    const isCollapsed = sidebar.classList.contains("collapsed");
                    if (btn)
                        btn.setAttribute(
                            "aria-expanded",
                            isCollapsed ? "false" : "true",
                        );
                }
            }

            function closeMobileSidebar() {
                if (window.innerWidth <= 768 && sidebarOpen) {
                    sidebarOpen = false;
                    const sidebar = document.getElementById("sidebar");
                    const backdrop = document.getElementById("sidebarBackdrop");
                    const btn = document.getElementById("btnToggleSidebar");
                    if (sidebar) sidebar.classList.remove("open");
                    if (backdrop) backdrop.classList.remove("show");
                    if (btn) btn.setAttribute("aria-expanded", "false");
                }
            }

            function handleResize() {
                if (window.innerWidth > 768) {
                    if (sidebarOpen) {
                        const sidebar = document.getElementById("sidebar");
                        const backdrop =
                            document.getElementById("sidebarBackdrop");
                        if (sidebar) sidebar.classList.remove("open");
                        if (backdrop) backdrop.classList.remove("show");
                        sidebarOpen = false;
                        const btn = document.getElementById("btnToggleSidebar");
                        if (btn) btn.setAttribute("aria-expanded", "false");
                    }
                    const sidebarEl = document.getElementById("sidebar");
                    if (sidebarEl) sidebarEl.classList.remove("open");
                } else {
                    const sidebarEl = document.getElementById("sidebar");
                    if (
                        sidebarEl &&
                        sidebarEl.classList.contains("collapsed")
                    ) {
                        sidebarEl.classList.remove("collapsed");
                    }
                    if (
                        !sidebarOpen &&
                        sidebarEl &&
                        sidebarEl.classList.contains("open")
                    ) {
                        sidebarEl.classList.remove("open");
                        const backdrop =
                            document.getElementById("sidebarBackdrop");
                        if (backdrop) backdrop.classList.remove("show");
                    }
                }
            }

            // ═══════════════════════════════════════════
            // NAVIGATION (modificada para cerrar sidebar móvil)
            // ═══════════════════════════════════════════
            function goTo(stepId, choiceLabel) {
                hist.push({ s: cur, next: stepId, c: choiceLabel || "" });
                cur = stepId;
                if (choiceLabel) sbTab("journey");
                render();
                document.getElementById("content").scrollTop = 0;
                closeMobileSidebar();
            }
            function goBack() {
                if (hist.length === 0) return;
                var prev = hist.pop();
                cur = prev.s;
                render();
                document.getElementById("content").scrollTop = 0;
                closeMobileSidebar();
            }
            function goBackTo(index) {
                if (index <= 0) {
                    restart();
                    return;
                }
                var step = hist[index - 1];
                cur = step.next;
                hist = hist.slice(0, index);
                render();
                document.getElementById("content").scrollTop = 0;
                closeMobileSidebar();
            }
            function goToDirect(stepId) {
                hist.push({ s: cur, next: stepId, c: "" });
                cur = stepId;
                render();
                document.getElementById("content").scrollTop = 0;
                closeMobileSidebar();
            }
            function noop() {
                /* No navigation */
            }
            function restart() {
                cur = "inicio";
                hist = [];
                sbTab("map");
                setZoom(100);
                render();
                closeMobileSidebar();
            }
            function sbTab(tab) {
                activeSbTab = tab;
                document.getElementById("sb-map").style.display =
                    tab === "map" ? "block" : "none";
                document.getElementById("sb-journey").style.display =
                    tab === "journey" ? "block" : "none";
                var tm = document.getElementById("tab-map");
                var tj = document.getElementById("tab-journey");
                tm.className = "sb-tab" + (tab === "map" ? " active" : "");
                tj.className = "sb-tab" + (tab === "journey" ? " active" : "");
            }
            function toggleMapa() {
                mapaOn = !mapaOn;
                document.getElementById("layout").style.display = mapaOn
                    ? "none"
                    : "flex";
                document.getElementById("mapa-overlay").style.display = mapaOn
                    ? "block"
                    : "none";
                if (mapaOn) renderMapa();
                closeMobileSidebar();
            }
            function dlGuia() {
                var html =
                    "<!DOCTYPE html>" + document.documentElement.outerHTML;
                var blob = new Blob([html], {
                    type: "text/html;charset=utf-8",
                });
                var url = URL.createObjectURL(blob);
                var a = document.createElement("a");
                a.href = url;
                a.download = "guia-tramitacion-emancipacion.html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            // ═══════════════════════════════════════════
            // RENDER
            // ═══════════════════════════════════════════
            function render() {
                renderPbar();
                renderBreadcrumb();
                renderSidebar();
                renderContent();
            }

            function renderPbar() {
                var step = STEPS[cur];
                var curPh = step ? step.ph : 0;
                var html = "";
                for (var i = 0; i < PHASES.length; i++) {
                    if (i > 0) html += '<span class="ph-sep">›</span>';
                    var cls =
                        i < curPh ? "done" : i === curPh ? "active" : "default";
                    html +=
                        '<div class="ph-item ' +
                        cls +
                        '"><span class="ph-lbl">' +
                        escQ(PHASES[i]) +
                        "</span></div>";
                }
                document.getElementById("pbar").innerHTML = html;
                var activePh = document.querySelector(".ph-item.active");
                if (activePh)
                    activePh.scrollIntoView({
                        behavior: "smooth",
                        block: "nearest",
                        inline: "center",
                    });
            }

            function renderBreadcrumb() {
                var html = "";
                var backDisabled = hist.length === 0;
                html +=
                    '<button class="bc-back" onclick="goBack()"' +
                    (backDisabled ? " disabled" : "") +
                    ">↩ Volver</button>";
                for (var i = 0; i < hist.length; i++) {
                    if (i > 0) html += '<span class="bc-sep">›</span>';
                    var st = STEPS[hist[i].s];
                    var lbl = st ? trunc(st.t, 30) : "?";
                    html +=
                        '<button class="bc-item" onclick="goBackTo(' +
                        i +
                        ')" title="' +
                        escQ(st ? st.t : "") +
                        '">' +
                        escQ(lbl) +
                        "</button>";
                }
                if (hist.length > 0) html += '<span class="bc-sep">›</span>';
                var curSt = STEPS[cur];
                html +=
                    '<span class="bc-current" title="' +
                    escQ(curSt ? curSt.t : "") +
                    '">' +
                    escQ(curSt ? trunc(curSt.t, 40) : "") +
                    "</span>";
                document.getElementById("breadcrumb").innerHTML = html;
            }

            function renderSidebar() {
                renderSidebarFoot();
                renderSidebarMap();
                renderSidebarJourney();
            }

            function renderSidebarMap() {
                var vs = visitedSet();
                var stepsByPhase = {};
                for (var k in STEPS) {
                    var s = STEPS[k];
                    if (!stepsByPhase[s.ph]) stepsByPhase[s.ph] = [];
                    stepsByPhase[s.ph].push({ id: k, t: s.t });
                }
                var html = "";
                for (var ph = 0; ph < PHASES.length; ph++) {
                    var steps = stepsByPhase[ph];
                    if (!steps) continue;
                    var isCollapsed = collapsedPhases[ph] === true;
                    html +=
                        '<div class="sb-ph-hdr' +
                        (isCollapsed ? " collapsed" : "") +
                        '" onclick="togglePhase(' +
                        ph +
                        ')">';
                    html += "<span>" + escQ(PHASES[ph]) + "</span>";
                    html += '<span class="ph-arrow">▼</span>';
                    html += "</div>";
                    var maxH = isCollapsed ? "0" : steps.length * 50 + "px";
                    html +=
                        '<div class="sb-ph-steps' +
                        (isCollapsed ? " collapsed" : "") +
                        '" style="max-height:' +
                        maxH +
                        '">';
                    for (var j = 0; j < steps.length; j++) {
                        var node = steps[j];
                        var isCur = node.id === cur;
                        var isVis = vs[node.id] && !isCur;
                        var cls = isCur
                            ? "sm-current"
                            : isVis
                              ? "sm-visited"
                              : "sm-default";
                        html +=
                            '<div class="sm-node ' +
                            cls +
                            '" onclick="goToDirect(\'' +
                            node.id +
                            '\')" title="' +
                            escQ(node.t) +
                            '">';
                        html +=
                            '<span class="sm-dot">' +
                            (isCur ? "" : isVis ? "✓" : "") +
                            "</span>";
                        html +=
                            '<span class="sm-lbl">' +
                            escQ(trunc(node.t, 38)) +
                            "</span>";
                        html += "</div>";
                    }
                    html += "</div>";
                }
                document.getElementById("sb-map").innerHTML = html;
            }

            function renderSidebarJourney() {
                var html = "";
                for (var i = 0; i < hist.length; i++) {
                    var h = hist[i];
                    var st = STEPS[h.s];
                    var lbl = st ? trunc(st.t, 36) : "?";
                    html += '<div class="jy-entry jy-done">';
                    html += '<div class="jy-step">' + escQ(lbl) + "</div>";
                    if (h.c)
                        html +=
                            '<div class="jy-choice">→ ' +
                            escQ(trunc(h.c, 40)) +
                            "</div>";
                    html += "</div>";
                }
                var curSt = STEPS[cur];
                if (curSt) {
                    html += '<div class="jy-entry jy-cur">';
                    html +=
                        '<div class="jy-step">' +
                        escQ(trunc(curSt.t, 36)) +
                        "</div>";
                    if (hist.length === 0)
                        html += '<div class="jy-choice">Punto de inicio</div>';
                    html += "</div>";
                }
                document.getElementById("sb-journey").innerHTML = html;
            }

            function togglePhase(ph) {
                collapsedPhases[ph] = !collapsedPhases[ph];
                renderSidebarMap();
            }

            function renderContent() {
                var step = STEPS[cur];
                if (!step) {
                    document.getElementById("content").innerHTML =
                        '<div class="card"><p>Paso no encontrado.</p></div>';
                    return;
                }
                var html = '<div class="card">';
                html += '<div class="card-badges">';
                html +=
                    '<div class="phase-badge">' +
                    escQ(PHASES[step.ph]) +
                    "</div>";
                html +=
                    '<div class="actor-badge ' +
                    step.ac +
                    '">' +
                    escQ(actorLabel(step.ac)) +
                    "</div>";
                html += "</div>";
                html += '<h2 class="card-title">' + escQ(step.t) + "</h2>";
                html += buildBlocks(step.c);
                if (step.end) {
                    html += buildEnd(step);
                }
                if (step.q && step.opts) {
                    html += buildQuestion(step);
                } else if (step.nx) {
                    html +=
                        '<button class="next-btn" onclick="goTo(\'' +
                        step.nx +
                        "','')\">Siguiente → " +
                        escQ(
                            trunc(STEPS[step.nx] ? STEPS[step.nx].t : "", 40),
                        ) +
                        "</button>";
                }
                html += "</div>";
                document.getElementById("content").innerHTML = html;
            }

            function buildBlocks(c) {
                if (!c) return "";
                var html = "";
                for (var i = 0; i < c.length; i++) {
                    var b = c[i];
                    var type = b[0];
                    if (type === "i") {
                        html +=
                            '<div class="cb cb-i"><p style="font-size:14px;line-height:1.55;color:var(--text);">' +
                            escQ(b[1]) +
                            "</p></div>";
                    } else if (type === "d") {
                        html +=
                            '<div class="cb cb-d"><div class="cb-label">Plazo</div><p style="font-size:14px;line-height:1.55;margin:0;">' +
                            escQ(b[1]) +
                            "</p></div>";
                    } else if (type === "n") {
                        html +=
                            '<div class="cb cb-n"><div class="cb-label">Nota</div><p style="font-size:14px;line-height:1.55;margin:0;font-style:italic;">' +
                            escQ(b[1]) +
                            "</p></div>";
                    } else if (type === "w") {
                        html +=
                            '<div class="cb cb-w"><div class="cb-label">Atención</div><p style="font-size:14px;line-height:1.55;margin:0;">' +
                            escQ(b[1]) +
                            "</p></div>";
                    } else if (type === "l") {
                        html +=
                            '<div class="cb cb-l"><div class="cb-label">Referencia legal</div><p style="font-size:13px;line-height:1.5;margin:0;">' +
                            escQ(b[1]) +
                            "</p></div>";
                    } else if (type === "cl") {
                        html += buildChecklist(b[1], b[2]);
                    }
                }
                return html;
            }

            function buildChecklist(title, items) {
                var html = '<div class="cb cb-cl">';
                html +=
                    '<div class="cl-title"><span class="cl-icon">✓</span> ' +
                    escQ(title) +
                    "</div>";
                html += "<ul>";
                for (var i = 0; i < items.length; i++) {
                    html += "<li>" + escQ(items[i]) + "</li>";
                }
                html += "</ul></div>";
                return html;
            }

            function buildQuestion(step) {
                var html = '<div class="question">';
                html += '<div class="q-label">Decisión</div>';
                html += '<div class="q-text">' + escQ(step.q) + "</div>";
                html += '<div class="dec-btns">';
                var ltrs = letters();
                for (var i = 0; i < step.opts.length; i++) {
                    var o = step.opts[i];
                    var cls = optClass(o.n);
                    var letter = ltrs[i];
                    var onclick = o.n
                        ? "goTo('" + escQ(o.n) + "','" + escQ(o.l) + "')"
                        : "noop()";
                    html +=
                        '<button class="dec-btn ' +
                        cls +
                        '" onclick="' +
                        onclick +
                        '">';
                    html += '<span class="dec-letter">' + letter + "</span>";
                    html += '<span class="dec-text">';
                    html += '<div class="dt-main">' + escQ(o.t) + "</div>";
                    if (o.l)
                        html += '<div class="dt-sub">' + escQ(o.l) + "</div>";
                    html += "</span></button>";
                }
                html += "</div></div>";
                return html;
            }

            function buildEnd(step) {
                var et = step.end || "neutral";
                var icons = {
                    success: "✓",
                    error: "✕",
                    neutral: "●",
                    warning: "⚠",
                };
                var titles = {
                    success: "Procedimiento finalizado con éxito",
                    error: "Procedimiento finalizado sin éxito",
                    neutral: "Procedimiento archivado",
                    warning: "Procedimiento finalizado con advertencia",
                };
                var icon = icons[et] || "●";
                var title = titles[et] || "";
                var html = '<div class="end-card ' + et + '">';
                html += '<div class="end-icon">' + icon + "</div>";
                html += '<div class="end-title">' + escQ(title) + "</div>";
                html += '<div class="end-sub">' + escQ(step.t) + "</div>";
                html += '<div class="end-btns">';
                html +=
                    '<button class="ebtn-restart" onclick="restart()">↺ Nuevo procedimiento</button>';
                html +=
                    '<button class="ebtn-back" onclick="goBack()" style="' +
                    (hist.length === 0 ? "opacity:0.35;cursor:default;" : "") +
                    '">← Volver</button>';
                html += "</div>";
                html += buildSummary();
                html += "</div>";
                return html;
            }

            function buildSummary() {
                var html = '<div class="summary-box">';
                html += '<div class="sum-title">Resumen del recorrido</div>';
                html += "<ol>";
                for (var i = 0; i < hist.length; i++) {
                    var h = hist[i];
                    var st = STEPS[h.s];
                    var lbl = st ? st.t : "?";
                    html += "<li>" + escQ(lbl);
                    if (h.c)
                        html +=
                            ' — <span class="sum-choice">' +
                            escQ(h.c) +
                            "</span>";
                    html += "</li>";
                }
                var curSt = STEPS[cur];
                if (curSt) {
                    html += "<li><strong>" + escQ(curSt.t) + "</strong></li>";
                }
                html += "</ol></div>";
                return html;
            }

            // ═══════════════════════════════════════════
            // MAP OVERLAY
            // ═══════════════════════════════════════════
            function renderMapa() {
                var vs = visitedSet();
                var stepsByPhase = {};
                for (var k in STEPS) {
                    var s = STEPS[k];
                    if (!stepsByPhase[s.ph]) stepsByPhase[s.ph] = [];
                    stepsByPhase[s.ph].push({ id: k, t: s.t, end: s.end });
                }
                var html = '<div class="mapa-header">';
                html += "<h2>Mapa completo del procedimiento</h2>";
                html +=
                    '<button class="mapa-close" onclick="toggleMapa()">← Volver al recorrido</button>';
                html += "</div>";
                html += '<div class="mapa-cols">';
                for (var ph = 0; ph < PHASES.length; ph++) {
                    var steps = stepsByPhase[ph];
                    if (!steps) continue;
                    html += '<div class="mapa-col">';
                    html += '<div class="mc-ph">' + escQ(PHASES[ph]) + "</div>";
                    html += '<div class="mc-body">';
                    for (var j = 0; j < steps.length; j++) {
                        var node = steps[j];
                        var isCur = node.id === cur;
                        var isVis = vs[node.id] && !isCur;
                        var cls = "mc-node";
                        if (isCur) cls += " mc-current";
                        else if (isVis) cls += " mc-visited";
                        if (node.end === "success") cls += " mc-end-ok";
                        if (node.end === "error") cls += " mc-end-err";
                        if (node.end === "neutral") cls += " mc-end-neu";
                        if (j > 0) html += '<div class="mc-arrow">↓</div>';
                        html +=
                            '<div class="' +
                            cls +
                            '" style="cursor:pointer" onclick="goToDirect(\'' +
                            node.id +
                            '\');toggleMapa()" title="Ir a: ' +
                            escQ(node.t) +
                            '">' +
                            escQ(trunc(node.t, 50)) +
                            "</div>";
                    }
                    html += "</div></div>";
                }
                html += "</div>";
                document.getElementById("mapa-overlay").innerHTML = html;
            }

            // ═══════════════════════════════════════════
            // INIT
            // ═══════════════════════════════════════════
            renderSidebarFoot();
            setZoom(zoomLevel);
            // Eventos para toggle sidebar
            document
                .getElementById("btnToggleSidebar")
                .addEventListener("click", toggleSidebar);
            document
                .getElementById("sidebarBackdrop")
                .addEventListener("click", closeMobileSidebar);
            window.addEventListener("resize", handleResize);
            handleResize();
            render();
        </script>
    </body>
</html>
