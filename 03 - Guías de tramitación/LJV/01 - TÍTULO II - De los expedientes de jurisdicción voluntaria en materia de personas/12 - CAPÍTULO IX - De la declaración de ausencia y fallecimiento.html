<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de Tramitación — Declaración de Ausencia y Fallecimiento</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A2F6E;--navy-mid:#2E4DAA;--navy-lt:#4169E1;
  --cyan:#0D9488;--cyan-bg:#F0FDFA;
  --violet:#5B21B6;--violet-bg:#F5F3FF;
  --green:#15803D;--green-bg:#F0FDF4;
  --amber:#B45309;--amber-bg:#FFFBEB;
  --red:#B91C1C;--red-bg:#FEF2F2;
  --slate:#475569;--slate-bg:#F4F6FB;
  --white:#FFFFFF;
  --bdr:#D1D9EE;
  --text:#1A1A2E;
  --muted:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;background:var(--slate-bg);color:var(--text);line-height:1.6;font-size:15px}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* === HEADER === */
#hdr{flex-shrink:0;height:56px;display:flex;justify-content:space-between;align-items:center;padding:0 20px;background:var(--navy)}
.h-left{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
.h-seal{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.10);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:17px;color:rgba(255,255,255,.85);flex-shrink:0}
.h-text{min-width:0}
.h-title{font-size:14px;font-weight:700;color:#fff;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-sub{font-size:10px;opacity:.55;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-right{display:flex;gap:6px;flex-shrink:0}
.btn{font-family:inherit;cursor:pointer;border-radius:6px;font-size:12px;font-weight:500;transition:all .15s}
.btn-ghost{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.85);padding:6px 12px;white-space:nowrap}
.btn-ghost:hover{background:rgba(255,255,255,.18)}
.btn-ghost:focus-visible,.sb-tab:focus-visible,.dec-btn:focus-visible,.btn-back:focus-visible,.btn-next:focus-visible,.bc-past:focus-visible,.mapa-back-btn:focus-visible{outline:2px solid var(--navy-lt);outline-offset:2px}

/* === PHASE BAR === */
#pbar{flex-shrink:0;height:36px;display:flex;align-items:center;padding:0 20px;overflow-x:auto;scrollbar-width:none;background:var(--navy-mid)}
#pbar::-webkit-scrollbar{display:none}
.ph-item{display:flex;align-items:center;gap:4px;white-space:nowrap}
.ph-lbl{font-size:11px;font-weight:500;padding:3px 10px;border-radius:12px;color:rgba(255,255,255,.40);transition:all .15s}
.ph-lbl.active{color:#fff;font-weight:700;background:rgba(59,130,246,.45)}
.ph-lbl.done{color:rgba(255,255,255,.70)}
.ph-sep{font-size:10px;color:rgba(255,255,255,.25);margin:0 2px}

/* === BREADCRUMB === */
#breadcrumb{flex-shrink:0;min-height:34px;display:flex;align-items:center;padding:0 20px;gap:0;overflow-x:auto;scrollbar-width:none;background:var(--slate-bg);border-bottom:1px solid var(--bdr)}
#breadcrumb::-webkit-scrollbar{display:none}
.bc-item{font-size:13px;white-space:nowrap;padding:0 6px;color:var(--muted)}
.bc-past{cursor:pointer;background:none;border:none;font-family:inherit;font-size:13px}
.bc-past:hover{color:var(--navy-lt);text-decoration:underline}
.bc-current{font-weight:600;color:var(--navy)}
.bc-sep{font-size:11px;color:var(--bdr);padding:0 2px}

/* === LAYOUT === */
#layout{flex:1;overflow:hidden;display:flex}
#sidebar{flex-shrink:0;width:280px;background:var(--navy-mid);overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
#content{flex:1;overflow-y:auto;padding:24px;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent}

/* === SIDEBAR TABS === */
#sb-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.10)}
.sb-tab{flex:1;padding:9px 0;font-size:11px;font-weight:600;font-family:inherit;background:none;border:none;color:rgba(255,255,255,.40);cursor:pointer;letter-spacing:.4px;text-transform:uppercase;transition:all .15s}
.sb-tab.active{color:#fff;border-bottom:2px solid var(--navy-lt)}
.sb-tab:hover:not(.active){color:rgba(255,255,255,.70);background:rgba(255,255,255,.05)}

/* === SIDEBAR MAP === */
#sb-map{padding:8px 0}
.sm-phase{margin-bottom:2px}
.sm-phase-hdr{display:flex;align-items:center;gap:6px;padding:7px 14px;cursor:pointer;color:rgba(255,255,255,.70);font-size:11px;font-weight:600;transition:all .15s;text-transform:uppercase;letter-spacing:.3px}
.sm-phase-hdr:hover{background:rgba(255,255,255,.06)}
.sm-phase-hdr .arrow{font-size:9px;transition:transform .2s;flex-shrink:0}
.sm-phase-hdr.collapsed .arrow{transform:rotate(-90deg)}
.sm-phase-count{font-size:10px;opacity:.5;margin-left:auto}
.sm-phase-body{padding:0 0 4px 0}
.sm-phase-body.collapsed{display:none}
.sm-node{display:flex;align-items:center;gap:7px;padding:5px 14px 5px 22px;font-size:13px;color:rgba(255,255,255,.60);cursor:pointer;transition:all .12s;border-left:2px solid transparent}
.sm-node:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.95)}
.sm-node.sm-visited{color:rgba(255,255,255,.85)}
.sm-node.sm-visited .sm-dot{background:var(--green)}
.sm-node.sm-current{color:#fff;font-weight:600;background:rgba(255,255,255,.06)}
.sm-node.sm-current .sm-dot{background:var(--navy-lt);animation:pulse 1.5s infinite}
.sm-node.sm-unreachable{opacity:.3;cursor:default}
.sm-node.sm-unreachable:hover{background:none;color:rgba(255,255,255,.30)}
.sm-node.sm-end-node .sm-dot{border-radius:2px}
.sm-node.sm-end-success .sm-dot{background:var(--green)}
.sm-node.sm-end-warning .sm-dot{background:var(--amber)}
.sm-node.sm-end-error .sm-dot{background:var(--red)}
.sm-node.sm-end-neutral .sm-dot{background:var(--navy-lt)}
.sm-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.25);flex-shrink:0}
.sm-label{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* === SIDEBAR PREVIEW TOOLTIP === */
.sm-preview{position:fixed;z-index:500;width:320px;max-height:400px;overflow-y:auto;background:var(--white);border:1px solid var(--bdr);border-radius:10px;box-shadow:0 8px 30px rgba(0,0,0,.18);padding:16px;font-size:13px;color:var(--text);animation:fadeUp .15s ease}
.sm-preview-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sm-preview-title{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;flex:1}
.sm-preview-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--muted);padding:0 0 0 8px;line-height:1}
.sm-preview-close:hover{color:var(--text)}
.sm-preview-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px}
.sm-preview-body{font-size:12.5px;color:var(--muted);line-height:1.5}
.sm-preview-body p{margin-bottom:6px}
.sm-preview-nav{margin-top:10px;padding-top:10px;border-top:1px solid var(--bdr)}
.sm-preview-nav button{width:100%;padding:8px;background:var(--navy-lt);color:#fff;border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.sm-preview-nav button:hover{background:var(--navy)}

/* === SIDEBAR JOURNEY === */
#sb-journey{padding:12px 0;display:none}
.pi{padding:7px 14px;font-size:13px;color:rgba(255,255,255,.55);border-left:2px solid rgba(255,255,255,.08)}
.pi.past{color:rgba(255,255,255,.70);border-left-color:var(--green)}
.pi.current{color:#fff;font-weight:600;border-left-color:var(--navy-lt)}
.pi-choice{font-size:11.5px;color:rgba(255,255,255,.45);margin-top:2px;font-style:italic}
.sb-foot{padding:12px 14px;font-size:10px;color:rgba(255,255,255,.30);border-top:1px solid rgba(255,255,255,.06);margin-top:8px}

/* === MAPA OVERLAY === */
#mapa-overlay{
  flex:1;
  overflow-y:auto;
  background:var(--slate-bg);
  padding:20px;
  display:none;
  flex-direction:column;  /* ← Solución: organiza los elementos en columna */
}
.mapa-cols{
  display:flex;
  gap:16px;
  overflow-x:auto;
  padding-bottom:16px;
}
.mapa-col{min-width:230px;flex-shrink:0}
.mapa-col-hdr{font-size:12px;font-weight:700;color:var(--navy);padding:8px 12px;background:rgba(26,47,110,.08);border-radius:8px 8px 0 0;text-transform:uppercase;letter-spacing:.3px}
.mapa-node{background:var(--white);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px;border-left:3px solid var(--muted);transition:all .15s}
.mapa-node.mapa-visited{border-left-color:var(--green);background:var(--green-bg)}
.mapa-node.mapa-current{border-left-color:var(--navy-lt);background:var(--cyan-bg)}
.mapa-node.mapa-end-success{border-left-color:var(--green)}
.mapa-node.mapa-end-error{border-left-color:var(--red)}
.mapa-node.mapa-end-warning{border-left-color:var(--amber)}
.mapa-node.mapa-end-neutral{border-left-color:var(--navy-lt)}
.mapa-node-title{font-weight:600;color:var(--text);margin-bottom:2px}
.mapa-node-actor{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px}
.mapa-arrow{font-size:10px;color:var(--muted);padding:2px 0 2px 20px}
.mapa-back-btn{
  display:inline-flex;
  align-items:center;
  gap:6px;
  padding:8px 16px;
  background:var(--navy-lt);
  color:#fff;
  border:none;
  border-radius:6px;
  font-family:inherit;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
  margin-bottom:16px;
  transition:all .15s;
  align-self:flex-start;   /* ← Evita que el botón se estire al ancho completo */
}
.mapa-back-btn:hover{background:var(--navy)}

/* === CARD === */
.card{background:var(--white);border:1px solid var(--bdr);border-radius:10px;overflow:hidden;animation:fadeUp .22s ease;max-width:780px;margin:0 auto}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.c-hdr{padding:20px 24px 16px;border-bottom:1px solid var(--bdr);background:var(--slate-bg)}
.act-badge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.act-laj{background:var(--cyan-bg);color:var(--cyan);border:1px solid rgba(13,148,136,.25)}
.act-juez{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(91,33,182,.25)}
.act-ambos{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(180,83,9,.25)}
.c-title{font-size:20px;font-weight:700;color:var(--text);line-height:1.3;margin-bottom:4px}
.step-num{font-size:11px;color:var(--muted);margin-top:4px}

/* === CARD BODY === */
.c-body{padding:20px 24px}
.c-body p{margin-bottom:12px;line-height:1.7}
.c-body p:last-child{margin-bottom:0}
.blk-i{color:var(--text);font-size:15px}
.blk-d{background:var(--amber-bg);border-left:3px solid var(--amber);padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:12px;font-size:14px;font-weight:500;color:var(--amber)}
.blk-n{background:var(--cyan-bg);border-left:3px solid var(--cyan);padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:12px;font-size:14px;color:var(--cyan)}
.blk-w{background:var(--red-bg);border-left:3px solid var(--red);padding:10px 14px;border-radius:0 6px 6px 0;margin-bottom:12px;font-size:14px;font-weight:500;color:var(--red)}
.blk-l{font-family:ui-monospace,SFMono-Regular,monospace;font-size:12px;color:var(--muted);background:rgba(0,0,0,.03);padding:8px 12px;border-radius:6px;margin-bottom:12px;line-height:1.5}
.blk-cl{margin-bottom:12px}
.blk-cl-title{font-weight:600;font-size:13px;margin-bottom:6px;color:var(--text)}
.blk-cl-item{display:flex;align-items:flex-start;gap:8px;font-size:14px;color:var(--text);padding:3px 0}
.blk-cl-item input[type=checkbox]{margin-top:3px;accent-color:var(--navy-lt)}

/* === DECISION AREA === */
.dec-area{padding:20px 24px;border-top:1px solid var(--bdr)}
.dec-q{background:var(--white);border-top:3px solid var(--navy);padding:14px 18px;border-radius:0 0 8px 8px;font-size:16px;font-weight:600;color:var(--text);margin-bottom:16px}
.dec-opts{display:flex;flex-direction:column;gap:10px}
.dec-btn{display:flex;align-items:center;gap:12px;padding:14px 18px;border:1.5px solid var(--bdr);border-radius:8px;background:var(--white);cursor:pointer;font-family:inherit;font-size:14px;text-align:left;transition:all .15s;color:var(--text)}
.dec-btn:hover{border-color:var(--navy-lt);background:var(--cyan-bg);transform:translateX(3px)}
.dec-btn.ok{border-left:3px solid var(--green)}
.dec-btn.ok:hover{background:var(--green-bg)}
.dec-btn.bad{border-left:3px solid var(--red)}
.dec-btn.bad:hover{background:var(--red-bg)}
.dec-btn.warn{border-left:3px solid var(--amber)}
.dec-btn.warn:hover{background:var(--amber-bg)}
.dec-btn.neutral{border-left:3px solid var(--navy-lt)}
.dec-btn.neutral:hover{background:var(--cyan-bg)}
.dec-letter{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;background:var(--slate-bg);color:var(--text)}
.dec-btn.ok .dec-letter{background:var(--green-bg);color:var(--green)}
.dec-btn.bad .dec-letter{background:var(--red-bg);color:var(--red)}
.dec-btn.warn .dec-letter{background:var(--amber-bg);color:var(--amber)}
.dec-btn.neutral .dec-letter{background:var(--cyan-bg);color:var(--navy-lt)}
.dec-text{flex:1;min-width:0}
.dec-text-title{font-weight:600;display:block}
.dec-text-sub{font-size:12px;color:var(--muted);margin-top:2px;display:block}

/* === CARD NAV === */
.c-nav{display:flex;justify-content:space-between;padding:16px 24px;border-top:1px solid var(--bdr);background:var(--slate-bg)}
.btn-back{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--white);border:1px solid var(--bdr);border-radius:6px;font-family:inherit;font-size:13px;font-weight:500;cursor:pointer;color:var(--muted);transition:all .15s}
.btn-back:hover:not(:disabled){color:var(--text);border-color:var(--navy-lt)}
.btn-back:disabled{opacity:.35;cursor:not-allowed}
.btn-next{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:var(--navy-lt);border:none;border-radius:6px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;color:#fff;transition:all .15s}
.btn-next:hover{background:var(--navy)}

/* === END CARD === */
.card.end-success,.card.end-error,.card.end-warning,.card.end-neutral{border-top:4px solid}
.card.end-success{border-top-color:var(--green)}
.card.end-error{border-top-color:var(--red)}
.card.end-warning{border-top-color:var(--amber)}
.card.end-neutral{border-top-color:var(--navy-lt)}
.end-body{text-align:center;padding:32px 24px 20px}
.end-icon{font-size:48px;margin-bottom:12px}
.end-success .end-icon{color:var(--green)}
.end-error .end-icon{color:var(--red)}
.end-warning .end-icon{color:var(--amber)}
.end-neutral .end-icon{color:var(--navy-lt)}
.end-title{font-size:22px;font-weight:700;margin-bottom:6px}
.end-success .end-title{color:var(--green)}
.end-error .end-title{color:var(--red)}
.end-warning .end-title{color:var(--amber)}
.end-neutral .end-title{color:var(--navy-lt)}
.end-sub{font-size:14px;color:var(--muted);margin-bottom:20px}
.end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:24px}
.end-content{text-align:left;padding:0 24px 16px}
.summary-box{margin:16px 24px 20px;padding:16px;background:var(--slate-bg);border-radius:8px;border:1px solid var(--bdr)}
.summary-box h4{font-size:13px;font-weight:700;color:var(--text);margin-bottom:10px}
.summary-item{font-size:13px;padding:4px 0;color:var(--muted);display:flex;gap:6px}
.summary-item .sn{font-weight:700;color:var(--navy-lt);min-width:22px}
.summary-item .sc{color:var(--amber);font-style:italic;font-size:12px}

/* === RESPONSIVE === */
@media(max-width:700px){
  #sidebar{display:none}
  #content{padding:12px}
  .c-title{font-size:17px}
  .c-hdr{padding:16px 16px 12px}
  .c-body{padding:16px}
  .dec-area{padding:16px}
  .dec-q{font-size:14px;padding:12px 14px}
  .card{border-radius:8px}
  .h-right{gap:4px}
  .btn-ghost{padding:5px 8px;font-size:11px}
}

/* === PRINT === */
@media print{
  #hdr,#pbar,#breadcrumb,#sidebar,.c-nav,.dec-opts,.btn-back,.btn-next,.end-btns,.sm-preview{display:none!important}
  #app{height:auto;overflow:visible}
  #layout{display:block;overflow:visible}
  #content{overflow:visible;padding:0}
  .card{break-inside:avoid;box-shadow:none;border:1px solid #ccc;animation:none;margin-bottom:16px}
  body{background:#fff}
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="h-left">
      <div class="h-seal">&#9878;</div>
      <div class="h-text">
        <div class="h-title">Declaraci&#243;n de Ausencia y Fallecimiento</div>
        <div class="h-sub">Ley 15/2015 &#183; Cap. IX &#183; Arts. 67-77 LJV &#183; CC 181-198</div>
      </div>
    </div>
    <div class="h-right">
      <button class="btn btn-ghost" onclick="toggleMapa()">&#9673; Mapa</button>
      <button class="btn btn-ghost" onclick="dlGuia()">&#8615; Descargar</button>
      <button class="btn btn-ghost" onclick="restart()">&#8635; Reiniciar</button>
    </div>
  </div>
  <div id="pbar"></div>
  <div id="breadcrumb"></div>
  <div id="layout">
    <div id="sidebar">
      <div id="sb-tabs">
        <button class="sb-tab active" onclick="sbTab('map')">Mapa</button>
        <button class="sb-tab" onclick="sbTab('journey')">Recorrido</button>
      </div>
      <div id="sb-map"></div>
      <div id="sb-journey"></div>
    </div>
    <div id="content"></div>
  </div>
  <div id="mapa-overlay"></div>
</div>

<script>
const PHASES = [
  'Inicio y Competencia',
  'Defensor Judicial',
  'Declaraci\u00f3n de Ausencia',
  'Medidas e Inventario',
  'Declaraci\u00f3n de Fallecimiento',
  'Hechos Posteriores',
  'Comunicaci\u00f3n Registral'
];

const STEPS = {

inicio: {
  ph:0, t:'Inicio del procedimiento', ac:'laj',
  c:[
    ['i','Como Administrador Procesal y Administrativo, debe determinar qu\u00e9 tipo de expediente de jurisdicci\u00f3n voluntaria requiere tramitar conforme al Cap\u00edtulo IX de la Ley 15/2015 (Arts. 67-77 LJV), en relaci\u00f3n con el T\u00edtulo VIII del Libro I del C\u00f3digo Civil (Arts. 181-198 CC).'],
    ['n','Estos procedimientos se caracterizan por la ausencia de controversia litigiosa. El \u00f3rgano decisor es el Letrado de la Administraci\u00f3n de Justicia (Secretario judicial), conforme al principio de desjudicializaci\u00f3n y simplificaci\u00f3n procesal (Art. 67 LJV).'],
    ['l','Art. 67 LJV \u2014 \u00c1mbito de aplicaci\u00f3n; CC arts. 181-198 \u2014 Desaparici\u00f3n, ausencia y fallecimiento; LO 1/2025 \u2014 Competencia Tribunal de Instancia']
  ],
  q:'\u00bfQu\u00e9 tipo de procedimiento necesita tramitar?',
  opts:[
    {t:'Nombramiento de defensor judicial por desaparici\u00f3n', l:'La persona ha desaparecido sin noticias y se necesita representaci\u00f3n para actos urgentes (Art. 69 LJV, Art. 181 CC)', n:'defensor_judicial', v:'ok'},
    {t:'Declaraci\u00f3n de ausencia legal', l:'Se cumplen los plazos legales para declarar la ausencia conforme a los arts. 182-184 CC (Art. 70 LJV)', n:'competencia_ausencia', v:'ok'},
    {t:'Declaraci\u00f3n de fallecimiento', l:'Procede declarar el fallecimiento conforme a los arts. 193-196 CC (Art. 74 LJV)', n:'competencia_fallecimiento', v:'ok'},
    {t:'Hechos posteriores', l:'Se ha presentado el ausente, hay noticias de su existencia, o se ha comprobado su fallecimiento (Arts. 75-76 LJV)', n:'hechos_posteriores', v:'warn'}
  ]
},

competencia_ausencia: {

// ============================================================
// STATE
// ============================================================
let cur = 'inicio';
let hist = []; // [{s: originKey, next: destKey, c: choiceLabel}]
let activeSbTab = 'map';
let mapaOn = false;
let phaseCollapsed = {};
let hasAutoSwitched = false;
let previewEl = null;

// ============================================================
// NAVIGATION
// ============================================================
function goTo(stepId, choiceLabel) {
  hist.push({ s: cur, next: stepId, c: choiceLabel || '' });
  cur = stepId;
  if (choiceLabel && !hasAutoSwitched) { sbTab('journey'); hasAutoSwitched = true; }
  closePreview();
  render();
}

function goBack() {
  if (hist.length === 0) return;
  const prev = hist.pop();
  cur = prev.s;
  closePreview();
  render();
}

function goBackTo(index) {
  if (index < 0 || index >= hist.length) return;
  cur = hist[index].s;
  hist = hist.slice(0, index);
  closePreview();
  render();
}

function buildPathTo(targetId) {
  if (targetId === 'inicio') return [];
  const queue = [{ node: 'inicio', path: [] }];
  const visited = new Set();
  visited.add('inicio');
  while (queue.length) {
    const current = queue.shift();
    const step = STEPS[current.node];
    if (!step) continue;
    if (step.nx) {
      const nextId = step.nx;
      const newPath = [...current.path, { s: current.node, next: nextId, c: '' }];
      if (nextId === targetId) return newPath;
      if (!visited.has(nextId)) {
        visited.add(nextId);
        queue.push({ node: nextId, path: newPath });
      }
    }
    if (step.opts) {
      for (const opt of step.opts) {
        const nextId = opt.n;
        const choiceLabel = opt.t;
        const newPath = [...current.path, { s: current.node, next: nextId, c: choiceLabel }];
        if (nextId === targetId) return newPath;
        if (!visited.has(nextId)) {
          visited.add(nextId);
          queue.push({ node: nextId, path: newPath });
        }
      }
    }
  }
  return null;
}

function jumpTo(stepId) {
  if (!STEPS[stepId]) return;
  if (stepId !== cur) {
    const path = buildPathTo(stepId);
    if (path) {
      hist = path;
    } else {
      hist = [];
    }
  }
  cur = stepId;
  hasAutoSwitched = false;
  closePreview();
  render();
}

function restart() {
  cur = 'inicio';
  hist = [];
  hasAutoSwitched = false;
  activeSbTab = 'map';
  mapaOn = false;
  document.getElementById('layout').style.display = 'flex';
  document.getElementById('mapa-overlay').style.display = 'none';
  closePreview();
  render();
}

function escQ(s) {
  return String(s).replace(/\\/g, '\\\\').replace(/'/g, '&#39;').replace(/"/g, '&quot;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function trunc(s, n) { return s.length > n ? s.substring(0, n - 1) + '\u2026' : s; }

// ============================================================
// KEYBOARD NAVIGATION
// ============================================================
document.addEventListener('keydown', function(e) {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.altKey && e.key === 'ArrowLeft') { e.preventDefault(); goBack(); }
  if (e.altKey && e.key === 'Home') { e.preventDefault(); restart(); }
});

// ============================================================
// RENDER
// ============================================================
function render() {
  renderPbar();
  renderBreadcrumb();
  renderSidebar();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

function renderPbar() {
  const s = STEPS[cur];
  if (!s) return;
  const curPh = s.ph;
  const visited = getVisitedPhases();
  let html = '';
  PHASES.forEach((ph, i) => {
    if (i > 0) html += '<span class="ph-sep">\u203A</span>';
    const cls = i === curPh ? 'active' : (visited.has(i) ? 'done' : '');
    html += '<span class="ph-item"><span class="ph-lbl ' + cls + '">' + (i + 1) + '. ' + escQ(ph) + '</span></span>';
  });
  document.getElementById('pbar').innerHTML = html;
}

function getVisitedPhases() {
  const set = new Set();
  hist.forEach(h => { const st = STEPS[h.s]; if (st) set.add(st.ph); });
  const st = STEPS[cur]; if (st) set.add(st.ph);
  return set;
}

function renderBreadcrumb() {
  let items = [];
  hist.forEach((h, i) => {
    const st = STEPS[h.s];
    if (st) items.push({ t: st.t, short: trunc(st.t, 32), idx: i, isCurrent: false });
  });
  const st = STEPS[cur];
  if (st) items.push({ t: st.t, short: trunc(st.t, 32), idx: -1, isCurrent: true });

  let html = '';
  items.forEach((it, i) => {
    if (i > 0) html += '<span class="bc-sep">\u203A</span>';
    if (it.isCurrent) {
      html += '<span class="bc-item bc-current" title="' + escQ(it.t) + '">' + escQ(it.short) + '</span>';
    } else {
      html += '<button class="bc-item bc-past" onclick="goBackTo(' + it.idx + ')" title="' + escQ(it.t) + '">' + escQ(it.short) + '</button>';
    }
  });
  document.getElementById('breadcrumb').innerHTML = html;
}

function sbTab(tab) {
  activeSbTab = tab;
  document.getElementById('sb-map').style.display = tab === 'map' ? 'block' : 'none';
  document.getElementById('sb-journey').style.display = tab === 'journey' ? 'block' : 'none';
  document.querySelectorAll('.sb-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'map') || (i === 1 && tab === 'journey'));
  });
  if (tab === 'map') closePreview();
}

function renderSidebar() {
  renderSidebarMap();
  renderSidebarJourney();
}

function renderSidebarMap() {
  const visitedKeys = new Set();
  hist.forEach(h => { visitedKeys.add(h.s); visitedKeys.add(h.next); });
  visitedKeys.add(cur);

  let html = '';
  PHASES.forEach((ph, pi) => {
    const isCollapsed = phaseCollapsed[pi];
    const stepsInPhase = Object.entries(STEPS).filter(([k, v]) => v.ph === pi);
    if (stepsInPhase.length === 0) return;

    html += '<div class="sm-phase">';
    html += '<div class="sm-phase-hdr' + (isCollapsed ? ' collapsed' : '') + '" onclick="togglePhase(' + pi + ')">';
    html += '<span class="arrow">\u25BC</span> ' + escQ(ph);
    html += '<span class="sm-phase-count">' + stepsInPhase.length + '</span>';
    html += '</div>';
    html += '<div class="sm-phase-body' + (isCollapsed ? ' collapsed' : '') + '">';
    stepsInPhase.forEach(([key, step]) => {
      let cls = '';
      if (step.end) {
        cls += ' sm-end-node sm-end-' + step.end;
      }
      if (visitedKeys.has(key) && key !== cur) cls += ' sm-visited';
      else if (key === cur) cls += ' sm-current';

      html += '<div class="sm-node' + cls + '" data-step="' + escQ(key) + '" onclick="previewStep(\'' + escQ(key) + '\', this)" title="' + escQ(step.t) + '">';
      html += '<span class="sm-dot"></span>';
      html += '<span class="sm-label">' + escQ(step.t) + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  });
  document.getElementById('sb-map').innerHTML = html;
}

function togglePhase(pi) {
  phaseCollapsed[pi] = !phaseCollapsed[pi];
  renderSidebarMap();
}

// Preview tooltip for sidebar nodes
function previewStep(stepId, el) {
  const step = STEPS[stepId];
  if (!step) return;

  closePreview();

  const rect = el.getBoundingClientRect();
  const sidebarRect = document.getElementById('sidebar').getBoundingClientRect();

  const div = document.createElement('div');
  div.className = 'sm-preview';

  // Position: to the right of the sidebar
  let left = sidebarRect.right + 8;
  let top = rect.top;

  // If not enough space on the right, show to the left
  if (left + 320 > window.innerWidth) {
    left = sidebarRect.left - 328;
  }
  // Clamp top
  if (top + 400 > window.innerHeight) top = window.innerHeight - 410;
  if (top < 8) top = 8;

  div.style.left = left + 'px';
  div.style.top = top + 'px';

  const phName = PHASES[step.ph] || '';
  const badgeClass = 'act-' + step.ac;
  const isCurrent = (stepId === cur);
  const isVisited = hist.some(h => h.s === stepId || h.next === stepId) || isCurrent;
  const isEnd = !!step.end;

  let bodyText = '';
  if (step.c) {
    step.c.forEach(b => {
      if (b[0] === 'i') bodyText += '<p>' + escQ(trunc(b[1], 150)) + '</p>';
      else if (b[0] === 'd') bodyText += '<p style="color:var(--amber)">\u23F1 ' + escQ(trunc(b[1], 120)) + '</p>';
      else if (b[0] === 'n') bodyText += '<p style="color:var(--cyan)">\u2139 ' + escQ(trunc(b[1], 120)) + '</p>';
      else if (b[0] === 'w') bodyText += '<p style="color:var(--red)">\u26A0 ' + escQ(trunc(b[1], 120)) + '</p>';
    });
  }
  if (!bodyText) bodyText = '<p>Sin descripci\u00f3n adicional.</p>';

  div.innerHTML =
    '<div class="sm-preview-hdr">' +
      '<div><span class="sm-preview-badge ' + badgeClass + '">' + actorLabel(step.ac) + '</span>' +
      '<div class="sm-preview-title">' + escQ(step.t) + '</div></div>' +
      '<button class="sm-preview-close" onclick="closePreview()">&times;</button>' +
    '</div>' +
    '<div style="font-size:11px;color:var(--muted);margin-bottom:6px">Fase ' + (step.ph + 1) + ': ' + escQ(phName) +
      (isEnd ? ' &middot; <span style="font-weight:600">Fin del procedimiento</span>' : '') +
      (isCurrent ? ' &middot; <span style="font-weight:600;color:var(--navy-lt)">Paso actual</span>' : '') +
      (isVisited && !isCurrent ? ' &middot; <span style="color:var(--green)">\u2713 Visitado</span>' : '') +
    '</div>' +
    '<div class="sm-preview-body">' + bodyText + '</div>' +
    '<div class="sm-preview-nav">' +
      (isCurrent
        ? '<button disabled style="opacity:.5;cursor:default">Paso actual del recorrido</button>'
        : '<button onclick="jumpTo(\'' + escQ(stepId) + '\')">Ir a este paso</button>'
      ) +
    '</div>';

  document.body.appendChild(div);
  previewEl = div;

  // Close on click outside
  setTimeout(function() {
    document.addEventListener('click', closePreviewOutside, { once: true });
  }, 50);
}

function closePreview() {
  if (previewEl) { previewEl.remove(); previewEl = null; }
}

function closePreviewOutside(e) {
  if (previewEl && !previewEl.contains(e.target)) closePreview();
}

function renderSidebarJourney() {
  let html = '';
  hist.forEach((h, i) => {
    const st = STEPS[h.s];
    if (!st) return;
    html += '<div class="pi past" title="' + escQ(st.t) + '">';
    html += escQ(trunc(st.t, 34));
    if (h.c) html += '<div class="pi-choice">\u2713 ' + escQ(trunc(h.c, 34)) + '</div>';
    html += '</div>';
  });
  const st = STEPS[cur];
  if (st) {
    html += '<div class="pi current" title="' + escQ(st.t) + '">' + escQ(trunc(st.t, 34));
    if (st.end) html += ' &mdash; Fin';
    html += '</div>';
  }
  html += '<div class="sb-foot">Ley 15/2015, Arts. 67-77 LJV<br>CC arts. 181-198</div>';
  document.getElementById('sb-journey').innerHTML = html;
}

function renderContent() {
  const s = STEPS[cur];
  if (!s) return;
  document.getElementById('content').innerHTML = s.end ? buildEnd(s) : buildStep(s);
}

function buildStep(s) {
  const stepN = hist.length + 1;
  const phName = PHASES[s.ph] || '';
  let h = '<div class="card">';
  h += '<div class="c-hdr">';
  h += '<span class="act-badge act-' + s.ac + '">' + actorLabel(s.ac) + '</span>';
  h += '<div class="c-title">' + escQ(s.t) + '</div>';
  h += '<div class="step-num">Paso ' + stepN + ' de este recorrido &middot; Fase ' + (s.ph + 1) + ': ' + escQ(phName) + '</div>';
  h += '</div>';
  h += '<div class="c-body">' + renderBlocks(s.c) + '</div>';

  if (s.q) {
    h += '<div class="dec-area">';
    h += '<div class="dec-q">' + escQ(s.q) + '</div>';
    h += '<div class="dec-opts">';
    const letters = 'ABCDEFGHIJ';
    (s.opts || []).forEach((o, i) => {
      const v = o.v || 'neutral';
      h += '<button class="dec-btn ' + v + '" onclick="goTo(\'' + escQ(o.n) + '\',\'' + escQ(trunc(o.t, 60)) + '\')">';
      h += '<span class="dec-letter">' + letters[i] + '</span>';
      h += '<span class="dec-text"><span class="dec-text-title">' + escQ(o.t) + '</span>';
      if (o.l) h += '<span class="dec-text-sub">' + escQ(o.l) + '</span>';
      h += '</span></button>';
    });
    h += '</div></div>';
  }

  h += '<div class="c-nav">';
  h += '<button class="btn-back" onclick="goBack()"' + (hist.length === 0 ? ' disabled' : '') + '>&#8249; Volver</button>';
  if (s.nx) {
    h += '<button class="btn-next" onclick="goTo(\'' + escQ(s.nx) + '\',\'\')">Siguiente &#8250;</button>';
  }
  h += '</div></div>';
  return h;
}

function buildEnd(s) {
  const endType = s.end || 'neutral';
  const icons = { success: '&#10004;', error: '&#10008;', warning: '&#9888;', neutral: '&#9679;' };
  const labels = { success: 'Procedimiento concluido', error: 'Procedimiento no viable', warning: 'Procedimiento condicionado', neutral: 'Procedimiento finalizado' };

  let h = '<div class="card end-' + endType + '">';
  h += '<div class="end-body">';
  h += '<div class="end-icon">' + (icons[endType] || '&#9679;') + '</div>';
  h += '<div class="end-title">' + escQ(labels[endType] || 'Fin') + '</div>';
  h += '<div class="end-sub">El procedimiento ha concluido en esta v\u00eda</div>';
  h += '<div class="end-btns">';
  h += '<button class="btn-next" onclick="restart()">&#8635; Nuevo procedimiento</button>';
  h += '<button class="btn-back" onclick="goBack()"' + (hist.length === 0 ? ' disabled' : '') + '>&#8249; Volver</button>';
  h += '</div></div>';
  h += '<div class="end-content">' + renderBlocks(s.c) + '</div>';

  h += '<div class="summary-box"><h4>Resumen del recorrido</h4>';
  hist.forEach((hi, i) => {
    const st = STEPS[hi.s];
    h += '<div class="summary-item"><span class="sn">' + (i + 1) + '.</span> ';
    h += escQ(st ? st.t : '?');
    if (hi.c) h += ' <span class="sc">\u2192 ' + escQ(hi.c) + '</span>';
    h += '</div>';
  });
  h += '<div class="summary-item"><span class="sn">' + (hist.length + 1) + '.</span> ' + escQ(s.t) + '</div>';
  h += '</div></div>';
  return h;
}

function renderBlocks(blocks) {
  if (!blocks) return '';
  let h = '';
  blocks.forEach(b => {
    const type = b[0], text = b[1];
    switch(type) {
      case 'i': h += '<p class="blk-i">' + escQ(text) + '</p>'; break;
      case 'd': h += '<div class="blk-d">&#9201; ' + escQ(text) + '</div>'; break;
      case 'n': h += '<div class="blk-n">&#8505; ' + escQ(text) + '</div>'; break;
      case 'w': h += '<div class="blk-w">&#9888; ' + escQ(text) + '</div>'; break;
      case 'l': h += '<div class="blk-l">' + escQ(text) + '</div>'; break;
      case 'cl':
        h += '<div class="blk-cl"><div class="blk-cl-title">' + escQ(text) + '</div>';
        if (b[2]) b[2].forEach(item => {
          h += '<label class="blk-cl-item"><input type="checkbox"> ' + escQ(item) + '</label>';
        });
        h += '</div>';
        break;
    }
  });
  return h;
}

function actorLabel(ac) {
  switch(ac) {
    case 'laj': return 'LAJ (Secretario judicial)';
    case 'juez': return 'Juez';
    case 'ambos': return 'LAJ / Juez';
    default: return ac;
  }
}

function toggleMapa() {
  mapaOn = !mapaOn;
  document.getElementById('layout').style.display = mapaOn ? 'none' : 'flex';
  const overlay = document.getElementById('mapa-overlay');
  overlay.style.display = mapaOn ? 'flex' : 'none';
  if (mapaOn) renderMapa();
}

function renderMapa() {
  const visitedKeys = new Set();
  hist.forEach(h => { visitedKeys.add(h.s); visitedKeys.add(h.next); });
  visitedKeys.add(cur);

  let html = '<button class="mapa-back-btn" onclick="toggleMapa()">&#8249; Volver al recorrido</button>';
  html += '<div class="mapa-cols">';

  PHASES.forEach((ph, pi) => {
    const stepsInPhase = Object.entries(STEPS).filter(([k, v]) => v.ph === pi);
    if (stepsInPhase.length === 0) return;

    html += '<div class="mapa-col">';
    html += '<div class="mapa-col-hdr">' + (pi + 1) + '. ' + escQ(ph) + '</div>';

    stepsInPhase.forEach(([key, step]) => {
      let cls = '';
      if (step.end) cls = 'mapa-end-' + step.end;
      if (visitedKeys.has(key) && key !== cur) cls += ' mapa-visited';
      else if (key === cur) cls += ' mapa-current';

      html += '<div class="mapa-node ' + cls + '">';
      html += '<div class="mapa-node-title">' + escQ(step.t) + '</div>';
      html += '<div class="mapa-node-actor">' + actorLabel(step.ac) + (step.end ? ' &middot; Fin' : '') + '</div>';

      if (step.opts) {
        step.opts.forEach(o => {
          const destStep = STEPS[o.n];
          html += '<div class="mapa-arrow">\u2193 ' + escQ(trunc(o.t, 28)) + (destStep ? ' \u2192 ' + escQ(trunc(destStep.t, 20)) : '') + '</div>';
        });
      } else if (step.nx) {
        const nxStep = STEPS[step.nx];
        html += '<div class="mapa-arrow">\u2193 ' + (nxStep ? escQ(trunc(nxStep.t, 30)) : escQ(step.nx)) + '</div>';
      }
      html += '</div>';
    });
    html += '</div>';
  });

  html += '</div>';
  document.getElementById('mapa-overlay').innerHTML = html;
}

// DOWNLOAD
// ============================================================
function dlGuia() {
  const html = '<!DOCTYPE html>' + document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'guia-tramitacion-ausencia-fallecimiento.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
