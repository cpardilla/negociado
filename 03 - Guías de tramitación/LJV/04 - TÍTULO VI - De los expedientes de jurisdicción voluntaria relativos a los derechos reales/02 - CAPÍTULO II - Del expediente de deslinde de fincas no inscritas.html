<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            Del expediente de deslinde de fincas no inscritas (artículos 104 a
            107 LJV)
        </title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <style>
            /* =========================================================
   MÓDULO 1 — Paleta
   ========================================================= */
            :root {
                --navy: #1a2f6e;
                --navy-mid: #2e4daa;
                --navy-lt: #4169e1;
                --cyan: #0d9488;
                --cyan-bg: #f0fdfa;
                --violet: #5b21b6;
                --violet-bg: #f5f3ff;
                --green: #15803d;
                --green-bg: #f0fdf4;
                --amber: #b45309;
                --amber-bg: #fffbeb;
                --red: #b91c1c;
                --red-bg: #fef2f2;
                --slate: #475569;
                --slate-bg: #f4f6fb;
                --white: #ffffff;
                --bdr: #d1d9ee;
                --text: #1a1a2e;
                --muted: #6b7280;
                --transition-norm: 250ms ease;
            }

            /* =========================================================
   MÓDULO 3 — Tipografía base
   ========================================================= */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family:
                    "Outfit",
                    system-ui,
                    -apple-system,
                    sans-serif;
                font-size: 15px;
                color: var(--text);
                background: var(--slate-bg);
                line-height: 1.5;
                -webkit-font-smoothing: antialiased;
            }
            button {
                font-family: inherit;
            }

            /* =========================================================
   MÓDULO 4 — Layout principal #app
   ========================================================= */
            #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            /* =========================================================
   MÓDULO 5 — Cabecera #hdr
   ========================================================= */
            #hdr {
                flex-shrink: 0;
                height: 56px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
                background: var(--navy);
                color: var(--white);
            }
            .h-left {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .h-seal {
                width: 32px;
                height: 32px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: rgba(255, 255, 255, 0.1);
                border: 1.5px solid rgba(255, 255, 255, 0.25);
                border-radius: 50%;
                font-size: 16px;
            }
            .h-title {
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 0.2px;
            }
            .h-sub {
                font-size: 10px;
                opacity: 0.55;
                font-family: ui-monospace, SFMono-Regular, monospace;
                margin-top: 2px;
            }
            .h-right {
                display: flex;
                gap: 8px;
            }
            .zoom-cluster {
                display: inline-flex;
                align-items: center;
                overflow: hidden;
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.08);
            }
            .btn-zoom {
                appearance: none;
                border: 0;
                background: transparent;
                color: rgba(255, 255, 255, 0.85);
                width: 30px;
                height: 30px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                cursor: pointer;
            }
            .btn-zoom:hover {
                background: rgba(255, 255, 255, 0.14);
            }
            .zoom-label {
                min-width: 46px;
                text-align: center;
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.9);
            }
            .btn {
                font-size: 13px;
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
                transition: all 0.15s;
                font-weight: 500;
            }
            .btn-ghost {
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.18);
                color: rgba(255, 255, 255, 0.85);
            }
            .btn-ghost:hover {
                background: rgba(255, 255, 255, 0.18);
            }

            /* ============ NUEVO: BOTÓN TOGGLE SIDEBAR ============ */
            .btn-toggle-sidebar {
                font-size: 20px;
                padding: 4px 12px;
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.2);
                color: #fff;
            }
            .btn-toggle-sidebar:hover {
                background: rgba(255, 255, 255, 0.18);
            }

            /* =========================================================
   MÓDULO 6 — Barra de fases #pbar
   ========================================================= */
            #pbar {
                flex-shrink: 0;
                height: 42px;
                display: flex;
                align-items: center;
                padding: 0 16px;
                gap: 2px;
                overflow-x: auto;
                background: var(--navy-mid);
                scrollbar-width: none;
            }
            #pbar::-webkit-scrollbar {
                display: none;
            }
            .ph-item {
                display: flex;
                align-items: center;
                white-space: nowrap;
            }
            .ph-lbl {
                display: inline-flex;
                align-items: center;
                height: 28px;
                font-size: 12px;
                font-weight: 600;
                padding: 0 10px;
                border-radius: 8px;
                letter-spacing: 0.3px;
                text-transform: uppercase;
            }
            .ph-lbl.active {
                background: rgba(255, 255, 255, 0.22);
                color: #fff;
                font-weight: 800;
            }
            .ph-lbl.done {
                color: rgba(255, 255, 255, 0.9);
            }
            .ph-lbl:not(.active):not(.done) {
                color: rgba(255, 255, 255, 0.6);
            }
            .ph-sep {
                color: rgba(255, 255, 255, 0.3);
                padding: 0 2px;
                font-size: 10px;
                flex-shrink: 0;
            }

            /* =========================================================
   MÓDULO 7 — Migas de pan #breadcrumb
   ========================================================= */
            #breadcrumb {
                flex-shrink: 0;
                min-height: 34px;
                height: auto;
                display: flex;
                align-items: center;
                padding: 4px 20px;
                overflow-x: auto;
                background: var(--slate-bg);
                border-bottom: 1px solid var(--bdr);
                scrollbar-width: none;
                flex-wrap: wrap;
                row-gap: 2px;
                white-space: normal;
            }
            #breadcrumb::-webkit-scrollbar {
                display: none;
            }
            .bc-item {
                font-size: 11px;
                white-space: nowrap;
                padding: 0 6px;
                color: var(--muted);
            }
            .bc-past {
                cursor: pointer;
                background: none;
                border: none;
                font-family: inherit;
            }
            .bc-past:hover {
                color: var(--navy-lt);
                text-decoration: underline;
            }
            .bc-current {
                font-weight: 600;
                color: var(--navy);
            }
            .bc-sep {
                font-size: 10px;
                color: var(--bdr);
                padding: 0 2px;
            }

            /* =========================================================
   MÓDULO 8 — #layout
   ========================================================= */
            #layout {
                flex: 1;
                overflow: hidden;
                display: flex;
            }

            /* =========================================================
   MÓDULO 9 — Sidebar dual (modificado para toggle)
   ========================================================= */
            #sidebar {
                flex-shrink: 0;
                width: 260px;
                background: var(--navy-mid);
                overflow-y: auto;
                overflow-x: hidden;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
                scrollbar-gutter: stable;
                color: #fff;
                display: flex;
                flex-direction: column;
                transition:
                    width var(--transition-norm),
                    transform var(--transition-norm);
                will-change: width, transform;
            }
            #sidebar.collapsed {
                width: 0;
                overflow: hidden;
                padding: 0;
            }
            #sidebar::-webkit-scrollbar {
                width: 6px;
            }
            #sidebar::-webkit-scrollbar-track {
                background: transparent;
            }
            #sidebar::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.18);
                border-radius: 8px;
                border: 2px solid transparent;
                background-clip: padding-box;
            }
            #sidebar:hover::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.28);
            }
            #sb-tabs {
                display: flex;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                position: sticky;
                top: 0;
                background: var(--navy-mid);
                z-index: 2;
            }
            .sb-tab {
                flex: 1;
                padding: 10px 0;
                font-size: 11px;
                font-weight: 600;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                letter-spacing: 0.4px;
                text-transform: uppercase;
                transition: all 0.15s;
            }
            .sb-tab.active {
                color: #fff;
                border-bottom: 2px solid var(--navy-lt);
            }
            .sb-tab:hover:not(.active) {
                color: rgba(255, 255, 255, 0.7);
                background: rgba(255, 255, 255, 0.05);
            }

            /* Pestaña Mapa */
            #sb-map {
                flex: 1;
                min-height: 0;
            }
            .sm-phase {
                border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            }
            .sm-phase-hdr {
                width: 100%;
                padding: 10px 14px;
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: rgba(255, 255, 255, 0.85);
                background: none;
                border: none;
                cursor: pointer;
                text-align: left;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .sm-phase-hdr:hover {
                background: rgba(255, 255, 255, 0.05);
            }
            .sm-phase-arrow {
                font-size: 9px;
                opacity: 0.7;
                transition: transform 0.15s;
            }
            .sm-phase.collapsed .sm-phase-arrow {
                transform: rotate(-90deg);
            }
            .sm-phase.collapsed .sm-nodes {
                display: none;
            }
            .sm-nodes {
                padding: 2px 0 8px 0;
            }
            .sm-node {
                width: 100%;
                padding: 6px 14px 6px 24px;
                font-size: 12px;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.65);
                cursor: pointer;
                text-align: left;
                display: flex;
                align-items: center;
                gap: 6px;
                transition: all 0.15s;
                position: relative;
            }
            .sm-node:hover {
                background: rgba(255, 255, 255, 0.06);
                color: #fff;
            }
            .sm-node.sm-visited {
                color: #86efac;
            }
            .sm-node.sm-visited::before {
                content: "✓";
                font-size: 11px;
                color: #86efac;
            }
            .sm-node.sm-current {
                color: #fff;
                font-weight: 600;
                background: rgba(65, 105, 225, 0.3);
            }
            .sm-node.sm-current::before {
                content: "●";
                font-size: 10px;
                color: var(--navy-lt);
                animation: pulse 1.5s infinite;
            }
            .sm-node.sm-unreachable {
                opacity: 0.35;
            }

            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }

            /* Pestaña Recorrido */
            #sb-journey {
                padding: 8px 0;
                flex: 1;
                min-height: 0;
            }
            .pi {
                padding: 8px 14px;
                font-size: 12px;
                border-left: 3px solid transparent;
                color: rgba(255, 255, 255, 0.7);
            }
            .pi.past {
                border-left-color: rgba(134, 239, 172, 0.6);
            }
            .pi.current {
                border-left-color: var(--navy-lt);
                background: rgba(65, 105, 225, 0.15);
                color: #fff;
                font-weight: 600;
            }
            .pi-choice {
                font-size: 11px;
                opacity: 0.75;
                margin-top: 2px;
                font-style: italic;
            }
            .sb-foot {
                margin-top: 12px;
                padding: 12px 14px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                font-size: 10px;
                color: rgba(255, 255, 255, 0.55);
                font-family: ui-monospace, SFMono-Regular, monospace;
                line-height: 1.7;
            }
            .sb-foot strong {
                color: #fff;
                font-family: "Outfit", sans-serif;
                font-size: 11px;
                display: block;
                margin-bottom: 6px;
                letter-spacing: 0.4px;
                text-transform: uppercase;
            }

            /* =========================================================
   Área #content
   ========================================================= */
            #content {
                flex: 1;
                overflow-y: auto;
                padding: 28px 32px;
            }

            /* =========================================================
   MÓDULO 13 — Tarjeta de paso
   ========================================================= */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .card {
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                background: var(--white);
                border: 1px solid var(--bdr);
                border-radius: 12px;
                padding: 28px 32px;
                animation: fadeUp 0.22s ease;
                box-shadow: 0 2px 8px rgba(26, 47, 110, 0.06);
            }
            .c-hdr {
                display: flex;
                align-items: center;
                gap: 10px;
                margin-bottom: 6px;
                flex-wrap: wrap;
            }
            .act-badge {
                font-size: 10px;
                font-weight: 700;
                padding: 3px 8px;
                border-radius: 10px;
                letter-spacing: 0.5px;
                text-transform: uppercase;
            }
            .act-laj {
                background: var(--cyan-bg);
                color: var(--cyan);
                border: 1px solid var(--cyan);
            }
            .act-juez {
                background: var(--violet-bg);
                color: var(--violet);
                border: 1px solid var(--violet);
            }
            .act-ambos {
                background: var(--amber-bg);
                color: var(--amber);
                border: 1px solid var(--amber);
            }
            .c-title {
                font-size: 22px;
                font-weight: 700;
                color: var(--navy);
                line-height: 1.3;
                flex: 1;
                min-width: 200px;
            }
            .step-num {
                font-size: 11px;
                color: var(--muted);
                margin-bottom: 18px;
                font-family: ui-monospace, SFMono-Regular, monospace;
                letter-spacing: 0.3px;
            }

            .c-body {
                font-size: 15px;
                color: var(--text);
            }
            .blk {
                margin-bottom: 14px;
            }
            .blk-i {
                line-height: 1.65;
            }
            .blk-d {
                padding: 10px 14px;
                background: var(--amber-bg);
                border-left: 3px solid var(--amber);
                border-radius: 6px;
                font-size: 14px;
                color: var(--amber);
                font-weight: 600;
            }
            .blk-d::before {
                content: "⏱ ";
            }
            .blk-n {
                padding: 10px 14px;
                background: var(--slate-bg);
                border-left: 3px solid var(--slate);
                border-radius: 6px;
                font-size: 14px;
                line-height: 1.6;
            }
            .blk-w {
                padding: 10px 14px;
                background: var(--red-bg);
                border-left: 3px solid var(--red);
                border-radius: 6px;
                font-size: 14px;
                color: var(--red);
                line-height: 1.6;
            }
            .blk-w::before {
                content: "⚠ ";
                font-weight: 700;
            }
            .blk-l {
                padding: 8px 12px;
                background: var(--navy);
                color: #fff;
                border-radius: 6px;
                font-size: 12px;
                font-family: ui-monospace, SFMono-Regular, monospace;
                display: inline-block;
            }
            .blk-l::before {
                content: "§ ";
                opacity: 0.6;
            }
            .blk-cl {
                padding: 14px 16px;
                background: var(--cyan-bg);
                border: 1px solid var(--cyan);
                border-radius: 8px;
            }
            .blk-cl-title {
                font-size: 13px;
                font-weight: 700;
                color: var(--cyan);
                margin-bottom: 8px;
                letter-spacing: 0.3px;
                text-transform: uppercase;
            }
            .blk-cl ul {
                list-style: none;
                padding: 0;
            }
            .blk-cl li {
                padding: 5px 0 5px 24px;
                font-size: 14px;
                position: relative;
                line-height: 1.5;
            }
            .blk-cl li::before {
                content: "☐";
                position: absolute;
                left: 0;
                color: var(--cyan);
                font-size: 14px;
                font-weight: 700;
            }

            /* Zona de decisión */
            .dec-area {
                margin-top: 22px;
                padding-top: 22px;
                border-top: 1px solid var(--bdr);
            }
            .dec-q {
                padding: 16px 18px;
                background: var(--slate-bg);
                border-top: 3px solid var(--navy);
                border-radius: 6px;
                font-size: 16px;
                font-weight: 600;
                color: var(--navy);
                margin-bottom: 16px;
                line-height: 1.45;
            }
            .dec-opts {
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .dec-btn {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: var(--white);
                border: 1.5px solid var(--bdr);
                border-radius: 8px;
                cursor: pointer;
                font-size: 14px;
                text-align: left;
                transition: all 0.15s;
                color: var(--text);
            }
            .dec-btn:hover {
                border-color: var(--navy-lt);
                background: var(--slate-bg);
            }
            .dec-letter {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 12px;
                flex-shrink: 0;
            }
            .dec-btn.ok .dec-letter {
                background: var(--green-bg);
                color: var(--green);
                border: 1.5px solid var(--green);
            }
            .dec-btn.bad .dec-letter {
                background: var(--red-bg);
                color: var(--red);
                border: 1.5px solid var(--red);
            }
            .dec-btn.warn .dec-letter {
                background: var(--amber-bg);
                color: var(--amber);
                border: 1.5px solid var(--amber);
            }
            .dec-btn.neutral .dec-letter {
                background: var(--slate-bg);
                color: var(--slate);
                border: 1.5px solid var(--slate);
            }
            .dec-btn.ok:hover {
                border-color: var(--green);
                background: var(--green-bg);
            }
            .dec-btn.bad:hover {
                border-color: var(--red);
                background: var(--red-bg);
            }
            .dec-btn.warn:hover {
                border-color: var(--amber);
                background: var(--amber-bg);
            }
            .dec-btn.neutral:hover {
                border-color: var(--slate);
                background: var(--slate-bg);
            }

            /* Barra de navegación inferior */
            .c-nav {
                margin-top: 24px;
                padding-top: 18px;
                border-top: 1px solid var(--bdr);
                display: flex;
                justify-content: space-between;
                gap: 10px;
            }
            .btn-back {
                background: var(--white);
                border: 1.5px solid var(--bdr);
                color: var(--slate);
                padding: 8px 16px;
                border-radius: 6px;
                font-size: 14px;
                cursor: pointer;
            }
            .btn-back:hover:not(:disabled) {
                border-color: var(--slate);
                background: var(--slate-bg);
            }
            .btn-back:disabled {
                opacity: 0.4;
                cursor: not-allowed;
            }
            .btn-next,
            .btn-blue {
                background: var(--navy-lt);
                border: none;
                color: #fff;
                padding: 8px 18px;
                border-radius: 6px;
                font-size: 14px;
                font-weight: 600;
                cursor: pointer;
            }
            .btn-next:hover,
            .btn-blue:hover {
                background: var(--navy);
            }

            /* =========================================================
   MÓDULO 14 — Tarjeta final
   ========================================================= */
            .card.end-success {
                border-top: 4px solid var(--green);
            }
            .card.end-error {
                border-top: 4px solid var(--red);
            }
            .card.end-warning {
                border-top: 4px solid var(--amber);
            }
            .card.end-neutral {
                border-top: 4px solid var(--slate);
            }
            .end-body {
                text-align: center;
                padding: 20px 0 28px 0;
                border-bottom: 1px solid var(--bdr);
                margin-bottom: 20px;
            }
            .end-icon {
                font-size: 56px;
                line-height: 1;
                margin-bottom: 12px;
            }
            .end-title {
                font-size: 24px;
                font-weight: 700;
                margin-bottom: 6px;
            }
            .end-sub {
                font-size: 14px;
                color: var(--muted);
            }
            .end-success .end-title {
                color: var(--green);
            }
            .end-error .end-title {
                color: var(--red);
            }
            .end-warning .end-title {
                color: var(--amber);
            }
            .end-neutral .end-title {
                color: var(--navy);
            }
            .end-actions {
                display: flex;
                justify-content: center;
                gap: 10px;
                margin-top: 20px;
            }
            .summary-box {
                margin-top: 22px;
                padding: 16px 18px;
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-radius: 8px;
            }
            .summary-title {
                font-size: 12px;
                font-weight: 700;
                color: var(--navy);
                text-transform: uppercase;
                letter-spacing: 0.4px;
                margin-bottom: 10px;
            }
            .summary-list {
                list-style: none;
                counter-reset: sum;
                padding: 0;
            }
            .summary-list li {
                counter-increment: sum;
                padding: 6px 0 6px 28px;
                font-size: 13px;
                line-height: 1.5;
                position: relative;
                border-bottom: 1px dashed var(--bdr);
            }
            .summary-list li:last-child {
                border-bottom: none;
            }
            .summary-list li::before {
                content: counter(sum);
                position: absolute;
                left: 0;
                top: 6px;
                width: 20px;

            // ----- Variables para toggle sidebar -----
            let sidebarOpen = false;
            let btnToggleSidebar = null;
            let sidebarBackdrop = null;

            function clampNum(v, min, max) {
                return Math.min(max, Math.max(min, v));
            }
            function setZoom(pct) {
                zoomLevel = clampNum(Math.round(pct), 80, 140);
                const content = document.getElementById("content");
                if (content) content.style.zoom = String(zoomLevel / 100);
                const lbl = document.getElementById("zoomLabel");
                if (lbl) lbl.textContent = zoomLevel + "%";
            }
            function zoomIn() {
                setZoom(zoomLevel + 10);
            }
            function zoomOut() {
                setZoom(zoomLevel - 10);
            }

            /* =========================================================
   TOGGLE SIDEBAR (nuevo)
   ========================================================= */
            function toggleSidebar() {
                const isMobile = window.innerWidth <= 700;
                const sidebar = document.getElementById("sidebar");
                if (isMobile) {
                    sidebarOpen = !sidebarOpen;
                    if (sidebar) {
                        if (sidebarOpen) {
                            sidebar.classList.add("open");
                        } else {
                            sidebar.classList.remove("open");
                        }
                    }
                    if (sidebarBackdrop) {
                        if (sidebarOpen) {
                            sidebarBackdrop.classList.add("show");
                        } else {
                            sidebarBackdrop.classList.remove("show");
                        }
                    }
                    if (btnToggleSidebar) {
                        btnToggleSidebar.setAttribute(
                            "aria-expanded",
                            sidebarOpen,
                        );
                    }
                } else {
                    if (sidebar) {
                        sidebar.classList.toggle("collapsed");
                    }
                }
            }

            function closeMobileSidebar() {
                if (window.innerWidth <= 700 && sidebarOpen) {
                    sidebarOpen = false;
                    const sidebar = document.getElementById("sidebar");
                    if (sidebar) sidebar.classList.remove("open");
                    if (sidebarBackdrop)
                        sidebarBackdrop.classList.remove("show");
                    if (btnToggleSidebar)
                        btnToggleSidebar.setAttribute("aria-expanded", "false");
                }
            }

            /* =========================================================
   MÓDULO 16 — NAVEGACIÓN
   ========================================================= */
            function goTo(stepId, choiceLabel) {
                if (!STEPS[stepId]) return;
                hist.push({ s: cur, next: stepId, c: choiceLabel || "" });
                cur = stepId;
                if (choiceLabel) sbTab("journey");
                render();
            }

            function goBack() {
                if (hist.length === 0) return;
                cur = hist.pop().s;
                render();
            }

            function goBackTo(index) {
                if (index < 0 || index >= hist.length) return;
                cur = hist[index].next;
                hist = hist.slice(0, index);
                render();
            }

            function restart() {
                cur = "inicio";
                hist = [];
                sbTab("map");
                setZoom(100);
                render();
            }

            function sbTab(tab) {
                activeSbTab = tab;
                const map = document.getElementById("sb-map");
                const jny = document.getElementById("sb-journey");
                if (map) map.style.display = tab === "map" ? "block" : "none";
                if (jny)
                    jny.style.display = tab === "journey" ? "block" : "none";
                document.querySelectorAll(".sb-tab").forEach(function (t) {
                    t.classList.toggle("active", t.dataset.tab === tab);
                });
            }

            function toggleMapa() {
                mapaOn = !mapaOn;
                const lay = document.getElementById("layout");
                const ovl = document.getElementById("mapa-overlay");
                if (lay) lay.style.display = mapaOn ? "none" : "flex";
                if (ovl) ovl.style.display = mapaOn ? "block" : "none";
                if (mapaOn) renderMapa();
                hideTooltip();
            }

            // Reconstruye la ruta más corta desde 'inicio' hasta targetId
            function buildPathTo(targetId) {
                if (targetId === "inicio") return [];
                const queue = [{ node: "inicio", path: [] }];
                const visited = new Set();
                visited.add("inicio");
                while (queue.length) {
                    const current = queue.shift();
                    const step = STEPS[current.node];
                    if (!step) continue;
                    if (step.nx) {
                        const nextId = step.nx;
                        const newPath = [
                            ...current.path,
                            { s: current.node, next: nextId, c: "" },
                        ];
                        if (nextId === targetId) return newPath;
                        if (!visited.has(nextId)) {
                            visited.add(nextId);
                            queue.push({ node: nextId, path: newPath });
                        }
                    }
                    if (step.opts) {
                        for (const opt of step.opts) {
                            const nextId = opt.n;
                            const choiceLabel = opt.t;
                            const newPath = [
                                ...current.path,
                                {
                                    s: current.node,
                                    next: nextId,
                                    c: choiceLabel,
                                },
                            ];
                            if (nextId === targetId) return newPath;
                            if (!visited.has(nextId)) {
                                visited.add(nextId);
                                queue.push({ node: nextId, path: newPath });
                            }
                        }
                    }
                }
                return null;
            }

            function jumpTo(stepId) {
                if (!STEPS[stepId]) return;
                if (stepId !== cur) {
                    const path = buildPathTo(stepId);
                    if (path) {
                        hist = path;
                    } else {
                        hist = [];
                    }
                }
                cur = stepId;
                hideTooltip();
                if (mapaOn) toggleMapa();
                render();
            }

            /* =========================================================
   MÓDULO 20 — HASH
   ========================================================= */
            function syncHash() {
                const current = window.location.hash.replace("#", "");
                if (current !== cur) {
                    history.replaceState(null, "", "#" + cur);
                }
            }

            function loadFromHash() {
                const h = window.location.hash.replace("#", "");
                if (h && STEPS[h]) {
                    cur = h;
                    hist = [];
                }
            }

            /* =========================================================
   UTILIDADES
   ========================================================= */
            function escQ(s) {
                return String(s).replace(/'/g, "&#39;");
            }

            function escHTML(s) {
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }

            function truncate(s, n) {
                if (!s) return "";
                if (s.length <= n) return s;
                return s.slice(0, n - 1) + "…";
            }

            function actorLabel(ac) {
                if (ac === "laj") return "LAJ";
                if (ac === "juez") return "Juez";
                if (ac === "ambos") return "LAJ e interesados";
                return "LAJ";
            }

            function visitedSet() {
                const set = {};
                hist.forEach(function (h) {
                    set[h.s] = true;
                });
                return set;
            }

   RENDER — Barra de fases (Módulo 6)
   ========================================================= */
            function renderPbar() {
                const host = document.getElementById("pbar");
                if (!host) return;
                const curPhase = STEPS[cur] ? STEPS[cur].ph : 0;
                let html = "";
                PHASES.forEach(function (name, i) {
                    let cls = "";
                    if (i === curPhase) cls = "active";
                    else if (i < curPhase) cls = "done";
                    html +=
                        '<div class="ph-item"><span class="ph-lbl ' +
                        cls +
                        '">' +
                        escHTML(name) +
                        "</span>";
                    if (i < PHASES.length - 1)
                        html += '<span class="ph-sep">›</span>';
                    html += "</div>";
                });
                host.innerHTML = html;
            }

            /* =========================================================
   RENDER — Migas de pan (Módulo 7)
   ========================================================= */
            function renderBreadcrumb() {
                const host = document.getElementById("breadcrumb");
                if (!host) return;
                let html = "";
                if (hist.length === 0) {
                    html =
                        '<span class="bc-item bc-current">' +
                        escHTML(truncate(STEPS[cur].t, 60)) +
                        "</span>";
                } else {
                    hist.forEach(function (h, idx) {
                        const step = STEPS[h.s];
                        if (!step) return;
                        html +=
                            '<button class="bc-item bc-past" data-action="go-back-to" data-index="' +
                            idx +
                            '" title="' +
                            escHTML(step.t) +
                            '">' +
                            escHTML(truncate(step.t, 28)) +
                            "</button>";
                        html += '<span class="bc-sep">›</span>';
                    });
                    html +=
                        '<span class="bc-item bc-current" title="' +
                        escHTML(STEPS[cur].t) +
                        '">' +
                        escHTML(truncate(STEPS[cur].t, 28)) +
                        "</span>";
                }
                host.innerHTML = html;
            }

            /* =========================================================
   RENDER — Sidebar (Módulos 9.1, 9.2)
   ========================================================= */
            function renderSidebar() {
                renderSbMap();
                renderSbJourney();
            }

            function renderSbMap() {
                const host = document.getElementById("sb-map");
                if (!host) return;
                const visited = visitedSet();

                // Agrupar pasos por fase
                const byPhase = {};
                PHASES.forEach(function (_, i) {
                    byPhase[i] = [];
                });
                Object.keys(STEPS).forEach(function (k) {
                    const s = STEPS[k];
                    if (byPhase[s.ph]) byPhase[s.ph].push({ id: k, step: s });
                });

                let html = "";
                PHASES.forEach(function (name, i) {
                    const nodes = byPhase[i];
                    if (!nodes || nodes.length === 0) return;
                    const collapsed = collapsedPhases[i] ? "collapsed" : "";
                    html += '<div class="sm-phase ' + collapsed + '">';
                    html +=
                        '<button class="sm-phase-hdr" data-action="toggle-phase" data-phase="' +
                        i +
                        '">';
                    html += "<span>" + escHTML(name) + "</span>";
                    html += '<span class="sm-phase-arrow">▼</span>';
                    html += "</button>";
                    html += '<div class="sm-nodes">';
                    nodes.forEach(function (n) {
                        let cls = "";
                        if (n.id === cur) cls = "sm-current";
                        else if (visited[n.id]) cls = "sm-visited";
                        html +=
                            '<button class="sm-node ' +
                            cls +
                            '" data-action="preview-step" data-step="' +
                            escHTML(n.id) +
                            '" title="' +
                            escHTML(n.step.t) +
                            '">';
                        html +=
                            "<span>" +
                            escHTML(truncate(n.step.t, 32)) +
                            "</span>";
                        html += "</button>";
                    });
                    html += "</div></div>";
                });

                host.innerHTML = html;
                host.insertAdjacentHTML("beforeend", SB_FOOT);
            }

            function renderSbJourney() {
                const host = document.getElementById("sb-journey");
                if (!host) return;
                let html = "";
                // Historial
                hist.forEach(function (h) {
                    const step = STEPS[h.s];
                    if (!step) return;
                    html += '<div class="pi past">';
                    html += "<div>" + escHTML(truncate(step.t, 36)) + "</div>";
                    if (h.c)
                        html +=
                            '<div class="pi-choice">→ ' +
                            escHTML(h.c) +
                            "</div>";
                    html += "</div>";
                });
                // Actual
                const curStep = STEPS[cur];
                if (curStep) {
                    html += '<div class="pi current">';
                    html +=
                        "<div>" + escHTML(truncate(curStep.t, 36)) + "</div>";
                    html += "</div>";
                }
                html += SB_FOOT;
                host.innerHTML = html;
            }

            /* =========================================================
   RENDER — Contenido (Módulo 13/14)
   ========================================================= */
            function renderContent() {
                const s = STEPS[cur];
                if (!s) return;
                const host = document.getElementById("content");
                if (!host) return;
                host.innerHTML = s.end ? buildEnd(s) : buildStep(s);
            }

            function buildBlock(b) {
                if (!Array.isArray(b)) return "";
                const type = b[0];
                if (type === "i")
                    return '<div class="blk blk-i">' + escHTML(b[1]) + "</div>";
                if (type === "d")
                    return '<div class="blk blk-d">' + escHTML(b[1]) + "</div>";
                if (type === "n")
                    return '<div class="blk blk-n">' + escHTML(b[1]) + "</div>";
                if (type === "w")
                    return '<div class="blk blk-w">' + escHTML(b[1]) + "</div>";
                if (type === "l")
                    return (
                        '<div class="blk"><span class="blk-l">' +
                        escHTML(b[1]) +
                        "</span></div>"
                    );
                if (type === "cl") {
                    let html =
                        '<div class="blk blk-cl"><div class="blk-cl-title">' +
                        escHTML(b[1]) +
                        "</div><ul>";
                    (b[2] || []).forEach(function (item) {
                        html += "<li>" + escHTML(item) + "</li>";
                    });
                    html += "</ul></div>";
                    return html;
                }
                return "";
            }

            function buildStep(s) {
                const stepNum = hist.length + 1;
                const phaseName = PHASES[s.ph] || "";
                let html = '<div class="card">';
                // Cabecera
                html += '<div class="c-hdr">';
                html +=
                    '<span class="act-badge act-' +
                    s.ac +
                    '">' +
                    escHTML(actorLabel(s.ac)) +
                    "</span>";
                html += '<span class="c-title">' + escHTML(s.t) + "</span>";
                html += "</div>";
                html +=
                    '<div class="step-num">Paso ' +
                    stepNum +
                    " de este recorrido · Fase " +
                    (s.ph + 1) +
                    ": " +
                    escHTML(phaseName) +
                    "</div>";
                // Cuerpo
                html += '<div class="c-body">';
                (s.c || []).forEach(function (b) {
                    html += buildBlock(b);
                });
                html += "</div>";
                // Decisión
                if (s.q && s.opts) {
                    html += '<div class="dec-area">';
                    html += '<div class="dec-q">' + escHTML(s.q) + "</div>";
                    html += '<div class="dec-opts">';
                    s.opts.forEach(function (o) {
                        const v = o.v || "neutral";
                        html +=
                            '<button class="dec-btn ' +
                            v +
                            '" data-action="go-to" data-step="' +
                            escHTML(o.n) +
                            '" data-label="' +
                            escHTML(o.t) +
                            '">';
                        html +=
                            '<span class="dec-letter">' +
                            escHTML(o.l) +
                            "</span>";
                        html += "<span>" + escHTML(o.t) + "</span>";
                        html += "</button>";
                    });
                    html += "</div></div>";
                }
                // Navegación
                html += '<div class="c-nav">';
                const disabled = hist.length === 0 ? "disabled" : "";
                html +=
                    '<button class="btn-back" data-action="go-back" ' +
                    disabled +
                    ">← Volver</button>";
                if (s.nx) {
                    html +=
                        '<button class="btn-next" data-action="go-to" data-step="' +
                        escHTML(s.nx) +
                        '" data-label="">Siguiente →</button>';
                } else {
                    html += "<span></span>";
                }
                html += "</div>";
                html += "</div>";
                return html;
            }

            function buildEnd(s) {
                const icon =
                    s.end === "success"
                        ? "✅"
                        : s.end === "error"
                          ? "❌"
                          : s.end === "warning"
                            ? "⚠️"
                            : "ℹ️";
                const label =
                    s.end === "success"
                        ? "Procedimiento finalizado con éxito"
                        : s.end === "error"
                          ? "Procedimiento no aplicable en esta vía"
                          : s.end === "warning"
                            ? "Procedimiento finalizado con reservas"
                            : "Procedimiento finalizado sin avenencia";
                let html = '<div class="card end-' + s.end + '">';
                html += '<div class="end-body">';
                html += '<div class="end-icon">' + icon + "</div>";
                html += '<div class="end-title">' + escHTML(s.t) + "</div>";
                html += '<div class="end-sub">' + escHTML(label) + "</div>";
                html += "</div>";
                html += '<div class="c-body">';
                (s.c || []).forEach(function (b) {
                    html += buildBlock(b);
                });
                html += "</div>";
                // Resumen del recorrido
                html += '<div class="summary-box">';
                html +=
                    '<div class="summary-title">Resumen del recorrido</div>';
                html += '<ol class="summary-list">';
                hist.forEach(function (h) {
                    const step = STEPS[h.s];
                    if (!step) return;
                    html += "<li>" + escHTML(step.t);
                    if (h.c)
                        html +=
                            '<span class="summary-choice">Decisión: ' +
                            escHTML(h.c) +
                            "</span>";
                    html += "</li>";
                });
                html +=
                    "<li>" +
                    escHTML(s.t) +
                    '<span class="summary-choice">Desenlace</span></li>';
                html += "</ol>";
                html += "</div>";
                // Botones
                html += '<div class="end-actions">';
                html +=
                    '<button class="btn-next" data-action="reiniciar">↺ Nuevo procedimiento</button>';
                const disabled = hist.length === 0 ? "disabled" : "";
                html +=
                    '<button class="btn-back" data-action="go-back" ' +
                    disabled +
                    ">← Volver</button>";
                html += "</div>";
                html += "</div>";
                return html;
            }

            /* =========================================================
   RENDER — Mapa completo (Módulo 10)
   ========================================================= */
            function renderMapa() {
                const host = document.getElementById("mapa-overlay");
                if (!host) return;
                const visited = visitedSet();

                // Agrupar pasos por fase
                const byPhase = {};
                PHASES.forEach(function (_, i) {
                    byPhase[i] = [];
                });
                Object.keys(STEPS).forEach(function (k) {
                    const s = STEPS[k];
                    if (byPhase[s.ph]) byPhase[s.ph].push({ id: k, step: s });
                });

                let html = "";
                html += '<div class="mapa-hdr">';
                html +=
                    '<div class="mapa-title">🗺️ Mapa completo del procedimiento</div>';
                html +=
                    '<button class="btn btn-blue" data-action="close-mapa">← Volver al recorrido</button>';
                html += "</div>";
                html += '<div class="mapa-grid">';
                PHASES.forEach(function (name, i) {
                    const nodes = byPhase[i] || [];
                    html += '<div class="mapa-col">';
                    html +=
                        '<div class="mapa-col-hdr">' +
                        (i + 1) +
                        ". " +
                        escHTML(name) +
                        "</div>";
                    nodes.forEach(function (n) {
                        let cls = "";
                        if (n.id === cur) cls = "current";
                        else if (visited[n.id]) cls = "visited";
                        else if (n.step.end) cls = "end-" + n.step.end;

                        const badge = n.step.end ? "b-end" : "b-" + n.step.ac;
                        const badgeText = n.step.end
                            ? "Final"
                            : actorLabel(n.step.ac);

                        html +=
                            '<div class="mapa-node ' +
                            cls +
                            '" data-action="preview-step" data-step="' +
                            escHTML(n.id) +
                            '">';
                        html +=
                            '<div class="mapa-node-title">' +
                            escHTML(n.step.t) +
                            "</div>";
                        html +=
                            '<span class="mapa-node-badge ' +
                            badge +
                            '">' +
                            escHTML(badgeText) +
                            "</span>";
                        html += "</div>";

                        // Flechas
                        if (n.step.nx) {
                            html +=
                                '<div class="mapa-arrow">→ ' +
                                escHTML(
                                    truncate(
                                        STEPS[n.step.nx]
                                            ? STEPS[n.step.nx].t
                                            : n.step.nx,
                                        26,
                                    ),
                                ) +
                                "</div>";
                        }
                        if (n.step.opts) {
                            n.step.opts.forEach(function (o) {
                                const dest = STEPS[o.n] ? STEPS[o.n].t : o.n;
                                html +=
                                    '<div class="mapa-arrow">' +
                                    escHTML(truncate(o.t, 20)) +
                                    " → " +
                                    escHTML(truncate(dest, 22)) +
                                    "</div>";
                            });
                        }
                    });
                    html += "</div>";
                });
                html += "</div>";
                host.innerHTML = html;
            }

            /* =========================================================
   TOOLTIP — Previsualización desde el mapa (Módulo 9.1 / 20)
   ========================================================= */
            function showTooltip(stepId, x, y) {
                const s = STEPS[stepId];
                if (!s) return;
                const tt = document.getElementById("tooltip");
                if (!tt) return;
                let html =
                    '<div class="tooltip-title">' + escHTML(s.t) + "</div>";
                html += '<div class="tooltip-body">';
                const intro = (s.c || []).find(function (b) {
                    return b[0] === "i";
                });
                if (intro)
                    html += "<p>" + escHTML(truncate(intro[1], 220)) + "</p>";
                const law = (s.c || []).find(function (b) {
                    return b[0] === "l";
                });
                if (law)
                    html +=
                        '<p style="margin-top:6px;font-family:ui-monospace,monospace;font-size:11px;color:var(--navy-mid);">§ ' +
                        escHTML(law[1]) +
                        "</p>";
                html += "</div>";
                html += '<div class="tooltip-actions">';
                html +=
                    '<button class="tooltip-btn primary" data-action="jump-to" data-step="' +
                    escHTML(stepId) +
                    '">Ir a este paso</button>';
                html +=
                    '<button class="tooltip-btn" data-action="hide-tooltip">Cerrar</button>';
                html += "</div>";
                tt.innerHTML = html;
                tt.style.display = "block";
                // Posicionamiento
                const pad = 10;
                const tw = 360;
                const th = 220;
                let px = x + 12;
                let py = y + 12;
                if (px + tw > window.innerWidth - pad) px = x - tw - 12;
                if (py + th > window.innerHeight - pad)
                    py = window.innerHeight - th - pad;
                if (px < pad) px = pad;
                if (py < pad) py = pad;
                tt.style.left = px + "px";
                tt.style.top = py + "px";
            }

            function hideTooltip() {
                const tt = document.getElementById("tooltip");
                if (tt) tt.style.display = "none";
            }

            /* =========================================================
   RENDER — Principal (Módulo 17)
   ========================================================= */
            function render() {
                renderPbar();
                renderBreadcrumb();
                renderSidebar();
                renderContent();
                syncHash();
                // Cerrar sidebar móvil al navegar
                closeMobileSidebar();
                const content = document.getElementById("content");
                if (content) content.scrollTop = 0;
            }

            /* =========================================================
   MÓDULO 18 — DESCARGA
   ========================================================= */
            function dlGuia() {
                const html =
                    "<!DOCTYPE html>" + document.documentElement.outerHTML;
                const blob = new Blob([html], {
                    type: "text/html;charset=utf-8",
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "guia-tramitacion-deslinde.html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            /* =========================================================
   MÓDULO 21 — CABLEADO DE EVENTOS
   ========================================================= */
            function wireEvents() {
                document.addEventListener("click", function (ev) {
                    const el = ev.target.closest("[data-action]");
                    if (!el) {
                        // Clic fuera del tooltip, lo oculta si está visible
                        const tt = document.getElementById("tooltip");
                        if (
                            tt &&
                            tt.style.display === "block" &&
                            !ev.target.closest("#tooltip")
                        ) {
                            hideTooltip();
                        }
                        return;
                    }
                    const action = el.dataset.action;
                    switch (action) {
                        case "toggle-mapa":
                            toggleMapa();
                            break;
                        case "descargar":
                            dlGuia();
                            break;
                        case "reiniciar":
                            restart();
                            break;
                        case "zoom-in":
                            zoomIn();
                            break;
                        case "zoom-out":
                            zoomOut();
                            break;
                        case "sb-tab":
                            sbTab(el.dataset.tab);
                            break;
                        case "go-back":
                            goBack();
                            break;
                        case "go-back-to":
                            goBackTo(parseInt(el.dataset.index, 10));
                            break;
                        case "go-to":
                            goTo(el.dataset.step, el.dataset.label || "");
                            break;
                        case "jump-to":
                            jumpTo(el.dataset.step);
                            break;
                        case "close-mapa":
                            toggleMapa();
                            break;
                        case "toggle-phase":
                            const ph = el.dataset.phase;
                            collapsedPhases[ph] = !collapsedPhases[ph];
                            renderSbMap();
                            break;
                        case "preview-step":
                            showTooltip(
                                el.dataset.step,
                                ev.clientX,
                                ev.clientY,
                            );
                            break;
                        case "hide-tooltip":
                            hideTooltip();
                            break;
                    }
                });

                // Cerrar tooltip con scroll
                document.addEventListener("scroll", hideTooltip, true);

                // Atajos de teclado
                document.addEventListener("keydown", function (ev) {
                    if (ev.key === "Escape") {
                        if (mapaOn) toggleMapa();
                        else hideTooltip();
                        if (window.innerWidth <= 700 && sidebarOpen) {
                            closeMobileSidebar();
                        }
                    }
                });

                // Reaccionar a cambios del hash (navegación del usuario con back/forward)
                window.addEventListener("hashchange", function () {
                    const h = window.location.hash.replace("#", "");
                    if (h && STEPS[h] && h !== cur) {
                        cur = h;
                        hist = [];
                        render();
                    }
                });
            }

            /* =========================================================
   ARRANQUE
   ========================================================= */
            document.addEventListener("DOMContentLoaded", function () {
                // Inicializar referencias del toggle sidebar
                btnToggleSidebar = document.getElementById("btnToggleSidebar");
                sidebarBackdrop = document.getElementById("sidebarBackdrop");
                if (btnToggleSidebar) {
                    btnToggleSidebar.addEventListener("click", toggleSidebar);
                }
                if (sidebarBackdrop) {
                    sidebarBackdrop.addEventListener(
                        "click",
                        closeMobileSidebar,
                    );
                }
                // Ajustar al redimensionar la ventana
                window.addEventListener("resize", function () {
                    if (window.innerWidth > 700 && sidebarOpen) {
                        closeMobileSidebar();
                    }
                });
                loadFromHash();
                wireEvents();
                setZoom(zoomLevel);
                render();
            });
        </script>
    </body>
</html>
