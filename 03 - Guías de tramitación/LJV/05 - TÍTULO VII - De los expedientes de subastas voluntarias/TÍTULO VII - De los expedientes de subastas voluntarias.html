<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>
            De los expedientes de subastas voluntarias (artículos 108 a 111 LJV)
        </title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />

        <style>
            /* =========================================================
   MÓDULO 1 — VARIABLES CSS
   ========================================================= */
            :root {
                --navy: #1a2f6e;
                --navy-mid: #2e4daa;
                --navy-lt: #4169e1;
                --cyan: #0d9488;
                --cyan-bg: #f0fdfa;
                --violet: #5b21b6;
                --violet-bg: #f5f3ff;
                --green: #15803d;
                --green-bg: #f0fdf4;
                --amber: #b45309;
                --amber-bg: #fffbeb;
                --red: #b91c1c;
                --red-bg: #fef2f2;
                --slate: #475569;
                --slate-bg: #f4f6fb;
                --white: #ffffff;
                --bdr: #d1d9ee;
                --text: #1a1a2e;
                --muted: #6b7280;
                --transition-norm: 250ms ease;
            }

            /* =========================================================
   BASE
   ========================================================= */
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }
            html,
            body {
                height: 100%;
            }
            body {
                font-family: "Outfit", system-ui, sans-serif;
                font-size: 15px;
                line-height: 1.5;
                color: var(--text);
                background: var(--white);
                -webkit-font-smoothing: antialiased;
            }
            button {
                font-family: inherit;
            }

            /* =========================================================
   MÓDULO 4 — LAYOUT PRINCIPAL
   ========================================================= */
            #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            /* =========================================================
   MÓDULO 5 — CABECERA
   ========================================================= */
            #hdr {
                flex-shrink: 0;
                height: 56px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
                background: var(--navy);
                color: #fff;
            }
            .h-left {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .h-seal {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.1);
                border: 1.5px solid rgba(255, 255, 255, 0.25);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
            }
            .h-title {
                font-size: 14px;
                font-weight: 700;
                letter-spacing: 0.2px;
            }
            .h-sub {
                font-size: 10px;
                opacity: 0.55;
                margin-top: 1px;
            }

            .h-right {
                display: flex;
                gap: 8px;
            }
            .zoom-cluster {
                display: inline-flex;
                align-items: center;
                overflow: hidden;
                border: 1px solid rgba(255, 255, 255, 0.18);
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.08);
            }
            .btn-zoom {
                appearance: none;
                border: 0;
                background: transparent;
                color: rgba(255, 255, 255, 0.85);
                width: 30px;
                height: 30px;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                font-size: 18px;
                cursor: pointer;
            }
            .btn-zoom:hover {
                background: rgba(255, 255, 255, 0.14);
            }
            .zoom-label {
                min-width: 46px;
                text-align: center;
                font-size: 12px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.9);
            }
            .btn {
                font-size: 12px;
                padding: 7px 12px;
                border-radius: 6px;
                cursor: pointer;
                transition: all 0.15s;
            }
            .btn-ghost {
                background: rgba(255, 255, 255, 0.08);
                border: 1px solid rgba(255, 255, 255, 0.18);
                color: rgba(255, 255, 255, 0.85);
            }
            .btn-ghost:hover {
                background: rgba(255, 255, 255, 0.18);
            }

            /* ============ NUEVO: BOTÓN TOGGLE SIDEBAR ============ */
            .btn-toggle-sidebar {
                font-size: 20px;
                padding: 4px 12px;
                background: rgba(255, 255, 255, 0.08);
                border-color: rgba(255, 255, 255, 0.2);
                color: #fff;
            }
            .btn-toggle-sidebar:hover {
                background: rgba(255, 255, 255, 0.18);
            }

            /* =========================================================
   MÓDULO 6 — BARRA DE FASES
   ========================================================= */
            #pbar {
                flex-shrink: 0;
                height: 42px;
                display: flex;
                align-items: center;
                padding: 0 16px;
                gap: 2px;
                overflow-x: auto;
                scrollbar-width: none;
                background: var(--navy-mid);
            }
            #pbar::-webkit-scrollbar {
                display: none;
            }
            .ph-item {
                display: inline-flex;
                align-items: center;
                flex-shrink: 0;
            }
            .ph-lbl {
                display: inline-flex;
                align-items: center;
                height: 28px;
                padding: 0 10px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.3px;
                white-space: nowrap;
                color: rgba(255, 255, 255, 0.6);
                transition: all 0.15s;
            }
            .ph-lbl.done {
                color: rgba(255, 255, 255, 0.9);
            }
            .ph-lbl.active {
                color: #fff;
                background: rgba(255, 255, 255, 0.22);
                font-weight: 800;
            }
            .ph-sep {
                color: rgba(255, 255, 255, 0.25);
                font-size: 10px;
                padding: 0 2px;
                flex-shrink: 0;
            }

            /* =========================================================
   MÓDULO 7 — MIGAS DE PAN
   ========================================================= */
            #breadcrumb {
                flex-shrink: 0;
                min-height: 34px;
                height: auto;
                display: flex;
                align-items: center;
                padding: 4px 20px;
                gap: 0;
                overflow-x: auto;
                scrollbar-width: none;
                background: var(--slate-bg);
                border-bottom: 1px solid var(--bdr);
                flex-wrap: wrap;
                row-gap: 2px;
                white-space: normal;
            }
            #breadcrumb::-webkit-scrollbar {
                display: none;
            }
            .bc-item {
                font-size: 11px;
                white-space: nowrap;
                padding: 0 6px;
                color: var(--muted);
            }
            .bc-past {
                cursor: pointer;
                background: none;
                border: none;
                font-family: inherit;
            }
            .bc-past:hover {
                color: var(--navy-lt);
                text-decoration: underline;
            }
            .bc-current {
                font-weight: 600;
                color: var(--navy);
            }
            .bc-sep {
                font-size: 10px;
                color: var(--bdr);
                padding: 0 2px;
            }

            /* =========================================================
   MÓDULO 8 — CONTENEDOR DEL ÁREA DE TRABAJO
   ========================================================= */
            #layout {
                flex: 1;
                overflow: hidden;
                display: flex;
            }

            /* =========================================================
   MÓDULO 9 — SIDEBAR (modificado para toggle)
   ========================================================= */
            #sidebar {
                flex-shrink: 0;
                width: 260px;
                overflow-y: auto;
                overflow-x: hidden;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.18) transparent;
                scrollbar-gutter: stable;
                background: var(--navy-mid);
                color: #fff;
                display: flex;
                flex-direction: column;
                transition:
                    width var(--transition-norm),
                    transform var(--transition-norm);
                will-change: width, transform;
            }
            #sidebar.collapsed {
                width: 0;
                overflow: hidden;
                padding: 0;
            }
            #sidebar::-webkit-scrollbar {
                width: 6px;
            }
            #sidebar::-webkit-scrollbar-track {
                background: transparent;
            }
            #sidebar::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.18);
                border-radius: 8px;
                border: 2px solid transparent;
                background-clip: padding-box;
            }
            #sidebar:hover::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.28);
            }
            #sb-tabs {
                display: flex;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                position: sticky;
                top: 0;
                background: var(--navy-mid);
                z-index: 2;
            }
            .sb-tab {
                flex: 1;
                padding: 8px 0;
                font-size: 11px;
                font-weight: 600;
                font-family: inherit;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                letter-spacing: 0.4px;
                text-transform: uppercase;
                transition: all 0.15s;
            }
            .sb-tab.active {
                color: #fff;
                border-bottom: 2px solid var(--navy-lt);
            }
            .sb-tab:hover:not(.active) {
                color: rgba(255, 255, 255, 0.7);
                background: rgba(255, 255, 255, 0.05);
            }

            /* --- Pestaña MAPA --- */
            #sb-map {
                padding: 8px 0;
                flex: 1;
                min-height: 0;
            }
            .sm-phase {
                border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            }
            .sm-phase:last-child {
                border-bottom: none;
            }
            .sm-phase-hdr {
                width: 100%;
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 10px 16px;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.85);
                font-size: 11px;
                font-weight: 600;
                font-family: inherit;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                cursor: pointer;
                text-align: left;
            }
            .sm-phase-hdr:hover {
                background: rgba(255, 255, 255, 0.05);
            }
            .sm-chev {
                font-size: 10px;
                opacity: 0.6;
                transition: transform 0.15s;
            }
            .sm-phase.collapsed .sm-chev {
                transform: rotate(-90deg);
            }
            .sm-phase.collapsed .sm-nodes {
                display: none;
            }
            .sm-nodes {
                padding: 2px 0 8px;
            }
            .sm-node {
                display: flex;
                align-items: center;
                gap: 8px;
                width: 100%;
                padding: 6px 16px 6px 28px;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.7);
                font-size: 12px;
                font-family: inherit;
                text-align: left;
                cursor: pointer;
                transition: all 0.15s;
            }
            .sm-node:hover {
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
            }
            .sm-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.25);
                flex-shrink: 0;
            }
            .sm-visited {
                color: rgba(255, 255, 255, 0.9);
            }
            .sm-visited .sm-dot {
                background: var(--green);
                box-shadow: 0 0 0 2px rgba(21, 128, 61, 0.25);
            }
            .sm-visited::after {
                content: "✓";
                color: var(--green);
                margin-left: auto;
                font-size: 11px;
                font-weight: 700;
            }
            .sm-current {
                color: #fff;
                font-weight: 600;
            }
            .sm-current .sm-dot {
                background: var(--navy-lt);
                animation: pulse 1.4s ease-in-out infinite;
            }
            @keyframes pulse {
                0%,
                100% {
                    box-shadow: 0 0 0 0 rgba(65, 105, 225, 0.6);
                }
                50% {
                    box-shadow: 0 0 0 6px rgba(65, 105, 225, 0);
                }
            }
            .sm-unreachable {
                opacity: 0.35;
            }
            .sm-unreachable .sm-dot {
                background: rgba(255, 255, 255, 0.15);
            }

            /* Preview tooltip dentro del mapa */
            .sm-preview {
                margin: 2px 16px 8px 28px;
                padding: 10px 12px;
                background: rgba(0, 0, 0, 0.25);
                border: 1px solid rgba(255, 255, 255, 0.1);
                border-radius: 6px;
                font-size: 11px;
                color: rgba(255, 255, 255, 0.85);
                line-height: 1.5;
            }
            .sm-preview-title {
                font-size: 11px;
                font-weight: 700;
                margin-bottom: 4px;
                color: #fff;
            }
            .sm-preview-meta {
                font-size: 10px;
                opacity: 0.65;
                margin-bottom: 6px;
            }
            .sm-preview .sm-jump {
                margin-top: 8px;
                padding: 5px 10px;
                background: var(--navy-lt);
                border: none;
                border-radius: 4px;
                color: #fff;
                font-size: 10px;
                font-weight: 600;
                font-family: inherit;
                letter-spacing: 0.3px;
                cursor: pointer;
                text-transform: uppercase;
            }
            .sm-preview .sm-jump:hover {
                background: #5a7eeb;
            }

            /* --- Pestaña RECORRIDO --- */
            #sb-journey {
                padding: 12px 0 0;
                display: none;
                flex: 1;
                min-height: 0;
            }
            .pi {
                padding: 10px 16px;
                border-left: 3px solid transparent;
                font-size: 12px;
                color: rgba(255, 255, 255, 0.7);
            }
            .pi.past {
                border-left-color: rgba(21, 128, 61, 0.6);
            }
            .pi.current {
                border-left-color: var(--navy-lt);
                background: rgba(65, 105, 225, 0.12);
                color: #fff;
                font-weight: 600;
            }
            .pi-t {
                line-height: 1.4;
            }
            .pi-choice {
                display: block;
                margin-top: 3px;
                font-size: 11px;
                font-style: italic;
                color: rgba(255, 255, 255, 0.55);
                font-weight: 400;
            }
            .sb-foot {
                margin-top: 18px;
                padding: 14px 16px;
                border-top: 1px solid rgba(255, 255, 255, 0.1);
                font-size: 10px;
                line-height: 1.55;
                color: rgba(255, 255, 255, 0.6);
            }
            .sb-foot b {
                color: #fff;
                display: block;
                margin-bottom: 4px;
                font-size: 11px;
                letter-spacing: 0.3px;
            }
            .sb-foot .law {
                font-family: ui-monospace, SFMono-Regular, monospace;
                font-size: 10px;
                color: rgba(255, 255, 255, 0.8);
            }

            /* =========================================================
   SIDEBAR BACKDROP (móvil)
   ========================================================= */
            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                z-index: 140;
                background: rgba(0, 0, 0, 0.5);
                display: none;
            }
            .sidebar-backdrop.show {
                display: block;
            }

            /* =========================================================
   CONTENIDO CENTRAL
   ========================================================= */
            #content {
                flex: 1;
                overflow-y: auto;
                padding: 28px 32px;
                background: var(--white);
            }

            /* =========================================================
   MÓDULO 13 — TARJETA DE PASO
   ========================================================= */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            .card {
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                background: var(--white);
                border: 1px solid var(--bdr);
                border-radius: 12px;
                box-shadow: 0 1px 3px rgba(26, 47, 110, 0.04);
                animation: fadeUp 0.22s ease;
            }
            .c-hdr {
                padding: 20px 24px 14px;
                border-bottom: 1px solid var(--bdr);
            }
            .act-badge {
                display: inline-block;
                padding: 3px 10px;
                border-radius: 12px;
                font-size: 10px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.6px;
                margin-bottom: 10px;
            }
            .act-laj {
                background: var(--violet-bg);
                color: var(--violet);
                border: 1px solid var(--violet);
            }
            .act-juez {
                background: var(--amber-bg);
                color: var(--amber);
                border: 1px solid var(--amber);
            }
            .act-ambos {
                background: var(--slate-bg);
                color: var(--slate);
                border: 1px solid var(--slate);
            }
            .c-title {
                font-size: 20px;
                font-weight: 700;
                color: var(--navy);
                line-height: 1.3;
            }
            .step-num {
                font-size: 11px;
                color: var(--muted);
                margin-top: 6px;
                letter-spacing: 0.2px;
            }
            .c-body {
                padding: 18px 24px;
                font-size: 15px;
                color: var(--text);
            }
            .c-body p {
                margin-bottom: 10px;
            }
            .c-body .blk {
                margin-bottom: 14px;
            }
            .c-body .blk:last-child {
                margin-bottom: 0;
            }

            .blk-i p {
                line-height: 1.6;
            }
            .blk-d {
                padding: 10px 14px;
                background: var(--amber-bg);
                border-left: 3px solid var(--amber);
                border-radius: 0 6px 6px 0;
                font-size: 14px;
            }
            .blk-d b {
                color: var(--amber);
                display: block;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 3px;
            }
            .blk-n {
                padding: 10px 14px;
                background: var(--cyan-bg);
                border-left: 3px solid var(--cyan);
                border-radius: 0 6px 6px 0;
                font-size: 14px;
            }
            .blk-n b {
                color: var(--cyan);
                display: block;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 3px;
            }
            .blk-w {
                padding: 10px 14px;
                background: var(--red-bg);
                border-left: 3px solid var(--red);
                border-radius: 0 6px 6px 0;
                font-size: 14px;
            }
            .blk-w b {
                color: var(--red);
                display: block;
                font-size: 11px;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 3px;
            }
            .blk-l {
                padding: 8px 12px;
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-radius: 6px;
                font-size: 12px;
                font-family: ui-monospace, SFMono-Regular, monospace;
                color: var(--slate);
            }
            .blk-l b {
                color: var(--navy);
                font-family: "Outfit", sans-serif;
            }
            .blk-cl {
                padding: 12px 14px;
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-radius: 8px;
            }
            .blk-cl .cl-t {
                font-weight: 600;
                font-size: 13px;
                color: var(--navy);
                margin-bottom: 8px;
            }
            .blk-cl ul {
                list-style: none;
            }
            .blk-cl li {
                font-size: 14px;
                padding: 4px 0 4px 26px;
                position: relative;
                line-height: 1.45;
            }
            .blk-cl li::before {
                content: "";
                position: absolute;
                left: 2px;
                top: 7px;
                width: 14px;
                height: 14px;
                border: 1.5px solid var(--slate);
                border-radius: 3px;
                background: var(--white);
            }

            /* Decisión */
            .dec-area {
                margin: 16px 24px 8px;
                padding: 16px;
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-top: 3px solid var(--navy);
                border-radius: 8px;
            }
            .dec-q {
                font-size: 15px;
                font-weight: 600;
                color: var(--navy);
                margin-bottom: 12px;
            }
            .dec-opts {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .dec-btn {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                background: var(--white);
                border: 1.5px solid var(--bdr);
                border-radius: 8px;
                font-size: 14px;
                text-align: left;
                color: var(--text);
                cursor: pointer;
                transition: all 0.15s;
            }
            .dec-btn:hover {
                border-color: var(--navy-lt);
                background: var(--slate-bg);
            }
            .dec-letter {
                width: 26px;
                height: 26px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: 700;
                font-size: 12px;
                flex-shrink: 0;
                background: var(--slate-bg);
                color: var(--slate);
                border: 1.5px solid var(--slate);
            }
            .dec-btn.ok .dec-letter {
                background: var(--green-bg);
                color: var(--green);
                border-color: var(--green);
            }
            .dec-btn.bad .dec-letter {
                background: var(--red-bg);
                color: var(--red);
                border-color: var(--red);
            }
            .dec-btn.warn .dec-letter {
                background: var(--amber-bg);
                color: var(--amber);
                border-color: var(--amber);
            }
            .dec-btn.neutral .dec-letter {
                background: var(--cyan-bg);
                color: var(--cyan);
                border-color: var(--cyan);
            }
            .dec-btn.ok:hover {
                border-color: var(--green);
                background: var(--green-bg);
            }
            .dec-btn.bad:hover {
                border-color: var(--red);
                background: var(--red-bg);
            }
            .dec-btn.warn:hover {
                border-color: var(--amber);
                background: var(--amber-bg);
            }
            .dec-btn.neutral:hover {
                border-color: var(--cyan);
                background: var(--cyan-bg);
            }

            /* Navegación */
            .c-nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 14px 24px;
                border-top: 1px solid var(--bdr);
                background: var(--slate-bg);
                border-radius: 0 0 12px 12px;
            }
            .btn-back {
                background: var(--white);
                border: 1.5px solid var(--bdr);
                color: var(--slate);
                padding: 8px 14px;
                border-radius: 6px;
                font-size: 13px;
                cursor: pointer;
                transition: all 0.15s;
            }
            .btn-back:hover:not(:disabled) {
                border-color: var(--navy-lt);
                color: var(--navy-lt);
            }
            .btn-back:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }
            .btn-next,
            .btn-blue {

                padding: 8px 10px;
                margin-bottom: 10px;

            .mapa-node.end-error {
                border-left-color: var(--red);
            }
            .mapa-node.end-warning {
                border-left-color: var(--amber);
            }
            .mapa-node.end-neutral {

                color: var(--text);

                font-size: 9px;
                font-weight: 700;
                padding: 1px 6px;
                border-radius: 8px;
                margin-top: 5px;
                letter-spacing: 0.4px;
                text-transform: uppercase;
            }
            .mapa-arrow {
                font-size: 10px;
                color: var(--muted);
                margin: 2px 0 8px 14px;
                border-left: 1px solid var(--bdr);
                padding-left: 8px;

   ========================================================= */
            @media print {

                    color: #111;
                }

                #pbar,
                #breadcrumb,
                #sidebar,
                .c-nav,
                .dec-opts {
                    display: none;
                }
                #layout,
                #content {
                    display: block;
                    overflow: visible;
                    height: auto;
                }
                .card {
                    break-inside: avoid;
                    box-shadow: none;
                    border: 1px solid #999;
                }
                #mapa-overlay {
                    padding: 0;
                }

   MÓDULO 24 — RESPONSIVE (modificado para sidebar toggle)
   ========================================================= */
            @media (max-width: 700px) {

                    left: 0;
                    bottom: 0;

            // ----- Variables para toggle sidebar -----
            let sidebarOpen = false;
            let btnToggleSidebar = null;
            let sidebarBackdrop = null;

            function clampNum(v, min, max) {
                return Math.min(max, Math.max(min, v));
            }
            function setZoom(pct) {
                zoomLevel = clampNum(Math.round(pct), 80, 140);
                const content = document.getElementById("content");
                if (content) content.style.zoom = String(zoomLevel / 100);
                const lbl = document.getElementById("zoomLabel");
                if (lbl) lbl.textContent = zoomLevel + "%";
            }
            function zoomIn() {
                setZoom(zoomLevel + 10);
            }
            function zoomOut() {
                setZoom(zoomLevel - 10);
            }

            /* =========================================================
   TOGGLE SIDEBAR (nuevo)
   ========================================================= */
            function toggleSidebar() {
                const isMobile = window.innerWidth <= 700;
                const sidebar = document.getElementById("sidebar");
                if (isMobile) {
                    sidebarOpen = !sidebarOpen;
                    if (sidebar) {
                        if (sidebarOpen) {
                            sidebar.classList.add("open");
                        } else {
                            sidebar.classList.remove("open");
                        }
                    }
                    if (sidebarBackdrop) {
                        if (sidebarOpen) {
                            sidebarBackdrop.classList.add("show");
                        } else {
                            sidebarBackdrop.classList.remove("show");
                        }
                    }
                    if (btnToggleSidebar) {
                        btnToggleSidebar.setAttribute(
                            "aria-expanded",
                            sidebarOpen,
                        );
                    }
                } else {
                    if (sidebar) {
                        sidebar.classList.toggle("collapsed");
                    }
                }
            }

            function closeMobileSidebar() {
                if (window.innerWidth <= 700 && sidebarOpen) {
                    sidebarOpen = false;
                    const sidebar = document.getElementById("sidebar");
                    if (sidebar) sidebar.classList.remove("open");
                    if (sidebarBackdrop)
                        sidebarBackdrop.classList.remove("show");
                    if (btnToggleSidebar)
                        btnToggleSidebar.setAttribute("aria-expanded", "false");
                }
            }

            /* =========================================================
   NAVEGACIÓN (Módulo 16)
   ========================================================= */
            function goTo(stepId, choiceLabel) {
                if (!STEPS[stepId]) return;
                hist.push({ s: cur, next: stepId, c: choiceLabel || "" });
                cur = stepId;
                if (choiceLabel) sbTab("journey");
                render();
            }
            function goBack() {
                if (hist.length === 0) return;
                cur = hist.pop().s;
                render();
            }
            function goBackTo(index) {
                if (index < 0 || index >= hist.length) return;
                cur = hist[index].s;
                hist = hist.slice(0, index);
                render();
            }
            function restart() {
                cur = "inicio";
                hist = [];
                mapPreview = null;
                sbTab("map");
                setZoom(100);
                render();
            }
            function sbTab(tab) {
                activeSbTab = tab;
                const map = document.getElementById("sb-map");
                const jny = document.getElementById("sb-journey");
                if (map) map.style.display = tab === "map" ? "block" : "none";
                if (jny)
                    jny.style.display = tab === "journey" ? "block" : "none";
                document.querySelectorAll(".sb-tab").forEach((t) => {
                    t.classList.toggle("active", t.dataset.tab === tab);
                });
            }
            function toggleMapa() {
                mapaOn = !mapaOn;
                const lay = document.getElementById("layout");
                const ovl = document.getElementById("mapa-overlay");
                if (lay) lay.style.display = mapaOn ? "none" : "flex";
                if (ovl) ovl.style.display = mapaOn ? "block" : "none";
                if (mapaOn) renderMapa();
            }

            // Reconstruye la ruta más corta desde 'inicio' hasta targetId
            function buildPathTo(targetId) {
                if (targetId === "inicio") return [];
                const queue = [{ node: "inicio", path: [] }];
                const visited = new Set();
                visited.add("inicio");
                while (queue.length) {
                    const current = queue.shift();
                    const step = STEPS[current.node];
                    if (!step) continue;
                    if (step.nx) {
                        const nextId = step.nx;
                        const newPath = [
                            ...current.path,
                            { s: current.node, next: nextId, c: "" },
                        ];
                        if (nextId === targetId) return newPath;
                        if (!visited.has(nextId)) {
                            visited.add(nextId);
                            queue.push({ node: nextId, path: newPath });
                        }
                    }
                    if (step.opts) {
                        for (const opt of step.opts) {
                            const nextId = opt.n;
                            const choiceLabel = opt.t;
                            const newPath = [
                                ...current.path,
                                {
                                    s: current.node,
                                    next: nextId,
                                    c: choiceLabel,
                                },
                            ];
                            if (nextId === targetId) return newPath;
                            if (!visited.has(nextId)) {
                                visited.add(nextId);
                                queue.push({ node: nextId, path: newPath });
                            }
                        }
                    }
                }
                return null;
            }

            function jumpTo(stepId) {
                if (!STEPS[stepId]) return;
                if (stepId !== cur) {
                    const path = buildPathTo(stepId);
                    if (path) {
                        hist = path;
                    } else {
                        hist = [];
                    }
                }
                cur = stepId;
                mapPreview = null;
                mapaOn = false;
                const lay = document.getElementById("layout");
                const ovl = document.getElementById("mapa-overlay");
                if (lay) lay.style.display = "flex";
                if (ovl) ovl.style.display = "none";
                render();
            }

            /* =========================================================
   HASH (Módulo 20)
   ========================================================= */
            function syncHash() {
                const current = window.location.hash.replace("#", "");
                if (current !== cur) history.replaceState(null, "", "#" + cur);
            }
            function loadFromHash() {
                const h = window.location.hash.replace("#", "");
                if (h && STEPS[h]) {
                    cur = h;
                    hist = [];
                }
            }

            /* =========================================================
   UTILIDADES
   ========================================================= */
            function escQ(s) {
                return String(s).replace(/'/g, "&#39;");
            }
            function escH(s) {
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;");
            }
            function trunc(s, n) {
                const str = String(s);
                if (str.length <= n) return str;
                return str.slice(0, n - 1) + "…";
            }
            function actLabel(ac) {
                if (ac === "laj") return "Letrado de la Admón. de Justicia";
                if (ac === "juez") return "Juez de Primera Instancia";
                if (ac === "ambos") return "LAJ / Interesado";
                return "Actor";
            }
            function endMeta(end) {
                if (end === "success")
                    return { ico: "✅", lbl: "Expediente concluido con éxito" };
                if (end === "error")
                    return {
                        ico: "❌",
                        lbl: "Expediente no viable por este cauce",
                    };
                if (end === "warning")
                    return { ico: "⚠️", lbl: "Expediente suspendido" };
                if (end === "neutral")
                    return { ico: "ℹ️", lbl: "Expediente sobreseído" };
                return { ico: "•", lbl: "Fin" };
            }
            // Claves visitadas hasta ahora (incluye el actual)
            function visitedSet() {
                const set = new Set();
                hist.forEach((h) => {
                    set.add(h.s);
                });
                set.add(cur);
                return set;
            }

            /* =========================================================
   RENDER — BARRA DE FASES (Módulo 6)
   ========================================================= */
            function renderPbar() {
                const host = document.getElementById("pbar");
                if (!host) return;
                const curPh =
                    STEPS[cur] && typeof STEPS[cur].ph === "number"
                        ? STEPS[cur].ph
                        : 0;
                let html = "";
                PHASES.forEach((name, i) => {
                    let cls = "";
                    if (i < curPh) cls = "done";
                    else if (i === curPh) cls = "active";
                    html +=
                        '<div class="ph-item"><span class="ph-lbl ' +
                        cls +
                        '">' +
                        escH(name) +
                        "</span></div>";
                    if (i < PHASES.length - 1)
                        html += '<span class="ph-sep">›</span>';
                });
                host.innerHTML = html;
            }

            /* =========================================================
   RENDER — MIGAS DE PAN (Módulo 7)
   ========================================================= */
            function renderBreadcrumb() {
                const host = document.getElementById("breadcrumb");
                if (!host) return;
                let html = "";
                if (hist.length === 0) {
                    const t = (STEPS[cur] && STEPS[cur].t) || cur;
                    html =
                        '<span class="bc-item bc-current">' +
                        escH(trunc(t, 28)) +
                        "</span>";
                } else {
                    hist.forEach((h, i) => {
                        const step = STEPS[h.s];
                        const label = step && step.t ? step.t : h.s;
                        html +=
                            '<button class="bc-item bc-past" data-action="go-back-to" data-index="' +
                            i +
                            '">' +
                            escH(trunc(label, 28)) +
                            "</button>";
                        html += '<span class="bc-sep">›</span>';
                    });
                    const t = (STEPS[cur] && STEPS[cur].t) || cur;
                    html +=
                        '<span class="bc-item bc-current">' +
                        escH(trunc(t, 28)) +
                        "</span>";
                }
                host.innerHTML = html;
            }

            /* =========================================================
   RENDER — SIDEBAR (Módulos 9.1 y 9.2)
   ========================================================= */
            function renderSidebar() {
                renderSbMap();
                renderSbJourney();
                // sync visibilidad
                const map = document.getElementById("sb-map");
                const jny = document.getElementById("sb-journey");
                if (map)
                    map.style.display =
                        activeSbTab === "map" ? "block" : "none";
                if (jny)
                    jny.style.display =
                        activeSbTab === "journey" ? "block" : "none";
            }

            function renderSbMap() {
                const host = document.getElementById("sb-map");
                if (!host) return;
                const visited = visitedSet();
                // Agrupar claves por fase, conservando orden de declaración
                const byPh = {};
                PHASES.forEach((_, i) => {
                    byPh[i] = [];
                });
                Object.keys(STEPS).forEach((k) => {
                    const ph = STEPS[k].ph;
                    if (byPh[ph]) byPh[ph].push(k);
                });

                let html = "";
                PHASES.forEach((name, i) => {
                    const collapsed = !!mapCollapsed[i];
                    html +=
                        '<div class="sm-phase' +
                        (collapsed ? " collapsed" : "") +
                        '">';
                    html +=
                        '<button class="sm-phase-hdr" data-action="sm-toggle-phase" data-ph="' +
                        i +
                        '">';
                    html += "<span>" + escH(name) + "</span>";
                    html += '<span class="sm-chev">▾</span>';
                    html += "</button>";
                    html += '<div class="sm-nodes">';
                    byPh[i].forEach((k) => {
                        const s = STEPS[k];
                        let cls = "";
                        if (k === cur) cls = "sm-current";
                        else if (visited.has(k)) cls = "sm-visited";
                        // Nodos inalcanzables: por simplicidad, ninguno se marca como tal;
                        // se mantiene la clase para futuras evoluciones del grafo.
                        html +=
                            '<button class="sm-node ' +
                            cls +
                            '" data-action="sm-preview" data-step="' +
                            escH(k) +
                            '">';
                        html += '<span class="sm-dot"></span>';
                        html += "<span>" + escH(trunc(s.t, 32)) + "</span>";
                        html += "</button>";
                        if (mapPreview === k) {
                            html += buildSmPreview(k);
                        }
                    });
                    html += "</div></div>";
                });
                html += SB_FOOT;
                host.innerHTML = html;
            }

            function buildSmPreview(k) {
                const s = STEPS[k];
                if (!s) return "";
                const meta = s.end ? endMeta(s.end).lbl : actLabel(s.ac);
                let body = "";
                if (s.c && s.c.length) {
                    const first = s.c.find((b) => b[0] === "i");
                    if (first) body = trunc(first[1], 160);
                }
                if (!body && s.q) body = trunc(s.q, 160);
                if (!body && s.end) body = "Nodo final del procedimiento.";
                let html = '<div class="sm-preview">';
                html += '<div class="sm-preview-title">' + escH(s.t) + "</div>";
                html += '<div class="sm-preview-meta">' + escH(meta) + "</div>";
                html += "<div>" + escH(body) + "</div>";
                html +=
                    '<button class="sm-jump" data-action="jump-to" data-step="' +
                    escH(k) +
                    '">Ir a este paso</button>';
                html += "</div>";
                return html;
            }

            function renderSbJourney() {
                const host = document.getElementById("sb-journey");
                if (!host) return;
                let html = "";
                hist.forEach((h) => {
                    const step = STEPS[h.s];
                    const label = step && step.t ? step.t : h.s;
                    html += '<div class="pi past">';
                    html += '<div class="pi-t">' + escH(label) + "</div>";
                    if (h.c)
                        html +=
                            '<span class="pi-choice">→ ' +
                            escH(h.c) +
                            "</span>";
                    html += "</div>";
                });
                const now = STEPS[cur];
                if (now) {
                    html +=
                        '<div class="pi current"><div class="pi-t">' +
                        escH(now.t) +
                        "</div></div>";
                }
                html += SB_FOOT;
                host.innerHTML = html;
            }

            /* =========================================================
   RENDER — CONTENIDO CENTRAL (Módulos 13 y 14)
   ========================================================= */
            function renderContent() {
                const s = STEPS[cur];
                const host = document.getElementById("content");
                if (!host || !s) return;
                host.innerHTML = s.end ? buildEnd(s) : buildStep(s);
            }

            function buildBlocks(arr) {
                if (!arr || !arr.length) return "";
                let html = "";
                arr.forEach((b) => {
                    const type = b[0];
                    if (type === "i") {
                        html +=
                            '<div class="blk blk-i"><p>' + b[1] + "</p></div>";
                    } else if (type === "d") {
                        html +=
                            '<div class="blk blk-d"><b>Plazo</b>' +
                            b[1] +
                            "</div>";
                    } else if (type === "n") {
                        html +=
                            '<div class="blk blk-n"><b>Nota</b>' +
                            b[1] +
                            "</div>";
                    } else if (type === "w") {
                        html +=
                            '<div class="blk blk-w"><b>Advertencia</b>' +
                            b[1] +
                            "</div>";
                    } else if (type === "l") {
                        html += '<div class="blk blk-l">' + b[1] + "</div>";
                    } else if (type === "cl") {
                        html +=
                            '<div class="blk blk-cl"><div class="cl-t">' +
                            escH(b[1]) +
                            "</div><ul>";
                        (b[2] || []).forEach((it) => {
                            html += "<li>" + escH(it) + "</li>";
                        });
                        html += "</ul></div>";
                    }
                });
                return html;
            }

            function buildStep(s) {
                const phName = PHASES[s.ph] || "";
                const n = hist.length + 1;
                let html = '<div class="card">';
                // Cabecera
                html += '<div class="c-hdr">';
                html +=
                    '<span class="act-badge act-' +
                    s.ac +
                    '">' +
                    escH(actLabel(s.ac)) +
                    "</span>";
                html += '<div class="c-title">' + escH(s.t) + "</div>";
                html +=
                    '<div class="step-num">Paso ' +
                    n +
                    " de este recorrido · Fase " +
                    (s.ph + 1) +
                    ": " +
                    escH(phName) +
                    "</div>";
                html += "</div>";
                // Cuerpo
                html += '<div class="c-body">' + buildBlocks(s.c) + "</div>";
                // Decisión
                if (s.q && s.opts) {
                    html += '<div class="dec-area">';
                    html += '<div class="dec-q">' + escH(s.q) + "</div>";
                    html += '<div class="dec-opts">';
                    s.opts.forEach((op) => {
                        const variant =
                            op.l === "A"
                                ? "ok"
                                : op.l === "B"
                                  ? "bad"
                                  : op.l === "C"
                                    ? "warn"
                                    : "neutral";
                        html +=
                            '<button class="dec-btn ' +
                            variant +
                            '" data-action="go-to" data-step="' +
                            escH(op.n) +
                            '" data-label="' +
                            escH(op.t) +
                            '">';
                        html +=
                            '<span class="dec-letter">' +
                            escH(op.l) +
                            "</span>";
                        html += "<span>" + escH(op.t) + "</span>";
                        html += "</button>";
                    });
                    html += "</div></div>";
                }
                // Navegación
                html += '<div class="c-nav">';
                const disBack = hist.length === 0 ? "disabled" : "";
                html +=
                    '<button class="btn-back" data-action="go-back" ' +
                    disBack +
                    ">← Volver</button>";
                if (s.nx) {
                    html +=
                        '<button class="btn-next" data-action="go-to" data-step="' +
                        escH(s.nx) +
                        '" data-label="">Siguiente →</button>';
                } else {
                    html += "<span></span>";
                }
                html += "</div>";
                html += "</div>";
                return html;
            }

            function buildEnd(s) {
                const meta = endMeta(s.end);
                let html = '<div class="card end-' + s.end + '">';
                html += '<div class="end-body">';
                html += '<div class="end-ico">' + meta.ico + "</div>";
                html += '<div class="end-title">' + escH(s.t) + "</div>";
                html +=
                    '<div class="end-sub">El procedimiento ha concluido en esta vía.</div>';
                html += "</div>";
                html += '<div class="end-actions">';
                html +=
                    '<button class="btn-blue" data-action="reiniciar">↺ Nuevo procedimiento</button>';
                const disBack = hist.length === 0 ? "disabled" : "";
                html +=
                    '<button class="btn-back" data-action="go-back" ' +
                    disBack +
                    ">← Volver</button>";
                html += "</div>";
                // Resumen del recorrido
                html +=
                    '<div class="summary-box"><h4>Resumen del recorrido</h4><ol>';
                hist.forEach((h) => {
                    const step = STEPS[h.s];
                    const label = step && step.t ? step.t : h.s;
                    html += "<li>" + escH(label);
                    if (h.c)
                        html +=
                            ' <span class="sum-choice">→ ' +
                            escH(h.c) +
                            "</span>";
                    html += "</li>";
                });
                html += "<li><b>" + escH(s.t) + "</b></li>";
                html += "</ol></div>";
                // Contenido específico del desenlace
                html += '<div class="c-body">' + buildBlocks(s.c) + "</div>";
                html += "</div>";
                return html;
            }

            /* =========================================================
   RENDER — VISTA DE MAPA COMPLETO (Módulo 10)
   ========================================================= */
            function renderMapa() {
                const host = document.getElementById("mapa-overlay");
                if (!host) return;
                const visited = visitedSet();

                // Pre-calcular nodos por fase
                const byPh = {};
                PHASES.forEach((_, i) => {
                    byPh[i] = [];
                });
                Object.keys(STEPS).forEach((k) => {
                    const ph = STEPS[k].ph;
                    if (byPh[ph]) byPh[ph].push(k);
                });

                let html = "";
                html += '<div class="mapa-head">';
                html +=
                    '<div><div class="mapa-title">Mapa completo del procedimiento</div>';
                html +=
                    '<div class="mapa-sub">Subastas voluntarias · Ley 15/2015, Título VII (arts. 108–111) · 5 fases · ' +
                    Object.keys(STEPS).length +
                    " nodos</div></div>";
                html +=
                    '<button class="btn btn-blue" data-action="close-mapa">← Volver al recorrido</button>';
                html += "</div>";

                html += '<div class="mapa-grid">';
                PHASES.forEach((name, i) => {
                    html +=
                        '<div class="mapa-col"><div class="mapa-col-hdr">Fase ' +
                        (i + 1) +
                        ": " +
                        escH(name) +
                        "</div>";
                    byPh[i].forEach((k) => {
                        const s = STEPS[k];
                        let cls = "";
                        if (k === cur) cls = "current";
                        else if (visited.has(k)) cls = "visited";
                        if (s.end) cls += " end-" + s.end;
                        html +=
                            '<div class="mapa-node ' +
                            cls +
                            '" data-action="jump-to" data-step="' +
                            escH(k) +
                            '">';
                        html +=
                            '<div class="mapa-node-title">' +
                            escH(trunc(s.t, 70)) +
                            "</div>";
                        let badgeBg = "var(--violet-bg)",
                            badgeFg = "var(--violet)",
                            badgeLbl = "LAJ";
                        if (s.ac === "juez") {
                            badgeBg = "var(--amber-bg)";
                            badgeFg = "var(--amber)";
                            badgeLbl = "Juez";
                        }
                        if (s.ac === "ambos") {
                            badgeBg = "var(--slate-bg)";
                            badgeFg = "var(--slate)";
                            badgeLbl = "LAJ / Interesado";
                        }
                        if (s.end) {
                            const em = endMeta(s.end);
                            badgeLbl = em.lbl;
                            if (s.end === "success") {
                                badgeBg = "var(--green-bg)";
                                badgeFg = "var(--green)";
                            }
                            if (s.end === "error") {
                                badgeBg = "var(--red-bg)";
                                badgeFg = "var(--red)";
                            }
                            if (s.end === "warning") {
                                badgeBg = "var(--amber-bg)";
                                badgeFg = "var(--amber)";
                            }
                            if (s.end === "neutral") {
                                badgeBg = "var(--cyan-bg)";
                                badgeFg = "var(--cyan)";
                            }
                        }
                        html +=
                            '<span class="mapa-node-badge" style="background:' +
                            badgeBg +
                            ";color:" +
                            badgeFg +
                            ';">' +
                            escH(badgeLbl) +
                            "</span>";
                        html += "</div>";
                        // Flechas salientes
                        if (s.nx && STEPS[s.nx]) {
                            html +=
                                '<div class="mapa-arrow">→ Siguiente: ' +
                                escH(trunc(STEPS[s.nx].t, 40)) +
                                "</div>";
                        }
                        if (s.opts && s.opts.length) {
                            s.opts.forEach((op) => {
                                const dest = STEPS[op.n]
                                    ? trunc(STEPS[op.n].t, 34)
                                    : op.n;
                                html +=
                                    '<div class="mapa-arrow">→ ' +
                                    escH(op.l) +
                                    ": " +
                                    escH(trunc(op.t, 22)) +
                                    " &rarr; " +
                                    escH(dest) +
                                    "</div>";
                            });
                        }
                    });
                    html += "</div>";
                });
                html += "</div>";

                host.innerHTML = html;
            }

            /* =========================================================
   RENDER PRINCIPAL (Módulo 17)
   ========================================================= */
            function render() {
                renderPbar();
                renderBreadcrumb();
                renderSidebar();
                renderContent();
                syncHash();
                // Cerrar sidebar móvil al navegar
                closeMobileSidebar();
                const content = document.getElementById("content");
                if (content) content.scrollTop = 0;
            }

            /* =========================================================
   DESCARGA (Módulo 18)
   ========================================================= */
            function dlGuia() {
                const html =
                    "<!DOCTYPE html>" + document.documentElement.outerHTML;
                const blob = new Blob([html], {
                    type: "text/html;charset=utf-8",
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "guia-tramitacion.html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            /* =========================================================
   EVENTOS (Módulo 21)
   ========================================================= */
            function wireEvents() {
                document.addEventListener("click", (ev) => {
                    const el = ev.target.closest("[data-action]");
                    if (!el) return;
                    const action = el.dataset.action;
                    switch (action) {
                        case "toggle-mapa":
                            toggleMapa();
                            break;
                        case "descargar":
                            dlGuia();
                            break;
                        case "reiniciar":
                            restart();
                            break;
                        case "zoom-in":
                            zoomIn();
                            break;
                        case "zoom-out":
                            zoomOut();
                            break;
                        case "sb-tab":
                            sbTab(el.dataset.tab);
                            break;
                        case "go-back":
                            goBack();
                            break;
                        case "go-back-to":
                            goBackTo(parseInt(el.dataset.index, 10));
                            break;
                        case "go-to":
                            goTo(el.dataset.step, el.dataset.label || "");
                            break;
                        case "jump-to":
                            jumpTo(el.dataset.step);
                            break;
                        case "close-mapa":
                            toggleMapa();
                            break;
                        case "sm-toggle-phase": {
                            const ph = parseInt(el.dataset.ph, 10);
                            mapCollapsed[ph] = !mapCollapsed[ph];
                            renderSbMap();
                            break;
                        }
                        case "sm-preview": {
                            const k = el.dataset.step;
                            mapPreview = mapPreview === k ? null : k;
                            renderSbMap();
                            break;
                        }
                    }
                });
                document.addEventListener("keydown", (ev) => {
                    if (ev.key === "Escape" && mapaOn) toggleMapa();
                    if (
                        ev.key === "Escape" &&
                        window.innerWidth <= 700 &&
                        sidebarOpen
                    ) {
                        closeMobileSidebar();
                    }
                });
                window.addEventListener("hashchange", () => {
                    const h = window.location.hash.replace("#", "");
                    if (h && STEPS[h] && h !== cur) {
                        cur = h;
                        hist = [];
                        render();
                    }
                });
            }

            /* =========================================================
   ARRANQUE
   ========================================================= */
            document.addEventListener("DOMContentLoaded", () => {
                // Inicializar referencias del toggle sidebar
                btnToggleSidebar = document.getElementById("btnToggleSidebar");
                sidebarBackdrop = document.getElementById("sidebarBackdrop");
                if (btnToggleSidebar) {
                    btnToggleSidebar.addEventListener("click", toggleSidebar);
                }
                if (sidebarBackdrop) {
                    sidebarBackdrop.addEventListener(
                        "click",
                        closeMobileSidebar,
                    );
                }
                // Ajustar al redimensionar la ventana
                window.addEventListener("resize", function () {
                    if (window.innerWidth > 700 && sidebarOpen) {
                        closeMobileSidebar();
                    }
                });
                loadFromHash();
                wireEvents();
                setZoom(zoomLevel);
                render();
            });
        </script>
    </body>
</html>
