<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de tramitación — Expedientes de jurisdicción voluntaria en Derecho sucesorio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --navy:      #1A2F6E;
  --navy-mid:  #2E4DAA;
  --navy-lt:   #4169E1;
  --cyan:      #0D9488;   --cyan-bg:   #F0FDFA;
  --violet:    #5B21B6;   --violet-bg: #F5F3FF;
  --green:     #15803D;   --green-bg:  #F0FDF4;
  --amber:     #B45309;   --amber-bg:  #FFFBEB;
  --red:       #B91C1C;   --red-bg:    #FEF2F2;
  --slate:     #475569;   --slate-bg:  #F4F6FB;
  --white:     #FFFFFF;
  --bdr:       #D1D9EE;
  --text:      #1A1A2E;
  --muted:     #6B7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; }
body {
  font-family: 'Outfit', system-ui, -apple-system, sans-serif;
  font-size: 14.5px;
  line-height: 1.55;
  color: var(--text);
  background: var(--slate-bg);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

/* ============ Estructura raíz ============ */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
  background: var(--slate-bg);
}

/* ============ ELEMENTO 1 — Cabecera ============ */
#hdr {
  flex-shrink: 0;
  height: 56px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  background: var(--navy);
  color: #fff;
}
.h-left { display: flex; align-items: center; gap: 12px; }
.h-seal {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: rgba(255,255,255,.10);
  border: 1.5px solid rgba(255,255,255,.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: #fff;
  flex-shrink: 0;
}
.h-title { font-size: 14px; font-weight: 700; line-height: 1.2; letter-spacing: .2px; }
.h-sub { font-size: 10.5px; opacity: .62; margin-top: 2px; font-family: ui-monospace, SFMono-Regular, monospace; }
.h-right { display: flex; gap: 8px; align-items: center; }
.btn {
  font-family: inherit; font-size: 12px; font-weight: 500;
  padding: 7px 14px; border-radius: 6px;
  border: 1px solid transparent; cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn-ghost {
  background: rgba(255,255,255,.08);
  border-color: rgba(255,255,255,.18);
  color: rgba(255,255,255,.88);
}
.btn-ghost:hover { background: rgba(255,255,255,.18); }
.btn-ghost.active { background: rgba(255,255,255,.22); border-color: rgba(255,255,255,.35); }

/* ============ ELEMENTO 2 — Barra de fases ============ */
#pbar {
  flex-shrink: 0;
  height: 36px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  background: var(--navy-mid);
  overflow-x: auto;
  scrollbar-width: none;
}
#pbar::-webkit-scrollbar { display: none; }
.ph-item { display: inline-flex; align-items: center; flex-shrink: 0; }
.ph-lbl {
  font-size: 11.5px; font-weight: 500;
  padding: 4px 10px; border-radius: 4px;
  color: rgba(255,255,255,.42);
  letter-spacing: .15px;
  white-space: nowrap;
  transition: all .15s;
}
.ph-lbl.done { color: rgba(255,255,255,.72); }
.ph-lbl.active { background: rgba(65,105,225,.45); color: #fff; font-weight: 700; }
.ph-sep { color: rgba(255,255,255,.28); font-size: 12px; padding: 0 4px; }

/* ============ ELEMENTO 3 — Migas de pan ============ */
#breadcrumb {
  flex-shrink: 0;
  min-height: 34px;
  display: flex;
  align-items: center;
  padding: 0 20px;
  background: var(--slate-bg);
  border-bottom: 1px solid var(--bdr);
  overflow-x: auto;
  scrollbar-width: none;
}
#breadcrumb::-webkit-scrollbar { display: none; }
.bc-item { font-size: 12px; white-space: nowrap; padding: 0 6px; color: var(--muted); font-family: inherit; }
.bc-past { cursor: pointer; background: none; border: none; }
.bc-past:hover { color: var(--navy-lt); text-decoration: underline; }
.bc-current { font-weight: 600; color: var(--navy); }
.bc-sep { font-size: 11px; color: var(--bdr); padding: 0 2px; }

/* ============ LAYOUT de trabajo ============ */
#layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ============ ELEMENTO 4 — Sidebar dual ============ */
#sidebar {
  flex-shrink: 0;
  width: 280px;
  background: var(--navy-mid);
  overflow-y: auto;
  color: rgba(255,255,255,.88);
  display: flex;
  flex-direction: column;
}
#sb-tabs {
  display: flex;
  border-bottom: 1px solid rgba(255,255,255,.10);
  flex-shrink: 0;
  position: sticky; top: 0;
  background: var(--navy-mid);
  z-index: 2;
}
.sb-tab {
  flex: 1; padding: 10px 0;
  font-size: 11px; font-weight: 600;
  font-family: inherit;
  background: none; border: none;
  color: rgba(255,255,255,.42);
  cursor: pointer;
  letter-spacing: .5px;
  text-transform: uppercase;
  transition: all .15s;
  border-bottom: 2px solid transparent;
}
.sb-tab.active { color: #fff; border-bottom-color: var(--navy-lt); }
.sb-tab:hover:not(.active) { color: rgba(255,255,255,.75); background: rgba(255,255,255,.05); }

#sb-map, #sb-journey { padding: 12px 14px 20px; flex: 1; }

/* Mapa */
.sm-phase { margin-bottom: 10px; }
.sm-phase-hdr {
  display: flex; justify-content: space-between; align-items: center;
  cursor: pointer;
  padding: 6px 4px;
  font-size: 10px; font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: rgba(255,255,255,.55);
  border-bottom: 1px solid rgba(255,255,255,.08);
  user-select: none;
}
.sm-phase-hdr:hover { color: rgba(255,255,255,.9); }
.sm-phase-arrow { font-size: 9px; transition: transform .15s; }
.sm-phase.collapsed .sm-phase-arrow { transform: rotate(-90deg); }
.sm-phase.collapsed .sm-nodes { display: none; }
.sm-nodes { padding: 6px 0 4px; }
.sm-node {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 5px 8px;
  font-size: 12px;
  color: rgba(255,255,255,.78);
  border-radius: 4px;
  cursor: pointer;
  margin-bottom: 1px;
  line-height: 1.35;
  transition: all .12s;
  text-align: left;
  width: 100%;
  background: none; border: none;
  font-family: inherit;
}
.sm-node:hover { background: rgba(255,255,255,.08); color: #fff; }
.sm-node .sm-dot {
  flex-shrink: 0;
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,.35);
  margin-top: 3px;
}
.sm-node.sm-visited .sm-dot { background: var(--green); border-color: var(--green); }
.sm-node.sm-visited .sm-dot::after { content: '✓'; color:#fff; font-size:8px; position:relative; top:-4px; left:1.5px; font-weight:700; }
.sm-node.sm-current .sm-dot {
  background: var(--navy-lt);
  border-color: #fff;
  box-shadow: 0 0 0 2px rgba(65,105,225,.35);
  animation: pulse 1.5s infinite;
}
.sm-node.sm-current { color: #fff; font-weight: 600; background: rgba(65,105,225,.22); }
.sm-node.sm-unreachable { opacity: .32; cursor: pointer; }
.sm-node.sm-final .sm-dot { background: var(--amber); border-color: var(--amber); }

@keyframes pulse { 0%,100% { box-shadow: 0 0 0 2px rgba(65,105,225,.35); } 50% { box-shadow: 0 0 0 4px rgba(65,105,225,.18); } }

/* Recorrido */
.pi {
  padding: 8px 10px; margin-bottom: 2px;
  font-size: 12px; line-height: 1.4;
  border-radius: 5px;
  color: rgba(255,255,255,.82);
  border-left: 2px solid transparent;
}
.pi.past { background: rgba(255,255,255,.05); border-left-color: rgba(255,255,255,.25); }
.pi.current { background: rgba(65,105,225,.22); border-left-color: var(--navy-lt); color: #fff; font-weight: 600; }
.pi-num { font-size: 9.5px; opacity: .5; font-family: ui-monospace, monospace; margin-right: 6px; }
.pi-choice {
  display: block;
  margin-top: 4px;
  padding-left: 10px;
  font-size: 11px; font-style: italic;
  color: rgba(200,255,220,.75);
  border-left: 2px solid rgba(21,128,61,.5);
}

.sb-foot {
  margin-top: 18px; padding: 10px 4px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: 10.5px;
  color: rgba(255,255,255,.42);
  font-family: ui-monospace, monospace;
  line-height: 1.5;
}
.sb-foot strong { color: rgba(255,255,255,.7); display:block; margin-bottom:3px; font-family:inherit; font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase;}

/* ============ Contenido principal ============ */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 22px 30px 40px;
}

/* Tarjeta de paso */
.card {
  background: var(--white);
  border: 1px solid var(--bdr);
  border-radius: 10px;
  padding: 0;
  max-width: 860px;
  margin: 0 auto;
  box-shadow: 0 1px 3px rgba(0,0,0,.03);
  animation: fadeUp .22s ease;
}
@keyframes fadeUp { from { opacity:0; transform: translateY(10px);} to { opacity:1; transform: translateY(0);} }

.c-hdr {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--bdr);
  background: #FAFBFE;
  border-radius: 10px 10px 0 0;
}
.c-meta-row {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 10px;
}
.act-badge {
  font-size: 10px; font-weight: 700;
  padding: 4px 10px;
  border-radius: 14px;
  letter-spacing: .5px;
  text-transform: uppercase;
}
.act-laj { background: var(--cyan-bg); color: var(--cyan); border: 1px solid rgba(13,148,136,.3); }
.act-juez { background: var(--violet-bg); color: var(--violet); border: 1px solid rgba(91,33,182,.3); }
.act-ambos { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(180,83,9,.3); }
.step-num {
  font-size: 10.5px;
  color: var(--muted);
  font-family: ui-monospace, monospace;
  margin-left: auto;
}
.c-title {
  font-size: 19px; font-weight: 700;
  color: var(--navy);
  line-height: 1.3;
  letter-spacing: -.2px;
}

.c-body { padding: 18px 22px 10px; }
.c-body > * { margin-bottom: 12px; }
.c-body > *:last-child { margin-bottom: 0; }

.blk-i { font-size: 14.5px; color: var(--text); line-height: 1.6; }
.blk-d {
  background: var(--amber-bg);
  border-left: 3px solid var(--amber);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 13.5px;
  color: var(--amber);
  font-weight: 500;
}
.blk-d::before { content: '⏱ '; font-weight: 700; }
.blk-n {
  background: var(--cyan-bg);
  border-left: 3px solid var(--cyan);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 13.5px;
  color: var(--slate);
}
.blk-n::before { content: 'ℹ '; color: var(--cyan); font-weight: 700; }
.blk-w {
  background: var(--red-bg);
  border-left: 3px solid var(--red);
  padding: 10px 14px;
  border-radius: 0 6px 6px 0;
  font-size: 13.5px;
  color: var(--red);
  font-weight: 500;
}
.blk-w::before { content: '⚠ '; font-weight: 700; }
.blk-l {
  font-family: ui-monospace, SFMono-Regular, monospace;
  font-size: 12px;
  color: var(--slate);
  background: var(--slate-bg);
  padding: 8px 12px;
  border-radius: 4px;
  border: 1px dashed var(--bdr);
  letter-spacing: -.2px;
}
.blk-l::before { content: '§ '; color: var(--navy); font-weight: 700; }

.blk-cl {
  background: #FBFCFE;
  border: 1px solid var(--bdr);
  border-radius: 6px;
  padding: 12px 14px;
}
.blk-cl-h {
  font-size: 12.5px; font-weight: 700;
  color: var(--navy);
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: .4px;
}
.blk-cl-i {
  display: flex; align-items: flex-start; gap: 8px;
  padding: 5px 0;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.45;
}
.blk-cl-box {
  flex-shrink: 0; margin-top: 2px;
  width: 14px; height: 14px;
  border: 1.5px solid var(--navy-mid);
  border-radius: 3px;
  cursor: pointer;
  display: inline-block;
  position: relative;
}
.blk-cl-box.checked { background: var(--navy-lt); border-color: var(--navy-lt); }
.blk-cl-box.checked::after {
  content: '✓';
  position: absolute;
  top: -3px; left: 1px;
  color: #fff; font-size: 11px; font-weight: 700;
}

/* Zona de decisión */
.dec-area {
  margin: 12px 22px 0;
  background: var(--slate-bg);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  border-top: 3px solid var(--navy);
  padding: 14px 16px 16px;
}
.dec-q {
  font-size: 14.5px; font-weight: 700;
  color: var(--navy);
  margin-bottom: 12px;
  line-height: 1.4;
}
.dec-opts { display: flex; flex-direction: column; gap: 8px; }
.dec-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px;
  background: var(--white);
  border: 1.5px solid var(--bdr);
  border-radius: 7px;
  cursor: pointer;
  font-family: inherit;
  font-size: 13.5px;
  color: var(--text);
  text-align: left;
  line-height: 1.4;
  transition: all .15s;
}
.dec-btn:hover { border-color: var(--navy-lt); background: #F5F8FF; }
.dec-btn.ok:hover { border-color: var(--green); background: var(--green-bg); }
.dec-btn.bad:hover { border-color: var(--red); background: var(--red-bg); }
.dec-btn.warn:hover { border-color: var(--amber); background: var(--amber-bg); }
.dec-btn.neutral:hover { border-color: var(--cyan); background: var(--cyan-bg); }
.dec-letter {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--slate-bg);
  border: 1.5px solid var(--bdr);
  font-size: 12px; font-weight: 700;
  color: var(--navy);
  display: flex; align-items: center; justify-content: center;
}
.dec-btn.ok .dec-letter { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.dec-btn.bad .dec-letter { background: var(--red-bg); border-color: var(--red); color: var(--red); }
.dec-btn.warn .dec-letter { background: var(--amber-bg); border-color: var(--amber); color: var(--amber); }
.dec-btn.neutral .dec-letter { background: var(--cyan-bg); border-color: var(--cyan); color: var(--cyan); }

/* Navegación inferior */
.c-nav {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 22px 20px;
  margin-top: 10px;
  border-top: 1px solid var(--bdr);
}
.btn-back, .btn-next {
  font-family: inherit;
  font-size: 13px; font-weight: 500;
  padding: 8px 16px;
  border-radius: 6px; cursor: pointer;
  transition: all .15s;
  border: 1.5px solid transparent;
}
.btn-back {
  background: var(--white);
  border-color: var(--bdr);
  color: var(--slate);
}
.btn-back:hover:not(:disabled) { border-color: var(--navy-lt); color: var(--navy-lt); }
.btn-back:disabled { opacity: .4; cursor: not-allowed; }
.btn-next {
  background: var(--navy-lt);
  color: #fff;
  border-color: var(--navy-lt);
  margin-left: auto;
}
.btn-next:hover { background: var(--navy); border-color: var(--navy); }

/* Tarjetas finales */
.card.end { border-top: 4px solid var(--slate); }
.card.end-success { border-top-color: var(--green); }
.card.end-error { border-top-color: var(--red); }
.card.end-warning { border-top-color: var(--amber); }
.card.end-neutral { border-top-color: var(--cyan); }

.end-body {
  padding: 28px 26px 20px;
  text-align: center;
}
.end-icon { font-size: 52px; margin-bottom: 10px; }
.end-title { font-size: 21px; font-weight: 700; margin-bottom: 4px; letter-spacing: -.2px; }
.end-success .end-title { color: var(--green); }
.end-error .end-title { color: var(--red); }
.end-warning .end-title { color: var(--amber); }
.end-neutral .end-title { color: var(--cyan); }
.end-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }
.end-actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
.btn-blue { background: var(--navy-lt); color: #fff; border: 1.5px solid var(--navy-lt); padding: 9px 18px; font-size: 13px; font-weight: 500; font-family: inherit; border-radius: 6px; cursor: pointer; transition: all .15s; }
.btn-blue:hover { background: var(--navy); border-color: var(--navy); }
.end-content { text-align: left; padding: 0 26px 20px; }

.summary-box {
  margin: 0 22px 22px;
  background: var(--slate-bg);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 14px 16px;
}
.summary-h {
  font-size: 11px; font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 10px;
}
.summary-item {
  display: flex; gap: 10px;
  padding: 6px 0;
  font-size: 12.5px;
  border-bottom: 1px dashed var(--bdr);
}
.summary-item:last-child { border-bottom: none; }
.summary-n {
  flex-shrink: 0;
  width: 20px; height: 20px;
  background: var(--navy-lt); color: #fff;
  border-radius: 50%;
  font-size: 10px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.summary-t { font-weight: 500; color: var(--text); }
.summary-c { color: var(--cyan); font-size: 11.5px; font-style: italic; margin-top: 2px; display:block; }

/* ============ ELEMENTO 5 — Mapa overlay ============ */
#mapa-overlay {
  display: none;
  flex: 1;
  overflow-y: auto;
  background: var(--slate-bg);
  padding: 22px 30px 60px;
}
.mapa-head {
  max-width: 1200px; margin: 0 auto 18px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px;
}
.mapa-title { font-size: 18px; font-weight: 700; color: var(--navy); }
.mapa-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }
.mapa-cols {
  max-width: 1400px; margin: 0 auto;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 12px;
}
@media (max-width: 1200px) { .mapa-cols { grid-template-columns: repeat(3, 1fr); } }
@media (max-width: 700px) { .mapa-cols { grid-template-columns: 1fr; } }

.mapa-col {
  background: var(--white);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 12px;
  min-height: 200px;
}
.mapa-col-h {
  font-size: 10px; font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: .5px;
  padding-bottom: 8px;
  margin-bottom: 10px;
  border-bottom: 2px solid var(--navy-lt);
}
.mapa-node {
  background: #FBFCFE;
  border: 1px solid var(--bdr);
  border-left: 3px solid var(--slate);
  border-radius: 5px;
  padding: 8px 10px;
  margin-bottom: 8px;
  font-size: 11.5px;
  line-height: 1.35;
  cursor: pointer;
  transition: all .12s;
}
.mapa-node:hover { background: var(--white); border-left-color: var(--navy-lt); }
.mapa-node.mn-visited { background: var(--green-bg); border-left-color: var(--green); }
.mapa-node.mn-current { background: var(--cyan-bg); border-left-color: var(--navy-lt); font-weight: 600; }
.mapa-node.mn-final-success { border-left-color: var(--green); }
.mapa-node.mn-final-error { border-left-color: var(--red); }
.mapa-node.mn-final-warning { border-left-color: var(--amber); }
.mapa-node.mn-final-neutral { border-left-color: var(--cyan); }
.mapa-node-t { font-weight: 600; color: var(--navy); margin-bottom: 3px; }
.mapa-node-act {
  display: inline-block; font-size: 9px; font-weight: 700;
  padding: 1px 6px; border-radius: 8px;
  letter-spacing: .4px; text-transform: uppercase;
  margin-right: 4px;
}
.mapa-node-act.act-laj { background: var(--cyan-bg); color: var(--cyan); }
.mapa-node-act.act-juez { background: var(--violet-bg); color: var(--violet); }
.mapa-node-act.act-ambos { background: var(--amber-bg); color: var(--amber); }
.mapa-node-arrows {
  font-size: 10px; color: var(--muted);
  margin-top: 6px;
  padding-top: 5px;
  border-top: 1px dashed var(--bdr);
  line-height: 1.6;
}
.mapa-node-arrows span {
  display: inline-block;
  padding: 1px 5px;

  border-radius: 3px;
  margin-right: 3px;
  margin-bottom: 2px;

/* Panel preview del paso (cuando se hace clic en el sidebar-mapa) */
#preview-panel {
  display: none;
  position: fixed;
  bottom: 0; right: 0;
  width: 380px; max-height: 60vh;
  background: var(--white);
  border: 1px solid var(--bdr);
  border-right: none; border-bottom: none;
  border-radius: 10px 0 0 0;
  box-shadow: -4px -4px 24px rgba(0,0,0,.12);
  z-index: 10;
  display: none;
  flex-direction: column;
}
#preview-panel.on { display: flex; }
.prev-hdr {
  padding: 12px 16px;
  background: var(--navy);
  color: #fff;
  border-radius: 10px 0 0 0;
  display: flex; justify-content: space-between; align-items: center;

.prev-hdr-t { font-size: 13px; font-weight: 600; }

  padding: 0; line-height: 1;
}
.prev-close:hover { color: #fff; }
.prev-body { padding: 14px 16px; overflow-y: auto; flex: 1; font-size: 13px; }
.prev-foot {
  padding: 10px 16px;
  border-top: 1px solid var(--bdr);
  display: flex; gap: 8px; justify-content: flex-end;
}

/* ============ Responsive ============ */
@media (max-width: 780px) {
  #sidebar { display: none; }
  #content { padding: 14px 12px 30px; }
  .h-title { font-size: 12.5px; }
  .h-sub { display: none; }
  .btn { padding: 6px 10px; font-size: 11px; }
  .c-title { font-size: 17px; }
  #preview-panel { width: 100%; border-radius: 10px 10px 0 0; }
}

/* ============ Impresión ============ */
@media print {
  #hdr, #pbar, #breadcrumb, #sidebar, .c-nav, .dec-area, #preview-panel { display: none !important; }
  #app { height: auto; overflow: visible; }
  body { background: #fff; color: #111; }

/* Animación pulso para nodos actuales */
@keyframes pulse-card { from { box-shadow: 0 0 0 0 rgba(65,105,225,.5); } to { box-shadow: 0 0 0 6px rgba(65,105,225,0); } }

/* Agrupación de nodos por fase (para sidebar-mapa) */
const NODES_BY_PHASE = [[], [], [], [], [], []];
Object.entries(STEPS).forEach(([k, s]) => NODES_BY_PHASE[s.ph].push(k));

/* Títulos abreviados para breadcrumb/mapa */
function shortT(key) {
  const s = STEPS[key];
  if (!s) return key;
  let t = s.t;
  if (t.length > 32) t = t.slice(0, 31) + '…';
  return t;
}

/* ============================================================
   ESTADO Y NAVEGACIÓN
   ============================================================ */

let cur = 'inicio';
let hist = []; // [{ s: claveOrigen, next: claveDestino, c: textoOpción }]
let mapaOn = false;
let activeSbTab = 'map';
let collapsedPhases = new Set();
let previewKey = null;

function goTo(stepId, choiceLabel) {
  if (!STEPS[stepId]) return;
  hist.push({ s: cur, next: stepId, c: choiceLabel || '' });
  cur = stepId;
  if (choiceLabel) sbTab('journey');
  render();
}
function goBack() {
  if (hist.length === 0) return;
  const last = hist.pop();
  cur = last.s;
  render();
}
function goBackTo(index) {
  // index: posición en hist hasta la que retroceder (esa entrada también se elimina)
  if (index < 0 || index >= hist.length) return;
  if (index === 0) {
    cur = hist[0].s;
  } else {
    cur = hist[index].s;
  }
  hist = hist.slice(0, index);
  render();
}
function restart() {
  cur = 'inicio';
  hist = [];
  sbTab('map');
  render();
}

// Función BFS para construir la ruta más corta desde 'inicio' hasta targetId
function buildPathTo(targetId) {
  if (targetId === 'inicio') return [];
  const queue = [{ node: 'inicio', path: [] }];
  const visited = new Set();
  visited.add('inicio');
  while (queue.length) {
    const current = queue.shift();
    const step = STEPS[current.node];
    if (!step) continue;
    if (step.nx) {
      const nextId = step.nx;
      const newPath = [...current.path, { s: current.node, next: nextId, c: '' }];
      if (nextId === targetId) return newPath;
      if (!visited.has(nextId)) {
        visited.add(nextId);
        queue.push({ node: nextId, path: newPath });
      }
    }
    if (step.opts) {
      for (const opt of step.opts) {
        const nextId = opt.n;
        const choiceLabel = opt.t;
        const newPath = [...current.path, { s: current.node, next: nextId, c: choiceLabel }];
        if (nextId === targetId) return newPath;
        if (!visited.has(nextId)) {
          visited.add(nextId);
          queue.push({ node: nextId, path: newPath });
        }
      }
    }
  }
  return null;
}

function jumpTo(stepId) {
  if (!STEPS[stepId]) return;
  if (stepId !== cur) {
    const path = buildPathTo(stepId);
    if (path) {
      hist = path;
    } else {
      hist = []; // fallback: no se encuentra ruta lógica
    }
  }
  cur = stepId;
  closePrev();
  render();
}

function sbTab(tab) {
  activeSbTab = tab;
  document.getElementById('sb-map').style.display = tab === 'map' ? 'block' : 'none';
  document.getElementById('sb-journey').style.display = tab === 'journey' ? 'block' : 'none';
  document.querySelectorAll('.sb-tab').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === (tab === 'map' ? 'Mapa' : 'Recorrido'));
  });
}

function toggleMapa() {
  mapaOn = !mapaOn;
  document.getElementById('layout').style.display = mapaOn ? 'none' : 'flex';
  document.getElementById('mapa-overlay').style.display = mapaOn ? 'block' : 'none';
  document.getElementById('btn-mapa').classList.toggle('active', mapaOn);
  document.getElementById('btn-mapa').textContent = mapaOn ? '↩ Ver recorrido' : '🗺 Ver mapa';
  if (mapaOn) renderMapa();
}

function togglePhaseCollapse(phaseIdx) {
  if (collapsedPhases.has(phaseIdx)) collapsedPhases.delete(phaseIdx);
  else collapsedPhases.add(phaseIdx);
  renderSbMap();
}

function escQ(s) { return (s || '').replace(/'/g, "&#39;").replace(/"/g, '&quot;'); }

/* ============================================================
   RENDER
   ============================================================ */

function render() {
  renderPbar();
  renderBreadcrumb();
  renderSidebar();
  renderContent();
  const c = document.getElementById('content');
  if (c) c.scrollTop = 0;
}

function renderPbar() {
  const curPh = STEPS[cur] ? STEPS[cur].ph : 0;
  const visitedPh = new Set(hist.map(h => STEPS[h.s] ? STEPS[h.s].ph : -1));
  let h = '';
  PHASES.forEach((p, i) => {
    let cls = '';
    if (i === curPh) cls = 'active';
    else if (i < curPh || visitedPh.has(i)) cls = 'done';
    h += `<div class="ph-item"><span class="ph-lbl ${cls}">${i + 1}. ${p}</span></div>`;
    if (i < PHASES.length - 1) h += `<span class="ph-sep">›</span>`;
  });
  document.getElementById('pbar').innerHTML = h;
}

function renderBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (hist.length === 0) {
    bc.innerHTML = `<span class="bc-item bc-current">${shortT(cur)}</span>`;
    return;
  }
  let html = '';
  hist.forEach((h, i) => {
    html += `<button class="bc-item bc-past" onclick="goBackTo(${i})" title="Volver a este paso">${shortT(h.s)}</button>`;
    html += `<span class="bc-sep">›</span>`;
  });
  html += `<span class="bc-item bc-current">${shortT(cur)}</span>`;
  bc.innerHTML = html;
}

function renderSidebar() {
  renderSbMap();
  renderSbJourney();
}

function renderSbMap() {
  const visited = new Set(hist.map(h => h.s));
  const container = document.getElementById('sb-map');
  let html = '';
  PHASES.forEach((phName, i) => {
    const nodes = NODES_BY_PHASE[i] || [];
    if (nodes.length === 0) return;
    const isCol = collapsedPhases.has(i);
    html += `<div class="sm-phase ${isCol ? 'collapsed' : ''}">`;
    html += `<div class="sm-phase-hdr" onclick="togglePhaseCollapse(${i})">
               <span>${i + 1}. ${phName}</span>
               <span class="sm-phase-arrow">▼</span>
             </div>`;
    html += `<div class="sm-nodes">`;
    nodes.forEach(k => {
      const s = STEPS[k];
      let cls = '';
      if (k === cur) cls = 'sm-current';
      else if (visited.has(k)) cls = 'sm-visited';
      if (s.end) cls += ' sm-final';
      html += `<button class="sm-node ${cls}" onclick="openPrev('${escQ(k)}')" title="${escQ(s.t)}">
                 <span class="sm-dot"></span>
                 <span>${shortT(k)}</span>
               </button>`;
    });
    html += `</div></div>`;
  });
  container.innerHTML = html;
}

function renderSbJourney() {
  const container = document.getElementById('sb-journey');
  let html = '';
  hist.forEach((h, i) => {
    const s = STEPS[h.s];
    if (!s) return;
    html += `<div class="pi past">`;
    html += `<span class="pi-num">${String(i + 1).padStart(2, '0')}</span>`;
    html += `${shortT(h.s)}`;
    if (h.c) html += `<span class="pi-choice">→ ${escQ(h.c)}</span>`;
    html += `</div>`;
  });
  // Paso actual
  const s = STEPS[cur];
  if (s) {
    html += `<div class="pi current">`;
    html += `<span class="pi-num">${String(hist.length + 1).padStart(2, '0')}</span>`;
    html += `${shortT(cur)} <span style="color:rgba(255,255,255,.5);font-size:10px">(actual)</span>`;
    html += `</div>`;
  }
  html += `<div class="sb-foot">
             <strong>Referencias</strong>
             Ley 15/2015, de 2 de julio<br>
             Arts. 13–22 LJV (comunes)<br>
             Arts. 91–95 LJV (Tít. IV)<br>
             CC: arts. 898–911, 988–1034, 1051–1087<br>
             LEC: arts. 455+, 749, 782+
           </div>`;
  container.innerHTML = html;
}

function renderContent() {
  const s = STEPS[cur];
  const c = document.getElementById('content');
  if (!s) { c.innerHTML = '<p>Paso no encontrado.</p>'; return; }
  c.innerHTML = s.end ? buildEnd(s) : buildStep(s);
}

function renderBlocks(blocks) {
  if (!blocks || !blocks.length) return '';
  return blocks.map(b => {
    const [type, ...rest] = b;
    if (type === 'i') return `<div class="blk-i">${rest[0]}</div>`;
    if (type === 'd') return `<div class="blk-d">${rest[0]}</div>`;
    if (type === 'n') return `<div class="blk-n">${rest[0]}</div>`;
    if (type === 'w') return `<div class="blk-w">${rest[0]}</div>`;
    if (type === 'l') return `<div class="blk-l">${rest[0]}</div>`;
    if (type === 'cl') {
      const [, h, items] = b;
      const lis = items.map((it, i) => `<div class="blk-cl-i">
        <span class="blk-cl-box" onclick="this.classList.toggle('checked')"></span>
        <span>${it}</span>
      </div>`).join('');
      return `<div class="blk-cl"><div class="blk-cl-h">${h}</div>${lis}</div>`;
    }
    return '';
  }).join('');
}

function buildStep(s) {
  const stepNum = hist.length + 1;
  const actLbl = ACT_LBL[s.ac] || s.ac;
  let html = `<article class="card">`;

  // Cabecera
  html += `<div class="c-hdr">
             <div class="c-meta-row">
               <span class="act-badge act-${s.ac}">${actLbl}</span>
               <span class="step-num">Paso ${stepNum} · Fase ${s.ph + 1}: ${PHASES[s.ph]}</span>
             </div>
             <h1 class="c-title">${s.t}</h1>
           </div>`;

  // Cuerpo
  html += `<div class="c-body">${renderBlocks(s.c)}</div>`;

  // Zona de decisión
  if (s.q && s.opts) {
    html += `<div class="dec-area">
               <div class="dec-q">${s.q}</div>
               <div class="dec-opts">`;
    s.opts.forEach((o, i) => {
      const letter = String.fromCharCode(65 + i); // A, B, C…
      const cls = o.l || '';
      html += `<button class="dec-btn ${cls}" onclick="goTo('${escQ(o.n)}', '${escQ(o.t)}')">
                 <span class="dec-letter">${letter}</span>
                 <span>${o.t}</span>
               </button>`;
    });
    html += `</div></div>`;
  }

  // Navegación inferior
  html += `<div class="c-nav">
             <button class="btn-back" onclick="goBack()" ${hist.length === 0 ? 'disabled' : ''}>← Volver</button>`;
  if (s.nx && !s.q) {
    html += `<button class="btn-next" onclick="goTo('${escQ(s.nx)}', '')">Siguiente →</button>`;
  }
  html += `</div></article>`;

  return html;
}

function buildEnd(s) {
  const actLbl = ACT_LBL[s.ac] || s.ac;
  const icons = { success: '✓', error: '✕', warning: '⚠', neutral: 'ℹ' };
  const labels = { success: 'Desenlace favorable', error: 'Desenlace desfavorable', warning: 'Desenlace con consecuencia específica', neutral: 'Desenlace neutro' };
  let html = `<article class="card end end-${s.end}">`;
  html += `<div class="end-body">
             <div class="end-icon">${icons[s.end] || ''}</div>
             <div class="end-title">${s.t}</div>
             <div class="end-sub">${labels[s.end]} — el procedimiento ha concluido en esta vía</div>
             <div class="end-actions">
               <button class="btn-blue" onclick="restart()">↻ Nuevo procedimiento</button>
               <button class="btn btn-ghost" style="background:var(--slate-bg);color:var(--slate);border-color:var(--bdr)" onclick="goBack()" ${hist.length === 0 ? 'disabled' : ''}>← Volver</button>
             </div>
           </div>`;
  html += `<div class="end-content"><div class="c-meta-row" style="margin-bottom:10px;">
             <span class="act-badge act-${s.ac}">${actLbl}</span>
             <span class="step-num">Fase ${s.ph + 1}: ${PHASES[s.ph]}</span>
           </div>`;
  html += renderBlocks(s.c);
  html += `</div>`;

  // Resumen del recorrido
  html += `<div class="summary-box">
             <div class="summary-h">Resumen del recorrido seguido</div>`;
  hist.forEach((h, i) => {
    const stp = STEPS[h.s];
    if (!stp) return;
    html += `<div class="summary-item">
               <span class="summary-n">${i + 1}</span>
               <div>
                 <span class="summary-t">${stp.t}</span>`;
    if (h.c) html += `<span class="summary-c">→ ${h.c}</span>`;
    html += `</div></div>`;
  });
  // Paso final
  html += `<div class="summary-item">
             <span class="summary-n" style="background:var(--${s.end === 'success' ? 'green' : s.end === 'error' ? 'red' : s.end === 'warning' ? 'amber' : 'cyan'})">${hist.length + 1}</span>
             <div><span class="summary-t">${s.t}</span>
             <span class="summary-c" style="color:var(--${s.end === 'success' ? 'green' : s.end === 'error' ? 'red' : s.end === 'warning' ? 'amber' : 'cyan'})">(desenlace)</span></div>
           </div>`;
  html += `</div></article>`;
  return html;
}

/* Preview panel: abrir al hacer clic en nodo del sidebar-mapa */
function openPrev(key) {
  previewKey = key;
  const s = STEPS[key];
  if (!s) return;
  document.getElementById('prev-title').textContent = s.t;
  let body = `<div class="c-meta-row" style="margin-bottom:10px;">
    <span class="act-badge act-${s.ac}">${ACT_LBL[s.ac]}</span>
    <span class="step-num">Fase ${s.ph + 1}: ${PHASES[s.ph]}</span>
  </div>`;
  body += renderBlocks(s.c);
  if (s.q) body += `<p style="margin-top:12px;font-weight:600;color:var(--navy);">Pregunta de decisión:</p><p style="color:var(--slate)">${s.q}</p>`;
  document.getElementById('prev-body').innerHTML = body;
  const jump = document.getElementById('prev-jump');
  if (key === cur) {
    jump.style.display = 'none';
  } else {
    jump.style.display = '';
    jump.textContent = hist.length > 0 ? 'Saltar aquí (reinicia historial) →' : 'Empezar desde aquí →';
  }
  document.getElementById('preview-panel').classList.add('on');
}
function closePrev() {
  document.getElementById('preview-panel').classList.remove('on');
  previewKey = null;
}
function jumpFromPrev() {
  if (previewKey) jumpTo(previewKey);
}

/* Mapa overlay */
function renderMapa() {
  const visited = new Set(hist.map(h => h.s));
  const colsEl = document.getElementById('mapa-cols');
  let html = '';
  PHASES.forEach((phName, i) => {
    const nodes = NODES_BY_PHASE[i] || [];
    html += `<div class="mapa-col">`;
    html += `<div class="mapa-col-h">${i + 1}. ${phName}</div>`;
    nodes.forEach(k => {
      const s = STEPS[k];
      let cls = '';
      if (k === cur) cls = 'mn-current';
      else if (visited.has(k)) cls = 'mn-visited';
      else if (s.end) cls = 'mn-final-' + s.end;
      html += `<div class="mapa-node ${cls}" onclick="openPrev('${escQ(k)}')">`;
      html += `<div class="mapa-node-t">${s.t.length > 48 ? s.t.slice(0, 47) + '…' : s.t}</div>`;
      html += `<span class="mapa-node-act act-${s.ac}">${ACT_LBL[s.ac]}</span>`;
      // Flechas (opciones o siguiente)
      let arrows = '';
      if (s.opts) {
        s.opts.forEach(o => {
          const short = o.t.length > 26 ? o.t.slice(0, 25) + '…' : o.t;
          arrows += `<span>→ ${short}</span>`;
        });
      } else if (s.nx) {
        arrows += `<span>→ siguiente</span>`;
      } else if (s.end) {
        arrows += `<span style="color:var(--${s.end === 'success' ? 'green' : s.end === 'error' ? 'red' : s.end === 'warning' ? 'amber' : 'cyan'});font-weight:600">■ Desenlace</span>`;
      }
      if (arrows) html += `<div class="mapa-node-arrows">${arrows}</div>`;
      html += `</div>`;
    });
    html += `</div>`;
  });
  colsEl.innerHTML = html;
}

/* Descarga de la guía completa */
function dlGuia() {
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'guia-tramitacion-sucesorio.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

   ============================================================ */

document.addEventListener('DOMContentLoaded', () => {
  render();
});
