<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guía de tramitación — Título V Ley 15/2015 (Derecho de obligaciones)</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
/* =======================================================
   MÓDULO 1 — Paleta completa de variables CSS
   ======================================================= */
:root {
  --navy:      #1A2F6E;
  --navy-mid:  #2E4DAA;
  --navy-lt:   #4169E1;
  --cyan:      #0D9488;    --cyan-bg:   #F0FDFA;
  --violet:    #5B21B6;    --violet-bg: #F5F3FF;
  --green:     #15803D;    --green-bg:  #F0FDF4;
  --amber:     #B45309;    --amber-bg:  #FFFBEB;
  --red:       #B91C1C;    --red-bg:    #FEF2F2;
  --slate:     #475569;    --slate-bg:  #F4F6FB;
  --white:     #FFFFFF;
  --bdr:       #D1D9EE;
  --text:      #1A1A2E;
  --muted:     #6B7280;
}

/* =======================================================
   MÓDULO 2 — Reset mínimo y base
   ======================================================= */
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Outfit', system-ui, -apple-system, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  color: var(--text);
  background: var(--slate-bg);
  -webkit-font-smoothing: antialiased;
}
button {
  font: inherit;
  color: inherit;
  background: transparent;
  border: 0;
  padding: 0;
  margin: 0;
  cursor: pointer;
  text-align: inherit;
}
button:disabled { cursor: not-allowed; opacity: .45; }
:focus-visible { outline: 2px solid var(--navy-lt); outline-offset: 2px; }

.law {
  font-family: ui-monospace, SFMono-Regular, 'SF Mono', Consolas, 'Liberation Mono', monospace;
  font-size: 12.5px;
}

/* =======================================================
   MÓDULO 4 — Layout principal #app (arquitectura 100vh flex)
   ======================================================= */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* =======================================================
   MÓDULO 5 — Cabecera #hdr
   ======================================================= */
#hdr {
  flex-shrink: 0;
  height: 56px;
  background: var(--navy);
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 20px;
  color: #fff;
}
.h-left { display: flex; align-items: center; gap: 12px; }
.h-seal {
  width: 32px; height: 32px;
  background: rgba(255,255,255,.10);
  border: 1.5px solid rgba(255,255,255,.25);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
.h-title { font-size: 14px; font-weight: 700; line-height: 1.2; }
.h-sub   { font-size: 10px; opacity: .55; letter-spacing: .3px; }

.h-right { display: flex; gap: 8px; }
.btn {
  font-size: 12.5px;
  padding: 7px 12px;
  border-radius: 6px;
  transition: all .15s;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 5px;
}
.btn-ghost {
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.18);
  color: rgba(255,255,255,.85);
}
.btn-ghost:hover { background: rgba(255,255,255,.18); color: #fff; }

/* =======================================================
   MÓDULO 6 — Barra de fases #pbar
   ======================================================= */
#pbar {
  flex-shrink: 0;
  height: 36px;
  background: var(--navy-mid);
  display: flex;
  align-items: center;
  padding: 0 20px;
  overflow-x: auto;
  scrollbar-width: none;
}
#pbar::-webkit-scrollbar { display: none; }
.ph-item { display: inline-flex; align-items: center; }
.ph-lbl {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 4px;
  white-space: nowrap;
  letter-spacing: .2px;
  color: rgba(255,255,255,.40);
  transition: all .15s;
}
.ph-lbl.active {
  background: rgba(65,105,225,.35);
  color: #fff;
  font-weight: 700;
}
.ph-lbl.done { color: rgba(255,255,255,.70); }
.ph-sep { color: rgba(255,255,255,.30); padding: 0 4px; font-size: 11px; }

/* =======================================================
   MÓDULO 7 — Migas de pan #breadcrumb
   ======================================================= */
#breadcrumb {
  flex-shrink: 0;
  height: 34px;
  background: var(--slate-bg);
  border-bottom: 1px solid var(--bdr);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
#breadcrumb::-webkit-scrollbar { display: none; }
.bc-item { font-size: 11px; white-space: nowrap; padding: 0 6px; color: var(--muted); font-family: inherit; }
.bc-past { cursor: pointer; background: none; border: none; }
.bc-past:hover { color: var(--navy-lt); text-decoration: underline; }
.bc-current { font-weight: 600; color: var(--navy); }
.bc-sep { font-size: 10px; color: var(--bdr); padding: 0 2px; }

/* =======================================================
   MÓDULO 8 — Contenedor #layout
   ======================================================= */
#layout {
  flex: 1;
  overflow: hidden;
  display: flex;
}

/* =======================================================
   MÓDULO 9 — Sidebar dual #sidebar
   ======================================================= */
#sidebar {
  width: 260px;
  flex-shrink: 0;
  background: var(--navy-mid);
  overflow-y: auto;
  color: #fff;
}
#sb-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,.10); position: sticky; top: 0; background: var(--navy-mid); z-index: 5; }
.sb-tab {
  flex: 1;
  padding: 10px 0;
  font-size: 11px;
  font-weight: 600;
  font-family: inherit;
  background: none;
  border: none;
  color: rgba(255,255,255,.40);
  cursor: pointer;
  letter-spacing: .4px;
  text-transform: uppercase;
  transition: all .15s;
}
.sb-tab.active {
  color: #fff;
  border-bottom: 2px solid var(--navy-lt);
}
.sb-tab:hover:not(.active) {
  color: rgba(255,255,255,.70);
  background: rgba(255,255,255,.05);
}

/* Pestaña Mapa */
.sm-phase { border-bottom: 1px solid rgba(255,255,255,.08); }
.sm-phase-hdr {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 14px 8px;
  font-size: 10.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: rgba(255,255,255,.70);
  background: none;
  border: none;
  cursor: pointer;
  font-family: inherit;
}
.sm-phase-hdr:hover { color: #fff; background: rgba(255,255,255,.04); }
.sm-phase-chev { font-size: 9px; transition: transform .15s; }
.sm-phase.collapsed .sm-phase-chev { transform: rotate(-90deg); }
.sm-phase.collapsed .sm-nodes { display: none; }
.sm-nodes { padding: 0 8px 8px 14px; display: flex; flex-direction: column; gap: 2px; }
.sm-node {
  font-size: 12px;
  padding: 5px 8px 5px 18px;
  border-radius: 4px;
  color: rgba(255,255,255,.65);
  background: none;
  border: none;
  text-align: left;
  font-family: inherit;
  cursor: pointer;
  position: relative;
  line-height: 1.35;
  transition: all .15s;
}
.sm-node:hover { background: rgba(255,255,255,.08); color: #fff; }
.sm-node::before {
  content: '';
  position: absolute;
  left: 6px; top: 10px;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,.30);
}
.sm-node.sm-visited { color: rgba(167,243,208,.95); }
.sm-node.sm-visited::before { content: '✓'; background: none; color: var(--green); font-size: 10px; top: 5px; font-weight: 700; }
.sm-node.sm-current { color: #fff; font-weight: 700; background: rgba(65,105,225,.25); }
.sm-node.sm-current::before { background: var(--navy-lt); box-shadow: 0 0 0 3px rgba(65,105,225,.35); animation: pulse 1.4s infinite; }
.sm-node.sm-unreachable { color: rgba(255,255,255,.25); }
.sm-node.sm-unreachable::before { background: rgba(255,255,255,.15); }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .55; } }

/* Pestaña Recorrido */
#sb-journey { padding: 10px 0; }
.pi {
  padding: 8px 14px;
  border-left: 3px solid transparent;
  font-size: 12px;
  line-height: 1.35;
}
.pi.past { color: rgba(255,255,255,.55); border-left-color: rgba(255,255,255,.20); }
.pi.current { color: #fff; font-weight: 600; border-left-color: var(--navy-lt); background: rgba(65,105,225,.18); }
.pi-title { display: block; }
.pi-choice { display: block; font-size: 11px; font-style: italic; margin-top: 3px; color: rgba(255,255,255,.50); }
.pi.current .pi-choice { color: rgba(255,255,255,.75); }

.sb-foot {
  padding: 14px;
  border-top: 1px solid rgba(255,255,255,.08);
  font-size: 10.5px;
  line-height: 1.5;
  color: rgba(255,255,255,.55);
  margin-top: 10px;
}
.sb-foot-title {
  font-size: 9.5px;
  font-weight: 700;
  letter-spacing: .6px;
  text-transform: uppercase;
  color: rgba(255,255,255,.70);
  margin-bottom: 6px;
}
.sb-foot code { font-family: ui-monospace, monospace; color: rgba(255,255,255,.75); font-size: 10px; }

/* =======================================================
   ÁREA DE CONTENIDO
   ======================================================= */
#content {
  flex: 1;
  overflow-y: auto;
  padding: 26px 34px 40px;
}

/* =======================================================
   MÓDULO 13 — Tarjeta de paso .card
   ======================================================= */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
.card {
  max-width: 820px;
  background: var(--white);
  border: 1px solid var(--bdr);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(15,23,42,.04);
  animation: fadeUp .22s ease;
  overflow: hidden;
}
.c-hdr {
  padding: 18px 24px 14px;
  border-bottom: 1px solid var(--bdr);
  background: var(--slate-bg);
}
.act-badge {
  display: inline-block;
  font-size: 10.5px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
  letter-spacing: .4px;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.act-laj    { background: var(--violet-bg); color: var(--violet); border: 1px solid #ddd6fe; }
.act-juez   { background: var(--cyan-bg);   color: var(--cyan);   border: 1px solid #a5f3fc; }
.act-ambos  { background: var(--amber-bg);  color: var(--amber);  border: 1px solid #fde68a; }
.c-title {
  font-size: 19px;
  font-weight: 700;
  color: var(--navy);
  margin: 0 0 4px;
  line-height: 1.3;
}
.step-num {
  font-size: 11px;
  color: var(--muted);
  letter-spacing: .2px;
}

.c-body { padding: 18px 24px 4px; }
.c-body > * + * { margin-top: 12px; }

.blk-i { font-size: 15px; color: var(--text); line-height: 1.6; }
.blk-n {
  background: var(--cyan-bg);
  border-left: 3px solid var(--cyan);
  border-radius: 0 6px 6px 0;
  padding: 10px 14px;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.5;
}
.blk-n::before { content: 'ℹ  '; color: var(--cyan); font-weight: 700; }
.blk-w {
  background: var(--amber-bg);
  border-left: 3px solid var(--amber);
  border-radius: 0 6px 6px 0;
  padding: 10px 14px;
  font-size: 13.5px;
  color: var(--text);
  line-height: 1.5;
}
.blk-w::before { content: '⚠  '; color: var(--amber); font-weight: 700; }
.blk-d {
  background: var(--red-bg);
  border-left: 3px solid var(--red);
  border-radius: 0 6px 6px 0;
  padding: 10px 14px;
  font-size: 13.5px;
  color: var(--text);
  font-weight: 500;
}
.blk-d::before { content: '⏱  Plazo: '; color: var(--red); font-weight: 700; }
.blk-l {
  background: var(--slate-bg);
  border: 1px solid var(--bdr);
  border-radius: 6px;
  padding: 8px 12px;
  font-family: ui-monospace, SFMono-Regular, monospace;
  font-size: 12px;
  color: var(--slate);
}
.blk-l::before { content: '§ '; color: var(--navy); font-weight: 700; }
.blk-cl {
  background: #fff;
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 12px 14px;
}
.blk-cl-title {
  font-size: 12.5px;
  font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 8px;
}
.blk-cl ul { margin: 0; padding: 0; list-style: none; }
.blk-cl li {
  font-size: 13.5px;
  padding: 4px 0 4px 22px;
  position: relative;
  line-height: 1.45;
}
.blk-cl li::before {
  content: '';
  position: absolute;
  left: 0; top: 7px;
  width: 13px; height: 13px;
  border: 1.5px solid var(--navy-lt);
  border-radius: 3px;
  background: #fff;
}

/* Zona de decisión */
.dec-area {
  margin: 18px 24px;
  border: 1px solid var(--bdr);
  border-top: 3px solid var(--navy);
  border-radius: 8px;
  overflow: hidden;
}
.dec-q {
  padding: 14px 18px;
  background: var(--slate-bg);
  font-size: 15px;
  font-weight: 600;
  color: var(--navy);
  border-bottom: 1px solid var(--bdr);
}
.dec-q::before { content: '❓  '; font-size: 14px; }
.dec-opts { display: flex; flex-direction: column; padding: 10px; gap: 8px; }
.dec-btn {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 16px;
  border: 1.5px solid var(--bdr);
  border-radius: 8px;
  background: #fff;
  transition: all .15s;
  font-size: 14px;
  line-height: 1.4;
  text-align: left;
  width: 100%;
  font-family: inherit;
  color: var(--text);
}
.dec-btn:hover { border-color: var(--navy-lt); background: var(--slate-bg); transform: translateX(2px); }
.dec-btn.ok:hover       { border-color: var(--green);  background: var(--green-bg); }
.dec-btn.bad:hover      { border-color: var(--red);    background: var(--red-bg); }
.dec-btn.warn:hover     { border-color: var(--amber);  background: var(--amber-bg); }
.dec-btn.neutral:hover  { border-color: var(--slate);  background: var(--slate-bg); }
.dec-letter {
  flex-shrink: 0;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: var(--navy-lt);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
  font-size: 12px;
}
.dec-btn.ok       .dec-letter { background: var(--green); }
.dec-btn.bad      .dec-letter { background: var(--red); }
.dec-btn.warn     .dec-letter { background: var(--amber); }
.dec-btn.neutral  .dec-letter { background: var(--slate); }

/* Barra de navegación inferior */
.c-nav {
  display: flex;
  justify-content: space-between;
  padding: 14px 24px 18px;
  border-top: 1px solid var(--bdr);
  background: var(--slate-bg);
  gap: 10px;
}
.btn-back, .btn-next {
  padding: 9px 16px;
  border-radius: 7px;
  font-size: 13.5px;
  font-weight: 600;
  font-family: inherit;
  transition: all .15s;
  border: 1px solid var(--bdr);
}
.btn-back { background: #fff; color: var(--slate); }
.btn-back:hover:not(:disabled) { background: var(--slate-bg); border-color: var(--slate); }
.btn-next, .btn-blue {
  background: var(--navy-lt);
  color: #fff;
  border-color: var(--navy-lt);
}
.btn-next:hover, .btn-blue:hover { background: var(--navy); border-color: var(--navy); }

/* =======================================================
   MÓDULO 14 — Tarjeta final
   ======================================================= */
.card.end-success { border-top: 5px solid var(--green); }
.card.end-error   { border-top: 5px solid var(--red); }
.card.end-warning { border-top: 5px solid var(--amber); }
.card.end-neutral { border-top: 5px solid var(--slate); }

.end-body {
  padding: 30px 24px 10px;
  text-align: center;
}
.end-icon { font-size: 46px; line-height: 1; margin-bottom: 8px; }
.end-title {
  font-size: 22px;
  font-weight: 700;
  margin: 0 0 6px;
}
.card.end-success .end-title { color: var(--green); }
.card.end-error   .end-title { color: var(--red); }
.card.end-warning .end-title { color: var(--amber); }
.card.end-neutral .end-title { color: var(--navy); }
.end-sub { font-size: 13px; color: var(--muted); margin-bottom: 18px; }

.end-actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 14px 0 6px;
}
.end-actions .btn {
  padding: 10px 18px;
  border-radius: 7px;
  font-size: 13.5px;
  font-weight: 600;
  border: 1px solid var(--bdr);
}
.btn-primary { background: var(--navy-lt); color: #fff; border-color: var(--navy-lt); }
.btn-primary:hover { background: var(--navy); }
.btn-secondary { background: #fff; color: var(--slate); }
.btn-secondary:hover { background: var(--slate-bg); border-color: var(--slate); }

.end-content {
  padding: 6px 24px 20px;
  text-align: left;
}
.end-content > * + * { margin-top: 12px; }

.summary-box {
  margin: 18px 24px 22px;
  background: var(--slate-bg);
  border: 1px solid var(--bdr);
  border-radius: 8px;
  padding: 14px 18px;
}
.summary-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--navy);
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 10px;
}
.summary-list { margin: 0; padding-left: 20px; font-size: 13px; line-height: 1.55; color: var(--text); }
.summary-list li { margin-bottom: 4px; }
.summary-list .sm-choice { color: var(--navy-lt); font-style: italic; }

/* =======================================================
   MÓDULO 10 — Vista de mapa completo #mapa-overlay
   ======================================================= */
#mapa-overlay {
  flex: 1;
  overflow: auto;
  background: var(--slate-bg);
  padding: 24px;
}
.mapa-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 14px;
  border-bottom: 1px solid var(--bdr);
}
.mapa-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--navy);
}
.mapa-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

.mapa-cols {
  display: flex;
  gap: 14px;
  align-items: flex-start;
  overflow-x: auto;
  padding-bottom: 20px;
}
.mapa-col {
  flex: 1 0 240px;
  min-width: 240px;
  max-width: 280px;
}
.mapa-col-hdr {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: #fff;
  background: var(--navy-mid);
  padding: 8px 12px;
  border-radius: 6px;
  margin-bottom: 10px;
  text-align: center;
}
.mapa-nodes { display: flex; flex-direction: column; gap: 8px; }
.mapa-node {
  background: #fff;
  border: 1px solid var(--bdr);
  border-left: 3px solid var(--slate);
  border-radius: 6px;
  padding: 10px 12px;
  font-size: 12.5px;
  line-height: 1.4;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
  text-align: left;
  width: 100%;
  display: block;
}
.mapa-node:hover { box-shadow: 0 3px 10px rgba(15,23,42,.10); transform: translateY(-1px); }
.mapa-node-t { font-weight: 600; color: var(--navy); margin-bottom: 4px; }
.mapa-node-badge {
  display: inline-block;
  font-size: 9.5px;
  padding: 1px 6px;
  border-radius: 999px;
  letter-spacing: .3px;
  text-transform: uppercase;
  font-weight: 700;
  margin-top: 4px;
}
.mapa-node-badge.laj    { background: var(--violet-bg); color: var(--violet); }
.mapa-node-badge.juez   { background: var(--cyan-bg);   color: var(--cyan); }
.mapa-node-badge.ambos  { background: var(--amber-bg);  color: var(--amber); }

.mapa-node.visited { border-left-color: var(--green); background: var(--green-bg); }
.mapa-node.current { border-left-color: var(--navy-lt); background: var(--cyan-bg); box-shadow: 0 2px 8px rgba(65,105,225,.25); }
.mapa-node.end-success { border-left-color: var(--green); }
.mapa-node.end-error   { border-left-color: var(--red); }
.mapa-node.end-warning { border-left-color: var(--amber); }
.mapa-node.end-neutral { border-left-color: var(--slate); }

.mapa-arrows {
  margin-top: 6px;
  padding-top: 6px;
  border-top: 1px dashed var(--bdr);
  font-size: 10.5px;
  color: var(--muted);
  line-height: 1.5;
}
.mapa-arrow { display: block; }
.mapa-arrow::before { content: '→ '; color: var(--navy-lt); font-weight: 700; }

/* =======================================================
   MÓDULO 23 — CSS de impresión
   ======================================================= */
@media print {
  body { background: #fff; color: #111; }

/* ============================================================
   ESTADO (Módulo 16)
   ============================================================ */
let cur = 'inicio';
let hist = []; // [{s, next, c}]
let activeSbTab = 'map';
let mapaOn = false;
let phaseCollapsed = {}; // estado de las fases del mapa

/* ============================================================
   NAVEGACIÓN (Módulo 16)
   ============================================================ */
function goTo(stepId, choiceLabel) {
  if (!STEPS[stepId]) return;
  hist.push({ s: cur, next: stepId, c: choiceLabel || '' });
  cur = stepId;
  if (choiceLabel) sbTab('journey');
  render();
}
function goBack() {
  if (hist.length === 0) return;
  cur = hist.pop().s;
  render();
}
function goBackTo(index) {
  if (index < 0 || index >= hist.length) return;
  cur = hist[index].next;
  hist = hist.slice(0, index);
  render();
}
function restart() {
  cur = 'inicio';
  hist = [];
  sbTab('map');
  render();
}
function sbTab(tab) {
  activeSbTab = tab;
  const map = document.getElementById('sb-map');
  const jny = document.getElementById('sb-journey');
  if (map) map.style.display = (tab === 'map')     ? 'block' : 'none';
  if (jny) jny.style.display = (tab === 'journey') ? 'block' : 'none';
  document.querySelectorAll('.sb-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.tab === tab);
  });
}
function toggleMapa() {
  mapaOn = !mapaOn;
  const lay = document.getElementById('layout');
  const ovl = document.getElementById('mapa-overlay');
  if (lay) lay.style.display = mapaOn ? 'none'  : 'flex';
  if (ovl) ovl.style.display = mapaOn ? 'block' : 'none';
  if (mapaOn) renderMapa();
}

// Reconstruye la ruta más corta desde 'inicio' hasta targetId
function buildPathTo(targetId) {
  if (targetId === 'inicio') return [];
  const queue = [{ node: 'inicio', path: [] }];
  const visited = new Set();
  visited.add('inicio');
  while (queue.length) {
    const current = queue.shift();
    const step = STEPS[current.node];
    if (!step) continue;
    if (step.nx) {
      const nextId = step.nx;
      const newPath = [...current.path, { s: current.node, next: nextId, c: '' }];
      if (nextId === targetId) return newPath;
      if (!visited.has(nextId)) {
        visited.add(nextId);
        queue.push({ node: nextId, path: newPath });
      }
    }
    if (step.opts) {
      for (const opt of step.opts) {
        const nextId = opt.n;
        const choiceLabel = opt.t;
        const newPath = [...current.path, { s: current.node, next: nextId, c: choiceLabel }];
        if (nextId === targetId) return newPath;
        if (!visited.has(nextId)) {
          visited.add(nextId);
          queue.push({ node: nextId, path: newPath });
        }
      }
    }
  }
  return null;
}

function jumpTo(stepId) {
  if (!STEPS[stepId]) return;
  if (stepId !== cur) {
    const path = buildPathTo(stepId);
    if (path) {
      hist = path;
    } else {
      hist = [];
    }
  }
  cur = stepId;
  if (mapaOn) toggleMapa();
  render();
}

function syncHash() {
  const current = window.location.hash.replace('#', '');
  if (current !== cur) {
    try { history.replaceState(null, '', '#' + cur); } catch (e) { /* entornos sin history API */ }
  }
}
function loadFromHash() {
  const h = window.location.hash.replace('#', '');
  if (h && STEPS[h]) { cur = h; hist = []; }
}

/* ============================================================
   UTILIDADES
   ============================================================ */
function escH(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function escQ(s) { return String(s).replace(/'/g, '&#39;'); }
function truncate(s, n) {
  const t = String(s);
  return t.length > n ? t.slice(0, n - 1) + '…' : t;
}
function actorLabel(ac) {
  if (ac === 'laj')   return 'Letrado/a de la Administración de Justicia';
  if (ac === 'juez')  return 'Juez de Primera Instancia';
  if (ac === 'ambos') return 'LAJ y Juez';
  return 'Operador procedimental';
}
function actorShort(ac) {
  if (ac === 'laj')   return 'LAJ';
  if (ac === 'juez')  return 'Juez';
  if (ac === 'ambos') return 'LAJ + Juez';
  return 'Actor';
}

/* Mapa de alcance: qué pasos son alcanzables desde un nodo origen */
function reachableFrom(origin) {
  const reached = new Set();
  const stack = [origin];
  while (stack.length) {
    const k = stack.pop();
    if (reached.has(k)) continue;
    reached.add(k);
    const s = STEPS[k];
    if (!s) continue;
    if (s.nx) stack.push(s.nx);
    if (s.opts) s.opts.forEach(o => stack.push(o.n));
  }
  return reached;
}

/* ============================================================
   RENDER — BARRA DE FASES
   ============================================================ */
function renderPbar() {
  const host = document.getElementById('pbar');
  if (!host) return;
  const curPh = STEPS[cur] ? STEPS[cur].ph : 0;
  const visitedPhases = new Set(hist.map(h => STEPS[h.next] ? STEPS[h.next].ph : -1));
  visitedPhases.add(curPh);

  let html = '';
  PHASES.forEach((p, i) => {
    let cls = '';
    if (i === curPh) cls = 'active';
    else if (visitedPhases.has(i) || (i < curPh && hasVisitedInOrUpTo(i))) cls = 'done';
    html += '<div class="ph-item">';
    html += '<span class="ph-lbl ' + cls + '">' + escH(p) + '</span>';
    if (i < PHASES.length - 1) html += '<span class="ph-sep">›</span>';
    html += '</div>';
  });
  host.innerHTML = html;
}
function hasVisitedInOrUpTo(phIdx) {
  // Considera "done" cualquier fase cuyo índice sea menor al actual y que haya habido historial
  if (hist.length === 0) return false;
  return PHASES.indexOf(PHASES[phIdx]) < (STEPS[cur] ? STEPS[cur].ph : 0);
}

/* ============================================================
   RENDER — MIGAS DE PAN
   ============================================================ */
function renderBreadcrumb() {
  const host = document.getElementById('breadcrumb');
  if (!host) return;
  if (hist.length === 0) {
    host.innerHTML = '<span class="bc-item bc-current">' + escH(truncate(STEPS[cur] ? STEPS[cur].t : '', 48)) + '</span>';
    return;
  }
  let html = '';
  hist.forEach((h, i) => {
    const step = STEPS[h.s] || { t: h.s };
    html += '<button class="bc-item bc-past" data-action="go-back-to" data-index="' + i + '" title="' + escH(step.t) + '">' + escH(truncate(step.t, 28)) + '</button>';
    html += '<span class="bc-sep">›</span>';
  });
  html += '<span class="bc-item bc-current">' + escH(truncate(STEPS[cur] ? STEPS[cur].t : '', 32)) + '</span>';
  host.innerHTML = html;
}

/* ============================================================
   RENDER — SIDEBAR (Mapa y Recorrido)
   ============================================================ */
function renderSidebar() {
  renderSbMap();
  renderSbJourney();
}

function renderSbMap() {
  const host = document.getElementById('sb-map');
  if (!host) return;

  // Nodos visitados en el recorrido activo
  const visited = new Set(hist.map(h => h.s));
  // Nodos alcanzables desde el punto actual (potencial futuro del recorrido)
  const fromCur = reachableFrom(cur);

  // Agrupar STEPS por fase
  const byPhase = PHASES.map(() => []);
  Object.keys(STEPS).forEach(k => {
    const s = STEPS[k];
    if (typeof s.ph === 'number' && byPhase[s.ph]) byPhase[s.ph].push(k);
  });

  let html = '';
  PHASES.forEach((p, i) => {
    const collapsed = phaseCollapsed[i] ? ' collapsed' : '';
    html += '<section class="sm-phase' + collapsed + '" data-phase="' + i + '">';
    html += '<button class="sm-phase-hdr" data-action="toggle-phase" data-phase="' + i + '">';
    html += '<span>Fase ' + (i + 1) + '. ' + escH(p) + '</span>';
    html += '<span class="sm-phase-chev">▼</span>';
    html += '</button>';
    html += '<div class="sm-nodes">';
    byPhase[i].forEach(k => {
      const s = STEPS[k];
      let nodeCls = '';
      if (k === cur) nodeCls = 'sm-current';
      else if (visited.has(k)) nodeCls = 'sm-visited';
      else if (!fromCur.has(k) && hist.length > 0) nodeCls = 'sm-unreachable';
      html += '<button class="sm-node ' + nodeCls + '" data-action="jump-to" data-step="' + escH(k) + '" title="' + escH(s.t) + '">';
      html += escH(truncate(s.t, 48));
      html += '</button>';
    });
    html += '</div></section>';
  });
  host.innerHTML = html;
}

function renderSbJourney() {
  const host = document.getElementById('sb-journey');
  if (!host) return;
  let html = '<div style="padding:10px 14px 6px; font-size:9.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:rgba(255,255,255,.70)">Recorrido activo</div>';

  if (hist.length === 0) {
    html += '<div class="pi current"><span class="pi-title">' + escH(STEPS[cur] ? STEPS[cur].t : '') + '</span></div>';
  } else {
    hist.forEach((h, i) => {
      const s = STEPS[h.s] || { t: h.s };
      html += '<div class="pi past">';
      html += '<span class="pi-title">' + (i + 1) + '. ' + escH(s.t) + '</span>';
      if (h.c) html += '<span class="pi-choice">→ ' + escH(h.c) + '</span>';
      html += '</div>';
    });
    html += '<div class="pi current">';
    html += '<span class="pi-title">' + (hist.length + 1) + '. ' + escH(STEPS[cur] ? STEPS[cur].t : '') + '</span>';
    html += '</div>';
  }
  host.innerHTML = html;
}

/* ============================================================
   RENDER — TARJETA DE PASO
   ============================================================ */
function buildBlock(blk) {
  if (!Array.isArray(blk)) return '';
  const kind = blk[0];
  if (kind === 'i')  return '<div class="blk-i">' + escH(blk[1]) + '</div>';
  if (kind === 'n')  return '<div class="blk-n">' + escH(blk[1]) + '</div>';
  if (kind === 'w')  return '<div class="blk-w">' + escH(blk[1]) + '</div>';
  if (kind === 'd')  return '<div class="blk-d">' + escH(blk[1]) + '</div>';
  if (kind === 'l')  return '<div class="blk-l">' + escH(blk[1]) + '</div>';
  if (kind === 'cl') {
    const title = blk[1] || '';
    const items = Array.isArray(blk[2]) ? blk[2] : [];
    let s = '<div class="blk-cl"><div class="blk-cl-title">' + escH(title) + '</div><ul>';
    items.forEach(it => { s += '<li>' + escH(it) + '</li>'; });
    return s + '</ul></div>';
  }
  return '';
}

function buildStep(s) {
  const stepNum = hist.length + 1;
  const phaseName = PHASES[s.ph] || '';
  const actorClass = s.ac === 'laj' ? 'act-laj' : (s.ac === 'juez' ? 'act-juez' : 'act-ambos');
  const actorName = actorLabel(s.ac);

  let html = '<div class="card">';
  html += '<div class="c-hdr">';
  html += '<div class="act-badge ' + actorClass + '">' + escH(actorName) + '</div>';
  html += '<h1 class="c-title">' + escH(s.t) + '</h1>';
  html += '<div class="step-num">Paso ' + stepNum + ' de este recorrido · Fase ' + (s.ph + 1) + ': ' + escH(phaseName) + '</div>';
  html += '</div>';

  html += '<div class="c-body">';
  (s.c || []).forEach(b => { html += buildBlock(b); });
  html += '</div>';

  if (s.q) {
    html += '<div class="dec-area">';
    html += '<div class="dec-q">' + escH(s.q) + '</div>';
    html += '<div class="dec-opts">';
    (s.opts || []).forEach(o => {
      const cls = o.l === 'A' ? 'ok' : (o.l === 'X' ? 'bad' : (o.l === 'W' ? 'warn' : 'neutral'));
      html += '<button class="dec-btn ' + cls + '" data-action="go-to" data-step="' + escH(o.n) + '" data-label="' + escH(o.t) + '">';
      html += '<span class="dec-letter">' + escH(o.l) + '</span>';
      html += '<span>' + escH(o.t) + '</span>';
      html += '</button>';
    });
    html += '</div></div>';
  }

  html += '<div class="c-nav">';
  html += '<button class="btn-back" data-action="go-back"' + (hist.length === 0 ? ' disabled' : '') + '>← Volver</button>';
  if (s.nx) {
    html += '<button class="btn-next" data-action="go-to" data-step="' + escH(s.nx) + '" data-label="">Siguiente →</button>';
  } else {
    html += '<span></span>';
  }
  html += '</div>';

  html += '</div>';
  return html;
}

function buildEnd(s) {
  const iconMap = { success: '✅', error: '❌', warning: '⚠️', neutral: 'ℹ️' };
  const icon = iconMap[s.end] || 'ℹ️';

  let html = '<div class="card end-' + s.end + '">';
  html += '<div class="end-body">';
  html += '<div class="end-icon">' + icon + '</div>';
  html += '<h1 class="end-title">' + escH(s.t) + '</h1>';
  html += '<div class="end-sub">El procedimiento ha concluido en esta vía.</div>';
  html += '<div class="end-actions">';
  html += '<button class="btn btn-primary" data-action="reiniciar">↺ Nuevo procedimiento</button>';
  html += '<button class="btn btn-secondary" data-action="go-back"' + (hist.length === 0 ? ' disabled' : '') + '>← Volver</button>';
  html += '</div></div>';

  html += '<div class="end-content">';
  (s.c || []).forEach(b => { html += buildBlock(b); });
  html += '</div>';

  // Resumen del recorrido
  html += '<div class="summary-box">';
  html += '<div class="summary-title">Resumen del recorrido seguido</div>';
  html += '<ol class="summary-list">';
  hist.forEach(h => {
    const step = STEPS[h.s] || { t: h.s };
    html += '<li>' + escH(step.t);
    if (h.c) html += ' <span class="sm-choice">→ ' + escH(h.c) + '</span>';
    html += '</li>';
  });
  html += '<li><strong>' + escH(s.t) + '</strong></li>';
  html += '</ol></div>';

  html += '</div>';
  return html;
}

/* ============================================================
   RENDER — CONTENIDO Y MAPA COMPLETO
   ============================================================ */
function renderContent() {
  const s = STEPS[cur];
  const host = document.getElementById('content');
  if (!host) return;
  if (!s) {
    host.innerHTML = '<div class="card"><div class="c-body"><div class="blk-w">No se encuentra el paso solicitado.</div></div></div>';
    return;
  }
  host.innerHTML = s.end ? buildEnd(s) : buildStep(s);
}

function renderMapa() {
  const host = document.getElementById('mapa-overlay');
  if (!host) return;

  const visited = new Set(hist.map(h => h.s));
  visited.add(cur);

  const byPhase = PHASES.map(() => []);
  Object.keys(STEPS).forEach(k => {
    const s = STEPS[k];
    if (typeof s.ph === 'number' && byPhase[s.ph]) byPhase[s.ph].push(k);
  });

  let html = '';
  html += '<div class="mapa-hdr">';
  html += '<div><div class="mapa-title">Vista de mapa completo del procedimiento</div><div class="mapa-sub">Todos los nodos, fases y desenlaces · Pulsa cualquier nodo para saltar a ese paso sin perder coherencia del recorrido.</div></div>';
  html += '<button class="btn btn-blue" data-action="close-mapa" style="padding:8px 14px;border:0;border-radius:7px">← Volver al recorrido</button>';
  html += '</div>';

  html += '<div class="mapa-cols">';
  PHASES.forEach((p, i) => {
    html += '<div class="mapa-col">';
    html += '<div class="mapa-col-hdr">Fase ' + (i + 1) + '. ' + escH(p) + '</div>';
    html += '<div class="mapa-nodes">';
    byPhase[i].forEach(k => {
      const s = STEPS[k];
      let cls = '';
      if (k === cur) cls = 'current';
      else if (visited.has(k)) cls = 'visited';
      if (s.end) cls += ' end-' + s.end;
      html += '<button class="mapa-node ' + cls + '" data-action="jump-to" data-step="' + escH(k) + '">';
      html += '<div class="mapa-node-t">' + escH(s.t) + '</div>';
      html += '<span class="mapa-node-badge ' + (s.ac || 'laj') + '">' + escH(actorShort(s.ac)) + '</span>';

      // Flechas de salida
      let arrows = '';
      if (s.nx && STEPS[s.nx]) {
        arrows += '<span class="mapa-arrow">Siguiente: ' + escH(truncate(STEPS[s.nx].t, 34)) + '</span>';
      }
      if (s.opts) {
        s.opts.forEach(o => {
          const dst = STEPS[o.n] ? STEPS[o.n].t : o.n;
          arrows += '<span class="mapa-arrow">' + escH(o.l) + ': ' + escH(truncate(dst, 30)) + '</span>';
        });
      }
      if (arrows) html += '<div class="mapa-arrows">' + arrows + '</div>';

      html += '</button>';
    });
    html += '</div></div>';
  });
  html += '</div>';

  host.innerHTML = html;
}

/* ============================================================
   RENDER — FUNCIÓN PRINCIPAL (Módulo 17)
   ============================================================ */
function render() {
  renderPbar();
  renderBreadcrumb();
  renderSidebar();
  renderContent();
  syncHash();
  const content = document.getElementById('content');
  if (content) content.scrollTop = 0;
}

/* ============================================================
   DESCARGA (Módulo 18)
   ============================================================ */
function dlGuia() {
  const html = '<!DOCTYPE html>' + document.documentElement.outerHTML;
  const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'guia-tramitacion-titulo-v-ljv.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* ============================================================
   EVENTOS — Listener único de delegación (Módulo 21)
   ============================================================ */
function wireEvents() {
  document.addEventListener('click', function (ev) {
    const el = ev.target.closest('[data-action]');
    if (!el) return;
    const action = el.dataset.action;

    switch (action) {
      case 'toggle-mapa':
        toggleMapa();
        break;
      case 'descargar':
        dlGuia();
        break;
      case 'reiniciar':
        restart();
        break;
      case 'sb-tab':
        sbTab(el.dataset.tab);
        break;
      case 'go-back':
        goBack();
        break;
      case 'go-back-to':
        goBackTo(parseInt(el.dataset.index, 10));
        break;
      case 'go-to':
        goTo(el.dataset.step, el.dataset.label || '');
        break;
      case 'jump-to':
        jumpTo(el.dataset.step);
        break;
      case 'close-mapa':
        toggleMapa();
        break;
      case 'toggle-phase': {
        const i = parseInt(el.dataset.phase, 10);
        phaseCollapsed[i] = !phaseCollapsed[i];
        renderSbMap();
        break;
      }
    }
  });

  document.addEventListener('keydown', function (ev) {
    if (ev.key === 'Escape' && mapaOn) toggleMapa();
  });

  window.addEventListener('hashchange', function () {
    const h = window.location.hash.replace('#', '');
    if (h && STEPS[h] && h !== cur) {
      cur = h;
      hist = [];
      render();
    }
  });
}

/* ============================================================
   ARRANQUE
   ============================================================ */
document.addEventListener('DOMContentLoaded', function () {
  loadFromHash();
  wireEvents();
  render();
});
</script>
