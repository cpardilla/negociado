<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>De las diligencias preliminares (artículos 256 a 263 LEC)</title>
        <style>
            :root {
                --navy: #1a2f6e;
                --navy-mid: #2e4daa;
                --navy-lt: #4169e1;
                --cyan: #0d9488;
                --cyan-bg: #f0fdfa;
                --violet: #5b21b6;
                --violet-bg: #f5f3ff;
                --green: #15803d;
                --green-bg: #f0fdf4;
                --amber: #b45309;
                --amber-bg: #fffbeb;
                --red: #b91c1c;
                --red-bg: #fef2f2;
                --slate: #475569;
                --slate-bg: #f4f6fb;
                --white: #ffffff;
                --bdr: #d1d9ee;
                --text: #1a1a2e;
                --muted: #6b7280;
                --mono:
                    ui-monospace, SFMono-Regular, "Cascadia Code", monospace;
                --transition-norm: 250ms ease;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html,
            body {
                height: 100%;
                overflow: hidden;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Helvetica, Arial, sans-serif;
                font-size: 15px;
                color: var(--text);
                background: var(--slate-bg);
            }
            #app {
                display: flex;
                flex-direction: column;
                height: 100vh;
                overflow: hidden;
            }

            #hdr {
                flex-shrink: 0;
                height: 56px;
                background: var(--navy);
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 0 20px;
            }
            #hdr .hdr-left {
                display: flex;
                align-items: center;
                gap: 12px;
                min-width: 0;
            }
            #hdr .hdr-left .seal {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                flex-shrink: 0;
                background: rgba(255, 255, 255, 0.1);
                border: 1.5px solid rgba(255, 255, 255, 0.25);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
                color: rgba(255, 255, 255, 0.85);
            }
            #hdr .hdr-left .hdr-titles {
                min-width: 0;
            }
            #hdr .hdr-left h1 {
                font-size: 14px;
                font-weight: 700;
                color: var(--white);
                white-space: nowrap;
                overflow: hidden;
                text-overflow: ellipsis;
            }
            #hdr .hdr-left .hdr-sub {
                font-size: 11px;
                color: var(--white);
                opacity: 0.7;
            }
            #hdr .hdr-right {
                display: flex;
                gap: 6px;
                flex-shrink: 0;
            }

            /* --- Botón toggle sidebar (nuevo) --- */
            .btn-toggle-sidebar {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 4px 10px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 6px;
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
                font-family: inherit;
                font-size: 20px;
                cursor: pointer;
                transition: all 150ms ease;
                white-space: nowrap;
                line-height: 1;
            }
            .btn-toggle-sidebar:hover {
                background: rgba(255, 255, 255, 0.18);
            }
            .btn-toggle-sidebar:focus-visible {
                outline: 2px solid var(--navy-lt);
                outline-offset: 2px;
            }

            .btn-ghost {
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                color: var(--white);
                font-size: 13px;
                padding: 6px 12px;
                border-radius: 4px;
                cursor: pointer;
                white-space: nowrap;
                font-family: inherit;
            }
            .btn-ghost:hover {
                background: rgba(255, 255, 255, 0.2);
            }
            .btn-ghost:disabled {
                opacity: 0.4;
                cursor: default;
            }

            #pbar {
                flex-shrink: 0;
                height: 42px;
                background: var(--navy-mid);
                display: flex;
                align-items: center;
                padding: 0 20px;
                overflow-x: auto;
                scrollbar-width: none;
                gap: 2px;
            }
            #pbar::-webkit-scrollbar {
                display: none;
            }
            .ph-item {
                display: flex;
                align-items: center;
            }
            .ph-lbl {
                font-size: 12px;
                font-weight: 600;
                color: rgba(255, 255, 255, 0.45);
                padding: 5px 10px;
                border-radius: 6px;
                white-space: nowrap;
                transition: all 0.15s;
            }
            .ph-lbl.active {
                background: rgba(255, 255, 255, 0.2);
                color: #fff;
            }
            .ph-lbl.done {
                color: rgba(255, 255, 255, 0.95);
            }
            .ph-sep {
                color: rgba(255, 255, 255, 0.2);
                font-size: 16px;
                margin: 0 2px;
            }

            #breadcrumb {
                flex-shrink: 0;
                min-height: 34px;
                background: var(--slate-bg);
                border-bottom: 1px solid var(--bdr);
                display: flex;
                align-items: center;
                padding: 0 20px;
                gap: 0;
                overflow-x: auto;
                scrollbar-width: none;
                flex-wrap: wrap;
                row-gap: 2px;
                padding-top: 4px;
                padding-bottom: 4px;
            }
            #breadcrumb::-webkit-scrollbar {
                display: none;
            }
            .bc-item {
                font-size: 13px;
                font-weight: 500;
                white-space: nowrap;
                padding: 0 6px;
                color: var(--muted);
                background: none;
                border: none;
                font-family: inherit;
                cursor: pointer;
            }
            .bc-sep {
                color: var(--muted);
                font-size: 15px;
                opacity: 0.5;
                margin: 0 2px;
            }
            .bc-past:hover {
                color: var(--navy-lt);
                text-decoration: underline;
            }
            .bc-current {
                font-weight: 600;
                color: var(--navy);
                cursor: default;
            }

            #layout {
                flex: 1;
                overflow: hidden;
                display: flex;
                position: relative;
            }

            /* --- SIDEBAR (con soporte para colapso en escritorio y overlay en móvil) --- */
            #sidebar {
                width: 260px;
                flex-shrink: 0;
                background: var(--navy-mid);
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                min-height: 0;
                scrollbar-width: thin;
                scrollbar-color: rgba(255, 255, 255, 0.25) transparent;
                transition:
                    transform var(--transition-norm),
                    width var(--transition-norm);
                z-index: 80;
            }
            #sidebar.collapsed {
                width: 0;
                transform: translateX(-100%);
                overflow: hidden;
            }
            #sidebar::-webkit-scrollbar {
                width: 4px;
            }
            #sidebar::-webkit-scrollbar-track {
                background: transparent;
            }
            #sidebar::-webkit-scrollbar-thumb {
                background: rgba(255, 255, 255, 0.25);
                border-radius: 3px;
            }
            #sidebar::-webkit-scrollbar-thumb:hover {
                background: rgba(255, 255, 255, 0.35);
            }
            #sb-tabs {
                display: flex;
                border-bottom: 1px solid rgba(255, 255, 255, 0.1);
                flex-shrink: 0;
            }
            .sb-tab {
                flex: 1;
                padding: 10px 0;
                font-size: 12px;
                font-weight: 700;
                font-family: "Outfit", sans-serif;
                background: none;
                border: none;
                color: rgba(255, 255, 255, 0.4);
                cursor: pointer;
                letter-spacing: 0.5px;
                text-transform: uppercase;
                transition: all 0.15s;
                border-bottom: 2px solid transparent;
            }
            .sb-tab.active {
                color: #fff;
                border-bottom: 2px solid var(--navy-lt);
            }
            .sb-tab:hover:not(.active) {
                color: rgba(255, 255, 255, 0.7);
                background: rgba(255, 255, 255, 0.05);
            }
            #sb-map,
            #sb-journey {
                padding: 10px;
                flex: 1;
                min-height: 0;
            }
            .sm-phase {
                margin-bottom: 6px;
            }
            .sm-phase-hdr {
                font-size: 11px;
                font-weight: 700;
                color: rgba(255, 255, 255, 0.4);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                padding: 5px 6px;
                cursor: pointer;
                border-radius: 4px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                transition: background 0.15s;
            }
            .sm-phase-hdr:hover {
                background: rgba(255, 255, 255, 0.06);
            }
            .sm-phase-hdr .ph-toggle {
                font-size: 10px;
                opacity: 0.5;
            }
            .sm-nodes {
                overflow: hidden;
            }
            .sm-node {
                font-size: 12px;
                padding: 6px 8px 6px 14px;
                border-radius: 5px;
                color: rgba(255, 255, 255, 0.55);
                cursor: pointer;
                margin-bottom: 2px;
                transition:
                    background 0.12s,
                    color 0.12s;
                position: relative;
                line-height: 1.45;
                display: flex;
                align-items: flex-start;
                gap: 6px;
            }
            .sm-node:hover {
                background: rgba(255, 255, 255, 0.12);
                color: rgba(255, 255, 255, 0.95);
            }
            .sm-node.sm-visited {
                color: rgba(134, 239, 172, 0.9);
            }
            .sm-node.sm-visited::before {
                content: "✓";
                position: absolute;
                left: 2px;
                top: 6px;
                font-size: 10px;
                color: var(--green);
            }
            .sm-node.sm-current {
                color: #fff;
                background: rgba(65, 105, 225, 0.35);
                font-weight: 600;
            }
            .sm-node.sm-current::before {
                content: "●";
                position: absolute;
                left: 2px;
                top: 6px;
                font-size: 9px;
                color: var(--navy-lt);
            }
            .sm-node.sm-end {
                opacity: 0.7;
            }
            .sb-foot {
                margin-top: 12px;
                padding: 10px;
                background: rgba(0, 0, 0, 0.15);
                border-radius: 6px;
                font-size: 11px;
                color: rgba(255, 255, 255, 0.45);
                font-family: ui-monospace, SFMono-Regular, monospace;
                line-height: 1.7;
            }
            .pi {
                padding: 7px 8px;
                border-radius: 5px;
                margin-bottom: 4px;
                font-size: 12px;
                color: rgba(255, 255, 255, 0.45);
                border-left: 2px solid transparent;
                transition: background 0.12s;
            }
            .pi.current {
                color: #fff;
                border-left-color: var(--navy-lt);
                background: rgba(65, 105, 225, 0.2);
                font-weight: 600;
            }
            .pi.past {
                border-left-color: rgba(255, 255, 255, 0.15);
                color: rgba(255, 255, 255, 0.55);
            }
            .pi-choice {
                font-size: 11px;
                color: rgba(255, 255, 255, 0.35);
                margin-top: 3px;
                font-style: italic;
            }

            /* Backdrop para móvil (nuevo) */
            .sidebar-backdrop {
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
                z-index: 140;
                display: none;
            }
            .sidebar-backdrop.show {
                display: block;
            }

            /* ZOOM CLUSTER */
            .zoom-cluster {
                display: flex;
                align-items: center;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 4px;
                overflow: hidden;
                margin-right: 10px;
            }
            .btn-zoom {
                background: none;
                border: none;
                color: var(--white);
                font-size: 16px;
                padding: 4px 10px;
                cursor: pointer;
                transition: background 0.15s;
            }
            .btn-zoom:hover {
                background: rgba(255, 255, 255, 0.1);
            }
            .zoom-label {
                font-size: 12px;
                color: var(--white);
                padding: 0 8px;
                border-left: 1px solid rgba(255, 255, 255, 0.1);
                border-right: 1px solid rgba(255, 255, 255, 0.1);
                min-width: 45px;
                text-align: center;
            }

            #content {
                flex: 1;
                overflow-y: auto;
                padding: 28px 32px;
            }
            .card {
                background: #fff;
                border: 1px solid var(--bdr);
                border-radius: 12px;
                width: 100%;
                max-width: 1200px;
                margin: 0 auto;
                animation: fadeUp 0.22s ease;
            }
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }

            .c-hdr {
                padding: 22px 28px 16px;
                border-bottom: 1px solid var(--bdr);
            }
            .act-badge {
                display: inline-block;
                font-size: 10px;
                font-weight: 700;
                padding: 3px 10px;
                border-radius: 20px;
                letter-spacing: 0.3px;
                text-transform: uppercase;
                margin-bottom: 8px;
                border: 1px solid;
            }
            .act-laj {
                background: var(--cyan-bg);
                color: var(--cyan);
                border-color: #99f6e4;
            }
            .act-juez {
                background: var(--violet-bg);
                color: var(--violet);
                border-color: #c4b5fd;
            }
            .act-ambos {
                background: var(--amber-bg);
                color: var(--amber);
                border-color: #fcd34d;
            }
            .c-title {
                font-size: 19px;
                font-weight: 700;
                color: var(--navy);
                line-height: 1.3;
            }
            .step-num {
                font-size: 11px;
                color: var(--muted);
                margin-top: 6px;
            }

            .c-body {
                padding: 20px 28px;
            }
            .c-body > * + * {
                margin-top: 14px;
            }
            .cb-intro {
                font-size: 14px;
                line-height: 1.65;
                color: var(--text);
            }
            .cb-deadline {
                font-size: 13px;
                background: var(--amber-bg);
                border: 1px solid #fde68a;
                border-radius: 8px;
                padding: 10px 14px;
                color: var(--amber);
                font-weight: 500;
                line-height: 1.5;
            }
            .cb-note {
                font-size: 13px;
                background: var(--cyan-bg);
                border: 1px solid #99f6e4;
                border-radius: 8px;
                padding: 10px 14px;
                color: #0f766e;
                line-height: 1.5;
            }
            .cb-warn {
                font-size: 13px;
                background: var(--red-bg);
                border: 1px solid #fecaca;
                border-radius: 8px;
                padding: 10px 14px;
                color: var(--red);
                font-weight: 500;
                line-height: 1.5;
            }
            .cb-law {
                font-size: 12px;
                font-family: var(--mono);
                color: var(--slate);
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-radius: 6px;
                padding: 8px 12px;
                line-height: 1.5;
            }
            .cb-cl {
                border: 1px solid var(--bdr);
                border-radius: 8px;
                overflow: hidden;
            }
            .cb-cl-title {
                font-size: 12px;
                font-weight: 700;
                background: var(--slate-bg);
                padding: 8px 14px;
                color: var(--slate);
                text-transform: uppercase;
                letter-spacing: 0.3px;
            }
            .cb-cl-list {
                padding: 8px 14px;
                list-style: none;
            }
            .cb-cl-list li {
                display: flex;
                align-items: flex-start;
                gap: 8px;
                padding: 5px 0;
                font-size: 13px;
                line-height: 1.5;
                border-bottom: 1px solid #f1f5f9;
            }
            .cb-cl-list li:last-child {
                border-bottom: none;
            }
            .cb-cl-list li::before {
                content: "☐";
                flex-shrink: 0;
                color: var(--bdr);
                font-size: 14px;
                margin-top: 1px;
            }

            .dec-area {
                padding: 20px 28px;
                border-top: 1px solid var(--bdr);
            }
            .dec-q {
                font-size: 15px;
                font-weight: 600;
                color: var(--navy);
                padding: 14px 18px;
                border-top: 3px solid var(--navy);
                background: var(--slate-bg);
                border-radius: 0 0 8px 8px;
                margin-bottom: 14px;
                line-height: 1.4;
            }
            .dec-opts {
                display: flex;
                flex-direction: column;
                gap: 8px;
            }
            .dec-btn {
                display: flex;
                align-items: center;
                gap: 12px;
                width: 100%;
                padding: 13px 16px;
                border: 1.5px solid var(--bdr);
                border-radius: 9px;
                background: #fff;
                cursor: pointer;
                font-family: inherit;
                font-size: 14px;
                font-weight: 500;
                color: var(--text);
                text-align: left;
                transition: all 0.15s;
                line-height: 1.4;
            }
            .dec-btn:hover {
                border-color: var(--navy-lt);
                background: #f0f4ff;
            }
            .dec-letter {
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: 700;
                flex-shrink: 0;
                color: #fff;
            }
            .dec-btn.ok .dec-letter {
                background: var(--green);
            }
            .dec-btn.ok:hover {
                border-color: var(--green);
                background: var(--green-bg);
            }
            .dec-btn.bad .dec-letter {
                background: var(--red);
            }
            .dec-btn.bad:hover {
                border-color: var(--red);
                background: var(--red-bg);
            }
            .dec-btn.warn .dec-letter {
                background: var(--amber);
            }
            .dec-btn.warn:hover {
                border-color: var(--amber);
                background: var(--amber-bg);
            }
            .dec-btn.neutral .dec-letter {
                background: var(--navy-lt);
            }
            .dec-btn.neutral:hover {
                border-color: var(--navy-lt);
                background: #eef2ff;
            }

            .c-nav {
                display: flex;
                justify-content: space-between;
                align-items: center;
                padding: 16px 28px;
                border-top: 1px solid var(--bdr);
            }
            .btn-back {
                background: none;
                border: 1px solid var(--bdr);
                color: var(--muted);
                font-family: inherit;
                font-size: 13px;
                font-weight: 500;
                padding: 9px 18px;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.15s;
            }
            .btn-back:hover:not(:disabled) {
                border-color: var(--navy-lt);
                color: var(--navy);
            }
            .btn-back:disabled {
                opacity: 0.35;
                cursor: not-allowed;
            }
            .btn-next {
                background: var(--navy-lt);
                border: none;
                color: #fff;
                font-family: inherit;
                font-size: 13px;
                font-weight: 600;
                padding: 9px 22px;
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.15s;
            }
            .btn-next:hover {
                background: var(--navy);
            }

            .end-body {
                text-align: center;
                padding: 36px 28px;
            }
            .end-icon {
                font-size: 48px;
                margin-bottom: 12px;
            }
            .end-title {
                font-size: 22px;
                font-weight: 700;
                margin-bottom: 6px;
            }
            .end-sub {
                font-size: 13px;
                color: var(--muted);
                margin-bottom: 20px;
            }
            .end-btns {
                display: flex;
                gap: 10px;
                justify-content: center;
                margin-bottom: 24px;
            }
            .card.end-success .end-title {
                color: var(--green);
            }
            .card.end-success {
                border-top: 4px solid var(--green);
            }
            .card.end-error .end-title {
                color: var(--red);
            }
            .card.end-error {
                border-top: 4px solid var(--red);
            }
            .card.end-warning .end-title {
                color: var(--amber);
            }
            .card.end-warning {
                border-top: 4px solid var(--amber);
            }
            .card.end-neutral .end-title {
                color: var(--navy);
            }
            .card.end-neutral {
                border-top: 4px solid var(--navy);
            }

            .summary-box {
                text-align: left;
                background: var(--slate-bg);
                border: 1px solid var(--bdr);
                border-radius: 10px;
                padding: 18px;
                margin-top: 16px;
            }
            .summary-box h4 {
                font-size: 12px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.4px;
                color: var(--slate);
                margin-bottom: 10px;
            }
            .summary-step {
                display: flex;
                gap: 10px;
                padding: 6px 0;
                border-bottom: 1px solid #e8ecf4;
                font-size: 13px;
                align-items: flex-start;
            }
            .summary-step:last-child {
                border-bottom: none;
            }
            .summary-num {
                width: 24px;
                height: 24px;
                border-radius: 50%;
                background: var(--navy-lt);
                color: #fff;
                font-size: 10px;
                font-weight: 700;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }
            .summary-info {
                flex: 1;
            }
            .summary-choice {
                font-size: 11px;
                color: var(--navy-lt);
                margin-top: 2px;
            }

            #mapa-overlay {
                display: none;
                flex: 1;
                overflow-y: auto;
                background: var(--slate-bg);
                padding: 24px;
            }
            .mapa-title {
                text-align: center;
                font-size: 16px;
                font-weight: 700;
                color: var(--navy);
                margin-bottom: 4px;
            }
            .mapa-sub {
                text-align: center;
                font-size: 12px;
                color: var(--muted);
                margin-bottom: 20px;
            }
            .mapa-close {
                display: flex;
                justify-content: center;
                margin-bottom: 20px;
            }
            .mapa-cols {
                display: flex;
                gap: 16px;
                overflow-x: auto;
                padding-bottom: 20px;
            }
            .mapa-col {
                min-width: 200px;
                flex: 1;
            }
            .mapa-col-hdr {
                font-size: 11px;
                font-weight: 700;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                color: #fff;
                padding: 8px 10px;

            /* --- RESPONSIVE: SIDEBAR OVERLAY MÓVIL (se reemplaza display:none por fixed overlay) --- */
            @media (max-width: 768px) {

            let phaseCollapsed = {};

            // --- Estado para sidebar toggle ---
            let sidebarOpen = false; // solo para móvil
            let isSidebarCollapsed = false; // para escritorio

            // --- PRE-COMPUTED CACHES (Performance Optimization) ---
            const REACHABLE = computeReachable();
            const PATH_CACHE = buildPathCache();

            function computeReachable() {
                const reach = new Set(["inicio"]);
                const queue = ["inicio"];
                while (queue.length > 0) {
                    const id = queue.shift();
                    const step = STEPS[id];
                    if (!step) continue;
                    if (step.nx && !reach.has(step.nx)) {
                        reach.add(step.nx);
                        queue.push(step.nx);
                    }
                    if (step.opts) {
                        step.opts.forEach((o) => {
                            if (!reach.has(o.n)) {
                                reach.add(o.n);
                                queue.push(o.n);
                            }
                        });
                    }
                }
                return reach;
            }

            function buildPathCache() {
                const cache = {};
                const queue = [["inicio"]];
                const visited = new Set(["inicio"]);
                while (queue.length > 0) {
                    const path = queue.shift();
                    const currentId = path[path.length - 1];
                    cache[currentId] = path;
                    const step = STEPS[currentId];
                    if (!step) continue;
                    const neighbors = [];
                    if (step.nx) neighbors.push(step.nx);
                    if (step.opts)
                        step.opts.forEach((o) => neighbors.push(o.n));
                    for (const neighbor of neighbors) {
                        if (!visited.has(neighbor) && STEPS[neighbor]) {
                            visited.add(neighbor);
                            queue.push([...path, neighbor]);
                        }
                    }
                }
                return cache;
            }

            function escAttr(s) {
                if (!s) return "";
                return String(s)
                    .replace(/&/g, "&amp;")
                    .replace(/"/g, "&quot;")
                    .replace(/'/g, "&#39;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");
            }

            // --- NAVIGATION CORE ---
            function goTo(n, lbl) {
                hist.push({ s: cur, c: lbl || "" });
                cur = n;
                if (lbl) sbTab("journey");
                render();
            }
            function goBack() {
                if (!hist.length) return;
                cur = hist.pop().s;
                render();
            }
            function goBackTo(i) {
                if (i < 0 || i >= hist.length) return;
                cur = hist[i].s;
                hist = hist.slice(0, i);
                render();
            }
            function restart() {
                cur = "inicio";
                hist = [];
                sbTab("map");
                render();
            }

            function jumpTo(targetId) {
                if (targetId === cur) return;
                const path = PATH_CACHE[targetId];
                if (!path) return;

                hist = [];
                for (let i = 0; i < path.length - 1; i++) {
                    const stepId = path[i];
                    const nextStepId = path[i + 1];
                    const step = STEPS[stepId];
                    let choice = "";
                    if (step.opts) {
                        const opt = step.opts.find((o) => o.n === nextStepId);
                        if (opt) choice = opt.t;
                    }
                    hist.push({ s: stepId, c: choice });
                }
                cur = targetId;
                sbTab("map");
                if (mapaOn) toggleMapa();
                render();
            }

            // --- SIDEBAR TOGGLE FUNCTIONS (nuevas) ---
            function toggleSidebar() {
                const isMobile = window.innerWidth <= 768;
                if (isMobile) {
                    sidebarOpen = !sidebarOpen;
                    const sidebarEl = document.getElementById("sidebar");
                    const backdrop = document.getElementById("sidebarBackdrop");
                    const btn = document.getElementById("btnToggleSidebar");
                    if (sidebarOpen) {
                        sidebarEl.classList.add("open");
                        backdrop.classList.add("show");
                        if (btn) btn.setAttribute("aria-expanded", "true");
                    } else {
                        sidebarEl.classList.remove("open");
                        backdrop.classList.remove("show");
                        if (btn) btn.setAttribute("aria-expanded", "false");
                    }
                } else {
                    // escritorio: alternar clase collapsed en sidebar
                    const sidebarEl = document.getElementById("sidebar");
                    sidebarEl.classList.toggle("collapsed");
                    const btn = document.getElementById("btnToggleSidebar");
                    const isCollapsed =
                        sidebarEl.classList.contains("collapsed");
                    if (btn)
                        btn.setAttribute(
                            "aria-expanded",
                            isCollapsed ? "false" : "true",
                        );
                }
            }

            function closeMobileSidebar() {
                if (window.innerWidth <= 768 && sidebarOpen) {
                    sidebarOpen = false;
                    const sidebarEl = document.getElementById("sidebar");
                    const backdrop = document.getElementById("sidebarBackdrop");
                    const btn = document.getElementById("btnToggleSidebar");
                    sidebarEl.classList.remove("open");
                    backdrop.classList.remove("show");
                    if (btn) btn.setAttribute("aria-expanded", "false");
                }
            }

            function handleResize() {
                // Si se pasa de móvil a escritorio, aseguramos que el sidebar móvil se cierre
                if (window.innerWidth > 768) {
                    if (sidebarOpen) {
                        const sidebarEl = document.getElementById("sidebar");
                        const backdrop =
                            document.getElementById("sidebarBackdrop");
                        sidebarEl.classList.remove("open");
                        backdrop.classList.remove("show");
                        sidebarOpen = false;
                        const btn = document.getElementById("btnToggleSidebar");
                        if (btn) btn.setAttribute("aria-expanded", "false");
                    }
                    // Aseguramos que en escritorio la sidebar no tenga clase open (solo collapsed)
                    const sidebarEl = document.getElementById("sidebar");
                    if (sidebarEl) sidebarEl.classList.remove("open");
                } else {
                    // Si estamos en móvil y la sidebar tiene collapsed (por posible estado heredado) la quitamos
                    const sidebarEl = document.getElementById("sidebar");
                    if (
                        sidebarEl &&
                        sidebarEl.classList.contains("collapsed")
                    ) {
                        sidebarEl.classList.remove("collapsed");
                    }
                    // Si sidebarOpen es false pero por alguna razón tiene clase open, la quitamos
                    if (
                        !sidebarOpen &&
                        sidebarEl &&
                        sidebarEl.classList.contains("open")
                    ) {
                        sidebarEl.classList.remove("open");
                        const backdrop =
                            document.getElementById("sidebarBackdrop");
                        backdrop.classList.remove("show");
                    }
                }
            }

            // --- RENDER ENGINE (modificada para cerrar sidebar móvil)---
            function render() {
                renderPbar();
                renderBreadcrumb();
                renderSidebar();
                renderContent();
                document.getElementById("content").scrollTop = 0;
                closeMobileSidebar();
            }
            function renderPbar() {
                const s = STEPS[cur];
                let h = "";
                PHASES.forEach((p, i) => {
                    if (i > 0) h += '<span class="ph-sep">›</span>';
                    let cls = "";
                    if (i === s.ph) cls = "active";
                    else if (i < s.ph) cls = "done";
                    h += `<div class="ph-item"><span class="ph-lbl ${cls}">${p}</span></div>`;
                });
                document.getElementById("pbar").innerHTML = h;
            }
            function renderBreadcrumb() {
                const el = document.getElementById("breadcrumb");
                let h = "";
                hist.forEach((item, i) => {
                    const st = STEPS[item.s];
                    const lbl =
                        st.t.length > 28 ? st.t.slice(0, 26) + "…" : st.t;
                    h += `<button class="bc-item bc-past" onclick="goBackTo(${i})">${escAttr(lbl)}</button><span class="bc-sep">›</span>`;
                });
                const curS = STEPS[cur];
                const curLbl =
                    curS.t.length > 28 ? curS.t.slice(0, 26) + "…" : curS.t;
                h += `<span class="bc-item bc-current">${escAttr(curLbl)}</span>`;
                el.innerHTML = h;
                el.scrollLeft = el.scrollWidth;
            }
            function renderSidebar() {
                renderSbMap();
                renderSbJourney();
            }

            const SB_FOOT = `<div class="sb-foot">Arts. 256–263 LEC · Ley 1/2000<br>Art. 60 LEC (conflicto)<br>Art. 64 LEC (caución)<br>Art. 138.3 LEC (puerta cerrada)<br>Art. 556 CP (desobediencia)</div>`;

            function renderSbMap() {
                const visited = new Set(hist.map((h) => h.s));
                visited.add(cur);
                let h = "";
                PHASES.forEach((ph, pi) => {
                    const col = phaseCollapsed[pi] ? "collapsed" : "";
                    h += `<div class="sm-phase ${col}"><div class="sm-phase-hdr" onclick="togglePhase(${pi})"><span>${escAttr(ph)}</span><span class="ph-toggle">▼</span></div><div class="sm-nodes" style="display:${phaseCollapsed[pi] ? "none" : "block"}">`;
                    Object.keys(STEPS)
                        .filter((k) => STEPS[k].ph === pi)
                        .forEach((k) => {
                            const st = STEPS[k];
                            let cls = "sm-node";
                            if (k === cur) cls += " sm-current";
                            else if (visited.has(k)) cls += " sm-visited";
                            else if (!REACHABLE.has(k))
                                cls += " sm-unreachable";
                            if (st.end) cls += " sm-end";
                            const title = st.t;
                            h += `<div class="${cls}" data-jump="${escAttr(k)}" role="button" tabindex="0" title="${escAttr(st.t)}">${escAttr(title)}</div>`;
                        });
                    h += "</div></div>";
                });
                h += SB_FOOT;
                document.getElementById("sb-map").innerHTML = h;
            }
            function renderSbJourney() {
                let h = "";
                if (hist.length === 0) {
                    h =
                        '<div style="color:rgba(255,255,255,.4);font-size:12px;text-align:center;margin-top:20px">Inicio</div>';
                } else {
                    hist.forEach((item, i) => {
                        const st = STEPS[item.s];
                        h += `<div class="pi past"><div>${escAttr(st.t)}</div>`;
                        if (item.c)
                            h += `<div class="pi-choice">${escAttr(item.c)}</div>`;
                        h += "</div>";
                    });
                }
                const curS = STEPS[cur];
                h += `<div class="pi current"><div>${escAttr(curS.t)}</div></div>`;
                h += SB_FOOT;
                document.getElementById("sb-journey").innerHTML = h;
            }
            function renderContent() {
                const s = STEPS[cur];
                if (s.end) return renderEnd(s);
                let h = '<div class="card">';
                h += buildHdr(s);
                h += buildBody(s);
                if (s.q) h += buildDec(s);
                h += buildNav(s);
                h += "</div>";
                document.getElementById("content").innerHTML = h;
            }
            function buildHdr(s) {
                const stepNum = hist.length + 1;
                let h = '<div class="c-hdr">';
                h += `<span class="act-badge act-${s.ac}">${AC_LABELS[s.ac]}</span>`;
                h += `<div class="c-title">${escAttr(s.t)}</div>`;
                h += `<div class="step-num">Paso ${stepNum} · Fase ${s.ph + 1}: ${escAttr(PHASES[s.ph])}</div>`;
                h += "</div>";
                return h;
            }
            function buildBody(s) {
                let h = '<div class="c-body">';
                s.c.forEach((b) => {
                    switch (b[0]) {
                        case "i":
                            h += `<div class="cb-intro">${b[1]}</div>`;
                            break;
                        case "d":
                            h += `<div class="cb-deadline">${b[1]}</div>`;
                            break;
                        case "n":
                            h += `<div class="cb-note">${b[1]}</div>`;
                            break;
                        case "w":
                            h += `<div class="cb-warn">${b[1]}</div>`;
                            break;
                        case "l":
                            h += `<div class="cb-law">${b[1]}</div>`;
                            break;
                        case "cl":
                            h += `<div class="cb-cl"><div class="cb-cl-title">${escAttr(b[1])}</div><ul class="cb-cl-list">`;
                            b[2].forEach((li) => (h += `<li>${li}</li>`));
                            h += `</ul></div>`;
                            break;
                    }
                });
                h += "</div>";
                return h;
            }
            function buildDec(s) {
                const letters = "ABCDEFGHIJKLM";
                let h = '<div class="dec-area">';
                h += `<div class="dec-q">${escAttr(s.q)}</div><div class="dec-opts">`;
                s.opts.forEach((o, i) => {
                    const v = o.v || "neutral";
                    h += `<button class="dec-btn ${v}" onclick="goTo('${escAttr(o.n)}','${escAttr(o.t)}')"><span class="dec-letter">${letters[i]}</span>${escAttr(o.t)}</button>`;
                });
                h += "</div></div>";
                return h;
            }
            function buildNav(s) {
                let h = '<div class="c-nav">';
                h += `<button class="btn-back" onclick="goBack()" ${hist.length === 0 ? "disabled" : ""}>← Volver</button>`;
                if (s.nx && !s.q) {
                    h += `<button class="btn-next" onclick="goTo('${escAttr(s.nx)}','')">Siguiente →</button>`;
                } else {
                    h += "<span></span>";
                }
                h += "</div>";
                return h;
            }
            function renderEnd(s) {
                const icons = {
                    success: "✅",
                    error: "❌",
                    warning: "⚠️",
                    neutral: "ℹ️",
                };
                let h = `<div class="card end-${s.end}"><div class="end-body">`;
                h += `<div class="end-icon">${icons[s.end]}</div>`;
                h += `<div class="end-title">${escAttr(s.t)}</div>`;
                h += `<div class="end-sub">El procedimiento ha concluido en esta vía</div>`;
                h +=
                    '<div class="end-btns"><button class="btn-back" onclick="goBack()">← Volver</button><button class="btn-next" onclick="restart()">↺ Nuevo procedimiento</button></div></div>';
                h += buildBody(s);
                h += buildSummary();
                h += "</div>";
                document.getElementById("content").innerHTML = h;
            }
            function buildSummary() {
                let h =
                    '<div class="summary-box"><h4>Resumen del recorrido</h4>';
                hist.forEach((item, i) => {
                    const st = STEPS[item.s];
                    h += `<div class="summary-step"><span class="summary-num">${i + 1}</span><div class="summary-info"><strong>${escAttr(st.t)}</strong>`;
                    if (item.c)
                        h += `<div class="summary-choice">↳ ${escAttr(item.c)}</div>`;
                    h += "</div></div>";
                });
                const curS = STEPS[cur];
                h += `<div class="summary-step"><span class="summary-num">${hist.length + 1}</span><div class="summary-info"><strong>${escAttr(curS.t)}</strong><div class="summary-choice" style="color:var(--green)">← Desenlace</div></div></div>`;
                h += "</div>";
                return h;
            }
            function sbTab(tab) {
                activeSbTab = tab;
                document.getElementById("sb-map").style.display =
                    tab === "map" ? "block" : "none";
                document.getElementById("sb-journey").style.display =
                    tab === "journey" ? "block" : "none";
                document.querySelectorAll(".sb-tab").forEach((t, i) => {
                    t.classList.toggle(
                        "active",
                        (i === 0 && tab === "map") ||
                            (i === 1 && tab === "journey"),
                    );
                });
            }
            function togglePhase(i) {
                phaseCollapsed[i] = !phaseCollapsed[i];
                renderSbMap();
            }
            function toggleMapa() {
                mapaOn = !mapaOn;
                document.getElementById("layout").style.display = mapaOn
                    ? "none"
                    : "flex";
                document.getElementById("mapa-overlay").style.display = mapaOn
                    ? "block"
                    : "none";
                if (mapaOn) renderMapa();
            }
            function renderMapa() {
                const visited = new Set(hist.map((h) => h.s));
                visited.add(cur);
                let h =
                    '<div class="mapa-title">Mapa completo del procedimiento</div><div class="mapa-sub">Vista estructural de pasos y ramificaciones</div><div class="mapa-close"><button class="btn-next" onclick="toggleMapa()">← Volver al recorrido</button></div><div class="mapa-cols">';
                PHASES.forEach((ph, pi) => {
                    h += `<div class="mapa-col"><div class="mapa-col-hdr">${escAttr(ph)}</div>`;
                    Object.keys(STEPS)
                        .filter((k) => STEPS[k].ph === pi)
                        .forEach((k) => {
                            const st = STEPS[k];
                            let cls = "";
                            if (k === cur) cls = "m-current";
                            else if (visited.has(k)) cls = "m-visited";
                            if (st.end) cls += " m-end-" + st.end;
                            h += `<div class="mapa-nd ${cls}" data-jump="${escAttr(k)}" role="button" tabindex="0"><div class="mapa-nd-title">${escAttr(st.t)}</div><div class="mapa-nd-actor">${escAttr(AC_LABELS[st.ac])}</div>`;
                            if (st.end) {
                                const endL = {
                                    success: "✅ Fin exitoso",
                                    error: "❌ Fin sin éxito",
                                    warning: "⚠️ Fin con reservas",
                                    neutral: "ℹ️ Derivación",
                                };
                                h += `<div class="mapa-nd-arrows">${escAttr(endL[st.end])}</div>`;
                            }
                            h += `</div>`;
                        });
                    h += "</div>";
                });
                h +=
                    '</div><div style="margin-top:14px;padding:10px 14px;background:#fff;border:1px solid var(--bdr);border-radius:8px;font-size:11px;color:var(--muted);font-style:italic">✦ Pulsa cualquier nodo para ir directamente. El historial se reconstruirá lógicamente.</div>';
                document.getElementById("mapa-overlay").innerHTML = h;
            }
            function dlGuia() {
                const html =
                    "<!DOCTYPE html>" + document.documentElement.outerHTML;
                const blob = new Blob([html], {
                    type: "text/html;charset=utf-8",
                });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = "guia-diligencias-preliminares.html";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            function handleInteraction(e) {
                const target = e.target.closest("[data-jump]");
                if (target && target.dataset.jump) {
                    jumpTo(target.dataset.jump);
                }
            }
            document
                .getElementById("sb-map")
                .addEventListener("click", handleInteraction);
            document
                .getElementById("sb-map")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        handleInteraction(e);
                    }
                });
            document
                .getElementById("mapa-overlay")
                .addEventListener("click", handleInteraction);
            document
                .getElementById("mapa-overlay")
                .addEventListener("keydown", (e) => {
                    if (e.key === "Enter" || e.key === " ") {
                        e.preventDefault();
                        handleInteraction(e);
                    }
                });

            document.addEventListener("keydown", function (e) {
                if (
                    e.target.tagName === "INPUT" ||
                    e.target.tagName === "TEXTAREA" ||
                    e.target.tagName === "BUTTON"
                )
                    return;
                switch (e.key) {
                    case "ArrowLeft":
                        goBack();
                        break;
                    case "m":
                    case "M":
                        toggleMapa();
                        break;
                    case "r":
                    case "R":
                        restart();
                        break;
                    case "Escape":
                        if (mapaOn) toggleMapa();
                        break;
                }
            });

            // --- ZOOM LOGIC ---
            let zoomLevel = 100;
            function updateZoom() {
                const label = document.getElementById("zoom-label");
                const content = document.getElementById("content");
                if (label) label.innerText = `${zoomLevel}%`;
                if (content) content.style.zoom = zoomLevel / 100;
            }
            document.getElementById("btn-zoom-in").onclick = () => {
                if (zoomLevel < 150) {
                    zoomLevel += 10;
                    updateZoom();
                }
            };
            document.getElementById("btn-zoom-out").onclick = () => {
                if (zoomLevel > 70) {
                    zoomLevel -= 10;
                    updateZoom();
                }
            };

            // --- Inicialización y eventos adicionales ---
            document
                .getElementById("btnToggleSidebar")
                .addEventListener("click", toggleSidebar);
            document
                .getElementById("sidebarBackdrop")
                .addEventListener("click", closeMobileSidebar);
            window.addEventListener("resize", handleResize);
            handleResize(); // para estado inicial correcto
            render();
        </script>
    </body>
</html>
