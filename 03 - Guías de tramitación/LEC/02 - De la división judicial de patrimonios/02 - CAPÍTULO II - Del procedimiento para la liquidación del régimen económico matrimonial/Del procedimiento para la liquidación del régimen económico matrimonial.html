<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guía de Tramitación — Liquidación del Régimen Económico Matrimonial (LEC Arts. 806‑811)</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #1A2F6E; --navy-mid: #2E4DAA; --navy-lt: #4169E1;
            --cyan: #0D9488; --cyan-bg: #F0FDFA;
            --violet: #5B21B6; --violet-bg: #F5F3FF;
            --green: #15803D; --green-bg: #F0FDF4;
            --amber: #B45309; --amber-bg: #FFFBEB;
            --red: #B91C1C; --red-bg: #FEF2F2;
            --slate: #475569; --slate-bg: #F4F6FB;
            --white: #FFFFFF; --bdr: #D1D9EE;
            --text: #1A1A2E; --muted: #6B7280;
        }
        *,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
        html,body { height: 100%; overflow: hidden; }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            font-size: 14px; color: var(--text); background: var(--slate-bg);
            line-height: 1.55;
        }

        /* APP SHELL */
        #app { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* HEADER */
        #hdr { height: 56px; flex-shrink: 0; background: var(--navy); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; gap: 12px; }
        .h-left { display: flex; align-items: center; gap: 12px; min-width: 0; flex: 1; }
        .h-seal { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,.10); border: 1.5px solid rgba(255,255,255,.25); display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,.75); font-size: 15px; flex-shrink: 0; }
        .h-title { color: #fff; font-size: 13px; font-weight: 700; line-height: 1.2; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .h-sub { color: rgba(255,255,255,.50); font-size: 10px; white-space: nowrap; }
        .h-right { display: flex; gap: 6px; flex-shrink: 0; }
        .btn { padding: 6px 11px; border-radius: 6px; font-family: 'Outfit', sans-serif; font-size: 12px; font-weight: 500; cursor: pointer; border: 1px solid; transition: all .15s; white-space: nowrap; }
        .btn-ghost { background: rgba(255,255,255,.08); border-color: rgba(255,255,255,.18); color: rgba(255,255,255,.85); }
        .btn-ghost:hover { background: rgba(255,255,255,.18); }
        .btn-blue { background: var(--navy-lt); color: white; border-color: var(--navy-lt); }
        .btn-blue:hover { background: var(--navy); }

        /* PHASE BAR */
        #pbar { height: 36px; flex-shrink: 0; background: var(--navy-mid); display: flex; align-items: center; padding: 0 20px; overflow-x: auto; scrollbar-width: none; gap: 0; }
        #pbar::-webkit-scrollbar { display: none; }
        .ph-item { display: flex; align-items: center; }
        .ph-lbl { font-size: 11px; font-weight: 600; padding: 4px 9px; border-radius: 4px; color: rgba(255,255,255,.38); white-space: nowrap; transition: all .15s; }
        .ph-lbl.done { color: rgba(255,255,255,.68); }
        .ph-lbl.active { color: #fff; background: rgba(65,105,225,.35); font-weight: 700; }
        .ph-sep { color: rgba(255,255,255,.22); padding: 0 3px; font-size: 11px; }

        /* BREADCRUMB */
        #breadcrumb { height: 34px; flex-shrink: 0; background: var(--slate-bg); border-bottom: 1px solid var(--bdr); display: flex; align-items: center; padding: 0 20px; gap: 0; overflow-x: auto; scrollbar-width: none; }
        #breadcrumb::-webkit-scrollbar { display: none; }
        .bc-item { font-size: 12px; white-space: nowrap; padding: 0 5px; color: var(--muted); }
        .bc-past { cursor: pointer; background: none; border: none; font-family: 'Outfit', sans-serif; font-size: 12px; color: var(--muted); padding: 0 5px; }
        .bc-past:hover { color: var(--navy-lt); text-decoration: underline; }
        .bc-current { font-weight: 600; color: var(--navy); }
        .bc-sep { font-size: 10px; color: var(--bdr); padding: 0 2px; user-select: none; }

        /* LAYOUT */
        #layout { flex: 1; overflow: hidden; display: flex; }
        #sidebar { width: 260px; flex-shrink: 0; background: var(--navy-mid); overflow: hidden; display: flex; flex-direction: column; border-right: 1px solid rgba(255,255,255,.08); }
        #sb-tabs { display: flex; border-bottom: 1px solid rgba(255,255,255,.10); flex-shrink: 0; }
        .sb-tab { flex: 1; padding: 9px 0; font-size: 11px; font-weight: 600; font-family: 'Outfit', sans-serif; background: none; border: none; color: rgba(255,255,255,.38); cursor: pointer; letter-spacing: .4px; text-transform: uppercase; transition: all .15s; }
        .sb-tab.active { color: #fff; border-bottom: 2px solid var(--navy-lt); }
        .sb-tab:hover:not(.active) { color: rgba(255,255,255,.70); background: rgba(255,255,255,.05); }
        #sb-map,#sb-journey { flex: 1; overflow-y: auto; min-height: 0; }

        /* Sidebar map */
        .sm-phase { border-bottom: 1px solid rgba(255,255,255,.07); }
        .sm-phase-hdr { display: flex; align-items: center; justify-content: space-between; padding: 9px 14px; cursor: pointer; color: rgba(255,255,255,.52); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; user-select: none; transition: background .12s; }
        .sm-phase-hdr:hover { background: rgba(255,255,255,.05); color: rgba(255,255,255,.80); }
        .sm-nodes { padding: 2px 0 5px; }
        .sm-node { display: flex; align-items: flex-start; gap: 8px; padding: 5px 14px 5px 18px; cursor: pointer; transition: background .12s; }
        .sm-node:hover { background: rgba(255,255,255,.07); }
        .sm-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; background: rgba(255,255,255,.18); transition: all .2s; }
        .sm-node.visited .sm-dot { background: var(--green); }
        .sm-node.current .sm-dot { background: var(--navy-lt); box-shadow: 0 0 0 3px rgba(65,105,225,.3); }
        .sm-node.endok .sm-dot { background: var(--green); }
        .sm-node.endbad .sm-dot { background: var(--red); }
        .sm-node.endwarn .sm-dot { background: var(--amber); }
        .sm-nlbl { font-size: 12px; color: rgba(255,255,255,.48); line-height: 1.4; }
        .sm-node.visited .sm-nlbl { color: rgba(255,255,255,.75); }
        .sm-node.current .sm-nlbl { color: #fff; font-weight: 600; }
        .sm-node.endok .sm-nlbl, .sm-node.endbad .sm-nlbl, .sm-node.endwarn .sm-nlbl { color: rgba(255,255,255,.60); }

        /* Sidebar journey */
        .pi { padding: 9px 14px; border-bottom: 1px solid rgba(255,255,255,.06); }
        .pi-num { font-size: 10px; color: rgba(255,255,255,.32); margin-bottom: 2px; }
        .pi.past .pi-title { color: rgba(255,255,255,.65); font-size: 13px; line-height: 1.35; }
        .pi.current .pi-title { color: #fff; font-size: 13px; font-weight: 600; line-height: 1.35; }
        .pi-choice { font-size: 11px; color: var(--navy-lt); margin-top: 3px; line-height: 1.3; }
        .sb-foot { padding: 12px 14px; border-top: 1px solid rgba(255,255,255,.08); margin-top: 4px; }
        .sb-foot-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: .4px; color: rgba(255,255,255,.32); margin-bottom: 5px; }
        .sb-foot-refs { font-size: 11px; color: rgba(255,255,255,.48); line-height: 1.65; font-family: ui-monospace, SFMono-Regular, monospace; }
        .sb-empty { padding: 16px 14px; font-size: 12px; color: rgba(255,255,255,.32); line-height: 1.5; }

        /* CONTENT */
        #content { flex: 1; overflow-y: auto; padding: 24px; background: var(--slate-bg); }

        /* CARD */
        .card { background: var(--white); border-radius: 10px; border: 1px solid var(--bdr); max-width: 820px; margin: 0 auto; animation: fadeUp .22s ease; overflow: hidden; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .c-hdr { padding: 20px 24px 16px; border-bottom: 1px solid var(--bdr); }
        .c-hdr-top { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 10px; }
        .act-badge { font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
        .act-laj { background: var(--cyan-bg); color: var(--cyan); border: 1px solid #99F6E4; }
        .act-juez { background: var(--violet-bg); color: var(--violet); border: 1px solid #C4B5FD; }
        .act-ambos { background: #EFF6FF; color: #1D4ED8; border: 1px solid #BFDBFE; }
        .step-num { font-size: 12px; color: var(--muted); margin-left: auto; }
        .c-title { font-size: 19px; font-weight: 700; color: var(--navy); line-height: 1.25; }

        .c-body { padding: 20px 24px; }
        .c-block { margin-bottom: 14px; }
        .c-block:last-child { margin-bottom: 0; }

        .cb-intro { font-size: 15px; color: var(--text); line-height: 1.68; }
        .cb-box { display: flex; align-items: flex-start; gap: 10px; border-radius: 8px; padding: 12px 14px; font-size: 14px; line-height: 1.55; }
        .cb-deadline { background: var(--amber-bg); border: 1px solid #FDE68A; color: var(--amber); }
        .cb-note { background: var(--cyan-bg); border: 1px solid #99F6E4; color: #0F766E; }
        .cb-warn { background: var(--red-bg); border: 1px solid #FECACA; color: var(--red); }
        .cb-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
        .cb-law { font-family: ui-monospace, SFMono-Regular, monospace; font-size: 12px; color: var(--slate); background: var(--slate-bg); border-radius: 6px; padding: 9px 12px; border: 1px solid var(--bdr); line-height: 1.7; }
        .cb-cl-title { font-size: 14px; font-weight: 600; color: var(--navy); margin-bottom: 9px; }
        .cb-cl-list { list-style: none; }
        .cb-cl-item { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; border-bottom: 1px solid var(--bdr); font-size: 14px; color: var(--text); line-height: 1.5; }
        .cb-cl-item:last-child { border-bottom: none; }
        .cb-cl-check { flex-shrink: 0; width: 17px; height: 17px; border: 1.5px solid var(--bdr); border-radius: 4px; margin-top: 2px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 11px; transition: all .15s; background: var(--white); }
        .cb-cl-check.chk { background: var(--green); border-color: var(--green); color: #fff; }

        /* Decision area */
        .dec-area { margin: 0 24px; border-top: 1px solid var(--bdr); padding: 20px 0; }
        .dec-q { font-size: 15px; font-weight: 600; color: var(--navy); border-top: 3px solid var(--navy); padding-top: 14px; margin-bottom: 16px; line-height: 1.4; }
        .dec-opts { display: flex; flex-direction: column; gap: 9px; }
        .dec-btn { display: flex; align-items: center; gap: 12px; padding: 13px 16px; border-radius: 8px; border: 1.5px solid; cursor: pointer; background: var(--white); font-family: 'Outfit', sans-serif; text-align: left; width: 100%; transition: all .15s; }
        .dec-btn:hover { transform: translateX(2px); }
        .dec-btn.ok { border-color: #BBF7D0; background: var(--green-bg); }
        .dec-btn.ok:hover { border-color: var(--green); background: #DCFCE7; }
        .dec-btn.bad { border-color: #FECACA; background: var(--red-bg); }
        .dec-btn.bad:hover { border-color: var(--red); background: #FEE2E2; }
        .dec-btn.warn { border-color: #FDE68A; background: var(--amber-bg); }
        .dec-btn.warn:hover { border-color: var(--amber); background: #FEF3C7; }
        .dec-btn.neutral { border-color: var(--bdr); background: var(--slate-bg); }
        .dec-btn.neutral:hover { border-color: var(--navy-lt); background: var(--white); }
        .dec-letter { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
        .dec-btn.ok .dec-letter { background: var(--green); color: #fff; }
        .dec-btn.bad .dec-letter { background: var(--red); color: #fff; }
        .dec-btn.warn .dec-letter { background: var(--amber); color: #fff; }
        .dec-btn.neutral .dec-letter { background: var(--slate); color: #fff; }
        .dec-btn-text { font-size: 14px; color: var(--text); line-height: 1.4; }

        /* Nav bar */
        .c-nav { padding: 14px 24px; border-top: 1px solid var(--bdr); display: flex; align-items: center; gap: 10px; }
        .btn-back { background: var(--white); border: 1px solid var(--bdr); color: var(--muted); padding: 9px 16px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all .15s; }
        .btn-back:hover:not(:disabled) { border-color: var(--navy-lt); color: var(--navy); }
        .btn-back:disabled { opacity: .38; cursor: not-allowed; }
        .btn-next { background: var(--navy-lt); border: 1px solid var(--navy-lt); color: #fff; padding: 9px 18px; border-radius: 8px; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all .15s; }
        .btn-next:hover { background: var(--navy); border-color: var(--navy); }

        /* End cards */
        .card.end-success { border-top: 4px solid var(--green); }
        .card.end-error   { border-top: 4px solid var(--red); }
        .card.end-warning { border-top: 4px solid var(--amber); }
        .card.end-neutral { border-top: 4px solid var(--navy-lt); }
        .end-hero { padding: 28px 24px 20px; text-align: center; border-bottom: 1px solid var(--bdr); }
        .end-icon { font-size: 42px; margin-bottom: 10px; }
        .end-title { font-size: 21px; font-weight: 700; margin-bottom: 6px; }
        .end-title.success { color: var(--green); }
        .end-title.error   { color: var(--red); }
        .end-title.warning { color: var(--amber); }
        .end-title.neutral { color: var(--navy-lt); }
        .end-sub { font-size: 14px; color: var(--muted); margin-bottom: 18px; }
        .end-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .end-detail { padding: 20px 24px; }
        .summary-box { background: var(--slate-bg); border: 1px solid var(--bdr); border-radius: 8px; padding: 16px 18px; margin-top: 18px; }
        .summary-ttl { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .4px; color: var(--muted); margin-bottom: 10px; }
        .s-item { display: flex; gap: 10px; font-size: 14px; padding: 7px 0; border-bottom: 1px solid var(--bdr); line-height: 1.4; }
        .s-item:last-child { border-bottom: none; }
        .s-num { font-weight: 700; color: var(--navy); flex-shrink: 0; min-width: 22px; }
        .s-choice { font-size: 12px; color: var(--navy-lt); margin-top: 2px; }

        /* MAPA OVERLAY (completo) */
        #mapa-overlay { display: none; flex: 1; overflow-y: auto; background: var(--slate-bg); padding: 20px; }
        .mapa-container { max-width: 1400px; margin: 0 auto; }
        .mapa-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; flex-wrap: wrap; gap: 10px; }
        .mapa-ttl { font-size: 18px; font-weight: 700; color: var(--navy); }
        .mapa-cols { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 16px; align-items: flex-start; }
        .mapa-col { min-width: 210px; flex-shrink: 0; }
        .mapa-col-hdr { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--navy-mid); padding: 6px 10px; background: var(--white); border: 1px solid var(--bdr); border-radius: 6px 6px 0 0; border-bottom: 2px solid var(--navy-mid); margin-bottom: 3px; }
        .mn { background: var(--white); border: 1px solid var(--bdr); border-left: 3px solid var(--bdr); border-radius: 0 6px 6px 0; padding: 9px 11px; margin-bottom: 3px; cursor: pointer; transition: all .15s; }
        .mn:hover { border-left-color: var(--navy-lt); background: var(--slate-bg); }
        .mn.mn-vis { border-left-color: var(--green); background: var(--green-bg); }
        .mn.mn-cur { border-left-color: var(--navy-lt); background: var(--cyan-bg); }
        .mn.mn-eok { border-left-color: var(--green); }
        .mn.mn-ebad { border-left-color: var(--red); }
        .mn.mn-ewarn { border-left-color: var(--amber); }
        .mn-title { font-size: 12px; font-weight: 500; color: var(--text); line-height: 1.35; }
        .mn.mn-vis .mn-title, .mn.mn-cur .mn-title { color: var(--navy); font-weight: 600; }
        .mn-ac { font-size: 10px; color: var(--muted); margin-top: 2px; }
        .mn-arr { font-size: 10px; color: var(--bdr); padding-top: 3px; line-height: 1.4; }

        @media print {
            #sidebar, #pbar, #breadcrumb, .c-nav, .h-right, #sb-tabs, #sb-journey, #sb-map { display: none !important; }
            #hdr { height: auto; padding: 10px 16px; }
            #app, #layout, #content { height: auto !important; overflow: visible !important; }
            .card { box-shadow: none; break-inside: avoid; border: 1px solid #ccc; }
            body { background: #fff; }
            #mapa-overlay { display: block !important; }
            .mapa-cols { flex-wrap: wrap; gap: 8px; }
            .mapa-col { min-width: 160px; }
        }
        @media (max-width: 700px) {
            #sidebar { display: none; }
            #content { padding: 12px; }
            .c-hdr, .c-body, .end-hero, .end-detail { padding: 16px; }
            .dec-area { margin: 0 16px; }
            .c-nav { padding: 12px 16px; }
            .c-title { font-size: 17px; }
        }
    </style>
</head>
<body>
<div id="app">
    <!-- HEADER -->
    <header id="hdr">
        <div class="h-left">
            <div class="h-seal">⚖</div>
            <div>
                <div class="h-title">Liquidación del Régimen Económico Matrimonial</div>
                <div class="h-sub">LEC Arts. 806‑811 · Guía de tramitación completa</div>
            </div>
        </div>
        <div class="h-right">
            <button class="btn btn-ghost" onclick="toggleMapa()">🗺 Ver mapa</button>
            <button class="btn btn-ghost" onclick="dlGuia()">⬇ Descargar</button>
            <button class="btn btn-ghost" onclick="restart()">↺ Reiniciar</button>
        </div>
    </header>

    <!-- PHASE BAR -->
    <div id="pbar"></div>

    <!-- BREADCRUMB -->
    <div id="breadcrumb"></div>

    <!-- MAIN LAYOUT -->
    <div id="layout">
        <!-- SIDEBAR -->
        <aside id="sidebar">
            <div id="sb-tabs">
                <button class="sb-tab active" onclick="sbTab('map')">Mapa</button>
                <button class="sb-tab" onclick="sbTab('journey')">Recorrido</button>
            </div>
            <div id="sb-map"></div>
            <div id="sb-journey" style="display:none"></div>
        </aside>

        <!-- MAIN CONTENT -->
        <main id="content"></main>
    </div>

    <!-- MAPA OVERLAY (full page) -->
    <div id="mapa-overlay">
        <div class="mapa-container">
            <div class="mapa-header">
                <div class="mapa-ttl">🗺 Mapa completo del procedimiento — Todas las vías y desenlaces</div>
                <button class="btn btn-blue" onclick="toggleMapa()">← Volver al recorrido</button>
            </div>
            <div class="mapa-cols" id="mapa-grid"></div>
        </div>
    </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  FASES
// ═══════════════════════════════════════════════════════════════
const PHASES = [
    'Inicio y competencia',         // 0
    'Formación del inventario',     // 1
    'Liquidación (gananciales)',    // 2
    'Operaciones divisorias',       // 3
    'Régimen de participación',     // 4
    'Resolución final'              // 5
];

// ═══════════════════════════════════════════════════════════════
//  PASOS COMPLETOS
// ═══════════════════════════════════════════════════════════════
const STEPS = {

    // ── FASE 0: INICIO Y COMPETENCIA ──────────────────────
    inicio: { ph:0, t:'Inicio del procedimiento de liquidación', ac:'laj',
        c: [
            ['i','Este procedimiento regula la liquidación judicial de cualquier régimen económico matrimonial que determine la existencia de una masa común de bienes y derechos (art. 806 LEC). Opera en defecto de acuerdo entre los cónyuges.'],
            ['n','Si los cónyuges ya han alcanzado un acuerdo extrajudicial completo, podrán instrumentarlo mediante convenio regulador aprobado judicialmente (CC art. 90) o escritura pública notarial (CC art. 1404), sin necesidad de este procedimiento judicial.'],
            ['l','Art. 806 LEC · CC arts. 1344‑1410 (gananciales) · CC arts. 1411‑1434 (participación) · Reg. (UE) 2016/1103']
        ],
        q:'¿Qué régimen económico matrimonial se va a liquidar?',
        opts:[
            {t:'Sociedad de gananciales u otro régimen con masa común (conquistas navarras, consorcio aragonés, comunicación foral vasca…)',l:'ok',n:'acuerdo_extrajudicial'},
            {t:'Régimen de participación en las ganancias (CC arts. 1411‑1434)',l:'neutral',n:'art811_inicio'}
        ]
    },

    acuerdo_extrajudicial: { ph:0, t:'Verificación de acuerdo extrajudicial previo', ac:'ambos',
        c: [
            ['i','Antes de iniciar el procedimiento judicial, verificar si los cónyuges han alcanzado o pueden alcanzar un acuerdo sobre la liquidación.'],
            ['n','El acuerdo puede instrumentarse mediante: (1) Convenio regulador aprobado judicialmente, que puede incluir la liquidación del régimen (CC art. 90; LEC art. 774.1); o (2) escritura pública notarial (CC art. 1404).'],
            ['w','Si el acuerdo es solo parcial, el procedimiento del capítulo se aplica únicamente a la parte de la masa no acordada.'],
            ['l','CC art. 90 · LEC art. 774.1 · CC art. 1404']
        ],
        q:'¿Han acordado los cónyuges (o sus herederos) la liquidación extrajudicialmente?',
        opts:[
            {t:'Sí — existe acuerdo extrajudicial completo (convenio regulador aprobado o escritura notarial)',l:'ok',n:'fin_acuerdo_privado'},

// ═══════════════════════════════════════════════════════════════
//  ESTADO DE LA APLICACIÓN
// ═══════════════════════════════════════════════════════════════
let cur = 'inicio';
let hist = [];
let mapaOn = false;
let activeSbTab = 'map';
let phCol = {};

// ═══════════════════════════════════════════════════════════════
//  FUNCIONES DE NAVEGACIÓN
// ═══════════════════════════════════════════════════════════════
function goTo(stepId, choiceLabel) {
    if (!STEPS[stepId]) return;
    hist.push({ s: cur, next: stepId, c: choiceLabel || '' });
    cur = stepId;
    if (choiceLabel) sbTab('journey');
    render();
}

function goBack() {
    if (hist.length === 0) return;
    const h = hist.pop();
    cur = h.s;
    render();
}

function goBackTo(index) {
    if (index < 0 || index >= hist.length) return;
    cur = hist[index].s;
    hist = hist.slice(0, index);
    render();
}

// Construir la ruta más corta desde 'inicio' hasta 'target' usando BFS
function buildPathTo(target) {
    if (target === 'inicio') return [];
    const queue = [['inicio']];
    const visited = new Set(['inicio']);
    while (queue.length > 0) {
        const path = queue.shift();
        const current = path[path.length - 1];
        const step = STEPS[current];
        if (!step) continue;
        const neighbors = [];
        if (step.nx) neighbors.push(step.nx);
        if (step.opts) step.opts.forEach(o => neighbors.push(o.n));
        for (const nb of neighbors) {
            if (nb === target) return [...path, nb];
            if (!visited.has(nb)) {
                visited.add(nb);
                queue.push([...path, nb]);
            }
        }
    }
    return null; // no hay ruta
}

/**
 * Salto directo a un paso (desde sidebar o mapa).
 * Reconstruye el historial como la ruta más corta desde 'inicio'.
 */
function jumpTo(id) {
    if (!STEPS[id]) return;
    if (id === 'inicio') {
        hist = [];
        cur = 'inicio';
    } else {
        const path = buildPathTo(id);
        if (path && path.length > 1) {
            // Convertir la ruta en entradas de historial (sin choice asociada porque no fue una decisión del usuario)
            hist = [];
            for (let i = 1; i < path.length; i++) {
                hist.push({ s: path[i - 1], next: path[i], c: '' });
            }
            cur = id;
        } else {
            // Si no se encuentra ruta, simplemente vamos al paso sin historial (poco probable)
            hist = [];
            cur = id;
        }
    }
    if (mapaOn) {
        mapaOn = false;
        document.getElementById('layout').style.display = 'flex';
        document.getElementById('mapa-overlay').style.display = 'none';
    }
    render();
}

function restart() {
    cur = 'inicio'; hist = []; mapaOn = false;
    document.getElementById('layout').style.display = 'flex';
    document.getElementById('mapa-overlay').style.display = 'none';
    sbTab('map');
    render();
}

// ═══════════════════════════════════════════════════════════════
//  SIDEBAR TABS
// ═══════════════════════════════════════════════════════════════
function sbTab(tab) {
    activeSbTab = tab;
    document.getElementById('sb-map').style.display = tab === 'map' ? 'block' : 'none';
    document.getElementById('sb-journey').style.display = tab === 'journey' ? 'block' : 'none';
    document.querySelectorAll('.sb-tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'map') || (i === 1 && tab === 'journey'));
    });
}

// ═══════════════════════════════════════════════════════════════
//  MAPA OVERLAY
// ═══════════════════════════════════════════════════════════════
function toggleMapa() {
    mapaOn = !mapaOn;
    document.getElementById('layout').style.display = mapaOn ? 'none' : 'flex';
    document.getElementById('mapa-overlay').style.display = mapaOn ? 'block' : 'none';
    if (mapaOn) renderMapa();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape' && mapaOn) toggleMapa(); });

// ═══════════════════════════════════════════════════════════════
//  RENDER PRINCIPAL
// ═══════════════════════════════════════════════════════════════
function render() {
    renderPbar();
    renderBreadcrumb();
    renderSbMap();
    renderSbJourney();
    renderContent();
    try { document.getElementById('content').scrollTop = 0; } catch (e) {}
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }
function actLabel(ac) {
    if (ac === 'laj') return 'LAJ';
    if (ac === 'juez') return 'Juez / Tribunal';
    return 'LAJ + Tribunal';
}
function escQ(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/'/g, "&#39;").replace(/"/g, '&quot;');
}

// ── PBAR ──
function renderPbar() {
    const s = STEPS[cur];
    const cp = s ? s.ph : 0;
    let html = '';
    PHASES.forEach((n, i) => {
        const cls = i === cp ? 'active' : i < cp ? 'done' : '';
        html += `<div class="ph-item"><span class="ph-lbl ${cls}">${n}</span></div>`;
        if (i < PHASES.length - 1) html += '<span class="ph-sep">›</span>';
    });
    document.getElementById('pbar').innerHTML = html;
}

// ── BREADCRUMB ──
function renderBreadcrumb() {
    let html = '';
    hist.forEach((h, i) => {
        const s = STEPS[h.s];
        html += `<button class="bc-past bc-item" onclick="goBackTo(${i})">${s ? truncate(s.t, 28) : h.s}</button><span class="bc-sep">›</span>`;
    });
    const cs = STEPS[cur];
    html += `<span class="bc-item bc-current">${cs ? truncate(cs.t, 28) : cur}</span>`;
    document.getElementById('breadcrumb').innerHTML = html;
}

// ── SIDEBAR MAP ──
function togglePhase(pi) { phCol[pi] = !phCol[pi]; renderSbMap(); }
function renderSbMap() {
    const vis = new Set([...hist.map(h => h.s), ...hist.map(h => h.next)]);
    let html = '';
    PHASES.forEach((ph, pi) => {
        const nodes = Object.entries(STEPS).filter(([, s]) => s.ph === pi);
        if (nodes.length === 0) return;
        const collapsed = phCol[pi];
        let ndHtml = '';
        if (!collapsed) {
            nodes.forEach(([id, s]) => {
                const isCur = id === cur;
                const isVis = vis.has(id) && !isCur;
                let cls = 'sm-node';
                if (isCur) cls += ' current';
                else if (isVis) cls += ' visited';
                if (s.end === 'success') cls += ' endok';
                else if (s.end === 'error') cls += ' endbad';
                else if (s.end === 'warning') cls += ' endwarn';
                ndHtml += `<div class="${cls}" tabindex="0" role="button" aria-label="${s.t}" onclick="jumpTo('${id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();jumpTo('${id}')}"><span class="sm-dot"></span><span class="sm-nlbl">${truncate(s.t, 34)}</span></div>`;
            });
        }
        html += `<div class="sm-phase"><div class="sm-phase-hdr" onclick="togglePhase(${pi})"><span>${ph}</span><span>${collapsed ? '›' : '▾'}</span></div>${collapsed ? '' : `<div class="sm-nodes">${ndHtml}</div>`}</div>`;
    });
    document.getElementById('sb-map').innerHTML = html;
}

// ── SIDEBAR JOURNEY ──
function renderSbJourney() {
    if (hist.length === 0 && cur === 'inicio') {
        document.getElementById('sb-journey').innerHTML = '<div class="sb-empty">El recorrido aparecerá aquí cuando tomes decisiones.</div>';
        return;
    }
    let html = '';
    hist.forEach((h, i) => {
        const s = STEPS[h.s];
        html += `<div class="pi past"><div class="pi-num">Paso ${i + 1}</div><div class="pi-title">${s ? s.t : h.s}</div>${h.c ? `<div class="pi-choice">↳ ${h.c}</div>` : ''}</div>`;
    });
    const cs = STEPS[cur];
    html += `<div class="pi current"><div class="pi-num">Paso actual · ${cs ? PHASES[cs.ph] : ''}</div><div class="pi-title">${cs ? cs.t : cur}</div></div>`;
    if (cs) {
        const lb = (cs.c || []).find(b => b[0] === 'l');
        if (lb) html += `<div class="sb-foot"><div class="sb-foot-lbl">Fundamento legal</div><div class="sb-foot-refs">${lb[1]}</div></div>`;
    }
    document.getElementById('sb-journey').innerHTML = html;
}

// ── RENDER CONTENT ──
function renderContent() {
    const s = STEPS[cur];
    if (!s) {
        document.getElementById('content').innerHTML = '<div class="card"><div class="c-hdr"><div class="c-title">Paso no encontrado</div></div></div>';
        return;
    }
    document.getElementById('content').innerHTML = s.end ? buildEnd(s) : buildStep(s);
    document.querySelectorAll('.cb-cl-check').forEach(el => {
        el.addEventListener('click', () => {
            el.classList.toggle('chk');
            const checked = el.classList.contains('chk');
            el.textContent = checked ? '✓' : '';
            el.setAttribute('aria-checked', String(checked));
        });
        el.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); } });
    });
}

function buildStep(s) {
    const n = hist.length + 1;
    return `<div class="card">
        <div class="c-hdr">
            <div class="c-hdr-top">
                <span class="act-badge act-${s.ac}">${actLabel(s.ac)}</span>
                <span class="step-num">Paso ${n} · ${PHASES[s.ph]}</span>
            </div>
            <div class="c-title">${s.t}</div>
        </div>
        <div class="c-body">${renderBlocks(s.c)}</div>
        ${s.q ? renderDecision(s.q, s.opts) : ''}
        <div class="c-nav">
            <button class="btn-back" onclick="goBack()" ${hist.length === 0 ? 'disabled' : ''}>← Volver</button>
            ${s.nx ? `<button class="btn-next" onclick="goTo('${s.nx}','')">Siguiente →</button>` : ''}
        </div>
    </div>`;
}

function buildEnd(s) {
    const icons = { success: '✅', error: '❌', warning: '⚠️', neutral: '🔵' };
    const allSteps = [...hist.map(h => ({ id: h.s, c: h.c })), { id: cur, c: null }];
    const sumHtml = allSteps.map((item, i) => {
        const st = STEPS[item.id];
        return `<div class="s-item"><span class="s-num">${i + 1}</span><div><div>${st ? st.t : item.id}</div>${item.c ? `<div class="s-choice">↳ ${item.c}</div>` : ''}</div></div>`;
    }).join('');
    return `<div class="card end-${s.end}">
        <div class="end-hero">
            <div class="end-icon">${icons[s.end] || '🔵'}</div>
            <div class="end-title ${s.end}">${s.t}</div>
            <div class="end-sub">El procedimiento ha concluido en esta vía</div>
            <div class="end-btns">
                <button class="btn-next" onclick="restart()">↩ Nuevo procedimiento</button>
                <button class="btn-back" onclick="goBack()">← Volver</button>
            </div>
        </div>
        <div class="end-detail">
            ${renderBlocks(s.c)}
            <div class="summary-box"><div class="summary-ttl">Recorrido completo del procedimiento</div>${sumHtml}</div>
        </div>
    </div>`;
}

function renderDecision(q, opts) {
    return `<div class="dec-area"><div class="dec-q">${q}</div><div class="dec-opts">${opts.map((o, i) => {
        const ltr = String.fromCharCode(65 + i);
        return `<button class="dec-btn ${o.l}" onclick="goTo('${o.n}','${escQ(o.t)}')"><span class="dec-letter">${ltr}</span><span class="dec-btn-text">${o.t}</span></button>`;
    }).join('')}</div></div>`;
}

function renderBlocks(blocks) {
    if (!blocks) return '';
    return blocks.map(b => {
        switch (b[0]) {
            case 'i': return `<div class="c-block"><p class="cb-intro">${b[1]}</p></div>`;
            case 'd': return `<div class="c-block"><div class="cb-box cb-deadline"><span class="cb-icon">⏱</span><span>${b[1]}</span></div></div>`;
            case 'n': return `<div class="c-block"><div class="cb-box cb-note"><span class="cb-icon">ℹ</span><span>${b[1]}</span></div></div>`;
            case 'w': return `<div class="c-block"><div class="cb-box cb-warn"><span class="cb-icon">⚠</span><span>${b[1]}</span></div></div>`;
            case 'l': return `<div class="c-block"><div class="cb-law">${b[1]}</div></div>`;
            case 'cl': return `<div class="c-block"><div class="cb-cl-title">${b[1]}</div><ul class="cb-cl-list">${(b[2] || []).map(item => `<li class="cb-cl-item"><span class="cb-cl-check" tabindex="0" role="checkbox" aria-checked="false"></span><span>${item}</span></li>`).join('')}</ul></div>`;
            default: return '';
        }
    }).join('');
}

// ── MAPA COMPLETO (OVERLAY) ──
function renderMapa() {
    const vis = new Set([...hist.map(h => h.s), cur]);
    let html = '';
    PHASES.forEach((ph, pi) => {
        const nodes = Object.entries(STEPS).filter(([, s]) => s.ph === pi);
        if (!nodes.length) return;
        html += `<div class="mapa-col"><div class="mapa-col-hdr">${ph}</div>`;
        nodes.forEach(([id, s]) => {
            const isCur = id === cur;
            const isVis = vis.has(id);
            let cls = 'mn';
            if (isCur) cls += ' mn-cur';
            else if (isVis && !s.end) cls += ' mn-vis';
            if (s.end === 'success') cls += ' mn-eok';
            else if (s.end === 'error') cls += ' mn-ebad';
            else if (s.end === 'warning') cls += ' mn-ewarn';
            const targets = s.nx ? [s.nx] : (s.opts || []).map(o => o.n);
            const arrHint = targets.length ? `<div class="mn-arr">→ ${targets.map(t => truncate(STEPS[t]?.t || t, 22)).join(' / ')}</div>` : '';
            html += `<div class="${cls}" onclick="jumpTo('${id}')"><div class="mn-title">${truncate(s.t, 40)}</div><div class="mn-ac">${actLabel(s.ac)}</div>${arrHint}</div>`;
        });
        html += `</div>`;
    });
    document.getElementById('mapa-grid').innerHTML = html;
}

// ── DESCARGA ──
function dlGuia() {
    const html = '<!DOCTYPE html>' + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'guia-liquidacion-rem-definitiva.html';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ── INIT ──
render();
</script>
</body>
</html>
