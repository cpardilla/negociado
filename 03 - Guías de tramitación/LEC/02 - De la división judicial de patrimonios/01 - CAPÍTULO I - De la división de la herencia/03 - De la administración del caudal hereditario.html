<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Guía Definitiva · Administración del Caudal Hereditario · Arts. 797–805 LEC</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1A2F6E;--navy-mid:#2E4DAA;--navy-lt:#4169E1;
  --cyan:#0D9488;--cyan-bg:#F0FDFA;
  --green:#15803D;--green-bg:#F0FDF4;
  --amber:#B45309;--amber-bg:#FFFBEB;
  --red:#B91C1C;--red-bg:#FEF2F2;
  --slate:#475569;--slate-bg:#F4F6FB;
  --white:#FFFFFF;--bdr:#D1D9EE;
  --text:#1A1A2E;--muted:#6B7280;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',system-ui,sans-serif;font-size:17px;color:var(--text);background:var(--slate-bg);overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}
#hdr{flex-shrink:0;height:56px;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.h-left{display:flex;align-items:center;gap:10px}
.h-seal{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.10);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.h-title{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.h-sub{font-size:13px;color:rgba(255,255,255,.55)}
.h-right{display:flex;gap:6px}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;font-family:'Outfit',sans-serif;font-size:14px;font-weight:500;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap}
.btn-ghost{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.85)}
.btn-ghost:hover{background:rgba(255,255,255,.18)}
#pbar{flex-shrink:0;height:36px;background:var(--navy-mid);display:flex;align-items:center;padding:0 20px;gap:0;overflow-x:auto;scrollbar-width:none}
#pbar::-webkit-scrollbar{display:none}
.ph-item{display:flex;align-items:center}
.ph-lbl{font-size:13px;font-weight:600;padding:3px 8px;border-radius:4px;color:rgba(255,255,255,.38);letter-spacing:.2px;white-space:nowrap}
.ph-lbl.done{color:rgba(255,255,255,.68)}
.ph-lbl.active{color:#fff;background:rgba(65,105,225,.45);font-weight:700}
.ph-sep{font-size:12px;color:rgba(255,255,255,.22);padding:0 4px}
#breadcrumb{flex-shrink:0;height:34px;background:var(--slate-bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;overflow-x:auto;scrollbar-width:none}
#breadcrumb::-webkit-scrollbar{display:none}
.bc-item{font-size:13px;white-space:nowrap;padding:0 5px;color:var(--muted)}
.bc-past{cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;font-size:13px;color:var(--muted)}
.bc-past:hover{color:var(--navy-lt);text-decoration:underline}
.bc-current{font-weight:600;color:var(--navy)}
.bc-sep{font-size:12px;color:var(--bdr);padding:0 1px}
#layout{flex:1;overflow:hidden;display:flex}
#sidebar{width:258px;flex-shrink:0;background:var(--navy-mid);display:flex;flex-direction:column;overflow:hidden}
#sb-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.10);flex-shrink:0}
.sb-tab{flex:1;padding:9px 0;font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;background:none;border:none;color:rgba(255,255,255,.38);cursor:pointer;letter-spacing:.4px;text-transform:uppercase;transition:all .15s}
.sb-tab.active{color:#fff;border-bottom:2px solid var(--navy-lt)}
.sb-tab:hover:not(.active){color:rgba(255,255,255,.70);background:rgba(255,255,255,.05)}
#sb-map,#sb-journey,#sb-access{padding:10px;overflow-y:auto;flex:1}
.sm-phase{margin-bottom:6px}
.sm-phase-hdr{font-size:13px;font-weight:700;color:rgba(255,255,255,.48);text-transform:uppercase;letter-spacing:.5px;padding:5px 7px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;border-radius:4px;transition:background .1s;user-select:none}
.sm-phase-hdr:hover{background:rgba(255,255,255,.06)}
.sm-phase-arrow{font-size:11px;color:rgba(255,255,255,.28);transition:transform .15s}
.sm-phase-arrow.open{transform:rotate(90deg)}
.sm-nodes{display:flex;flex-direction:column;gap:2px;padding-left:8px;margin-top:3px}
.sm-node{font-size:13px;padding:5px 8px;border-radius:5px;color:rgba(255,255,255,.52);cursor:pointer;border-left:2px solid transparent;transition:all .1s;line-height:1.3}
.sm-node:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.85)}
.sm-node.sm-visited{color:rgba(134,239,172,.88);border-left-color:#22c55e}
.sm-node.sm-current{color:#fff;background:rgba(65,105,225,.32);border-left-color:var(--navy-lt);font-weight:600}
.sm-node.sm-end{font-style:italic}
.pi{display:flex;flex-direction:column;gap:2px;padding:7px 8px;border-radius:6px;margin-bottom:3px}
.pi.current{background:rgba(65,105,225,.22);border-left:2px solid var(--navy-lt)}
.pi-step{font-size:13px;color:rgba(255,255,255,.72);font-weight:500;line-height:1.3}
.pi-choice{font-size:13px;color:rgba(255,255,255,.40);margin-top:2px}
.ac-phase{margin-bottom:8px}
.ac-phase-hdr{font-size:10px;font-weight:700;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.5px;padding:4px 6px;margin-bottom:3px}
.ac-btn{width:100%;display:flex;align-items:center;gap:7px;padding:5px 8px;border-radius:5px;border:none;background:none;font-family:inherit;font-size:12px;color:rgba(255,255,255,.65);cursor:pointer;text-align:left;transition:all .12s}
.ac-btn:hover{background:rgba(255,255,255,.09);color:#fff}
.ac-btn.ac-current{background:rgba(65,105,225,.22);color:var(--navy-lt);font-weight:600}
.ac-num{font-size:10px;font-weight:700;color:var(--navy-lt);background:rgba(65,105,225,.25);padding:1px 5px;border-radius:3px;flex-shrink:0}
.sb-foot{margin-top:14px;padding-top:10px;border-top:1px solid rgba(255,255,255,.10);font-size:13px;color:rgba(255,255,255,.32);line-height:1.6}
#content{flex:1;overflow-y:auto;padding:24px 28px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card{background:#fff;border:1px solid var(--bdr);border-radius:12px;animation:fadeUp .22s ease;max-width:760px;margin:0 auto}
.c-hdr{padding:18px 22px 14px;border-bottom:1px solid var(--bdr)}
.c-hdr-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:8px}
.act-badge{font-size:13px;font-weight:700;padding:4px 10px;border-radius:20px;letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
.act-laj{background:#EEF2FF;color:#3730A3}
.act-juez{background:#FEF3C7;color:#92400E}
.act-ambos{background:#F0FDF4;color:#166534}
.act-notario{background:#F3E8FF;color:#6B21A8}
.c-title{font-size:20px;font-weight:700;color:var(--text);line-height:1.25}
.step-num{font-size:13px;color:var(--muted);margin-top:4px}
.c-body{padding:18px 22px;display:flex;flex-direction:column;gap:13px}
.blk-i{font-size:16px;line-height:1.72;color:var(--text)}
.blk-d{background:#EEF2FF;border-left:3px solid var(--navy-lt);padding:10px 14px;border-radius:0 6px 6px 0;font-size:15px;color:#1E3A8A;line-height:1.6}
.blk-n{background:var(--cyan-bg);border-left:3px solid var(--cyan);padding:10px 14px;border-radius:0 6px 6px 0;font-size:15px;color:#134E4A;line-height:1.6}
.blk-w{background:var(--amber-bg);border-left:3px solid var(--amber);padding:10px 14px;border-radius:0 6px 6px 0;font-size:15px;color:#78350F;line-height:1.6}
.blk-l{font-size:13px;font-family:ui-monospace,SFMono-Regular,monospace;color:var(--muted);padding:6px 0 0;border-top:1px solid var(--bdr);line-height:1.7}
.blk-cl-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px}
.blk-cl ul{list-style:none;display:flex;flex-direction:column;gap:5px}
.blk-cl li{display:flex;align-items:flex-start;gap:9px;font-size:15px;color:var(--text);line-height:1.5}
.blk-cl li::before{content:'';width:15px;height:15px;min-width:15px;border:1.5px solid var(--bdr);border-radius:3px;margin-top:1px}
.dec-area{padding:18px 22px;border-top:1px solid var(--bdr);background:var(--slate-bg);border-radius:0 0 12px 12px}
.dec-q{font-size:16px;font-weight:600;color:var(--text);padding:13px 16px;background:#fff;border:1.5px solid var(--navy);border-radius:8px;margin-bottom:12px;line-height:1.55}
.dec-opts{display:flex;flex-direction:column;gap:8px}
.dec-btn{display:flex;align-items:flex-start;gap:12px;padding:12px 15px;border-radius:8px;border:1.5px solid;cursor:pointer;font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;text-align:left;transition:all .15s;background:#fff;line-height:1.5}
.dec-letter{width:24px;height:24px;min-width:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:1px}
.dec-btn.ok{border-color:#86EFAC;color:var(--green)}
.dec-btn.ok .dec-letter{background:#DCFCE7;color:var(--green)}
.dec-btn.ok:hover{background:var(--green-bg);border-color:#4ADE80}
.dec-btn.bad{border-color:#FCA5A5;color:var(--red)}
.dec-btn.bad .dec-letter{background:#FEE2E2;color:var(--red)}
.dec-btn.bad:hover{background:var(--red-bg);border-color:#F87171}
.dec-btn.warn{border-color:#FCD34D;color:var(--amber)}
.dec-btn.warn .dec-letter{background:#FFFBEB;color:var(--amber)}
.dec-btn.warn:hover{background:var(--amber-bg);border-color:#F59E0B}
.dec-btn.neutral{border-color:var(--bdr);color:var(--slate)}
.dec-btn.neutral .dec-letter{background:var(--slate-bg);color:var(--slate)}
.dec-btn.neutral:hover{background:var(--slate-bg);border-color:#94A3B8}
.c-nav{padding:14px 22px;border-top:1px solid var(--bdr);display:flex;gap:10px;justify-content:space-between}
.btn-back{background:#fff;border:1.5px solid var(--bdr);color:var(--muted);padding:9px 20px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-back:hover:not(:disabled){border-color:var(--navy-lt);color:var(--navy-lt)}
.btn-back:disabled{opacity:.38;cursor:not-allowed}
.btn-next{background:var(--navy-lt);border:1.5px solid var(--navy-lt);color:#fff;padding:9px 22px;border-radius:8px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-next:hover{background:var(--navy);border-color:var(--navy)}
.card.end-success .c-hdr{background:var(--green-bg)}
.card.end-error .c-hdr{background:var(--red-bg)}
.card.end-warning .c-hdr{background:var(--amber-bg)}
.card.end-neutral .c-hdr{background:var(--cyan-bg)}
.end-body{display:flex;flex-direction:column;align-items:center;gap:6px;padding:28px 22px 20px;text-align:center}
.end-icon{font-size:44px}
.end-title{font-size:22px;font-weight:700}
.end-success .end-title{color:var(--green)}
.end-error .end-title{color:var(--red)}
.end-warning .end-title{color:var(--amber)}
.end-neutral .end-title{color:var(--navy-lt)}
.end-sub{font-size:15px;color:var(--muted);margin-top:2px}
.end-btns{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;justify-content:center}
.summary-box{margin:4px 22px 22px;background:var(--slate-bg);border:1px solid var(--bdr);border-radius:8px;padding:14px 16px}
.summary-box h4{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.sum-item{display:flex;gap:10px;font-size:14px;padding:6px 0;border-bottom:1px solid var(--bdr);line-height:1.5}
.sum-item:last-child{border-bottom:none}
.sum-n{font-weight:700;color:var(--navy);min-width:18px;flex-shrink:0}
.sum-t{color:var(--text);flex:1}
.sum-c{color:var(--muted);font-style:italic;font-size:13px;margin-top:1px}
#mapa-overlay{display:none;flex:1;overflow-y:auto;background:var(--slate-bg);padding:20px}
.mapa-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.mapa-hdr-left h2{font-size:19px;font-weight:700;color:var(--text)}
.mapa-hdr-left p{font-size:14px;color:var(--muted);margin-top:2px}
.mapa-cols{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:12px}
.mapa-col{min-width:180px;flex:1}
.mapa-col-hdr{font-size:13px;font-weight:700;color:var(--navy-mid);text-transform:uppercase;letter-spacing:.5px;padding:8px 10px;background:#E8EDFB;border-radius:6px 6px 0 0;border:1px solid var(--bdr);border-bottom:none;text-align:center}
.mapa-col-body{display:flex;flex-direction:column;gap:5px;padding:8px;background:#fff;border:1px solid var(--bdr);border-radius:0 0 8px 8px;min-height:50px}
.mapa-node{padding:8px 10px;border-radius:5px;font-size:13px;line-height:1.45;border:1px solid var(--bdr);background:#fff;border-left:3px solid var(--bdr);cursor:pointer;transition:box-shadow .15s,transform .1s}
.mapa-node:hover{box-shadow:0 2px 8px rgba(65,105,225,.18);transform:translateY(-1px);border-left-color:var(--navy-lt)}
.jump-badge{display:inline-block;font-size:11px;font-weight:700;background:#F5F3FF;color:#5B21B6;border:1px solid #5B21B6;border-radius:10px;padding:2px 8px;margin-left:8px;letter-spacing:.3px;vertical-align:middle}
.mapa-node.mn-visited{background:var(--green-bg);border-left-color:#22c55e}
.mapa-node.mn-current{background:#EEF2FF;border-left-color:var(--navy-lt);font-weight:600}
.mapa-node.mn-end-success{border-left-color:var(--green);background:var(--green-bg)}
.mapa-node.mn-end-error{border-left-color:var(--red);background:var(--red-bg)}
.mapa-node.mn-end-warning{border-left-color:var(--amber);background:var(--amber-bg)}
.mapa-node.mn-end-neutral{border-left-color:var(--navy-lt);background:var(--cyan-bg)}
.mapa-node-actor{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;color:var(--muted);margin-bottom:2px}
.mapa-node-title{color:var(--text);font-size:13px}
.mapa-legend{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px;padding-top:12px;border-top:1px solid var(--bdr)}
.ml-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--muted)}
.ml-dot{width:11px;height:11px;border-radius:2px;flex-shrink:0}
@media(max-width:700px){
  #sidebar{display:none}
  #content{padding:12px}
  .mapa-cols{flex-direction:column}
  .h-title{font-size:13px}
}
@media print{
  body{overflow:visible}
  #app{height:auto;overflow:visible}
  #hdr .h-right,#sidebar,#breadcrumb,#pbar,.c-nav,.dec-area{display:none!important}
  #layout{display:block;overflow:visible}
  #content{overflow:visible;padding:0}
  .card{break-inside:avoid;border:1px solid #ccc;margin-bottom:16px}
  #mapa-overlay{display:block!important;overflow:visible}
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="h-left">
      <div class="h-seal">⚖️</div>
      <div>
        <div class="h-title">Administración del caudal hereditario</div>
        <div class="h-sub">Arts. 797–805 LEC · Guía de tramitación procedimental definitiva</div>
      </div>
    </div>
    <div class="h-right">
      <button class="btn btn-ghost" onclick="toggleMapa()">🗺 Ver mapa</button>
      <button class="btn btn-ghost" onclick="dlGuia()">⬇ Descargar</button>
      <button class="btn btn-ghost" onclick="restart()">↺ Reiniciar</button>
    </div>
  </div>
  <div id="pbar"></div>
  <div id="breadcrumb"></div>
  <div id="layout">
    <div id="sidebar">
      <div id="sb-tabs">
        <button class="sb-tab active" onclick="sbTab('map')">Mapa</button>
        <button class="sb-tab" onclick="sbTab('journey')">Recorrido</button>
        <button class="sb-tab" onclick="sbTab('access')">Acceso</button>
      </div>
      <div id="sb-map"></div>
      <div id="sb-journey" style="display:none"></div>
      <div id="sb-access" style="display:none"></div>
    </div>
    <div id="content"></div>
  </div>
  <div id="mapa-overlay"></div>
</div>
<script>
// ════════════════════════════════════════════════════
// FASES
// ════════════════════════════════════════════════════
const PHASES = [
  'Constitución del cargo',
  'Representación',
  'Gestión y conservación',
  'Actos dispositivos',
  'Cuentas y retribución',
  'Administraciones subalternas',
  'Cese y liquidación'
];

// Orden de pasos por fase (para mapa y sidebar)
const STEP_ORDER = [
  ['inicio','presupuestos','nombramiento','caucion_pend','caucion_problema','posesion','acreditacion','registro_decision','registro_propiedad','subalternas_decision','subalternas_integracion','fin_sin_presupuestos'],
  ['representacion_check','rep_yacente','declaracion_check','rep_aceptada'],
  ['gestion_conservacion','reparacion_check','reparacion_ordinaria','reparacion_ext_notif','reparacion_ext_comp','reparacion_ext_resolucion','reparacion_ext_financiacion','disposicion_deposito','rep_denegada','recurso_rep','deposito_fondos','provision_fondos','prov_concedida','prov_denegada'],
  ['enajenacion_check','enajenacion_tipo','enajenacion_propuesta','enajenacion_autorizacion','enajenacion_subasta','enajenacion_mercado','consultar_alt','venta_exitosa','venta_fallida'],
  ['cuentas_periodo','saldo_forma','saldo_consignacion','saldo_resguardo','cese_check','nuevo_periodo','retribucion','ret_frutos','ret_inmuebles','ret_publicos','ret_otros','ret_viajes'],
  ['subalternas_gestion','subalternas_mantener','sep_subalterno','sep_autorizada','sep_denegada','proveer_vacante'],
  ['cuenta_final','traslado_cuentas','oposicion_check','traslado_cuentadante','vista_check','juicio_verbal','sentencia_verbal','resolucion_sin_vista','sent_mixta','fin_cuentas_aprobadas','fin_impugnacion_estimada','fin_impugnacion_desestimada']
];

// ════════════════════════════════════════════════════
// PASOS DEL PROCEDIMIENTO
// ════════════════════════════════════════════════════
const STEPS = {

  // ── FASE 0: CONSTITUCIÓN ──────────────────────────
  inicio:{ph:0,t:'Inicio de la guía — Administración del Caudal Hereditario',ac:'laj',
    c:[
      ['i','Bienvenido a la guía de tramitación interactiva para la administración judicial del caudal hereditario, regulada en los Arts. 797 a 805 de la Ley 1/2000, de 7 de enero, de Enjuiciamiento Civil.'],
      ['n','Esta guía cubre todo el ciclo vital de la figura del administrador: desde su nombramiento y toma de posesión hasta la rendición final de cuentas, aprobación o impugnación, retribución y cierre.'],
      ['cl','Ámbito normativo aplicable',[
        'LEC Libro IV, Título II, Capítulo I, Sección 3.ª (Arts. 797-805)',
        'Arts. 988-1012 CC (aceptación de herencia)',
        'Arts. 1967-1969 CC (posesión en interés de la herencia)',
        'Ley Hipotecaria y Reglamento Hipotecario (inscripción registral)',
        'Ley Notarial 21/2007 (subastas notariales)',
        'Ley 15/2015 de Jurisdicción Voluntaria (ventas JV)',
        'RD 4/2015 del Mercado de Valores'
      ]],
      ['l','Arts. 797-805 LEC · Ley 1/2000, de 7 de enero, de Enjuiciamiento Civil']
    ],
    nx:'presupuestos'
  },

  presupuestos:{ph:0,t:'Verificación de presupuestos del cargo',ac:'laj',
    c:[
      ['i','Antes de formalizar la toma de posesión, compruebe que constan acreditados en autos los dos presupuestos legales del art. 795 LEC: el nombramiento del administrador y la prestación de la caución exigida por el tribunal.'],
      ['cl','Presupuestos que deben constar acreditados en autos',[
        'Resolución judicial firme de nombramiento del administrador (art. 795.2.ª LEC)',
        'Prestación efectiva de la caución fijada por el tribunal (art. 795.4.ª LEC)',
        'Constancia documental de ambos extremos en los autos del procedimiento'
      ]],
      ['n','La caución puede adoptar cualquier forma admitida en derecho: depósito dinerario, aval bancario, fianza personal de sujeto solvente o seguro de caución. La LEC no predetermina su modalidad.'],
      ['w','La posesión del cargo no puede formalizarse si falta cualquiera de los dos presupuestos. Subsane el defecto antes de continuar.'],
      ['l','Art. 795 LEC (nombramiento y caución) · Art. 797.1 LEC']
    ],
    q:'¿Constan acreditados en autos tanto el nombramiento como la prestación de la caución?',
    opts:[
      {t:'Sí, ambos presupuestos están acreditados en autos',l:'ok',n:'posesion'},
      {t:'No, falta el nombramiento o la caución',l:'bad',n:'fin_sin_presupuestos'}
    ]
  },

// ESTADO
// ════════════════════════════════════════════════════
let cur = 'inicio';
let hist = []; // [{s: origen, next: destino, c: textoOpción}]
let activeSbTab = 'map';
let mapaOn = false;
let phCollapsed = {};

// ════════════════════════════════════════════════════
// NAVEGACIÓN
// ════════════════════════════════════════════════════
function goTo(stepId, choiceLabel) {
  hist.push({s:cur, next:stepId, c:choiceLabel||''});
  cur = stepId;
  if (choiceLabel) sbTab('journey');
  render();
}
function goBack() {
  if (!hist.length) return;
  const prev = hist.pop();
  cur = prev.s;
  render();
}
function goBackTo(idx) {
  if (idx < 0 || idx >= hist.length) return;
  cur = hist[idx].s;
  hist = hist.slice(0, idx);
  render();
}
function restart() {
  cur = 'inicio'; hist = []; phCollapsed = {};
  sbTab('map');
  if (mapaOn) { mapaOn = false; document.getElementById('layout').style.display='flex'; document.getElementById('mapa-overlay').style.display='none'; }
  render();
}
function jumpTo(stepId) {
  if (stepId === cur) return;
  hist.push({s:cur, next:stepId, c:'[Salto directo]'});
  cur = stepId;
  sbTab('map');
  if (mapaOn) toggleMapa();
  render();
}

// ════════════════════════════════════════════════════
// RENDER PRINCIPAL
// ════════════════════════════════════════════════════
function render() {
  renderPbar();
  renderBreadcrumb();
  renderSidebar();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

function renderPbar() {
  const s = STEPS[cur];
  const curPh = s ? s.ph : 0;
  const visitedPhs = new Set(hist.map(h => STEPS[h.s] ? STEPS[h.s].ph : 0));
  let html = '';
  PHASES.forEach((ph, i) => {
    let cls = '';
    if (i === curPh) cls = 'active';
    else if (visitedPhs.has(i) || i < curPh) cls = 'done';
    html += `<div class="ph-item"><span class="ph-lbl ${cls}">${ph}</span></div>`;
    if (i < PHASES.length-1) html += '<span class="ph-sep">›</span>';
  });
  document.getElementById('pbar').innerHTML = html;
}

function renderBreadcrumb() {
  let html = '';
  hist.forEach((h, i) => {
    const s = STEPS[h.s];
    const t = s ? (s.t.length>30 ? s.t.slice(0,30)+'…' : s.t) : h.s;
    html += `<button class="bc-item bc-past" onclick="goBackTo(${i})">${t}</button><span class="bc-sep">›</span>`;
  });
  const cs = STEPS[cur];
  const ct = cs ? (cs.t.length>30 ? cs.t.slice(0,30)+'…' : cs.t) : cur;
  html += `<span class="bc-item bc-current">${ct}</span>`;
  document.getElementById('breadcrumb').innerHTML = html;
}

function sbTab(tab) {
  activeSbTab = tab;
  document.getElementById('sb-map').style.display = tab==='map' ? 'block' : 'none';
  document.getElementById('sb-journey').style.display = tab==='journey' ? 'block' : 'none';
  document.getElementById('sb-access').style.display = tab==='access' ? 'block' : 'none';
  document.querySelectorAll('.sb-tab').forEach((t,i) => {
    t.classList.toggle('active', (i===0 && tab==='map') || (i===1 && tab==='journey') || (i===2 && tab==='access'));
  });
}

function renderSidebar() {
  const visitedSet = new Set(hist.map(h=>h.s));
  // MAP TAB
  let mapHtml = '';
  STEP_ORDER.forEach((phSteps, phi) => {
    const isCollapsed = phCollapsed[phi];
    const arrow = isCollapsed ? '▶' : '▼';
    const arrowCls = isCollapsed ? '' : 'open';
    mapHtml += `<div class="sm-phase">
      <div class="sm-phase-hdr" onclick="togglePh(${phi})">
        <span>${PHASES[phi]}</span>
        <span class="sm-phase-arrow ${arrowCls}">${arrow}</span>
      </div>`;
    if (!isCollapsed) {
      mapHtml += '<div class="sm-nodes">';
      phSteps.forEach(sid => {
        const s = STEPS[sid];
        if (!s) return;
        let cls = 'sm-node';
        if (sid === cur) cls += ' sm-current';
        else if (visitedSet.has(sid)) cls += ' sm-visited';
        else if (s.end) cls += ' sm-end';
        const title = s.t.length>34 ? s.t.slice(0,34)+'…' : s.t;
        mapHtml += `<div class="${cls}" onclick="sbNodeClick('${sid}')">${title}</div>`;
      });
      mapHtml += '</div>';
    }
    mapHtml += '</div>';
  });
  mapHtml += `<div class="sb-foot">Arts. 797–805 LEC<br>Ley 1/2000, de 7 de enero<br>Enjuiciamiento Civil</div>`;
  mapHtml += `<div style="padding:6px 7px 10px;font-size:11px;color:rgba(255,255,255,.28);font-style:italic">✦ Pulsa cualquier paso para acceder directamente</div>`;
  document.getElementById('sb-map').innerHTML = mapHtml;

  // JOURNEY TAB
  let jHtml = '';
  hist.forEach((h, i) => {
    const s = STEPS[h.s];
    if (!s) return;
    jHtml += `<div class="pi past">
      <div class="pi-step">${s.t.length>38?s.t.slice(0,38)+'…':s.t}</div>
      ${h.c ? `<div class="pi-choice">↳ ${h.c.length>38?h.c.slice(0,38)+'…':h.c}</div>` : ''}
    </div>`;
  });
  const cs = STEPS[cur];
  if (cs) {
    jHtml += `<div class="pi current">
      <div class="pi-step">${cs.t.length>38?cs.t.slice(0,38)+'…':cs.t}</div>
    </div>`;
  }
  if (!jHtml) jHtml = `<div style="font-size:14px;color:rgba(255,255,255,.30);padding:8px">El recorrido se registra aquí al tomar la primera decisión.</div>`;
  jHtml += `<div class="sb-foot">Arts. 797–805 LEC<br>Ley 1/2000, de 7 de enero<br>Enjuiciamiento Civil</div>`;
  document.getElementById('sb-journey').innerHTML = jHtml;

  // ACCESS TAB (de documento 2)
  let aHtml = '';
  let n = 1;
  PHASES.forEach((phName, pi) => {
    const steps = Object.entries(STEPS).filter(([k,v]) => v.ph === pi && !v.end);
    if (!steps.length) return;
    aHtml += `<div class="ac-phase"><div class="ac-phase-hdr">${phName}</div>`;
    steps.forEach(([key, step]) => {
      const isCur = key === cur;
      aHtml += `<button class="ac-btn${isCur ? ' ac-current' : ''}" onclick="jumpTo('${key}')"><span class="ac-num">${n++}</span><span>${step.t.length>32?step.t.slice(0,32)+'…':step.t}</span></button>`;
    });
    aHtml += '</div>';
  });
  document.getElementById('sb-access').innerHTML = aHtml;
}

function togglePh(phi) {
  phCollapsed[phi] = !phCollapsed[phi];
  renderSidebar();
}
function sbNodeClick(sid) {
  jumpTo(sid);
}

// ════════════════════════════════════════════════════
// RENDER CONTENIDO
// ════════════════════════════════════════════════════
function renderContent() {
  const s = STEPS[cur];
  if (!s) { document.getElementById('content').innerHTML = '<p>Paso no encontrado.</p>'; return; }
  const stepNum = hist.length + 1;
  const phaseName = PHASES[s.ph] || '';

  if (s.end) {
    document.getElementById('content').innerHTML = buildEnd(s, stepNum, phaseName);
  } else {
    document.getElementById('content').innerHTML = buildStep(s, stepNum, phaseName);
  }
}

function actLabel(ac) {
  if (ac==='laj') return '<span class="act-badge act-laj">Letrado de la A.J.</span>';
  if (ac==='juez') return '<span class="act-badge act-juez">Tribunal / Juez</span>';
  if (ac==='notario') return '<span class="act-badge act-notario">Notario</span>';
  return '<span class="act-badge act-ambos">LAJ + Tribunal</span>';
}

function renderBlocks(blocks) {
  let html = '';
  blocks.forEach(b => {
    switch(b[0]) {
      case 'i': html += `<p class="blk-i">${b[1]}</p>`; break;
      case 'd': html += `<div class="blk-d">⏱ ${b[1]}</div>`; break;
      case 'n': html += `<div class="blk-n">ℹ ${b[1]}</div>`; break;
      case 'w': html += `<div class="blk-w">⚠ ${b[1]}</div>`; break;
      case 'l': html += `<div class="blk-l">📋 ${b[1]}</div>`; break;
      case 'cl':
        html += `<div class="blk-cl"><div class="blk-cl-title">${b[1]}</div><ul>`;
        b[2].forEach(item => { html += `<li>${item}</li>`; });
        html += '</ul></div>'; break;
    }
  });
  return html;
}

const LETTERS = ['A','B','C','D','E'];
function escQ(s){ return s.replace(/'/g,"&#39;").replace(/"/g,'&quot;'); }

function buildStep(s, stepNum, phaseName) {
  const wasJump = hist.length && hist[hist.length-1].c === '[Salto directo]';
  let html = `<div class="card">
    <div class="c-hdr">
      <div class="c-hdr-top">${actLabel(s.ac)}</div>
      <div class="c-title">${s.t}</div>
      <div class="step-num">Paso ${stepNum} de este recorrido · ${phaseName}${wasJump ? `<span class="jump-badge">✦ Acceso directo</span>` : ''}</div>
    </div>
    <div class="c-body">${renderBlocks(s.c)}</div>`;

  if (s.q) {
    html += `<div class="dec-area">
      <div class="dec-q">${s.q}</div>
      <div class="dec-opts">`;
    s.opts.forEach((opt, i) => {
      html += `<button class="dec-btn ${opt.l}" onclick="goTo('${opt.n}','${escQ(opt.t)}')">
        <span class="dec-letter">${LETTERS[i]}</span>
        <span>${opt.t}</span>
      </button>`;
    });
    html += '</div></div>';
  }

  html += `<div class="c-nav">
    <button class="btn-back" onclick="goBack()" ${!hist.length?'disabled':''}>← Volver</button>
    ${s.nx ? `<button class="btn-next" onclick="goTo('${s.nx}','')">Siguiente →</button>` : ''}
  </div></div>`;
  return html;
}

function buildEnd(s, stepNum, phaseName) {
  const icons = {success:'✅',error:'❌',warning:'⚠️',neutral:'ℹ️'};
  const titles = {success:'Procedimiento concluido satisfactoriamente',error:'Procedimiento concluido con incidencias',warning:'Procedimiento concluido con observaciones',neutral:'Procedimiento concluido'};
  const icon = icons[s.end]||'ℹ️';
  const title = titles[s.end]||'Fin';

  let sumHtml = '';
  const allSteps = [...hist.map(h=>({sid:h.s,choice:h.c})), {sid:cur,choice:''}];
  allSteps.forEach((item, i) => {
    const st = STEPS[item.sid];
    if (!st) return;
    sumHtml += `<div class="sum-item">
      <span class="sum-n">${i+1}</span>
      <div class="sum-t">${st.t}${item.choice?`<div class="sum-c">↳ ${item.choice}</div>`:''}</div>
    </div>`;
  });

  return `<div class="card end-${s.end}">
    <div class="c-hdr">
      <div class="c-hdr-top">${actLabel(s.ac)}</div>
      <div class="c-title">${s.t}</div>
      <div class="step-num">Paso ${stepNum} de este recorrido · ${phaseName}</div>
    </div>
    <div class="end-body">
      <div class="end-icon">${icon}</div>
      <div class="end-title">${title}</div>
      <div class="end-sub">El procedimiento ha concluido en esta vía</div>
      <div class="end-btns">
        <button class="btn-next" onclick="restart()">↺ Nuevo procedimiento</button>
        <button class="btn-back" onclick="goBack()">← Volver</button>
      </div>
    </div>
    <div class="c-body">${renderBlocks(s.c)}</div>
    <div class="summary-box">
      <h4>Resumen del recorrido seguido</h4>
      ${sumHtml}
    </div>
  </div>`;
}

// ════════════════════════════════════════════════════
// MAPA COMPLETO
// ════════════════════════════════════════════════════
function toggleMapa() {
  mapaOn = !mapaOn;
  document.getElementById('layout').style.display = mapaOn ? 'none' : 'flex';
  const mo = document.getElementById('mapa-overlay');
  mo.style.display = mapaOn ? 'block' : 'none';
  if (mapaOn) renderMapa();
}

function renderMapa() {
  const visitedSet = new Set(hist.map(h=>h.s));
  const actLabels = {laj:'LAJ', juez:'Juez', ambos:'LAJ+J', notario:'Notario'};
  const actColors = {laj:'color:#3730A3', juez:'color:#92400E', ambos:'color:#166534', notario:'color:#6B21A8'};

  let html = `<div class="mapa-hdr">
    <div class="mapa-hdr-left">
      <h2>Mapa completo del procedimiento</h2>
      <p>Administración del caudal hereditario · Arts. 797–805 LEC</p>
    </div>
    <button class="btn btn-ghost" style="color:#fff;border-color:rgba(255,255,255,.3)" onclick="toggleMapa()">← Volver al recorrido</button>
  </div>
  <div class="mapa-cols">`;

  STEP_ORDER.forEach((phSteps, phi) => {
    html += `<div class="mapa-col">
      <div class="mapa-col-hdr">${PHASES[phi]}</div>
      <div class="mapa-col-body">`;
    phSteps.forEach(sid => {
      const s = STEPS[sid];
      if (!s) return;
      let cls = 'mapa-node';
      if (sid === cur) cls += ' mn-current';
      else if (visitedSet.has(sid)) cls += ' mn-visited';
      else if (s.end) cls += ` mn-end-${s.end}`;
      const al = actLabels[s.ac]||'';
      const ac = actColors[s.ac]||'';
      const title = s.t.length>38 ? s.t.slice(0,38)+'…' : s.t;
      html += `<div class="${cls}" onclick="jumpTo('${sid}')" title="Ir directamente a: ${s.t.replace(/'/g,'&#39;')}">
        <div class="mapa-node-actor" style="${ac}">${al}${s.end?' · FIN':''}</div>
        <div class="mapa-node-title">${title}</div>
      </div>`;
    });
    html += '</div></div>';
  });

  html += `</div>
  <div class="mapa-legend">
    <div class="ml-item"><div class="ml-dot" style="background:#22c55e"></div> Visitado</div>
    <div class="ml-item"><div class="ml-dot" style="background:#4169E1"></div> Paso actual</div>
    <div class="ml-item"><div class="ml-dot" style="background:#15803D"></div> Fin satisfactorio</div>
    <div class="ml-item"><div class="ml-dot" style="background:#B45309"></div> Fin con incidencias</div>
    <div class="ml-item"><div class="ml-dot" style="background:#B91C1C"></div> Fin por bloqueo</div>
    <div class="ml-item"><div class="ml-dot" style="background:#D1D9EE"></div> No visitado</div>
    <div class="ml-item" style="margin-left:auto;font-size:13px;color:var(--muted)">LAJ = Letrado de la Adm. de Justicia · Juez = Tribunal</div>
    <div class="ml-item" style="width:100%;margin-top:4px;font-style:italic;color:var(--navy-mid)">✦ Pulsa cualquier nodo para ir directamente a ese paso</div>
  </div>`;

  document.getElementById('mapa-overlay').innerHTML = html;
}

// ════════════════════════════════════════════════════
// DESCARGA
// ════════════════════════════════════════════════════
function dlGuia() {
  const html = '<!DOCTYPE html>' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type:'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'guia-definitiva-administracion-caudal-hereditario-LEC-797-805.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

// ════════════════════════════════════════════════════
// INICIO
// ════════════════════════════════════════════════════
render();
</script>
