<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Guía de Tramitación — Intervención del Caudal Hereditario (arts. 790–796 LEC)</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1A2F6E;
  --navy-mid:#2E4DAA;
  --navy-lt:#4169E1;
  --cyan:#0D9488;      --cyan-bg:#F0FDFA;
  --violet:#5B21B6;    --violet-bg:#F5F3FF;
  --green:#15803D;     --green-bg:#F0FDF4;
  --amber:#B45309;     --amber-bg:#FFFBEB;
  --red:#B91C1C;       --red-bg:#FEF2F2;
  --slate:#475569;     --slate-bg:#F4F6FB;
  --white:#FFFFFF;
  --bdr:#D1D9EE;
  --text:#1A1A2E;
  --muted:#6B7280;
  --success-c:#15803D; --success-bg:#F0FDF4; --success-bdr:#86EFAC;
  --error-c:#B91C1C;   --error-bg:#FEF2F2;   --error-bdr:#FCA5A5;
  --warning-c:#B45309; --warning-bg:#FFFBEB; --warning-bdr:#FCD34D;
  --neutral-c:#1A2F6E; --neutral-bg:#EFF6FF; --neutral-bdr:#93C5FD;
}
html,body{height:100%;font-family:'Outfit',sans-serif;font-size:17px;color:var(--text);background:var(--slate-bg)}
#app{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* HEADER */
#hdr{flex-shrink:0;height:64px;background:var(--navy);display:flex;justify-content:space-between;align-items:center;padding:0 20px;gap:12px}
.h-left{display:flex;align-items:center;gap:10px;min-width:0}
.h-seal{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.10);border:1.5px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:15px}
.h-text{min-width:0}
.h-title{font-size:15px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.h-sub{font-size:12px;color:rgba(255,255,255,.50);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:ui-monospace,SFMono-Regular,monospace}
.h-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.btn{font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;border-radius:6px;padding:6px 12px;cursor:pointer;border:1px solid;transition:all .15s;white-space:nowrap;letter-spacing:.3px}
.btn-ghost{background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.85)}
.btn-ghost:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.35)}

/* PHASE BAR */
#pbar{flex-shrink:0;height:42px;background:var(--navy-mid);display:flex;align-items:center;padding:0 20px;overflow-x:auto;scrollbar-width:none;gap:2px}
#pbar::-webkit-scrollbar{display:none}
.ph-item{display:flex;align-items:center;gap:2px}
.ph-lbl{font-size:12px;font-weight:600;padding:4px 10px;border-radius:4px;white-space:nowrap;letter-spacing:.3px;color:rgba(255,255,255,.40);transition:all .2s}
.ph-lbl.done{color:rgba(255,255,255,.65)}
.ph-lbl.active{color:#fff;background:rgba(65,105,225,.45);font-weight:700}
.ph-sep{font-size:10px;color:rgba(255,255,255,.25);padding:0 1px}

/* BREADCRUMB */
#breadcrumb{flex-shrink:0;min-height:34px;background:var(--slate-bg);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;gap:0;overflow-x:auto;scrollbar-width:none;flex-wrap:wrap;row-gap:2px;padding-top:4px;padding-bottom:4px}
#breadcrumb::-webkit-scrollbar{display:none}
.bc-item{font-size:13px;white-space:nowrap;padding:0 6px;color:var(--muted)}
.bc-past{cursor:pointer;background:none;border:none;font-family:'Outfit',sans-serif;font-size:13px;color:var(--muted)}
.bc-past:hover{color:var(--navy-lt);text-decoration:underline}
.bc-current{font-weight:600;color:var(--navy)}
.bc-sep{font-size:12px;color:var(--bdr);padding:0 2px}

/* LAYOUT */
#layout{flex:1;overflow:hidden;display:flex}
#mapa-overlay{display:none;flex:1;overflow-y:auto;background:var(--slate-bg);padding:20px}

/* SIDEBAR */
#sidebar{width:260px;flex-shrink:0;background:var(--navy-mid);overflow-y:auto;display:flex;flex-direction:column}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:2px}
#sb-tabs{display:flex;border-bottom:1px solid rgba(255,255,255,.10);flex-shrink:0}
.sb-tab{flex:1;padding:10px 0;font-size:12px;font-weight:700;font-family:'Outfit',sans-serif;background:none;border:none;color:rgba(255,255,255,.40);cursor:pointer;letter-spacing:.5px;text-transform:uppercase;transition:all .15s;border-bottom:2px solid transparent}
.sb-tab.active{color:#fff;border-bottom:2px solid var(--navy-lt)}
.sb-tab:hover:not(.active){color:rgba(255,255,255,.70);background:rgba(255,255,255,.05)}
#sb-map,#sb-journey{padding:10px;flex:1}
.sm-phase{margin-bottom:6px}
.sm-phase-hdr{font-size:11px;font-weight:700;color:rgba(255,255,255,.40);text-transform:uppercase;letter-spacing:.5px;padding:5px 6px;cursor:pointer;border-radius:4px;display:flex;align-items:center;justify-content:space-between;transition:background .15s}
.sm-phase-hdr:hover{background:rgba(255,255,255,.06)}
.sm-phase-hdr .ph-toggle{font-size:10px;opacity:.5}
.sm-nodes{overflow:hidden}
.sm-node{font-size:12px;padding:6px 8px 6px 14px;border-radius:5px;color:rgba(255,255,255,.55);cursor:pointer;margin-bottom:2px;transition:background .12s,color .12s;position:relative;line-height:1.45;display:flex;align-items:flex-start;gap:6px}
.sm-node:hover{background:rgba(255,255,255,.12);color:rgba(255,255,255,.95)}
.sm-node.sm-visited{color:rgba(134,239,172,.9)}
.sm-node.sm-visited::before{content:'✓';position:absolute;left:2px;top:6px;font-size:10px;color:var(--green)}
.sm-node.sm-current{color:#fff;background:rgba(65,105,225,.35);font-weight:600}
.sm-node.sm-current::before{content:'●';position:absolute;left:2px;top:6px;font-size:9px;color:var(--navy-lt)}
.sm-node.sm-end{opacity:.7}
.sb-foot{margin-top:12px;padding:10px;background:rgba(0,0,0,.15);border-radius:6px;font-size:11px;color:rgba(255,255,255,.45);font-family:ui-monospace,SFMono-Regular,monospace;line-height:1.7}
.pi{padding:7px 8px;border-radius:5px;margin-bottom:4px;font-size:12px;color:rgba(255,255,255,.45);border-left:2px solid transparent;transition:background .12s}
.pi.current{color:#fff;border-left-color:var(--navy-lt);background:rgba(65,105,225,.20);font-weight:600}
.pi.past{border-left-color:rgba(255,255,255,.15);color:rgba(255,255,255,.55)}
.pi-choice{font-size:11px;color:rgba(255,255,255,.35);margin-top:3px;font-style:italic}

/* CONTENT */
#content{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:flex-start}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:3px}

/* CARD */
.card{background:var(--white);border:1px solid var(--bdr);border-radius:12px;width:100%;max-width:760px;box-shadow:0 2px 8px rgba(26,47,110,.07);animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.c-hdr{padding:18px 20px 14px;border-bottom:1px solid var(--bdr);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.act-badge{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;padding:4px 10px;border-radius:4px;font-family:ui-monospace,SFMono-Regular,monospace}
.act-laj{background:var(--cyan-bg);color:var(--cyan);border:1px solid rgba(13,148,136,.25)}
.act-juez{background:var(--violet-bg);color:var(--violet);border:1px solid rgba(91,33,182,.25)}
.act-ambos{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(180,83,9,.25)}
.c-title{font-size:18px;font-weight:700;color:var(--text);flex:1;min-width:200px}
.step-num{font-size:12px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,monospace;white-space:nowrap;align-self:flex-end}
.c-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px}
.b-intro{font-size:15px;line-height:1.75;color:var(--text)}
.b-deadline{background:var(--amber-bg);border:1px solid var(--warning-bdr);border-left:3px solid var(--amber);border-radius:6px;padding:12px 16px;font-size:14px;color:var(--amber);display:flex;gap:8px;align-items:flex-start}
.b-note{background:var(--cyan-bg);border:1px solid rgba(13,148,136,.2);border-left:3px solid var(--cyan);border-radius:6px;padding:12px 16px;font-size:14px;color:var(--cyan);display:flex;gap:8px;align-items:flex-start}
.b-warn{background:var(--red-bg);border:1px solid var(--error-bdr);border-left:3px solid var(--red);border-radius:6px;padding:12px 16px;font-size:14px;color:var(--red);display:flex;gap:8px;align-items:flex-start}
.b-law{background:var(--violet-bg);border:1px solid rgba(91,33,182,.2);border-radius:6px;padding:10px 14px;font-size:13px;color:var(--violet);font-family:ui-monospace,SFMono-Regular,monospace}
.b-check{background:var(--slate-bg);border:1px solid var(--bdr);border-radius:8px;overflow:hidden}
.b-check-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:9px 14px;border-bottom:1px solid var(--bdr);background:var(--white)}
.b-check-list{padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.b-check-item{display:flex;gap:10px;align-items:flex-start;font-size:14px;line-height:1.6;color:var(--text);cursor:pointer}
.b-check-item input[type=checkbox]{margin-top:3px;width:16px;height:16px;accent-color:var(--navy-lt);flex-shrink:0;cursor:pointer}
.b-check-item.done-item{color:var(--muted);text-decoration:line-through}

/* DECISION AREA */
.dec-area{padding:0 20px 18px}
.dec-q{background:var(--slate-bg);border:1.5px solid var(--bdr);border-top:3px solid var(--navy);border-radius:8px;padding:12px 16px;margin-bottom:12px}
.dec-q-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:6px}
.dec-q-text{font-size:15px;font-weight:600;color:var(--text);line-height:1.55}
.dec-opts{display:flex;flex-direction:column;gap:10px}
.dec-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;border-radius:8px;border:1.5px solid var(--bdr);background:var(--white);cursor:pointer;transition:all .15s;text-align:left;font-family:'Outfit',sans-serif;width:100%}
.dec-btn:hover{border-color:var(--navy-lt);background:var(--slate-bg)}
.dec-btn.ok:hover{border-color:var(--green);background:var(--green-bg)}
.dec-btn.bad:hover{border-color:var(--red);background:var(--red-bg)}
.dec-btn.warn:hover{border-color:var(--amber);background:var(--amber-bg)}
.dec-btn.neutral:hover{border-color:var(--navy-lt);background:var(--neutral-bg)}
.dec-letter{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:ui-monospace,SFMono-Regular,monospace}
.ok .dec-letter{background:var(--green-bg);color:var(--green);border:1px solid rgba(21,128,61,.25)}
.bad .dec-letter{background:var(--red-bg);color:var(--red);border:1px solid rgba(185,28,28,.25)}
.warn .dec-letter{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(180,83,9,.25)}
.neutral .dec-letter{background:var(--neutral-bg);color:var(--navy);border:1px solid rgba(26,47,110,.2)}
.dec-btn-text{font-size:14px;color:var(--text);line-height:1.45;font-weight:500}

/* NAV BAR */
.c-nav{padding:14px 20px;border-top:1px solid var(--bdr);display:flex;gap:8px;align-items:center;background:var(--slate-bg);border-radius:0 0 12px 12px}
.btn-back{background:var(--white);border:1.5px solid var(--bdr);color:var(--slate);font-size:14px;font-weight:600;padding:9px 18px;border-radius:7px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-back:hover:not(:disabled){border-color:var(--navy-lt);color:var(--navy-lt)}
.btn-back:disabled{opacity:.35;cursor:not-allowed}
.btn-next{background:var(--navy-lt);border:1.5px solid var(--navy-lt);color:#fff;font-size:14px;font-weight:600;padding:9px 20px;border-radius:7px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s;margin-left:auto}
.btn-next:hover{background:var(--navy);border-color:var(--navy)}

/* END CARD */
.end-success .c-hdr{background:var(--success-bg);border-bottom-color:var(--success-bdr)}
.end-error .c-hdr{background:var(--error-bg);border-bottom-color:var(--error-bdr)}
.end-warning .c-hdr{background:var(--warning-bg);border-bottom-color:var(--warning-bdr)}
.end-neutral .c-hdr{background:var(--neutral-bg);border-bottom-color:var(--neutral-bdr)}
.end-icon{font-size:32px;margin-right:10px}
.end-title{font-size:19px;font-weight:700}
.end-success .end-title{color:var(--success-c)}
.end-error .end-title{color:var(--error-c)}
.end-warning .end-title{color:var(--warning-c)}
.end-neutral .end-title{color:var(--neutral-c)}
.end-sub{font-size:13px;color:var(--muted);margin-top:2px;font-weight:400}
.summary-box{background:var(--slate-bg);border:1px solid var(--bdr);border-radius:8px;overflow:hidden;margin-top:4px}
.summary-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:9px 14px;border-bottom:1px solid var(--bdr);background:var(--white)}
.summary-list{padding:12px 14px;display:flex;flex-direction:column;gap:4px}
.summary-item{font-size:14px;color:var(--text);display:flex;gap:8px;line-height:1.55;padding:4px 0;border-bottom:1px solid var(--bdr)}
.summary-item:last-child{border-bottom:none}
.summary-n{font-size:11px;font-weight:700;color:var(--muted);font-family:ui-monospace,SFMono-Regular,monospace;min-width:22px;padding-top:2px}
.summary-choice{font-size:12px;color:var(--navy-lt);font-style:italic;margin-top:2px}
.end-actions{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--bdr);background:var(--slate-bg);border-radius:0 0 12px 12px}
.btn-restart{background:var(--navy);border:1.5px solid var(--navy);color:#fff;font-size:14px;font-weight:600;padding:9px 18px;border-radius:7px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-restart:hover{background:var(--navy-lt)}
.btn-end-back{background:var(--white);border:1.5px solid var(--bdr);color:var(--slate);font-size:14px;font-weight:600;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.btn-end-back:hover{border-color:var(--navy-lt);color:var(--navy-lt)}

/* MAPA OVERLAY */
.mapa-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.mapa-hdr h2{font-size:17px;font-weight:700;color:var(--navy)}
.mapa-phases{display:flex;gap:14px;align-items:flex-start;overflow-x:auto;padding-bottom:10px}
.mapa-col{min-width:180px;max-width:210px;flex-shrink:0}
.mapa-col-hdr{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--navy-mid);padding:7px 10px;background:var(--white);border:1px solid var(--bdr);border-radius:6px;margin-bottom:8px;text-align:center}
.mapa-node{background:var(--white);border:1px solid var(--bdr);border-left:3px solid var(--bdr);border-radius:6px;padding:9px 11px;margin-bottom:6px;font-size:12px;line-height:1.45;cursor:pointer;transition:box-shadow .15s,transform .1s}
.mapa-node:hover{box-shadow:0 2px 8px rgba(65,105,225,.18);transform:translateY(-1px);border-left-color:var(--navy-lt)}
.jump-badge{display:inline-block;font-size:10px;font-weight:700;background:var(--violet-bg);color:var(--violet);border:1px solid var(--violet);border-radius:10px;padding:2px 8px;margin-left:8px;letter-spacing:.3px;vertical-align:middle}
.mapa-node.visited{border-left-color:var(--green);background:var(--green-bg)}
.mapa-node.current-node{border-left-color:var(--navy-lt);background:var(--neutral-bg)}
.mapa-node.end-s{border-left-color:var(--green)}
.mapa-node.end-e{border-left-color:var(--red)}
.mapa-node.end-w{border-left-color:var(--amber)}
.mapa-node.end-n{border-left-color:var(--navy-lt)}
.mapa-node-title{font-weight:600;color:var(--text);margin-bottom:2px}
.mapa-node-actor{font-size:10px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,monospace;text-transform:uppercase;letter-spacing:.4px}
.mapa-node-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;margin-top:4px;display:inline-block}
.mapa-node-badge.end-s{background:var(--green-bg);color:var(--green)}
.mapa-node-badge.end-w{background:var(--amber-bg);color:var(--amber)}
.mapa-node-badge.end-n{background:var(--neutral-bg);color:var(--navy)}
.mapa-btn-back{background:var(--navy);border:1.5px solid var(--navy);color:#fff;font-size:14px;font-weight:600;padding:9px 16px;border-radius:7px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .15s}
.mapa-btn-back:hover{background:var(--navy-lt)}

/* TOOLTIP PREVIEW */
.node-preview{position:fixed;background:var(--white);border:1px solid var(--bdr);border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.15);padding:14px;max-width:260px;font-size:13px;z-index:100;pointer-events:none;line-height:1.55;color:var(--text)}
.node-preview-title{font-weight:700;margin-bottom:4px;font-size:14px}
.node-preview-actor{font-size:11px;color:var(--muted);font-family:ui-monospace,SFMono-Regular,monospace}

@media print{
  #hdr .h-right,#sidebar,#breadcrumb,#pbar,.c-nav,.end-actions{display:none!important}
  #app{height:auto}
  #layout{display:block;overflow:visible}
  #content{overflow:visible;padding:0}
  .card{box-shadow:none;break-inside:avoid;margin-bottom:16px}
  body{font-size:12px}
}
@media(max-width:700px){
  #sidebar{display:none}
  #content{padding:12px}
  .h-title{font-size:12px}
  .h-sub{display:none}
  .btn span{display:none}
  .dec-opts{flex-direction:column}
}
</style>
</head>
<body>
<div id="app">
  <div id="hdr">
    <div class="h-left">
      <div class="h-seal">⚖</div>
      <div class="h-text">
        <div class="h-title">Intervención del Caudal Hereditario</div>
        <div class="h-sub">Ley 1/2000 LEC · Arts. 790–796 · Administrador Procesal y Administrativo</div>
      </div>
    </div>
    <div class="h-right">
      <button class="btn btn-ghost" onclick="toggleMapa()"><span>🗺 Ver mapa</span></button>
      <button class="btn btn-ghost" onclick="dlGuia()"><span>⬇ Descargar</span></button>
      <button class="btn btn-ghost" onclick="restart()"><span>↺ Reiniciar</span></button>
    </div>
  </div>
  <div id="pbar"></div>
  <div id="breadcrumb"></div>
  <div id="layout">
    <div id="sidebar">
      <div id="sb-tabs">
        <button class="sb-tab active" onclick="sbTab('map')">Mapa</button>
        <button class="sb-tab" onclick="sbTab('journey')">Recorrido</button>
      </div>
      <div id="sb-map"></div>
      <div id="sb-journey" style="display:none"></div>
    </div>
    <div id="content"></div>
  </div>
  <div id="mapa-overlay"></div>
</div>

<script>
// ─────────────────────────────────────────────
// DATA
// ─────────────────────────────────────────────
const PHASES = [
  'Noticia del fallecimiento',
  'Medidas urgentes · art. 790',
  'Averiguación · art. 791.1',
  'Auto de intervención · arts. 791.2 / 792',
  'Citación e inventario · arts. 793–794',
  'Administración del caudal · art. 795',
  'Cesación · art. 796'
];

const STEPS = {
  inicio: {
    ph:0, t:'Noticia del fallecimiento', ac:'laj',
    c:[
      ['i','El Tribunal recibe noticia del fallecimiento del causante. Esta noticia puede llegar por diversas vías: comunicación del Registro Civil al amparo de la Ley 20/2011; denuncia de vecinos, autoridades o fuerzas de seguridad; o actuaciones judiciales previas en las que el óbito emerge incidentalmente.'],
      ['n','Antes de adoptar medida alguna, debe verificarse si constan testamento o parientes del causante con derecho hereditario.'],
      ['l','Art. 790 LEC · Ley 20/2011, del Registro Civil · Regl. (UE) 650/2012 (competencia internacional)']
    ],
    q:'¿Consta testamento o existen parientes conocidos del difunto (ascendientes, descendientes, cónyuge, persona en situación asimilable, o colaterales hasta el 4.º grado)?',
    opts:[
      {t:'No consta testamento ni parientes conocidos — procede actuación de oficio (art. 790)',l:'bad',n:'medidas_790'},

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let cur = 'inicio';
let hist = []; // [{s: claveOrigen, next: claveDestino, c: textoOpción}]
let activeSbTab = 'map';
let phaseCollapsed = {};
let mapaOn = false;
let visitedNodes = new Set();

// ─────────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────────
function goTo(stepId, choiceLabel) {
  hist.push({s: cur, next: stepId, c: choiceLabel || ''});
  visitedNodes.add(cur);
  cur = stepId;
  if (choiceLabel) sbTab('journey');
  render();
}
function goBack() {
  if (hist.length === 0) return;
  const last = hist.pop();
  cur = last.s;
  visitedNodes.delete(cur);
  render();
}
function goBackTo(index) {
  hist = hist.slice(0, index);
  visitedNodes.clear();
  hist.forEach(h => visitedNodes.add(h.s));
  cur = index === 0 ? 'inicio' : hist[index - 1].next;
  render();
}
function jumpTo(stepId) {
  if (stepId === cur) return;
  hist.push({s: cur, next: stepId, c: '[Salto directo]'});
  visitedNodes.add(cur);
  cur = stepId;
  sbTab('map');
  if (mapaOn) toggleMapa();
  render();
}
function restart() {
  cur = 'inicio'; hist = []; visitedNodes.clear();
  sbTab('map'); render();
}
function sbTab(tab) {
  activeSbTab = tab;
  document.getElementById('sb-map').style.display = tab === 'map' ? 'block' : 'none';
  document.getElementById('sb-journey').style.display = tab === 'journey' ? 'block' : 'none';
  document.querySelectorAll('.sb-tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && tab === 'map') || (i === 1 && tab === 'journey'));
  });
}

// ─────────────────────────────────────────────
// RENDER ORCHESTRATOR
// ─────────────────────────────────────────────
function render() {
  renderPbar();
  renderBreadcrumb();
  renderSidebar();
  renderContent();
  document.getElementById('content').scrollTop = 0;
}

// ─────────────────────────────────────────────
// PHASE BAR
// ─────────────────────────────────────────────
function renderPbar() {
  const s = STEPS[cur];
  const curPh = s ? s.ph : 0;
  const maxDone = Math.max(...hist.map(h => STEPS[h.s] ? STEPS[h.s].ph : 0), 0);
  let html = '';
  PHASES.forEach((ph, i) => {
    let cls = '';
    if (i === curPh) cls = 'active';
    else if (i <= maxDone) cls = 'done';
    html += `<div class="ph-item"><span class="ph-lbl ${cls}">${ph}</span></div>`;
    if (i < PHASES.length - 1) html += `<span class="ph-sep">›</span>`;
  });
  document.getElementById('pbar').innerHTML = html;
}

// ─────────────────────────────────────────────
// BREADCRUMB
// ─────────────────────────────────────────────
function renderBreadcrumb() {
  if (hist.length === 0) {
    document.getElementById('breadcrumb').innerHTML =
      `<span class="bc-item bc-current">${truncate(STEPS[cur].t, 40)}</span>`;
    return;
  }
  let html = '';
  hist.forEach((h, i) => {
    const st = STEPS[h.s];
    if (!st) return;
    html += `<button class="bc-item bc-past" onclick="goBackTo(${i})">${truncate(st.t, 28)}</button>`;
    html += `<span class="bc-sep">›</span>`;
  });
  html += `<span class="bc-item bc-current">${truncate(STEPS[cur] ? STEPS[cur].t : '—', 32)}</span>`;
  document.getElementById('breadcrumb').innerHTML = html;
}

function truncate(s, n) {
  return s.length > n ? s.slice(0, n - 1) + '…' : s;
}

// ─────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────
function renderSidebar() {
  renderSbMap();
  renderSbJourney();
}

function renderSbMap() {
  const groups = {};
  Object.keys(STEPS).forEach(id => {
    const s = STEPS[id];
    if (!groups[s.ph]) groups[s.ph] = [];
    groups[s.ph].push({id, s});
  });

  // Build reachable set from current path
  const reachableFromPath = new Set();
  // Simple: consider nodes on current trajectory reachable; finalized branch nodes less so
  Object.keys(STEPS).forEach(id => reachableFromPath.add(id));

  let html = '';
  PHASES.forEach((ph, i) => {
    const nodes = groups[i] || [];
    const collapsed = phaseCollapsed[i] === true;
    html += `<div class="sm-phase">
      <div class="sm-phase-hdr" onclick="togglePhase(${i})">
        <span>${ph}</span>
        <span class="ph-toggle">${collapsed ? '▶' : '▼'}</span>
      </div>
      <div class="sm-nodes" id="sm-nodes-${i}" style="display:${collapsed ? 'none' : 'block'}">`;
    nodes.forEach(({id, s}) => {
      let cls = '';
      if (id === cur) cls = 'sm-current';
      else if (visitedNodes.has(id)) cls = 'sm-visited';
      else if (s.end) cls = 'sm-end';
      const title = truncate(s.t, 34);
      html += `<div class="sm-node ${cls}" onclick="smNodeClick('${id}',event)" title="${s.t}">${title}</div>`;
    });
    html += `</div></div>`;
  });

  html += `<div class="sb-foot">Arts. 790–796 LEC<br>Ley 1/2000, 7 ene.<br>Guía: Adm. Procesal y Admvo.</div>`;
  html += `<div style="padding:6px 10px 10px;font-size:10px;color:rgba(255,255,255,.28);font-style:italic">✦ Pulsa cualquier paso para acceder directamente</div>`;
  document.getElementById('sb-map').innerHTML = html;
}

function smNodeClick(id, evt) {
  jumpTo(id);
}

function togglePhase(i) {
  phaseCollapsed[i] = !phaseCollapsed[i];
  const el = document.getElementById(`sm-nodes-${i}`);
  if (el) el.style.display = phaseCollapsed[i] ? 'none' : 'block';
  renderSbMap();
}

function renderSbJourney() {
  let html = '';
  hist.forEach((h, i) => {
    const s = STEPS[h.s];
    if (!s) return;
    html += `<div class="pi past">
      <div>${truncate(s.t, 38)}</div>
      ${h.c ? `<div class="pi-choice">→ ${truncate(h.c, 40)}</div>` : ''}
    </div>`;
  });
  const cs = STEPS[cur];
  if (cs) {
    html += `<div class="pi current">${truncate(cs.t, 38)}</div>`;
  }
  html += `<div class="sb-foot">Arts. 790–796 LEC · Ley 1/2000<br>Guía: Adm. Procesal y Admvo.<br>${hist.length} paso(s) recorridos</div>`;
  document.getElementById('sb-journey').innerHTML = html;
}

// ─────────────────────────────────────────────
// CONTENT
// ─────────────────────────────────────────────
function renderContent() {
  const s = STEPS[cur];
  if (!s) { document.getElementById('content').innerHTML = '<p>Paso no encontrado.</p>'; return; }
  if (s.end) {
    document.getElementById('content').innerHTML = buildEnd(s);
  } else {
    document.getElementById('content').innerHTML = buildStep(s);
  }
}

function buildStep(s) {
  const actorLabel = {laj:'Letrado de la Administración de Justicia',juez:'Tribunal (Juez/Magistrado)',ambos:'LAJ y Tribunal'}[s.ac] || s.ac;
  const actorCls = `act-${s.ac}`;
  const stepN = hist.length + 1;
  const phN = PHASES[s.ph] || '';
  const wasJump = hist.length && hist[hist.length - 1].c === '[Salto directo]';

  let bodyHtml = renderBlocks(s.c);
  let decHtml = '';
  if (s.q) {
    const letters = ['A','B','C','D','E'];
    const typeMaps = {ok:'ok', bad:'bad', warn:'warn', neutral:'neutral'};
    decHtml = `<div class="dec-area">
      <div class="dec-q">
        <div class="dec-q-label">Punto de decisión</div>
        <div class="dec-q-text">${s.q}</div>
      </div>
      <div class="dec-opts">
        ${s.opts.map((o, i) => `
          <button class="dec-btn ${typeMaps[o.l]||'neutral'}" onclick="goTo('${o.n}','${escQ(o.t)}')">
            <span class="dec-letter">${letters[i]||i+1}</span>
            <span class="dec-btn-text">${o.t}</span>
          </button>`).join('')}
      </div>
    </div>`;
  }
  let navHtml = `<div class="c-nav">
    <button class="btn-back" onclick="goBack()" ${hist.length === 0 ? 'disabled' : ''}>← Volver</button>
    ${s.nx ? `<button class="btn-next" onclick="goTo('${s.nx}','')">Siguiente →</button>` : ''}
  </div>`;

  return `<div class="card">
    <div class="c-hdr">
      <span class="act-badge ${actorCls}">${actorLabel}</span>
      <div class="c-title">${s.t}</div>
      <span class="step-num">Paso ${stepN} · ${phN}${wasJump ? `<span class="jump-badge">✦ Acceso directo</span>` : ''}</span>
    </div>
    <div class="c-body">${bodyHtml}</div>
    ${decHtml}
    ${navHtml}
  </div>`;
}

function buildEnd(s) {
  const icons = {success:'✅', error:'❌', warning:'⚠️', neutral:'📋'};
  const titles = {success:'Procedimiento concluido con éxito', error:'Procedimiento concluido con incidencia', warning:'Procedimiento bloqueado — acción requerida', neutral:'Procedimiento en suspensión o continuación externa'};
  const subs = {success:'La intervención del caudal hereditario ha culminado satisfactoriamente.', error:'Se ha producido un supuesto que requiere revisión.', warning:'El cese de la intervención no puede acordarse en este momento.', neutral:'La intervención subsiste o continúa por una vía diferente.'};

  let summHtml = '';
  const all = [...hist, {s: cur, next: null, c: ''}];
  const stepIds = [...hist.map(h => h.s), cur];
  summHtml = `<div class="summary-box">
    <div class="summary-title">Resumen del recorrido seguido</div>
    <div class="summary-list">
      ${hist.map((h, i) => {
        const st = STEPS[h.s];
        return `<div class="summary-item">
          <span class="summary-n">${i+1}</span>
          <div>
            <div>${st ? st.t : h.s}</div>
            ${h.c ? `<div class="summary-choice">→ ${h.c}</div>` : ''}
          </div>
        </div>`;
      }).join('')}
      <div class="summary-item">
        <span class="summary-n">${hist.length + 1}</span>
        <div><div>${STEPS[cur] ? STEPS[cur].t : cur}</div></div>
      </div>
    </div>
  </div>`;

  const bodyHtml = renderBlocks(s.c);

  return `<div class="card end-${s.end}">
    <div class="c-hdr">
      <span class="end-icon">${icons[s.end]}</span>
      <div>
        <div class="end-title">${titles[s.end]}</div>
        <div class="end-sub">${subs[s.end]}</div>
      </div>
    </div>
    <div class="c-body">
      ${bodyHtml}
      ${summHtml}
    </div>
    <div class="end-actions">
      <button class="btn-restart" onclick="restart()">↺ Nuevo procedimiento</button>
      <button class="btn-end-back" onclick="goBack()">← Volver al paso anterior</button>
    </div>
  </div>`;
}

function renderBlocks(blocks) {
  if (!blocks) return '';
  return blocks.map(b => {
    if (b[0] === 'i') return `<div class="b-intro">${b[1]}</div>`;
    if (b[0] === 'd') return `<div class="b-deadline"><span>⏱</span><div>${b[1]}</div></div>`;
    if (b[0] === 'n') return `<div class="b-note"><span>ℹ</span><div>${b[1]}</div></div>`;
    if (b[0] === 'w') return `<div class="b-warn"><span>⚠</span><div>${b[1]}</div></div>`;
    if (b[0] === 'l') return `<div class="b-law">${b[1]}</div>`;
    if (b[0] === 'cl') {
      const items = b[2].map((item, idx) => {
        const uid = 'chk_' + Math.random().toString(36).slice(2) + idx;
        return `<label class="b-check-item" id="lbl_${uid}">
          <input type="checkbox" id="${uid}" onchange="toggleCheck('lbl_${uid}',this.checked)"/>
          ${item}
        </label>`;
      }).join('');
      return `<div class="b-check">
        <div class="b-check-title">${b[1]}</div>
        <div class="b-check-list">${items}</div>
      </div>`;
    }
    return '';
  }).join('');
}

function toggleCheck(lblId, checked) {
  const lbl = document.getElementById(lblId);
  if (lbl) lbl.classList.toggle('done-item', checked);
}

function escQ(s) {
  return (s || '').replace(/'/g, "&#39;").replace(/"/g, '&quot;');
}

// ─────────────────────────────────────────────
// MAPA OVERLAY
// ─────────────────────────────────────────────
function toggleMapa() {
  mapaOn = !mapaOn;
  document.getElementById('layout').style.display = mapaOn ? 'none' : 'flex';
  document.getElementById('mapa-overlay').style.display = mapaOn ? 'block' : 'none';
  if (mapaOn) renderMapa();
}

function renderMapa() {
  const groups = {};
  PHASES.forEach((_, i) => groups[i] = []);
  Object.keys(STEPS).forEach(id => {
    const s = STEPS[id];
    groups[s.ph].push({id, s});
  });

  let html = `<div class="mapa-hdr">
    <h2>🗺 Mapa completo del procedimiento — Arts. 790–796 LEC</h2>
    <button class="mapa-btn-back" onclick="toggleMapa()">← Volver al recorrido</button>
  </div>
  <div class="mapa-phases">`;

  PHASES.forEach((ph, i) => {
    html += `<div class="mapa-col">
      <div class="mapa-col-hdr">${ph}</div>`;
    (groups[i] || []).forEach(({id, s}) => {
      let cls = '';
      if (id === cur) cls = 'current-node';
      else if (visitedNodes.has(id)) cls = 'visited';
      else if (s.end) cls = `end-${s.end.charAt(0)}`;
      const actLabel = {laj:'LAJ',juez:'Juez',ambos:'LAJ+Juez'}[s.ac] || s.ac;
      let badge = '';
      if (s.end) {
        const endLabels = {success:'✅ Cese',warning:'⚠ Bloqueado',neutral:'📋 Continúa'};
        badge = `<span class="mapa-node-badge end-${s.end.charAt(0)}">${endLabels[s.end]||s.end}</span>`;
      }
      html += `<div class="mapa-node ${cls}" onclick="jumpTo('${id}')" title="Ir directamente a: ${escQ(s.t)}">
        <div class="mapa-node-title">${truncate(s.t, 36)}</div>
        <div class="mapa-node-actor">${actLabel}</div>
        ${badge}
      </div>`;
    });
    html += `</div>`;
  });

  html += `</div>
  <div style="margin-top:16px;padding:12px;background:var(--white);border:1px solid var(--bdr);border-radius:8px;font-size:11px;color:var(--muted)">
    <strong style="color:var(--navy)">Leyenda:</strong>
    &nbsp;🟩 Nodo visitado en el recorrido actual &nbsp;|&nbsp;
    🔵 Nodo activo &nbsp;|&nbsp;
    ✅ Desenlace de cese &nbsp;|&nbsp;
    ⚠ Desenlace bloqueado &nbsp;|&nbsp;
    📋 Desenlace con continuación &nbsp;|&nbsp;
    <em style="color:var(--navy-mid)">✦ Pulsa cualquier nodo para ir directamente a ese paso</em>
  </div>`;
  document.getElementById('mapa-overlay').innerHTML = html;
}

function dlGuia() {
  const html = '<!DOCTYPE html>' + document.documentElement.outerHTML;
  const blob = new Blob([html], {type: 'text/html;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'guia-tramitacion-intervencion-caudal.html';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}
